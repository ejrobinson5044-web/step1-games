<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SUFFIX SHOWDOWN — Drug Name to Class</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Sora:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --bg2:#12101a;
  --panel:#17151f;
  --panel-hi:#211d2c;
  --cyan:#f97316;        /* arcade orange primary */
  --cyan-dim:#c2410c;
  --amber:#22d3ee;       /* electric cyan accent */
  --amber-hi:#67e8f9;
  --red:#94a3b8;         /* slate used for WRONG */
  --green:#4ade80;
  --text:#fdf0e6;
  --dim:#b0a08f;
  --line:rgba(249,115,22,.16);
  --glow:rgba(249,115,22,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Sora',sans-serif;min-height:100vh;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 16% 0%,rgba(249,115,22,.13),transparent 55%),
    radial-gradient(ellipse at 88% 100%,rgba(34,211,238,.08),transparent 55%),
    linear-gradient(180deg,#0a0a0f,#12101a);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.035) 0 1px,transparent 1px 4px);
}
#app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:18px}

.hdr{text-align:center;padding:18px 0 16px;border-bottom:2px solid var(--cyan-dim);margin-bottom:20px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:58px;height:58px;border-radius:12px;
  background:linear-gradient(150deg,var(--cyan),var(--cyan-dim));color:#0a0a0f;
  font-family:'Bungee';font-size:22px;margin-bottom:10px;box-shadow:0 0 26px var(--glow)}
h1{font-family:'Bungee';font-size:30px;letter-spacing:.5px;color:var(--cyan);text-shadow:0 0 18px var(--glow);line-height:1.1}
.sub{font-family:'Space Mono';font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:8px;text-transform:uppercase}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:8px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.tile::after{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--cyan);opacity:.65}
.tile:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 26px rgba(0,0,0,.55)}
.tile.amber::after{background:var(--amber)}
.tile.special::after{background:linear-gradient(var(--amber),var(--cyan))}
.tile .ic{font-size:24px}
.tile h3{font-family:'Sora';font-weight:700;font-size:17px;margin:7px 0 5px;letter-spacing:.1px;line-height:1.25}
.tile p{font-size:12.5px;color:var(--dim);line-height:1.45}
.tile .meta{font-family:'Space Mono';font-size:10px;color:var(--cyan);margin-top:9px;letter-spacing:1px}
.tile.amber .meta{color:var(--amber-hi)}

.section-label{font-family:'Space Mono';font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}

.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'Space Mono';font-size:12px}
.qcount{color:var(--dim)}
.streak{color:var(--amber-hi)}
.bar{height:6px;background:var(--panel);border-radius:4px;overflow:hidden;margin-bottom:18px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:.3s}
.modtag{display:inline-block;font-family:'Space Mono';font-size:10px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--cyan-dim);border-radius:20px;padding:3px 11px;margin-bottom:14px;text-transform:uppercase}
.stem{font-size:18.5px;line-height:1.5;font-weight:600;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:11px}
.choice{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:.14s;font-size:15.5px;display:flex;gap:12px;align-items:flex-start}
.choice .k{font-family:'Space Mono';font-size:13px;color:var(--cyan);font-weight:700;flex-shrink:0}
.choice:hover{border-color:var(--cyan);background:var(--panel-hi)}
.choice.correct{border-color:var(--green);background:rgba(74,222,128,.13)}
.choice.correct .k{color:var(--green)}
.choice.wrong{border-color:var(--red);background:rgba(148,163,184,.14)}
.choice.wrong .k{color:var(--red)}
.choice.disabled{pointer-events:none;opacity:.85}

.explain{margin-top:18px;border-radius:12px;padding:15px 16px;background:var(--panel);border-left:3px solid var(--cyan);animation:rise .25s ease}
.explain.miss{border-left-color:var(--red)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.explain .lab{font-family:'Space Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.explain .why{font-size:14.5px;line-height:1.5}
.pearl{margin-top:11px;background:rgba(34,211,238,.09);border:1px dashed var(--amber);border-radius:10px;padding:11px 13px;font-size:14px;line-height:1.5}
.pearl b{color:var(--amber-hi);font-family:'Sora';font-weight:700;font-size:13px}

.btn{font-family:'Bungee';letter-spacing:.5px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;font-size:14px;transition:.15s}
.btn-next{background:linear-gradient(145deg,var(--cyan),var(--cyan-dim));color:#0a0a0f;margin-top:18px;width:100%}
.btn-next:hover{box-shadow:0 0 18px var(--glow)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--dim);margin-top:18px}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}

.result{text-align:center;padding:30px 16px}
.score-big{font-family:'Bungee';font-size:58px;color:var(--cyan);line-height:1;text-shadow:0 0 18px var(--glow)}
.rank{font-family:'Space Mono';font-weight:700;font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:12px 0 22px}
.statrow{display:flex;justify-content:center;gap:30px;margin-bottom:24px}
.statrow div{font-family:'Space Mono';font-size:12px;color:var(--dim)}
.statrow b{display:block;font-size:24px;color:var(--text);font-family:'Sora';font-weight:700}

.vault-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:12px;border-left:3px solid var(--amber)}
.vault-card h4{font-family:'Sora';font-weight:700;color:var(--amber-hi);font-size:16px;margin-bottom:7px;letter-spacing:.1px;line-height:1.25}
.vault-card p{font-size:14px;line-height:1.55;color:var(--text)}
.vault-card .tag{font-family:'Space Mono';font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-top:7px}

.back{font-family:'Space Mono';font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:1px;display:inline-flex;gap:6px;align-items:center;margin-bottom:16px}
.back:hover{color:var(--cyan)}
footer{text-align:center;font-family:'Space Mono';font-size:10px;color:var(--dim);margin:28px 0 8px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* correct = index into c[]; choices shuffle at render. Stems give the SUFFIX + example drugs only — never the class name. */
const QBANK=[
/* ===== CARDIOVASCULAR & RENAL ===== */
{m:"cv",q:"Drugs ending in '-pril' (such as lisinopril and enalapril) belong to which class?",c:["ACE inhibitors","Angiotensin receptor blockers","Beta blockers","Calcium channel blockers"],a:0,why:"'-pril' = ACE inhibitors (block angiotensin I→II). Side effects: dry cough, angioedema, hyperkalemia; teratogenic. First-line in heart failure and diabetic nephropathy.",p:"<b>-pril</b> = ACE inhibitors. Cough/angioedema/hyperkalemia; renoprotective; teratogen.",v:"A patient with hypertension starts lisinopril and later develops cough from increased bradykinin. Which class is represented?"},
{m:"cv",q:"Drugs ending in '-sartan' (such as losartan and valsartan) act as which class?",c:["Angiotensin II receptor blockers","ACE inhibitors","Aldosterone antagonists","Renin inhibitors"],a:0,why:"'-sartan' = ARBs (block the AT1 receptor). Same indications as ACE inhibitors but NO cough (don't raise bradykinin); still hyperkalemia and teratogenicity.",p:"<b>-sartan</b> = ARBs. Like ACE inhibitors but NO cough (no bradykinin rise).",v:"A patient with diabetic nephropathy starts losartan because it blocks angiotensin II at its receptor. Which class is represented?"},
{m:"cv",q:"Drugs ending in '-olol' (such as metoprolol and propranolol) belong to which class?",c:["Beta-adrenergic blockers","Alpha-adrenergic blockers","Calcium channel blockers","ACE inhibitors"],a:0,why:"'-olol' = beta blockers (↓ heart rate, contractility, renin). Used post-MI, in heart failure, arrhythmia, and hypertension; caution in asthma (nonselective) and can mask hypoglycemia.",p:"<b>-olol</b> = beta blockers. Post-MI, HF, arrhythmia; caution in asthma; mask hypoglycemia.",v:"A patient with atrial fibrillation receives metoprolol for rate control. Which class is represented?"},
{m:"cv",q:"Drugs ending in '-dipine' (such as amlodipine and nifedipine) are which class?",c:["Dihydropyridine calcium channel blockers","Beta blockers","ACE inhibitors","Nitrates"],a:0,why:"'-dipine' = dihydropyridine CCBs (act on vascular smooth muscle → vasodilation; side effect: peripheral edema). Non-DHPs (verapamil, diltiazem) act on the heart.",p:"<b>-dipine</b> = dihydropyridine CCBs (vascular → vasodilation, ankle edema). Verapamil/diltiazem = heart.",v:"A patient with hypertension and Raynaud symptoms starts amlodipine. Which class is represented?"},
{m:"cv",q:"Drugs ending in '-statin' (such as atorvastatin and simvastatin) belong to which lipid-lowering class?",c:["HMG-CoA reductase inhibitors","Fibrates","Bile acid resins","PCSK9 inhibitors"],a:0,why:"'-statin' = HMG-CoA reductase inhibitors (block cholesterol synthesis, the rate-limiting step). Most effective at lowering LDL; side effects: myopathy/↑CK, hepatotoxicity.",p:"<b>-statin</b> = HMG-CoA reductase inhibitors. Best LDL-lowering; myopathy + hepatotoxicity.",v:"A patient with high LDL starts atorvastatin and later reports myalgias. Which lipid-lowering class is represented?"},
{m:"cv",q:"Drugs ending in '-afil' (such as sildenafil and tadalafil) belong to which class?",c:["Phosphodiesterase-5 inhibitors","Beta blockers","Nitrates","Alpha blockers"],a:0,why:"'-afil' = PDE-5 inhibitors (↑ cGMP → smooth muscle relaxation; erectile dysfunction, pulmonary hypertension). Contraindicated with nitrates (dangerous hypotension).",p:"<b>-afil</b> = PDE-5 inhibitors (↑cGMP). ED, pulmonary HTN. NEVER with nitrates.",v:"A patient with erectile dysfunction takes tadalafil and is warned not to use nitrates because of severe hypotension. Which class is represented?"},
{m:"cv",q:"Anticoagulants ending in '-parin' (such as enoxaparin and dalteparin) are which class?",c:["Low-molecular-weight heparins","Direct thrombin inhibitors","Oral factor Xa inhibitors","Vitamin K antagonists"],a:0,why:"'-parin' = low-molecular-weight heparins (activate antithrombin → mainly inhibit factor Xa). More predictable than unfractionated heparin; reversed partially by protamine.",p:"<b>-parin</b> = LMW heparins (antithrombin → mostly factor Xa). Partial reversal with protamine."},
{m:"cv",q:"Drugs ending in '-osin' / '-zosin' (such as prazosin and tamsulosin) act as which class?",c:["Alpha-1 adrenergic blockers","Beta blockers","ACE inhibitors","Calcium channel blockers"],a:0,why:"'-zosin' = alpha-1 blockers (relax vascular and prostatic smooth muscle; used for hypertension and BPH; tamsulosin is uroselective). Side effect: first-dose orthostatic hypotension.",p:"<b>-zosin</b> = alpha-1 blockers. HTN + BPH. First-dose orthostatic hypotension."},

/* ===== ANTIMICROBIALS ===== */
{m:"abx",q:"Antibiotics ending in '-cillin' (such as amoxicillin and ampicillin) belong to which class?",c:["Penicillins","Cephalosporins","Macrolides","Tetracyclines"],a:0,why:"'-cillin' = penicillins (beta-lactams that inhibit cell wall synthesis). Watch for hypersensitivity reactions and resistance via beta-lactamases.",p:"<b>-cillin</b> = penicillins (β-lactam, cell wall synthesis). Hypersensitivity; β-lactamase resistance."},
{m:"abx",q:"Antibiotics ending in '-cycline' (such as doxycycline and minocycline) belong to which class?",c:["Tetracyclines","Penicillins","Fluoroquinolones","Aminoglycosides"],a:0,why:"'-cycline' = tetracyclines (30S protein synthesis inhibitors). Avoid in pregnancy and young children (teeth staining, bone); don't take with milk/antacids (chelation).",p:"<b>-cycline</b> = tetracyclines (30S). Avoid in pregnancy/kids; no dairy/antacids (chelation)."},
{m:"abx",q:"Antibiotics ending in '-floxacin' (such as ciprofloxacin and levofloxacin) belong to which class?",c:["Fluoroquinolones","Macrolides","Penicillins","Sulfonamides"],a:0,why:"'-floxacin' = fluoroquinolones (inhibit DNA gyrase/topoisomerase). Risks: tendon rupture, QT prolongation, avoid in children/pregnancy.",p:"<b>-floxacin</b> = fluoroquinolones (DNA gyrase). Tendon rupture, QT prolongation."},
{m:"abx",q:"Antibiotics ending in '-thromycin' (such as azithromycin and erythromycin) belong to which class?",c:["Macrolides","Aminoglycosides","Tetracyclines","Cephalosporins"],a:0,why:"'-thromycin' = macrolides (50S protein synthesis inhibitors). Risks: QT prolongation, GI motility (erythromycin), and CYP450 inhibition.",p:"<b>-thromycin</b> = macrolides (50S). QT prolongation; CYP450 inhibition; GI upset."},
{m:"abx",q:"Antiretroviral drugs ending in '-navir' (such as ritonavir and atazanavir) belong to which class?",c:["Protease inhibitors","Nucleoside reverse transcriptase inhibitors","Integrase inhibitors","Fusion inhibitors"],a:0,why:"'-navir' = HIV protease inhibitors (block cleavage of viral polyproteins). Cause lipodystrophy and hyperglycemia; ritonavir is a potent CYP450 inhibitor (pharmacologic 'booster').",p:"<b>-navir</b> = HIV protease inhibitors. Lipodystrophy/hyperglycemia; ritonavir = CYP booster."},
{m:"abx",q:"Antiviral drugs ending in '-ciclovir' (such as acyclovir and ganciclovir) treat which family of viruses?",c:["Herpesviruses","Influenza","HIV","Hepatitis C"],a:0,why:"'-ciclovir' antivirals are guanosine analogs activated by viral thymidine kinase → treat herpesviruses (HSV, VZV; ganciclovir for CMV). (Oseltamivir treats influenza.)",p:"<b>-ciclovir</b> = herpesvirus antivirals (HSV/VZV; ganciclovir → CMV). Need viral thymidine kinase."},
{m:"abx",q:"Antibiotics ending in '-penem' (such as imipenem and meropenem) belong to which broad-spectrum beta-lactam class?",c:["Carbapenems","Cephalosporins","Penicillins","Monobactams"],a:0,why:"'-penem' = carbapenems (very broad-spectrum beta-lactams, last-resort). Imipenem is given with cilastatin (blocks renal dehydropeptidase); risk of seizures.",p:"<b>-penem</b> = carbapenems (broad-spectrum, last-resort). Imipenem + cilastatin; seizure risk."},
{m:"abx",q:"Antifungal drugs ending in '-conazole' (such as fluconazole and ketoconazole) inhibit ergosterol synthesis and belong to which class?",c:["Azoles","Polyenes","Echinocandins","Allylamines"],a:0,why:"'-conazole/-azole' antifungals inhibit ergosterol synthesis (block lanosterol 14-alpha-demethylase). Potent CYP450 inhibitors; hepatotoxic. (Amphotericin = polyene; -fungin = echinocandin.)",p:"<b>-azole</b> = azole antifungals (block ergosterol synthesis). CYP450 inhibitors; hepatotoxic."},

/* ===== CNS & PSYCH ===== */
{m:"cns",q:"Drugs ending in '-azepam' or '-azolam' (such as lorazepam and alprazolam) belong to which class?",c:["Benzodiazepines","Barbiturates","SSRIs","Antipsychotics"],a:0,why:"'-azepam/-azolam' = benzodiazepines (↑ FREQUENCY of GABA-A chloride channel opening). Risk of dependence and respiratory depression (worse with alcohol/opioids); reversed by flumazenil.",p:"<b>-azepam/-azolam</b> = benzodiazepines (↑GABA-A frequency). Dependence; reverse with flumazenil."},
{m:"cns",q:"Drugs ending in '-barbital' (such as phenobarbital and pentobarbital) belong to which sedative class?",c:["Barbiturates","Benzodiazepines","Opioids","Tricyclic antidepressants"],a:0,why:"'-barbital' = barbiturates (↑ DURATION of GABA-A chloride channel opening). More dangerous in overdose (respiratory depression, no good antidote); CYP450 inducers.",p:"<b>-barbital</b> = barbiturates (↑GABA-A duration). Dangerous overdose; CYP450 inducers."},
{m:"cns",q:"Drugs ending in '-triptan' (such as sumatriptan) are used to abort which condition?",c:["Migraine headaches","Seizures","Depression","Nausea"],a:0,why:"'-triptan' = 5-HT(1B/1D) agonists that cause vasoconstriction → abort migraines. Contraindicated in coronary artery disease/Prinzmetal angina (vasospasm).",p:"<b>-triptan</b> = migraine abortives (5-HT1B/1D agonists, vasoconstrict). Avoid in CAD."},
{m:"cns",q:"Drugs ending in '-triptyline' or '-ipramine' (such as amitriptyline and imipramine) belong to which antidepressant class?",c:["Tricyclic antidepressants","SSRIs","MAO inhibitors","SNRIs"],a:0,why:"'-triptyline/-ipramine' = TCAs (block norepinephrine and serotonin reuptake). Overdose triad: cardiotoxicity (wide QRS), anticholinergic effects, seizures (the '3 C's'). Treat with sodium bicarbonate.",p:"<b>-triptyline/-ipramine</b> = TCAs. Overdose '3 C's': Cardiotoxicity, anti-Cholinergic, Convulsions → bicarb."},
{m:"cns",q:"Drugs ending in '-stigmine' (such as neostigmine and physostigmine) inhibit which enzyme?",c:["Acetylcholinesterase","Monoamine oxidase","Phosphodiesterase","HMG-CoA reductase"],a:0,why:"'-stigmine' = acetylcholinesterase inhibitors (↑ acetylcholine). Used for myasthenia gravis (pyridostigmine), ileus/urinary retention (neostigmine), and anticholinergic toxicity (physostigmine crosses into the CNS).",p:"<b>-stigmine</b> = AChE inhibitors (↑ACh). Myasthenia gravis, ileus; physostigmine for anticholinergic tox."},
{m:"cns",q:"Drugs ending in '-setron' (such as ondansetron) are used to treat what?",c:["Nausea and vomiting","Depression","Hypertension","Seizures"],a:0,why:"'-setron' = 5-HT3 receptor antagonists (antiemetics), especially for chemotherapy-induced nausea. Side effect: QT prolongation.",p:"<b>-setron</b> = 5-HT3 antagonists (antiemetics, chemo nausea). QT prolongation."},
{m:"cns",q:"Drugs ending in '-peridone' or '-piprazole' (such as risperidone and aripiprazole) belong to which class?",c:["Atypical (second-generation) antipsychotics","Typical (first-generation) antipsychotics","Benzodiazepines","SSRIs"],a:0,why:"'-peridone/-piprazole' = atypical antipsychotics (block D2 and 5-HT2 receptors). Cause metabolic syndrome (weight gain, hyperglycemia, dyslipidemia); fewer extrapyramidal effects than typicals.",p:"<b>-peridone/-piprazole</b> = atypical antipsychotics. Metabolic syndrome; fewer EPS than typicals."},
{m:"cns",q:"Anesthetic drugs ending in '-flurane' (such as isoflurane and sevoflurane) belong to which class?",c:["Inhaled (volatile) anesthetics","Local anesthetics","Barbiturates","Opioids"],a:0,why:"'-flurane' = inhaled volatile anesthetics. Rare but lethal complication: malignant hyperthermia (with succinylcholine) → treat with dantrolene.",p:"<b>-flurane</b> = inhaled anesthetics. Malignant hyperthermia (+ succinylcholine) → dantrolene."},

/* ===== ENDOCRINE & GI ===== */
{m:"endo",q:"Antidiabetic drugs ending in '-glitazone' (such as pioglitazone and rosiglitazone) belong to which class?",c:["Thiazolidinediones","Sulfonylureas","Biguanides","DPP-4 inhibitors"],a:0,why:"'-glitazone' = thiazolidinediones (activate PPAR-gamma → ↑ insulin sensitivity). Side effects: fluid retention/edema (worsen heart failure), weight gain, fracture risk.",p:"<b>-glitazone</b> = TZDs (PPAR-γ → insulin sensitivity). Edema/HF, weight gain, fractures."},
{m:"endo",q:"Antidiabetic drugs ending in '-gliptin' (such as sitagliptin and linagliptin) inhibit which enzyme?",c:["Dipeptidyl peptidase-4 (DPP-4)","SGLT2","Alpha-glucosidase","HMG-CoA reductase"],a:0,why:"'-gliptin' = DPP-4 inhibitors (block incretin breakdown → ↑ GLP-1). Weight-neutral, low hypoglycemia risk.",p:"<b>-gliptin</b> = DPP-4 inhibitors (↑ incretins). Weight-neutral; low hypoglycemia risk."},
{m:"endo",q:"Antidiabetic drugs ending in '-flozin' (such as empagliflozin and canagliflozin) block glucose reabsorption via which transporter?",c:["Sodium-glucose cotransporter 2 (SGLT2)","GLUT4","DPP-4","Na-K-2Cl cotransporter"],a:0,why:"'-flozin' = SGLT2 inhibitors (block proximal tubule glucose reabsorption → glucosuria). Benefits in heart failure and kidney disease; risks: genital infections, euglycemic DKA.",p:"<b>-flozin</b> = SGLT2 inhibitors (glucosuria). HF/CKD benefit; UTIs, euglycemic DKA."},
{m:"endo",q:"Antidiabetic/weight-loss drugs ending in '-glutide' or '-tide' (such as semaglutide and liraglutide) mimic which incretin hormone?",c:["Glucagon-like peptide-1 (GLP-1)","Insulin","Amylin","Somatostatin"],a:0,why:"'-glutide/-tide' = GLP-1 receptor agonists (↑ glucose-dependent insulin, ↓ glucagon, slow gastric emptying → satiety/weight loss). Risk: pancreatitis; contraindicated with medullary thyroid cancer/MEN2.",p:"<b>-glutide/-tide</b> = GLP-1 agonists. Weight loss, satiety. Pancreatitis; avoid in MEN2/medullary thyroid CA."},
{m:"endo",q:"Drugs ending in '-prazole' (such as omeprazole and pantoprazole) belong to which class?",c:["Proton pump inhibitors","H2 receptor blockers","Antacids","Prokinetics"],a:0,why:"'-prazole' = PPIs (irreversibly block the H/K ATPase). Long-term risks: low B12/magnesium, C. difficile, fractures.",p:"<b>-prazole</b> = PPIs (irreversible H/K ATPase block). Long-term: ↓B12/Mg, C. diff, fractures."},
{m:"endo",q:"Drugs ending in '-tidine' (such as famotidine and cimetidine) belong to which class?",c:["Histamine H2 receptor blockers","Proton pump inhibitors","H1 antihistamines","Anticholinergics"],a:0,why:"'-tidine' = H2 blockers (reduce gastric acid). Cimetidine is a CYP450 inhibitor and antiandrogen (gynecomastia); newer agents lack these effects.",p:"<b>-tidine</b> = H2 blockers. Cimetidine = CYP450 inhibitor + antiandrogen (gynecomastia)."},
{m:"endo",q:"Drugs ending in '-dronate' (such as alendronate and risedronate) treat osteoporosis as which class?",c:["Bisphosphonates","SERMs","Calcitonin analogs","RANKL inhibitors"],a:0,why:"'-dronate' = bisphosphonates (inhibit osteoclasts). Take upright with water and stay upright (esophagitis); rare osteonecrosis of the jaw and atypical femur fractures.",p:"<b>-dronate</b> = bisphosphonates (↓osteoclasts). Take upright (esophagitis); jaw osteonecrosis."},
{m:"endo",q:"Antidiabetic drugs such as glipizide and glyburide (the 'gli-' stem) belong to which insulin-secreting class?",c:["Sulfonylureas","Biguanides","Thiazolidinediones","Meglitinides"],a:0,why:"Glipizide/glyburide/glimepiride = sulfonylureas (close beta-cell K-ATP channels → insulin release). Main risks: hypoglycemia and weight gain.",p:"gli-pizide/-yburide = <b>sulfonylureas</b> (close K-ATP → insulin). Hypoglycemia + weight gain."},

/* ===== ONC / IMMUNE / COAGULATION ===== */
{m:"misc",q:"Biologic drugs ending in '-mab' (such as rituximab and adalimumab) are what type of molecule?",c:["Monoclonal antibodies","Tyrosine kinase inhibitors","Small-molecule enzymes","Peptide hormones"],a:0,why:"'-mab' = monoclonal antibodies (-ximab = chimeric, -zumab = humanized, -umab = fully human). Used in cancer and autoimmune disease; risk of infusion reactions and infection.",p:"<b>-mab</b> = monoclonal antibodies (-ximab chimeric, -zumab humanized, -umab human). Infection risk."},
{m:"misc",q:"Targeted cancer drugs ending in '-nib' (such as imatinib and erlotinib) inhibit which type of enzyme?",c:["Tyrosine kinases","Proteases","Topoisomerases","HMG-CoA reductase"],a:0,why:"'-nib' = tyrosine kinase inhibitors (e.g., imatinib targets BCR-ABL in CML). 'Nib ends kinase.' Targeted oral therapy.",p:"<b>-nib</b> = tyrosine kinase inhibitors ('NIB ends kinase'). Imatinib → BCR-ABL (CML)."},
{m:"misc",q:"Oral anticoagulants ending in '-xaban' (such as apixaban and rivaroxaban) directly inhibit which clotting factor?",c:["Factor Xa","Thrombin (factor IIa)","Factor VII","Factor XIII"],a:0,why:"'-xaban' = direct factor Xa inhibitors (the 'xa' is the clue). No routine monitoring; reversed by andexanet alfa.",p:"<b>-xaban</b> = direct factor Xa inhibitors ('Xa-ban'). No monitoring; reverse with andexanet alfa."},
{m:"misc",q:"The oral anticoagulant dabigatran (the '-gatran' stem) directly inhibits which clotting factor?",c:["Thrombin (factor IIa)","Factor Xa","Factor VII","Plasmin"],a:0,why:"'-gatran' = direct thrombin (IIa) inhibitor. No routine monitoring; reversed by idarucizumab.",p:"<b>-gatran</b> = direct thrombin (IIa) inhibitor. Reverse with idarucizumab."},
{m:"misc",q:"Antiplatelet drugs ending in '-grel' (such as clopidogrel and prasugrel) block which platelet receptor?",c:["The P2Y12 (ADP) receptor","Glycoprotein IIb/IIIa","The thromboxane receptor","COX-1"],a:0,why:"'-grel' = P2Y12 (ADP receptor) inhibitors → block platelet aggregation. Used in acute coronary syndrome and after stenting (with aspirin = dual antiplatelet therapy).",p:"<b>-grel</b> = P2Y12 (ADP) inhibitors. ACS/post-stent (dual antiplatelet with aspirin)."},
{m:"misc",q:"Drugs ending in '-teplase' (such as alteplase and tenecteplase) act as which class — converting plasminogen to plasmin?",c:["Thrombolytics (tissue plasminogen activators)","Anticoagulants","Antiplatelets","Procoagulants"],a:0,why:"'-teplase' = thrombolytics (tPA): they convert plasminogen to plasmin → dissolve clots in acute MI, ischemic stroke, and massive PE. Major risk: bleeding.",p:"<b>-teplase</b> = thrombolytics (tPA). Acute MI, ischemic stroke, massive PE. Bleeding risk."},
{m:"misc",q:"Drugs ending in '-prost' (such as latanoprost and misoprostol) are analogs of what?",c:["Prostaglandins","Leukotrienes","Thromboxane","Histamine"],a:0,why:"'-prost' = prostaglandin analogs (latanoprost lowers intraocular pressure in glaucoma; misoprostol protects gastric mucosa and induces labor). Misoprostol is contraindicated in pregnancy (abortifacient) unless used for that purpose.",p:"<b>-prost</b> = prostaglandin analogs. Latanoprost (glaucoma); misoprostol (gastric/labor; teratogen)."},
{m:"misc",q:"Drugs ending in '-caine' (such as lidocaine and bupivacaine) belong to which class?",c:["Local anesthetics","Inhaled anesthetics","Opioids","Muscle relaxants"],a:0,why:"'-caine' = local anesthetics (block sodium channels). Esters (one 'i', e.g., procaine) vs amides (two 'i's, e.g., lidocaine). Work poorly in infected/acidic tissue (ionized form).",p:"<b>-caine</b> = local anesthetics (block Na⁺ channels). Esters (1 'i') vs amides (2 'i's). Fail in acidic/infected tissue."}
];

const VAULT=[

{t:"Antibiotic Suffixes",b:"<b>-cillin</b> penicillins · <b>-cef-/cephalo-</b> cephalosporins · <b>-penem</b> carbapenems · <b>-cycline</b> tetracyclines · <b>-thromycin</b> macrolides · <b>-floxacin</b> fluoroquinolones · <b>-micin/-mycin</b> aminoglycosides · <b>-conazole</b> azole antifungals.",g:"Antimicrobials"},
{t:"Antiviral / HIV Suffixes",b:"<b>-ciclovir</b> herpes antivirals (HSV/VZV; ganciclovir → CMV) · <b>-navir</b> protease inhibitors · <b>-tegravir</b> integrase inhibitors · <b>-tabine/-vudine</b> NRTIs · <b>oseltamivir</b> = influenza neuraminidase inhibitor.",g:"Antimicrobials"},
{t:"Sedative / Anesthetic Suffixes",b:"<b>-azepam/-azolam</b> benzodiazepines (↑GABA-A frequency) · <b>-barbital</b> barbiturates (↑GABA-A duration) · <b>-flurane</b> inhaled anesthetics · <b>-caine</b> local anesthetics (Na⁺ channel block; esters 1 'i' vs amides 2 'i's).",g:"CNS"},

const MODES={
  daily:{name:"Daily Bout",ic:"🥊",desc:"15 random suffixes across all categories. Quick warm-up.",pick:()=>shuffle([...QBANK]).slice(0,15)},
  endless:{name:"Endless Gauntlet",ic:"♾️",desc:"Survival mode — answer until you miss. Beat the streak.",endless:true,pick:()=>shuffle([...QBANK])},
  cv:{name:"Cardiovascular & Renal",ic:"🦴",desc:"The must-know core — the CV/renal suffixes that show up most on Step 1.",pick:()=>shuffle(QBANK.filter(q=>q.m==="cv"))},
  abx:{name:"Antimicrobials",ic:"🦠",desc:"Antibiotic, antifungal, and antiviral/HIV suffixes by class.",pick:()=>shuffle(QBANK.filter(q=>q.m==="abx"))},
  cns:{name:"CNS & Psych",ic:"🧠",desc:"Sedatives, antidepressants, antipsychotics, antiemetics, and anesthetics.",pick:()=>shuffle(QBANK.filter(q=>q.m==="cns"))},
  endo:{name:"Endocrine & GI",ic:"💊",desc:"Diabetes classes, PPIs/H2 blockers, and bisphosphonates.",pick:()=>shuffle(QBANK.filter(q=>q.m==="endo"))},
  misc:{name:"Onc, Immune & Coagulation",ic:"🧪",desc:"Monoclonals, kinase inhibitors, and the anticoagulant/antiplatelet suffixes.",pick:()=>shuffle(QBANK.filter(q=>q.m==="misc"))}
};
const MODE_TAGS={cv:"Cardiovascular / Renal",abx:"Antimicrobials",cns:"CNS / Psych",endo:"Endocrine / GI",misc:"Onc / Immune / Coagulation"};

const SAVE_KEY="suffix_showdown_v2";
let save=load();
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{best:{},endlessBest:0,played:0}}catch(e){return{best:{},endlessBest:0,played:0}}}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save))}catch(e){}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let session=null;
const app=document.getElementById("app");

function menu(){
  session=null;const m=MODES;
  app.innerHTML=`
  <div class="hdr">
    <div class="badge">VS</div>
    <h1>SUFFIX SHOWDOWN</h1>
    <div class="sub">Drug Name → Class — ${QBANK.length} questions</div>
  </div>
  <div class="section-label">Quick Play</div>
  <div class="grid">${tile("daily",m.daily,"")}${tile("endless",m.endless,"amber")}</div>
  <div class="section-label">Topic Drills</div>
  <div class="grid">
    ${tile("cv",m.cv,"special")}${tile("abx",m.abx,"")}${tile("cns",m.cns,"")}${tile("endo",m.endo,"")}${tile("misc",m.misc,"")}
  </div>
  <div class="section-label">Reinforce</div>
  <div class="grid">
    <div class="tile amber" onclick="vault()">
      <div class="ic">💎</div><h3>Dirty Medicine Vault</h3>
      <p>The full suffix → class cheat sheet by category, plus the bonus antidote pairings.</p>
      <div class="meta">${VAULT.length} memory tools</div>
    </div>
  </div>
  <footer>Saves to this browser via localStorage · ${save.played||0} rounds · Endless best: ${save.endlessBest||0}</footer>`;
}
function tile(key,mode,cls){
  const best=key==="endless"?(save.endlessBest||0):(save.best[key]!=null?save.best[key]+"%":"—");
  const bestLbl=key==="endless"?`Best streak: ${best}`:`Best: ${best}`;
  return `<div class="tile ${cls}" onclick="start('${key}')"><div class="ic">${mode.ic}</div><h3>${mode.name}</h3><p>${mode.desc}</p><div class="meta">${bestLbl}</div></div>`;
}
function start(key){const mode=MODES[key];const qs=mode.pick();session={key,mode,qs,i:0,correct:0,streak:0,answered:false};renderQ();}
function renderQ(){
  const s=session;
  if(!s.mode.endless&&s.i>=s.qs.length)return results();
  if(s.mode.endless&&s.i>=s.qs.length){s.qs=shuffle([...QBANK]);s.i=0;}
  const q=s.qs[s.i];
  const order=shuffle(q.c.map((t,idx)=>({t,idx})));
  s.order=order;s.correctPos=order.findIndex(o=>o.idx===q.a);
  const total=s.mode.endless?"∞":s.qs.length;const num=s.i+1;
  const pct=s.mode.endless?Math.min(100,(s.streak%15)/15*100):(num-1)/s.qs.length*100;
  const tag=MODE_TAGS[q.m]||"Mixed";
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="quiz-top"><span class="qcount">Q ${num} / ${total}</span><span class="streak">🔥 Streak ${s.streak}</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <span class="modtag">${tag}</span>
    <div class="stem">${q.q}</div>
    <div class="choices" id="ch">${order.map((o,i)=>`<div class="choice" data-i="${i}" onclick="answer(${i})"><span class="k">${String.fromCharCode(65+i)}</span><span>${o.t}</span></div>`).join("")}</div>
    <div id="post"></div>`;
}
function answer(pos){
  const s=session;if(s.answered)return;s.answered=true;
  const q=s.qs[s.i];const correct=pos===s.correctPos;
  document.querySelectorAll(".choice").forEach((n,i)=>{n.classList.add("disabled");if(i===s.correctPos)n.classList.add("correct");if(i===pos&&!correct)n.classList.add("wrong");});
  if(correct){s.correct++;s.streak++;}else{s.streak=0;}
  const post=document.getElementById("post");
  const pearl=q.p?`<div class="pearl"><b>💎 Pearl:</b> ${q.p}</div>`:"";
  post.innerHTML=`<div class="explain ${correct?"":"miss"}"><div class="lab">${correct?"✔ Correct":"✕ Review"}</div><div class="why">${q.why}</div>${pearl}</div>`;
  if(s.mode.endless&&!correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}post.innerHTML+=`<button class="btn btn-ghost" onclick="results()">End Run — Streak ${s.correct}</button>`;return;}
  if(s.mode.endless&&correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}}
  post.innerHTML+=`<button class="btn btn-next" onclick="nextQ()">${(!s.mode.endless&&s.i+1>=s.qs.length)?"SEE RESULTS":"NEXT ›"}</button>`;
}
function nextQ(){session.i++;session.answered=false;renderQ();}
function results(){
  const s=session;const got=s.correct;
  const pctNum=s.mode.endless?null:Math.round(got/s.qs.length*100);
  if(!s.mode.endless){save.best[s.key]=Math.max(save.best[s.key]||0,pctNum);}
  save.played=(save.played||0)+1;persist();
  let rank,col;const p=s.mode.endless?Math.min(100,got*5):pctNum;
  if(p>=90){rank="ATTENDING — DOMINATED";col="var(--green)"}
  else if(p>=75){rank="RESIDENT — SOLID";col="var(--cyan)"}
  else if(p>=55){rank="INTERN — GETTING THERE";col="var(--amber-hi)"}
  else{rank="MS1 — DRILL AGAIN";col="var(--red)"}
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="result">
      <div class="score-big" style="color:${col}">${s.mode.endless?got:pctNum+"%"}</div>
      <div class="rank" style="color:${col}">${s.mode.endless?"STREAK: "+got:rank}</div>
      <div class="statrow">
        <div><b>${got}</b>${s.mode.endless?"in a row":"correct"}</div>
        ${s.mode.endless?"":`<div><b>${s.qs.length-got}</b>missed</div>`}
        <div><b>${s.mode.endless?(save.endlessBest||0):(save.best[s.key]+"%")}</b>best</div>
      </div>
      <button class="btn btn-next" style="max-width:300px;margin:0 auto" onclick="start('${s.key}')">RUN IT AGAIN</button>
      <button class="btn btn-ghost" style="max-width:300px;margin:14px auto 0" onclick="menu()">BACK TO MENU</button>
    </div>`;
}
function vault(){
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="hdr" style="padding-top:6px">
      <h1 style="color:var(--amber-hi);font-size:24px">💎 Dirty Medicine Vault</h1>
      <div class="sub">Suffix → class cheat sheet</div>
    </div>
    ${VAULT.map(v=>`<div class="vault-card"><h4>${v.t}</h4><p>${v.b}</p><span class="tag">▸ ${v.g}</span></div>`).join("")}
    <button class="btn btn-ghost" style="width:100%" onclick="menu()">BACK TO MENU</button>`;
}
document.addEventListener("keydown",e=>{
  if(!session||session.answered)return;
  const map={"1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3};
  const k=e.key.toLowerCase();
  if(map[k]!=null&&session.order&&map[k]<session.order.length)answer(map[k]);
});
</script>
<script src="arcade_upgrade.js"></script>
<script src="supabase_config.js"></script>

menu();
