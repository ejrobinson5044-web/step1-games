<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MICROBE MAYHEM — Microbiology</title>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@600;700;800&family=Mulish:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0814;
  --bg2:#120a1c;
  --panel:#1a1228;
  --panel-hi:#241834;
  --cyan:#a855f7;        /* crystal-violet purple primary */
  --cyan-dim:#7e22ce;
  --amber:#fbbf24;       /* agar-amber accent */
  --amber-hi:#fde047;
  --red:#f87171;
  --green:#34d399;
  --text:#f3e8ff;
  --dim:#9a86b4;
  --line:rgba(168,85,247,.15);
  --glow:rgba(168,85,247,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Mulish',sans-serif;min-height:100vh;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 17% 0%,rgba(168,85,247,.13),transparent 55%),
    radial-gradient(ellipse at 88% 100%,rgba(251,191,36,.06),transparent 55%),
    linear-gradient(180deg,#0c0814,#120a1c);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(var(--line) 2px,transparent 2px);
  background-size:34px 34px;
  mask-image:radial-gradient(ellipse at center,#000 32%,transparent 88%);
}
#app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:18px}

.hdr{text-align:center;padding:18px 0 16px;border-bottom:2px solid var(--cyan-dim);margin-bottom:20px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:50%;
  background:linear-gradient(150deg,var(--cyan),var(--cyan-dim));color:#1a1228;
  font-family:'Hanken Grotesk';font-weight:800;font-size:30px;margin-bottom:8px;box-shadow:0 0 24px var(--glow)}
h1{font-family:'Hanken Grotesk';font-weight:800;font-size:33px;letter-spacing:.2px;color:var(--cyan)}
.sub{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:5px;text-transform:uppercase}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:8px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.tile::after{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--cyan);opacity:.6}
.tile:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 26px rgba(0,0,0,.5)}
.tile.amber::after{background:var(--amber)}
.tile.special::after{background:linear-gradient(var(--amber),var(--cyan))}
.tile .ic{font-size:24px}
.tile h3{font-family:'Hanken Grotesk';font-weight:800;font-size:17px;margin:7px 0 5px;letter-spacing:.1px;line-height:1.25}
.tile p{font-size:12.5px;color:var(--dim);line-height:1.45}
.tile .meta{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan);margin-top:9px;letter-spacing:1px}
.tile.amber .meta{color:var(--amber-hi)}

.section-label{font-family:'JetBrains Mono';font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}

.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'JetBrains Mono';font-size:12px}
.qcount{color:var(--dim)}
.streak{color:var(--amber-hi)}
.bar{height:6px;background:var(--panel);border-radius:4px;overflow:hidden;margin-bottom:18px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:.3s}
.modtag{display:inline-block;font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--cyan-dim);border-radius:20px;padding:3px 11px;margin-bottom:14px;text-transform:uppercase}
.stem{font-size:18.5px;line-height:1.5;font-weight:500;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:11px}
.choice{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:.14s;font-size:15.5px;display:flex;gap:12px;align-items:flex-start}
.choice .k{font-family:'JetBrains Mono';font-size:13px;color:var(--cyan);font-weight:600;flex-shrink:0}
.choice:hover{border-color:var(--cyan);background:var(--panel-hi)}
.choice.correct{border-color:var(--green);background:rgba(52,211,153,.13)}
.choice.correct .k{color:var(--green)}
.choice.wrong{border-color:var(--red);background:rgba(248,113,113,.13)}
.choice.wrong .k{color:var(--red)}
.choice.disabled{pointer-events:none;opacity:.85}

.explain{margin-top:18px;border-radius:12px;padding:15px 16px;background:var(--panel);border-left:3px solid var(--cyan);animation:rise .25s ease}
.explain.miss{border-left-color:var(--red)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.explain .lab{font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.explain .why{font-size:14.5px;line-height:1.5}
.pearl{margin-top:11px;background:rgba(251,191,36,.10);border:1px dashed var(--amber);border-radius:10px;padding:11px 13px;font-size:14px;line-height:1.5}
.pearl b{color:var(--amber-hi);font-family:'Hanken Grotesk';font-weight:800;font-size:13px}

.btn{font-family:'Hanken Grotesk';font-weight:800;letter-spacing:.2px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;font-size:15px;transition:.15s}
.btn-next{background:linear-gradient(145deg,var(--cyan),var(--cyan-dim));color:#1a1228;margin-top:18px;width:100%}
.btn-next:hover{box-shadow:0 0 18px var(--glow)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--dim);margin-top:18px}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}

.result{text-align:center;padding:30px 16px}
.score-big{font-family:'Hanken Grotesk';font-weight:800;font-size:64px;color:var(--cyan);line-height:1}
.rank{font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:10px 0 22px}
.statrow{display:flex;justify-content:center;gap:30px;margin-bottom:24px}
.statrow div{font-family:'JetBrains Mono';font-size:12px;color:var(--dim)}
.statrow b{display:block;font-size:26px;color:var(--text);font-family:'Hanken Grotesk';font-weight:800}

.vault-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:12px;border-left:3px solid var(--amber)}
.vault-card h4{font-family:'Hanken Grotesk';font-weight:800;color:var(--amber-hi);font-size:16px;margin-bottom:7px;letter-spacing:.1px;line-height:1.25}
.vault-card p{font-size:14px;line-height:1.55;color:var(--text)}
.vault-card .tag{font-family:'JetBrains Mono';font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-top:7px}

.back{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:1px;display:inline-flex;gap:6px;align-items:center;margin-bottom:16px}
.back:hover{color:var(--cyan)}
footer{text-align:center;font-family:'JetBrains Mono';font-size:10px;color:var(--dim);margin:28px 0 8px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* correct = index into c[]; choices shuffle at render. Stems never contain the answer. */
const QBANK=[
/* ===== MICROBIAL BASICS ===== */
{m:"basics",q:"Gram-POSITIVE bacteria appear purple because their thick cell wall retains crystal violet. What molecule forms this thick wall?",c:["Peptidoglycan","Lipopolysaccharide","Mycolic acid","Chitin"],a:0,why:"Gram-positive walls have a thick peptidoglycan layer that traps crystal violet (purple). Gram-negative walls have thin peptidoglycan plus an outer LPS membrane → pink with safranin.",p:"G+ = thick <b>peptidoglycan</b> → purple. G− = thin peptidoglycan + outer LPS membrane → pink."},
{m:"basics",q:"The outer membrane of Gram-NEGATIVE bacteria contains lipopolysaccharide, whose lipid A component acts as what?",c:["Endotoxin","An exotoxin","A capsule","A spore"],a:0,why:"Lipid A of LPS is endotoxin → triggers TNF, IL-1, and IL-6 → fever and septic shock. It is released on bacterial lysis, not secreted.",p:"LPS lipid A = <b>endotoxin</b> (Gram-negative) → TNF/IL-1 → septic shock. Released on lysis."},
{m:"basics",q:"A secreted bacterial protein with a specific mechanism that can be inactivated into a vaccine 'toxoid' is which type of toxin?",c:["Exotoxin","Endotoxin","Lipid A","Peptidoglycan"],a:0,why:"Exotoxins are secreted proteins (from Gram-positive AND some Gram-negative bacteria), highly potent and specific, heat-labile, and can be made into toxoid vaccines (tetanus, diphtheria).",p:"Exotoxin = secreted protein, specific, heat-labile, <b>toxoid vaccine</b> (tetanus/diphtheria). Endotoxin = LPS, no toxoid."},
{m:"basics",q:"Which stain is used to identify Mycobacteria, whose mycolic-acid-rich wall resists ordinary Gram staining?",c:["Acid-fast (Ziehl-Neelsen) stain","Gram stain","India ink","Silver stain"],a:0,why:"Acid-fast staining detects mycolic-acid organisms (Mycobacteria, Nocardia). India ink → Cryptococcus; silver → fungi/Pneumocystis/Legionella.",p:"<b>Acid-fast</b> = Mycobacteria + Nocardia (mycolic acid). India ink = Cryptococcus; silver = fungi/PCP/Legionella."},
{m:"basics",q:"A bacterial capsule promotes virulence mainly by doing what?",c:["Resisting phagocytosis","Producing exotoxins","Invading host cells","Forming spores"],a:0,why:"The polysaccharide capsule is antiphagocytic; asplenic and sickle-cell patients are at high risk from encapsulated organisms, so opsonizing antibodies/vaccines are key.",p:"Capsule = <b>antiphagocytic</b>. Asplenia/sickle cell at risk → vaccinate against encapsulated bugs."},
{m:"basics",q:"Obligate anaerobes (Clostridium, Bacteroides) cannot survive in oxygen because they lack which protective enzymes?",c:["Catalase and superoxide dismutase","Coagulase and protease","Urease and oxidase","DNA gyrase and ligase"],a:0,why:"Obligate anaerobes lack catalase and/or superoxide dismutase, so reactive oxygen species kill them; this is why aminoglycosides (which need O2 for uptake) don't work against them.",p:"Anaerobes lack <b>catalase + superoxide dismutase</b> → killed by O2. Aminoglycosides don't work (need O2)."},
{m:"basics",q:"Which two Gram-positive genera form heat-resistant endospores?",c:["Bacillus and Clostridium","Staphylococcus and Streptococcus","Escherichia and Klebsiella","Mycobacterium and Nocardia"],a:0,why:"Only Bacillus and Clostridium (both Gram-positive) form endospores, which survive heat and disinfectants (require autoclaving).",p:"Spore-formers = <b>Bacillus + Clostridium</b> (heat-resistant; need autoclave)."},
{m:"basics",q:"Treponema, Borrelia, and Leptospira share which characteristic shape?",c:["Spiral (spirochete)","Round cocci","Straight rods","Branching filaments"],a:0,why:"Spirochetes are spiral-shaped (Treponema, Borrelia, Leptospira). Treponema is too thin for light microscopy → seen on dark-field.",p:"Treponema/Borrelia/Leptospira = <b>spirochetes</b> (spiral). Treponema needs dark-field."},

/* ===== GRAM-POSITIVE ===== */
{m:"gpos",q:"A catalase-positive, COAGULASE-positive Gram-positive cluster causing skin abscesses, toxic shock, and rapid-onset food poisoning is which organism?",c:["Staphylococcus aureus","Staphylococcus epidermidis","Streptococcus pyogenes","Enterococcus faecalis"],a:0,why:"S. aureus = catalase+, coagulase+, golden, β-hemolytic; causes abscesses, endocarditis, TSS (TSST-1), and preformed-toxin food poisoning (rapid onset). MRSA is a major concern.",p:"S. aureus = catalase+/<b>coagulase+</b>, abscesses, TSS, rapid food poisoning (preformed toxin)."},
{m:"gpos",q:"A beta-hemolytic, bacitracin-SENSITIVE Group A streptococcus causing pharyngitis, rheumatic fever, and post-streptococcal glomerulonephritis is which organism?",c:["Streptococcus pyogenes","Streptococcus agalactiae","Streptococcus pneumoniae","Enterococcus faecium"],a:0,why:"S. pyogenes (Group A) = β-hemolytic, bacitracin-sensitive; causes pharyngitis, scarlet fever, impetigo, necrotizing fasciitis, and the sequelae rheumatic fever and PSGN.",p:"Group A (S. pyogenes) = β-hemolytic, <b>bacitracin-sensitive</b>. Rheumatic fever + PSGN + necrotizing fasciitis."},
{m:"gpos",q:"An alpha-hemolytic, optochin-SENSITIVE, encapsulated lancet-shaped diplococcus — the most common cause of community-acquired pneumonia — is which organism?",c:["Streptococcus pneumoniae","Streptococcus viridans","Staphylococcus aureus","Haemophilus influenzae"],a:0,why:"S. pneumoniae = α-hemolytic, optochin-sensitive, bile-soluble, encapsulated lancet diplococcus; #1 cause of CAP, otitis media, meningitis, and sinusitis (MOPS).",p:"S. pneumoniae = α-hemolytic, <b>optochin-sensitive</b>, encapsulated. MOPS (Meningitis, Otitis, Pneumonia, Sinusitis)."},
{m:"gpos",q:"A beta-hemolytic Group B streptococcus causing neonatal sepsis and meningitis (screened for at 35–37 weeks of pregnancy) is which organism?",c:["Streptococcus agalactiae","Streptococcus pyogenes","Listeria monocytogenes","Enterococcus faecalis"],a:0,why:"S. agalactiae (Group B) = β-hemolytic, bacitracin-resistant, hippurate+; the leading cause of neonatal sepsis/meningitis/pneumonia. Pregnant women are screened and given intrapartum penicillin.",p:"Group B (S. agalactiae) = neonatal sepsis/meningitis. Screen at <b>35–37 weeks</b>; intrapartum penicillin."},
{m:"gpos",q:"Watery diarrhea and pseudomembranous colitis following antibiotic use, caused by toxins A and B, is due to which organism?",c:["Clostridioides difficile","Clostridium botulinum","Bacillus cereus","Vibrio cholerae"],a:0,why:"C. difficile overgrows after antibiotics (clindamycin, fluoroquinolones, cephalosporins) → toxins A/B → pseudomembranous colitis. Treat with oral vancomycin or fidaxomicin.",p:"Antibiotic-associated pseudomembranous colitis = <b>C. difficile</b> (toxins A/B). Tx: oral vancomycin/fidaxomicin."},
{m:"gpos",q:"Lockjaw and spastic (rigid) paralysis, from a toxin that blocks the release of inhibitory neurotransmitters (GABA and glycine), is caused by which organism?",c:["Clostridium tetani","Clostridium botulinum","Clostridium perfringens","Listeria monocytogenes"],a:0,why:"C. tetani's tetanospasmin blocks release of inhibitory GABA/glycine from Renshaw cells → unopposed muscle contraction → spastic paralysis, lockjaw, risus sardonicus.",p:"C. tetani = tetanospasmin blocks <b>GABA/glycine</b> → SPASTIC paralysis (lockjaw). Tetanus toxoid vaccine."},
{m:"gpos",q:"Descending FLACCID paralysis, from a toxin that blocks acetylcholine release (e.g., from canned food or honey in infants), is caused by which organism?",c:["Clostridium botulinum","Clostridium tetani","Campylobacter jejuni","Corynebacterium diphtheriae"],a:0,why:"C. botulinum's toxin blocks acetylcholine release at the neuromuscular junction → descending flaccid paralysis (the 4 D's: diplopia, dysphagia, dysarthria, descending); infant botulism from honey.",p:"C. botulinum blocks <b>ACh release</b> → FLACCID descending paralysis. No honey for infants <1 year."},
{m:"gpos",q:"A Gram-positive rod with tumbling motility, acquired from unpasteurized dairy, causing meningitis in neonates, pregnant women, and the elderly, is which organism?",c:["Listeria monocytogenes","Bacillus anthracis","Corynebacterium diphtheriae","Streptococcus agalactiae"],a:0,why:"Listeria = Gram-positive rod, tumbling motility, intracellular (actin 'rocket' propulsion), from unpasteurized dairy/deli meats; causes neonatal and immunocompromised meningitis. Treat with ampicillin.",p:"Listeria = G+ rod, <b>tumbling motility</b>, unpasteurized dairy, intracellular (actin rockets). Neonatal/elderly meningitis → ampicillin."},

/* ===== GRAM-NEGATIVE ===== */
{m:"gneg",q:"Gram-negative diplococci causing a petechial rash, possible adrenal hemorrhage (Waterhouse-Friderichsen), and outbreaks in crowded dorms are which organism?",c:["Neisseria meningitidis","Neisseria gonorrhoeae","Haemophilus influenzae","Moraxella catarrhalis"],a:0,why:"N. meningitidis = encapsulated Gram-negative diplococci (maltose fermenter); causes meningococcemia with petechiae and Waterhouse-Friderichsen (adrenal hemorrhage). Vaccine available; prophylax close contacts.",p:"N. meningitidis = encapsulated, maltose+, petechiae + Waterhouse-Friderichsen. Vaccine + rifampin prophylaxis."},
{m:"gneg",q:"Gram-negative diplococci causing urethritis, septic arthritis in young adults, and neonatal conjunctivitis, with NO available vaccine (no polysaccharide capsule), are which organism?",c:["Neisseria gonorrhoeae","Neisseria meningitidis","Chlamydia trachomatis","Treponema pallidum"],a:0,why:"N. gonorrhoeae = no capsule (so no vaccine, no lasting immunity), maltose-NEGATIVE; causes gonorrhea, septic arthritis, PID, and ophthalmia neonatorum (prevented with erythromycin eye ointment).",p:"N. gonorrhoeae = NO capsule/vaccine, maltose−. Gonorrhea, septic arthritis, ophthalmia neonatorum."},
{m:"gneg",q:"The most common cause of urinary tract infections — a lactose-fermenting Gram-negative rod (some strains make Shiga toxin → hemolytic uremic syndrome) — is which organism?",c:["Escherichia coli","Klebsiella pneumoniae","Proteus mirabilis","Pseudomonas aeruginosa"],a:0,why:"E. coli = #1 UTI, lactose+ (pink on MacConkey); also causes neonatal meningitis and diarrhea. EHEC O157:H7 makes Shiga toxin → HUS (don't give antibiotics).",p:"E. coli = #1 UTI, lactose+. EHEC O157:H7 → Shiga toxin → <b>HUS</b> (avoid antibiotics)."},
{m:"gneg",q:"An oxidase-positive, non-lactose-fermenting Gram-negative rod producing a blue-green pigment, infecting burn wounds and cystic fibrosis lungs, is which organism?",c:["Pseudomonas aeruginosa","Escherichia coli","Klebsiella pneumoniae","Serratia marcescens"],a:0,why:"Pseudomonas = aerobic, oxidase+, non-lactose, pyocyanin (blue-green) and a grape-like odor; causes burn/CF infections, hot-tub folliculitis, and nosocomial pneumonia. Often multidrug-resistant.",p:"Pseudomonas = oxidase+, blue-green pyocyanin, fruity smell. Burns, CF, hot tub, nosocomial."},
{m:"gneg",q:"A curved, urease-positive Gram-negative rod causing chronic gastritis, peptic ulcers, and gastric adenocarcinoma/MALT lymphoma is which organism?",c:["Helicobacter pylori","Campylobacter jejuni","Vibrio cholerae","Salmonella enteritidis"],a:0,why:"H. pylori = curved/helical, urease+ (basis of urea breath test); causes gastritis, duodenal/gastric ulcers, and is a risk factor for gastric adenocarcinoma and MALT lymphoma. Triple therapy cures it.",p:"H. pylori = curved, <b>urease+</b>, ulcers + gastric cancer/MALT. Tx: PPI + clarithromycin + amoxicillin."},
{m:"gneg",q:"A fever with rose spots, a step-ladder fever pattern, and a chronic gallbladder carrier state, from an invasive motile Gram-negative rod, is caused by which organism?",c:["Salmonella typhi","Shigella dysenteriae","Vibrio cholerae","Yersinia enterocolitica"],a:0,why:"S. typhi causes typhoid fever (rose spots, stepwise fever, GI symptoms) and can establish a chronic gallbladder carrier state. It is motile and has a Vi capsule. (Non-typhoidal Salmonella → sickle-cell osteomyelitis.)",p:"S. typhi = rose spots + step-ladder fever + gallbladder carrier. Non-typhoidal Salmonella → sickle-cell osteomyelitis."},
{m:"gneg",q:"Profuse 'rice-water' diarrhea from a comma-shaped Gram-negative rod whose toxin overactivates adenylate cyclase (raising cAMP) is caused by which organism?",c:["Vibrio cholerae","Escherichia coli","Shigella sonnei","Clostridioides difficile"],a:0,why:"V. cholerae = comma-shaped, oxidase+; cholera toxin permanently activates Gs → ↑cAMP → massive chloride/water secretion → rice-water stools and severe dehydration. Treat with oral rehydration.",p:"V. cholerae = rice-water diarrhea, comma-shaped, toxin → <b>↑cAMP</b>. Tx: oral rehydration."},
{m:"gneg",q:"Atypical pneumonia with high fever, diarrhea, and hyponatremia, acquired from contaminated water/air-conditioning and diagnosed by urine antigen, is caused by which organism?",c:["Legionella pneumophila","Mycoplasma pneumoniae","Streptococcus pneumoniae","Chlamydophila pneumoniae"],a:0,why:"Legionella = atypical ('walking') pneumonia with GI symptoms and hyponatremia; from water/AC systems; needs silver stain or charcoal-yeast agar; diagnosed by urine antigen. Treat with macrolides/fluoroquinolones.",p:"Legionella = atypical pneumonia + diarrhea + hyponatremia, water/AC source. Dx = <b>urine antigen</b>."},

/* ===== VIRUSES ===== */
{m:"virus",q:"Recurrent cold sores and genital ulcers, with latency in sensory ganglia and possible temporal-lobe encephalitis, are caused by which virus?",c:["Herpes simplex virus","Cytomegalovirus","Coxsackievirus","Human papillomavirus"],a:0,why:"HSV-1 (oral, temporal-lobe encephalitis) and HSV-2 (genital) establish latency in trigeminal and sacral ganglia; Tzanck smear shows multinucleated giant cells.",p:"HSV = cold sores/genital ulcers, latency in ganglia, <b>temporal-lobe encephalitis</b> (HSV-1). Tzanck smear."},
{m:"virus",q:"Chickenpox followed years later by a painful dermatomal vesicular rash (shingles), from reactivation in dorsal root ganglia, is caused by which virus?",c:["Varicella-zoster virus","Herpes simplex virus","Measles virus","Parvovirus B19"],a:0,why:"VZV causes chickenpox, then lies dormant in dorsal root/trigeminal ganglia and reactivates as zoster (shingles) in a dermatomal pattern; postherpetic neuralgia can follow.",p:"VZV = chickenpox → latent in dorsal root ganglia → <b>shingles</b> (dermatomal). Vaccine prevents zoster."},
{m:"virus",q:"Infectious mononucleosis with atypical lymphocytes and a positive monospot, also linked to Burkitt lymphoma, is caused by which virus?",c:["Epstein-Barr virus","Cytomegalovirus","HIV","Hepatitis B virus"],a:0,why:"EBV infects B cells via CD21 → mononucleosis (fatigue, pharyngitis, posterior cervical nodes, splenomegaly, atypical/reactive T lymphocytes, +monospot); linked to Burkitt and nasopharyngeal carcinoma. Avoid ampicillin (rash).",p:"EBV = mono (+monospot, atypical lymphocytes) + Burkitt/nasopharyngeal CA. Infects B cells (CD21)."},
{m:"virus",q:"Owl-eye intranuclear inclusions, the most common congenital viral infection, and retinitis in AIDS, are caused by which virus?",c:["Cytomegalovirus","Epstein-Barr virus","Rubella virus","Herpes simplex virus"],a:0,why:"CMV shows 'owl-eye' inclusions; it is the most common congenital infection (hearing loss, periventricular calcifications) and causes retinitis, colitis, and esophagitis in AIDS. Mono is monospot-NEGATIVE.",p:"CMV = owl-eye inclusions, #1 congenital infection, AIDS retinitis. Monospot-NEGATIVE mono."},
{m:"virus",q:"A retrovirus that infects CD4 T cells via gp120 and uses reverse transcriptase, causing progressive loss of cell-mediated immunity, is which virus?",c:["Human immunodeficiency virus","Cytomegalovirus","Epstein-Barr virus","Human T-lymphotropic virus"],a:0,why:"HIV is a retrovirus that binds CD4 + a coreceptor (CCR5/CXCR4) via gp120, reverse-transcribes its RNA, and depletes CD4 T cells → opportunistic infections (AIDS when CD4 <200).",p:"HIV = retrovirus, infects <b>CD4 T cells</b> (gp120 + CCR5/CXCR4), reverse transcriptase. AIDS = CD4 <200."},
{m:"virus",q:"Sudden pandemics of influenza ('antigenic shift') are caused by what?",c:["Reassortment of genome segments between strains","Gradual point mutations","No genetic change at all","Bacterial superinfection"],a:0,why:"Influenza has a segmented genome; antigenic SHIFT = reassortment of segments (often between human/animal strains) → major novel surface proteins → pandemics. Antigenic DRIFT = minor point mutations → seasonal epidemics.",p:"Shift = <b>reassortment</b> of segments → pandemic. Drift = point mutations → seasonal epidemic."},
{m:"virus",q:"A bullet-shaped virus that travels retrograde up axons to the central nervous system, producing Negri bodies and hydrophobia, is which virus?",c:["Rabies virus","Polio virus","West Nile virus","JC virus"],a:0,why:"Rabies (bullet-shaped rhabdovirus) travels retrograde along axons to the CNS → Negri bodies (hippocampus/Purkinje), hydrophobia, encephalitis; from bat/dog/raccoon bites. Post-exposure prophylaxis works before symptoms.",p:"Rabies = bullet-shaped, retrograde axonal transport, <b>Negri bodies</b>, hydrophobia. Post-exposure prophylaxis."},
{m:"virus",q:"Most DNA viruses replicate in which part of the host cell (poxviruses being the exception)?",c:["The nucleus","The cytoplasm","The mitochondria","The plasma membrane"],a:0,why:"Most DNA viruses replicate in the nucleus (using host machinery); poxviruses are the exception (cytoplasm, carry their own polymerase). Most RNA viruses replicate in the cytoplasm (except influenza and retroviruses).",p:"DNA viruses replicate in the <b>nucleus</b> (except poxvirus = cytoplasm). RNA = cytoplasm (except flu/retro)."},

/* ===== FUNGI / PARASITES / ATYPICALS ===== */
{m:"fung",q:"A heavily encapsulated yeast (India-ink positive) causing meningitis in AIDS patients, acquired from pigeon droppings, is which organism?",c:["Cryptococcus neoformans","Candida albicans","Histoplasma capsulatum","Aspergillus fumigatus"],a:0,why:"Cryptococcus neoformans = encapsulated yeast with narrow-based budding; India ink and latex agglutination (capsular antigen) positive; causes meningitis in AIDS (CD4 <100). Soap-bubble brain lesions.",p:"Cryptococcus = encapsulated yeast, <b>India ink</b>+, pigeon droppings, AIDS meningitis. Latex antigen test."},
{m:"fung",q:"Oral thrush, esophagitis in AIDS, and vaginal yeast infections, caused by a germ-tube-forming yeast, are due to which organism?",c:["Candida albicans","Cryptococcus neoformans","Malassezia furfur","Sporothrix schenckii"],a:0,why:"Candida albicans forms germ tubes at body temperature; causes thrush, esophagitis (AIDS-defining), vulvovaginitis, diaper rash, and candidemia (especially with central lines/neutropenia).",p:"Candida = <b>germ tubes</b>, thrush/esophagitis (AIDS), vaginitis, line-associated candidemia."},
{m:"fung",q:"Diffuse interstitial 'ground-glass' pneumonia in an AIDS patient with a CD4 count below 200, treated and prevented with TMP-SMX, is caused by which organism?",c:["Pneumocystis jirovecii","Mycobacterium tuberculosis","Cytomegalovirus","Streptococcus pneumoniae"],a:0,why:"Pneumocystis jirovecii (a fungus) causes PCP in AIDS (CD4 <200): dry cough, dyspnea, diffuse ground-glass infiltrates; silver stain shows disc/cup-shaped organisms. TMP-SMX treats and prophylaxes.",p:"PCP = ground-glass pneumonia in AIDS (CD4 <200). Silver stain. <b>TMP-SMX</b> treats + prophylaxis."},
{m:"fung",q:"Cyclic fevers and chills with hemolysis, transmitted by the Anopheles mosquito and infecting red blood cells, indicate infection with which parasite?",c:["Plasmodium (malaria)","Babesia","Trypanosoma","Leishmania"],a:0,why:"Plasmodium (malaria) is transmitted by the female Anopheles mosquito, infects RBCs, and causes cyclic fevers and hemolysis; P. falciparum is the most severe (cerebral malaria). Sickle/thalassemia traits are protective.",p:"Malaria = <b>Anopheles</b> mosquito, cyclic fevers, RBC infection. P. falciparum = severe (cerebral)."},
{m:"fung",q:"Ring-enhancing brain lesions in an AIDS patient, or congenital intracranial calcifications with chorioretinitis, are caused by which parasite?",c:["Toxoplasma gondii","Taenia solium","Naegleria fowleri","Trypanosoma cruzi"],a:0,why:"Toxoplasma gondii (cat feces, undercooked meat) → multiple ring-enhancing brain lesions in AIDS (CD4 <100) and congenital toxoplasmosis (intracranial calcifications, chorioretinitis, hydrocephalus).",p:"Toxoplasma = <b>ring-enhancing</b> brain lesions (AIDS) + congenital (calcifications, chorioretinitis). Cat feces."},
{m:"fung",q:"Foul-smelling, fatty diarrhea and bloating after drinking from a mountain stream, caused by a pear-shaped flagellated protozoan, is due to which organism?",c:["Giardia lamblia","Entamoeba histolytica","Cryptosporidium","Vibrio cholerae"],a:0,why:"Giardia lamblia (pear-shaped, flagellated, from streams/daycare) causes fat malabsorption → foul, greasy, non-bloody diarrhea and bloating. Treat with metronidazole.",p:"Giardia = fatty/foul diarrhea after camping (streams). Pear-shaped flagellate. Tx: <b>metronidazole</b>."},
{m:"fung",q:"A spirochete causing a painless genital chancre, then a diffuse rash (including palms and soles), detected by dark-field microscopy and VDRL/RPR, is which organism?",c:["Treponema pallidum","Borrelia burgdorferi","Leptospira interrogans","Chlamydia trachomatis"],a:0,why:"Treponema pallidum (syphilis): primary = painless chancre; secondary = diffuse rash including palms/soles, condylomata lata; tertiary = gummas, tabes dorsalis, aortitis. Dark-field microscopy; screen with VDRL/RPR.",p:"Treponema = painless chancre → rash on <b>palms/soles</b> → tertiary. Dark-field; VDRL/RPR screen."},
{m:"fung",q:"A spirochete transmitted by the Ixodes tick causing a targetoid 'bull's-eye' rash (erythema migrans), then arthritis and carditis, is which organism?",c:["Borrelia burgdorferi","Treponema pallidum","Rickettsia rickettsii","Ehrlichia chaffeensis"],a:0,why:"Borrelia burgdorferi (Lyme disease) is spread by the Ixodes tick (deer/mouse reservoir): stage 1 erythema migrans, stage 2 carditis (AV block) and Bell palsy, stage 3 arthritis. Treat with doxycycline.",p:"Borrelia = Lyme, <b>Ixodes</b> tick, erythema migrans (bull's-eye) → carditis/Bell palsy → arthritis. Tx: doxycycline."}
];

const VAULT=[
{t:"Gram Stain & Stains",b:"<b>G+</b> = thick peptidoglycan → retains crystal violet (PURPLE). <b>G−</b> = thin peptidoglycan + outer LPS membrane → safranin (PINK). No wall = Mycoplasma. <b>Acid-fast</b> = Mycobacteria/Nocardia. <b>India ink</b> = Cryptococcus. <b>Silver</b> = fungi/PCP/Legionella.",g:"Basics"},
{t:"Endotoxin vs Exotoxin",b:"<b>Endotoxin</b> = LPS/lipid A (G−, structural, heat-stable, released on lysis, TNF/IL-1 → shock, NO toxoid). <b>Exotoxin</b> = secreted protein (G+ and some G−, specific, heat-labile, very potent, toxoid vaccine).",g:"Basics"},
{t:"Encapsulated Organisms",b:"'Some Killers Have Pretty Nice Capsules, Silly': S. pneumoniae, H. influenzae, Neisseria meningitidis, Klebsiella, GBS, Pseudomonas, Cryptococcus, Salmonella. Capsule = antiphagocytic. Asplenia/sickle cell at risk → vaccinate.",g:"Basics"},
{t:"Strep & Staph ID",b:"<b>Catalase+</b> = Staph (coagulase+ = aureus). <b>α-hemolytic</b> (green): S. pneumoniae (optochin-S, bile-S) vs viridans (optochin-R). <b>β-hemolytic</b> (clear): GAS/pyogenes (bacitracin-S) vs GBS/agalactiae (bacitracin-R).",g:"Gram+"},
{t:"Clostridia Toxins",b:"<b>C. tetani</b> = tetanospasmin blocks GABA/glycine → SPASTIC (lockjaw). <b>C. botulinum</b> = blocks ACh → FLACCID descending. <b>C. perfringens</b> = gas gangrene (α-toxin). <b>C. difficile</b> = pseudomembranous colitis (toxins A/B).",g:"Gram+"},
{t:"Diarrhea: Watery vs Bloody",b:"<b>Watery</b> = Vibrio (rice-water, ↑cAMP), ETEC, Giardia, viruses. <b>Bloody/inflammatory</b> = Shigella, EHEC O157:H7 (→HUS, avoid antibiotics), Salmonella, Campylobacter, Entamoeba.",g:"Gram−"},
{t:"Neisseria & Urease+",b:"<b>Meningitidis</b> = capsule, maltose+, vaccine, petechiae/Waterhouse-Friderichsen. <b>Gonorrhoeae</b> = no capsule/vaccine, maltose−, septic arthritis/ophthalmia neonatorum. <b>Urease+ (PUNCH-K):</b> Proteus, Ureaplasma, Nocardia, Cryptococcus, H. pylori, Klebsiella.",g:"Gram−"},
{t:"Herpesviruses (dsDNA)",b:"<b>HSV-1</b> (oral, temporal encephalitis), <b>HSV-2</b> (genital), <b>VZV</b> (chickenpox→shingles), <b>EBV</b> (mono, Burkitt, CD21/B cells), <b>CMV</b> (owl-eye, congenital, AIDS retinitis), <b>HHV-8</b> (Kaposi). Theme = latency.",g:"Viruses"},
{t:"DNA vs RNA Viruses",b:"<b>DNA</b> = mostly dsDNA, nucleus (except pox). 'HHAPPPy': Herpes, Hepadna, Adeno, Parvo, Papilloma, Polyoma, Pox. <b>RNA</b> = mostly ssRNA, cytoplasm (except influenza/retro). Influenza segmented → drift (mutation) vs shift (reassortment).",g:"Viruses"},
{t:"AIDS Opportunists by CD4",b:"<b><200</b> = PCP (Pneumocystis; TMP-SMX prophylaxis). <b><100</b> = Toxoplasma (ring-enhancing), Cryptococcus (meningitis). <b><50</b> = CMV (retinitis), MAC. Candidal esophagitis is AIDS-defining.",g:"Fungi"},
{t:"Dimorphic Fungi (mold cold, yeast heat)",b:"<b>Histoplasma</b> (Ohio/Mississippi, bird/bat, intracellular). <b>Blastomyces</b> (broad-based bud). <b>Coccidioides</b> (Southwest, spherules). <b>Paracoccidioides</b> (captain's wheel). Aspergillus = septate 45° hyphae; Mucor = broad nonseptate (DKA).",g:"Fungi"},
{t:"Spirochetes & Vectors",b:"<b>Treponema pallidum</b> (syphilis: chancre → palms/soles rash → tertiary; dark-field, VDRL/RPR). <b>Borrelia</b> (Lyme, Ixodes tick, erythema migrans → carditis/Bell palsy → arthritis; doxycycline). <b>Rickettsia rickettsii</b> (RMSF, wrists/ankles → trunk).",g:"Atypicals"}
];

const MODES={
  daily:{name:"Daily Culture",ic:"🦠",desc:"15 random questions across all of microbiology. Quick warm-up.",pick:()=>shuffle([...QBANK]).slice(0,15)},
  endless:{name:"Endless Outbreak",ic:"♾️",desc:"Survival mode — answer until you miss. Beat the streak.",endless:true,pick:()=>shuffle([...QBANK])},
  basics:{name:"Microbial Basics",ic:"🦴",desc:"The foundation: Gram stain, morphology, toxins, capsules, and classification.",pick:()=>shuffle(QBANK.filter(q=>q.m==="basics"))},
  gpos:{name:"Gram-Positive",ic:"🟣",desc:"Staph & Strep ID, the Clostridia toxins, and Listeria.",pick:()=>shuffle(QBANK.filter(q=>q.m==="gpos"))},
  gneg:{name:"Gram-Negative",ic:"🔴",desc:"Neisseria, the enterics, Pseudomonas, H. pylori, and Legionella.",pick:()=>shuffle(QBANK.filter(q=>q.m==="gneg"))},
  virus:{name:"Viruses",ic:"🧬",desc:"Herpesviruses, EBV/CMV, HIV, influenza shift vs drift, and rabies.",pick:()=>shuffle(QBANK.filter(q=>q.m==="virus"))},
  fung:{name:"Fungi, Parasites & Atypicals",ic:"🍄",desc:"Cryptococcus/Candida/PCP, malaria/Toxoplasma/Giardia, and the spirochetes.",pick:()=>shuffle(QBANK.filter(q=>q.m==="fung"))}
};
const MODE_TAGS={basics:"Microbial Basics",gpos:"Gram-Positive",gneg:"Gram-Negative",virus:"Viruses",fung:"Fungi / Parasites / Atypicals"};

const SAVE_KEY="microbe_mayhem_v2";
let save=load();
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{best:{},endlessBest:0,played:0}}catch(e){return{best:{},endlessBest:0,played:0}}}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save))}catch(e){}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let session=null;
const app=document.getElementById("app");

function menu(){
  session=null;const m=MODES;
  app.innerHTML=`
  <div class="hdr">
    <div class="badge">&mu;</div>
    <h1>MICROBE MAYHEM</h1>
    <div class="sub">Microbiology — ${QBANK.length} questions</div>
  </div>
  <div class="section-label">Quick Play</div>
  <div class="grid">${tile("daily",m.daily,"")}${tile("endless",m.endless,"amber")}</div>
  <div class="section-label">Topic Drills</div>
  <div class="grid">
    ${tile("basics",m.basics,"special")}${tile("gpos",m.gpos,"")}${tile("gneg",m.gneg,"")}${tile("virus",m.virus,"")}${tile("fung",m.fung,"")}
  </div>
  <div class="section-label">Reinforce</div>
  <div class="grid">
    <div class="tile amber" onclick="vault()">
      <div class="ic">💎</div><h3>Dirty Medicine Vault</h3>
      <p>The catchy micro tools — Gram stain, the encapsulated list, Strep/Staph ID, AIDS opportunists, spirochetes, and more.</p>
      <div class="meta">${VAULT.length} memory tools</div>
    </div>
  </div>
  <footer>Saves to this browser via localStorage · ${save.played||0} rounds · Endless best: ${save.endlessBest||0}</footer>`;
}
function tile(key,mode,cls){
  const best=key==="endless"?(save.endlessBest||0):(save.best[key]!=null?save.best[key]+"%":"—");
  const bestLbl=key==="endless"?`Best streak: ${best}`:`Best: ${best}`;
  return `<div class="tile ${cls}" onclick="start('${key}')"><div class="ic">${mode.ic}</div><h3>${mode.name}</h3><p>${mode.desc}</p><div class="meta">${bestLbl}</div></div>`;
}
function start(key){const mode=MODES[key];const qs=mode.pick();session={key,mode,qs,i:0,correct:0,streak:0,answered:false};renderQ();}
function renderQ(){
  const s=session;
  if(!s.mode.endless&&s.i>=s.qs.length)return results();
  if(s.mode.endless&&s.i>=s.qs.length){s.qs=shuffle([...QBANK]);s.i=0;}
  const q=s.qs[s.i];
  const order=shuffle(q.c.map((t,idx)=>({t,idx})));
  s.order=order;s.correctPos=order.findIndex(o=>o.idx===q.a);
  const total=s.mode.endless?"∞":s.qs.length;const num=s.i+1;
  const pct=s.mode.endless?Math.min(100,(s.streak%15)/15*100):(num-1)/s.qs.length*100;
  const tag=MODE_TAGS[q.m]||"Mixed";
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="quiz-top"><span class="qcount">Q ${num} / ${total}</span><span class="streak">🔥 Streak ${s.streak}</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <span class="modtag">${tag}</span>
    <div class="stem">${q.q}</div>
    <div class="choices" id="ch">${order.map((o,i)=>`<div class="choice" data-i="${i}" onclick="answer(${i})"><span class="k">${String.fromCharCode(65+i)}</span><span>${o.t}</span></div>`).join("")}</div>
    <div id="post"></div>`;
}
function answer(pos){
  const s=session;if(s.answered)return;s.answered=true;
  const q=s.qs[s.i];const correct=pos===s.correctPos;
  document.querySelectorAll(".choice").forEach((n,i)=>{n.classList.add("disabled");if(i===s.correctPos)n.classList.add("correct");if(i===pos&&!correct)n.classList.add("wrong");});
  if(correct){s.correct++;s.streak++;}else{s.streak=0;}
  const post=document.getElementById("post");
  const pearl=q.p?`<div class="pearl"><b>💎 Pearl:</b> ${q.p}</div>`:"";
  post.innerHTML=`<div class="explain ${correct?"":"miss"}"><div class="lab">${correct?"✔ Correct":"✕ Review"}</div><div class="why">${q.why}</div>${pearl}</div>`;
  if(s.mode.endless&&!correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}post.innerHTML+=`<button class="btn btn-ghost" onclick="results()">End Run — Streak ${s.correct}</button>`;return;}
  if(s.mode.endless&&correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}}
  post.innerHTML+=`<button class="btn btn-next" onclick="nextQ()">${(!s.mode.endless&&s.i+1>=s.qs.length)?"SEE RESULTS":"NEXT ›"}</button>`;
}
function nextQ(){session.i++;session.answered=false;renderQ();}
function results(){
  const s=session;const got=s.correct;
  const pctNum=s.mode.endless?null:Math.round(got/s.qs.length*100);
  if(!s.mode.endless){save.best[s.key]=Math.max(save.best[s.key]||0,pctNum);}
  save.played=(save.played||0)+1;persist();
  let rank,col;const p=s.mode.endless?Math.min(100,got*5):pctNum;
  if(p>=90){rank="ATTENDING — DOMINATED";col="var(--green)"}
  else if(p>=75){rank="RESIDENT — SOLID";col="var(--cyan)"}
  else if(p>=55){rank="INTERN — GETTING THERE";col="var(--amber-hi)"}
  else{rank="MS1 — DRILL AGAIN";col="var(--red)"}
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="result">
      <div class="score-big" style="color:${col}">${s.mode.endless?got:pctNum+"%"}</div>
      <div class="rank" style="color:${col}">${s.mode.endless?"STREAK: "+got:rank}</div>
      <div class="statrow">
        <div><b>${got}</b>${s.mode.endless?"in a row":"correct"}</div>
        ${s.mode.endless?"":`<div><b>${s.qs.length-got}</b>missed</div>`}
        <div><b>${s.mode.endless?(save.endlessBest||0):(save.best[s.key]+"%")}</b>best</div>
      </div>
      <button class="btn btn-next" style="max-width:300px;margin:0 auto" onclick="start('${s.key}')">RUN IT AGAIN</button>
      <button class="btn btn-ghost" style="max-width:300px;margin:14px auto 0" onclick="menu()">BACK TO MENU</button>
    </div>`;
}
function vault(){
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="hdr" style="padding-top:6px">
      <h1 style="color:var(--amber-hi);font-size:28px">💎 Dirty Medicine Vault</h1>
      <div class="sub">Micro memory tools — catchy on purpose</div>
    </div>
    ${VAULT.map(v=>`<div class="vault-card"><h4>${v.t}</h4><p>${v.b}</p><span class="tag">▸ ${v.g}</span></div>`).join("")}
    <button class="btn btn-ghost" style="width:100%" onclick="menu()">BACK TO MENU</button>`;
}
document.addEventListener("keydown",e=>{
  if(!session||session.answered)return;
  const map={"1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3};
  const k=e.key.toLowerCase();
  if(map[k]!=null&&session.order&&map[k]<session.order.length)answer(map[k]);
});
</script>

menu();
