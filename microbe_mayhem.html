<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MICROBE MAYHEM — Step 1 Microbiology</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #04090a;
  --bg-mid: #0a1418;
  --bg-card: #122028;
  --bio-yellow: #ffe600;
  --plague-green: #7fff00;
  --lab-blue: #00d4ff;
  --petri-pink: #ff4d8d;
  --hazard-orange: #ff9500;
  --crimson: #ff3838;
  --text: #f0fff8;
  --text-dim: #6b8a85;
  --grid: rgba(127, 255, 0, 0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 18px;
  min-height: 100vh;
  overflow-x: hidden;
}
body {
  background:
    radial-gradient(ellipse at 20% 10%, rgba(127, 255, 0, 0.10), transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(255, 230, 0, 0.10), transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 212, 255, 0.05), transparent 60%),
    linear-gradient(180deg, #04090a 0%, #0a1418 100%);
  position: relative;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,
    rgba(0,0,0,0.13) 0px, rgba(0,0,0,0.13) 1px,
    transparent 1px, transparent 3px);
  pointer-events: none;
  z-index: 1000;
  mix-blend-mode: multiply;
}
#app {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
}

/* HEADER */
.title-bar {
  text-align: center;
  margin-bottom: 24px;
  padding: 16px 0 24px;
  border-bottom: 2px solid var(--plague-green);
  box-shadow: 0 4px 20px rgba(127, 255, 0, 0.15);
}
h1.game-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 36px;
  background: linear-gradient(90deg, var(--bio-yellow), var(--plague-green), var(--lab-blue));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(127, 255, 0, 0.4);
  animation: titleGlow 3s ease-in-out infinite alternate;
}
@keyframes titleGlow {
  from { filter: drop-shadow(0 0 8px rgba(127, 255, 0, 0.4)); }
  to { filter: drop-shadow(0 0 20px rgba(255, 230, 0, 0.6)); }
}
.subtitle {
  color: var(--bio-yellow);
  font-size: 22px;
  margin-top: 8px;
  letter-spacing: 2px;
}

/* HUD */
.hud { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.hud-cell {
  background: rgba(18, 32, 40, 0.7);
  border: 1px solid var(--lab-blue);
  border-radius: 4px;
  padding: 10px 14px;
  position: relative;
  box-shadow: inset 0 0 12px rgba(0, 212, 255, 0.15);
}
.hud-label {
  font-size: 13px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: 'Press Start 2P', monospace;
}
.hud-value { font-size: 28px; margin-top: 4px; font-weight: bold; font-family: 'JetBrains Mono', monospace; }
.hud-value.hp { color: var(--crimson); }
.hud-value.xp { color: var(--plague-green); }
.hud-value.streak { color: var(--bio-yellow); }
.hud-value.lvl { color: var(--lab-blue); }
.hearts { display: inline-flex; gap: 4px; }
.heart { font-size: 24px; filter: drop-shadow(0 0 4px var(--crimson)); }
.heart.lost { filter: grayscale(1) brightness(0.3); }

/* PANEL */
.panel {
  background: rgba(18, 32, 40, 0.85);
  border: 2px solid var(--plague-green);
  border-radius: 6px;
  padding: 28px;
  position: relative;
  box-shadow: 0 0 30px rgba(127, 255, 0, 0.18), inset 0 0 20px rgba(127, 255, 0, 0.04);
  backdrop-filter: blur(4px);
  min-height: 400px;
}
.panel::before {
  content: '';
  position: absolute;
  top: -2px; left: 12px;
  width: 14px; height: 6px;
  background: var(--bg-deep);
  border-left: 2px solid var(--plague-green);
  border-right: 2px solid var(--plague-green);
}

/* BIOHAZARD CORNER ICON */
.panel::after {
  content: '☣';
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 26px;
  color: var(--bio-yellow);
  filter: drop-shadow(0 0 6px var(--bio-yellow));
  opacity: 0.6;
}

/* MENU */
.menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.menu-card {
  background: linear-gradient(135deg, rgba(127, 255, 0, 0.06), rgba(0, 212, 255, 0.08));
  border: 2px solid var(--lab-blue);
  border-radius: 4px;
  padding: 24px 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.menu-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0, 212, 255, 0.4);
  border-color: var(--plague-green);
}
.menu-card:hover::after {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: linear-gradient(45deg, transparent 30%, rgba(127, 255, 0, 0.18) 50%, transparent 70%);
  animation: shimmer 1s linear;
}
@keyframes shimmer { to { transform: translate(50%, 50%); } }
.menu-icon { font-size: 40px; margin-bottom: 12px; display: block; }
.menu-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  color: var(--bio-yellow);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.menu-desc { color: var(--text-dim); font-size: 16px; line-height: 1.4; }

/* QUESTION */
.question-area { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.q-tag {
  display: inline-block;
  background: var(--petri-pink);
  color: white;
  padding: 4px 12px;
  border-radius: 3px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  margin-bottom: 16px;
  letter-spacing: 1px;
}
.q-text {
  font-size: 22px;
  line-height: 1.5;
  margin-bottom: 24px;
  color: var(--text);
  padding: 16px;
  background: rgba(0, 0, 0, 0.3);
  border-left: 4px solid var(--plague-green);
  border-radius: 2px;
}
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  background: rgba(18, 32, 40, 0.9);
  border: 2px solid var(--text-dim);
  color: var(--text);
  padding: 14px 18px;
  border-radius: 4px;
  font-family: 'VT323', monospace;
  font-size: 19px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.choice:hover:not(.disabled) {
  border-color: var(--plague-green);
  background: rgba(127, 255, 0, 0.06);
  transform: translateX(4px);
}
.choice .key {
  background: var(--plague-green);
  color: var(--bg-deep);
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.choice.correct {
  background: rgba(127, 255, 0, 0.15);
  border-color: var(--plague-green);
  animation: pulseGreen 0.5s;
}
.choice.correct .key { background: var(--plague-green); }
.choice.wrong {
  background: rgba(255, 56, 56, 0.15);
  border-color: var(--crimson);
  animation: shake 0.4s;
}
.choice.wrong .key { background: var(--crimson); }
.choice.disabled { cursor: default; opacity: 0.5; }
@keyframes pulseGreen {
  0%, 100% { box-shadow: 0 0 0 0 rgba(127, 255, 0, 0); }
  50% { box-shadow: 0 0 30px 4px rgba(127, 255, 0, 0.4); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

/* PEARL */
.pearl-box {
  margin-top: 24px;
  background: linear-gradient(135deg, rgba(255, 230, 0, 0.06), rgba(255, 77, 141, 0.08));
  border: 2px dashed var(--bio-yellow);
  padding: 18px;
  border-radius: 4px;
  animation: fadeIn 0.5s 0.2s both;
}
.pearl-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: var(--bio-yellow);
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-shadow: 0 0 6px rgba(255, 230, 0, 0.5);
}
.pearl-text { font-size: 19px; line-height: 1.5; color: #fff; }
.pearl-text strong { color: var(--petri-pink); }
.pearl-text em { color: var(--plague-green); font-style: normal; }

/* CONTROLS */
.controls { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; flex-wrap: wrap; }
.btn {
  background: var(--plague-green);
  color: var(--bg-deep);
  border: none;
  padding: 12px 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
  text-transform: uppercase;
}
.btn:hover {
  background: var(--bio-yellow);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(255, 230, 0, 0.4);
}
.btn-secondary {
  background: transparent;
  color: var(--plague-green);
  border: 2px solid var(--plague-green);
}
.btn-secondary:hover { background: var(--plague-green); color: var(--bg-deep); }
.btn-danger { background: var(--crimson); color: white; }

/* PROGRESS */
.system-progress { margin-top: 24px; }
.system-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.system-name { width: 200px; font-size: 16px; color: var(--text-dim); }
.bar-track {
  flex: 1;
  background: rgba(255,255,255,0.05);
  height: 18px;
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid rgba(127, 255, 0, 0.2);
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--plague-green), var(--bio-yellow));
  transition: width 0.5s ease;
  position: relative;
}
.bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: barShine 2s linear infinite;
}
@keyframes barShine { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
.system-pct {
  width: 80px;
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--lab-blue);
}

/* TOAST */
.toast {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(-200%);
  background: var(--plague-green);
  color: var(--bg-deep);
  padding: 12px 30px;
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  border-radius: 4px;
  box-shadow: 0 4px 20px rgba(127, 255, 0, 0.5);
  z-index: 9999;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--crimson); color: white; }
.toast.xp { background: var(--bio-yellow); color: var(--bg-deep); }

/* PETRI DISH BAR (decorative) */
.petri-bar {
  height: 56px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  gap: 8px;
}
.petri {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 2px solid var(--lab-blue);
  background: radial-gradient(circle at 30% 30%, rgba(127, 255, 0, 0.3), rgba(127, 255, 0, 0.1));
  position: relative;
  filter: drop-shadow(0 0 6px var(--plague-green));
  animation: petriPulse 2.5s ease-in-out infinite;
}
.petri::before {
  content: '';
  position: absolute;
  width: 8px; height: 8px;
  background: var(--bio-yellow);
  border-radius: 50%;
  top: 6px; left: 8px;
  filter: blur(1px);
}
.petri::after {
  content: '';
  position: absolute;
  width: 6px; height: 6px;
  background: var(--petri-pink);
  border-radius: 50%;
  bottom: 8px; right: 10px;
  filter: blur(1px);
}
.petri:nth-child(2n) { background: radial-gradient(circle at 30% 30%, rgba(255, 230, 0, 0.3), rgba(255, 230, 0, 0.1)); border-color: var(--bio-yellow); animation-delay: 0.4s; }
.petri:nth-child(3n) { background: radial-gradient(circle at 30% 30%, rgba(255, 77, 141, 0.3), rgba(255, 77, 141, 0.1)); border-color: var(--petri-pink); animation-delay: 0.8s; }
@keyframes petriPulse {
  0%, 100% { transform: scale(1); opacity: 0.7; }
  50% { transform: scale(1.08); opacity: 1; }
}

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(4, 9, 10, 0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 1001;
  backdrop-filter: blur(6px);
  animation: fadeIn 0.3s;
}
.modal {
  background: var(--bg-mid);
  border: 2px solid var(--lab-blue);
  padding: 32px;
  border-radius: 6px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 0 40px rgba(0, 212, 255, 0.3);
}
.modal h2 {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: var(--bio-yellow);
  margin-bottom: 16px;
}
.modal p { font-size: 18px; line-height: 1.5; margin-bottom: 12px; }
.achievement-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 16px 0; }
.achievement {
  padding: 10px;
  border: 1px solid var(--text-dim);
  border-radius: 3px;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.achievement.unlocked {
  border-color: var(--bio-yellow);
  background: rgba(255, 230, 0, 0.08);
  color: var(--bio-yellow);
}
.achievement.locked { opacity: 0.4; }
.ach-icon { font-size: 22px; }

/* RESULTS */
.results-screen { text-align: center; padding: 20px; }
.results-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 28px;
  color: var(--bio-yellow);
  margin-bottom: 24px;
  text-shadow: 0 0 20px var(--bio-yellow);
}
.results-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 24px 0; }
.stat-block {
  padding: 16px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--plague-green);
  border-radius: 4px;
}
.stat-num {
  font-size: 36px;
  font-family: 'Press Start 2P', monospace;
  color: var(--plague-green);
  display: block;
}
.stat-label { font-size: 14px; color: var(--text-dim); letter-spacing: 1px; }
.rank-badge {
  display: inline-block;
  font-family: 'Press Start 2P', monospace;
  font-size: 32px;
  padding: 16px 32px;
  margin: 16px 0;
  border: 3px solid;
  border-radius: 6px;
}

@media (max-width: 700px) {
  h1.game-title { font-size: 22px; letter-spacing: 2px; }
  .hud { grid-template-columns: repeat(2, 1fr); }
  .menu-grid { grid-template-columns: 1fr; }
  .system-name { width: 130px; font-size: 14px; }
  .results-stats { grid-template-columns: 1fr; }
  .panel { padding: 18px; }
  .q-text { font-size: 18px; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="app">
  <div class="title-bar">
    <h1 class="game-title">MICROBE MAYHEM</h1>
    <div class="subtitle">★ IDENTIFY THE INVADER ★</div>
    <div class="petri-bar">
      <div class="petri"></div><div class="petri"></div><div class="petri"></div>
      <div class="petri"></div><div class="petri"></div><div class="petri"></div>
      <div class="petri"></div><div class="petri"></div><div class="petri"></div>
      <div class="petri"></div><div class="petri"></div><div class="petri"></div>
    </div>
  </div>

  <div class="hud">
    <div class="hud-cell"><div class="hud-label">HP</div><div class="hud-value hp"><span class="hearts" id="hearts"></span></div></div>
    <div class="hud-cell"><div class="hud-label">XP</div><div class="hud-value xp" id="xp-display">0</div></div>
    <div class="hud-cell"><div class="hud-label">LEVEL</div><div class="hud-value lvl" id="lvl-display">1</div></div>
    <div class="hud-cell"><div class="hud-label">STREAK</div><div class="hud-value streak" id="streak-display">0🔥</div></div>
  </div>

  <div class="panel" id="panel"></div>
</div>

<script>
// ============================================================================
// QUESTION BANK — comprehensive HY Microbiology
// Categories: Bacteria, Viruses, Fungi/Parasites, Vignette→Bug, Treatment
// Tags: BUZZWORD, GRAM, TX, IMG-clue, TOX-mediated
// ============================================================================
const QBANK = [
  // ── GRAM POSITIVE COCCI ─────────────────────────────────────────────
  { topic:"Bacteria", tag:"GRAM+", q:"Lobar pneumonia + dullness to percussion + rust-colored sputum. Gram stain shows?",
    c:["Gram(+) cocci in clusters","Gram(+) diplococci (lancet-shaped)","Gram(-) diplococci","Gram(-) rods"], a:1,
    p:"<strong>S. pneumoniae = gram(+) lancet-shaped diplococci</strong> = #1 cause of typical CAP (also #1 meningitis in adults, #1 otitis media). Optochin SENSITIVE, bile soluble, alpha-hemolytic. Polysaccharide capsule = #1 virulence. <em>Asplenia/sickle cell → encapsulated bug risk: S. pneumo, H. flu, N. meningitidis</em>." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Pneumonia after recent flu + gram(+) cocci in CLUSTERS?",
    c:["S. pneumoniae","S. aureus","S. epidermidis","Enterococcus"], a:1,
    p:"<strong>Post-influenza bacterial pneumonia → S. aureus</strong>. <em>Gram(+) cocci in CLUSTERS = staph; in CHAINS/PAIRS = strep</em>. S. aureus is catalase(+), coagulase(+). Other S. aureus vignettes: <em>IVDU endocarditis (tricuspid), osteomyelitis, toxic shock syndrome (TSST-1 superantigen)</em>." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Endocarditis in patient with recent dental work. Most likely organism?",
    c:["S. aureus","Strep viridans (subacute, damaged valve)","S. pneumoniae","Enterococcus"], a:1,
    p:"<strong>Subacute endocarditis (damaged valve, dental procedure) = S. viridans</strong>. <em>Acute endocarditis (normal valve, IVDU) = S. aureus → tricuspid</em>. <em>Endocarditis + colon cancer = S. gallolyticus (bovis) → colonoscopy</em>. HACEK (Haemophilus, Aggregatibacter, Cardiobacterium, Eikenella, Kingella) = culture-negative." },
  { topic:"Bacteria", tag:"GRAM+", q:"Neonate with sepsis + gram(+) cocci. Mom never tested for which organism?",
    c:["S. pneumoniae","Group B Strep (S. agalactiae)","Listeria","E. coli"], a:1,
    p:"<strong>Neonate sepsis: GBS, E. coli, Listeria</strong>. <em>Gram(+) cocci → GBS; gram(-) rods → E. coli; gram(+) rods → Listeria</em>. GBS = bacitracin RESISTANT, hippurate(+), CAMP(+). Universal screen at 36-37 wks; intrapartum penicillin/ampicillin if positive." },
  { topic:"Bacteria", tag:"TOX-mediated", q:"Strep pyogenes (Group A Strep) post-infectious complications?",
    c:["Hemolytic uremic syndrome","Rheumatic fever (type II HS) + post-strep glomerulonephritis (type III)","Reactive arthritis","Erythema multiforme"], a:1,
    p:"<strong>GAS sequelae: rheumatic fever (PHARYNGITIS) + PSGN (skin OR pharyngitis)</strong>. RF mnemonic <em>JONES</em>: Joints, Heart (myo/endo/peri), Nodules, Erythema marginatum, Sydenham chorea. PSGN: 'cola-colored urine' 1-3 wks after strep. <em>Treat strep pharyngitis with penicillin to prevent RF (NOT PSGN — that's already immune complex driven)</em>." },

  // ── GRAM POSITIVE RODS ─────────────────────────────────────────────
  { topic:"Bacteria", tag:"BUZZWORD", q:"Watery diarrhea/vomiting after eating REHEATED rice?",
    c:["Salmonella","Bacillus cereus","E. coli ETEC","Norovirus"], a:1,
    p:"<strong>Reheated rice → Bacillus cereus</strong>. Heating germinates spores. Two toxins: <em>emetic (preformed, vomiting fast)</em> + <em>diarrheal (delayed, watery)</em>. Also can cause endophthalmitis after eye surgery (only gram(+) rod that does this). Vomiting 1-6 hrs = pre-formed toxin (B. cereus, S. aureus)." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Pregnant woman + soft cheese consumption + neonatal sepsis. Organism?",
    c:["GBS","Listeria monocytogenes","E. coli","Salmonella"], a:1,
    p:"<strong>Listeria = gram(+) rod, soft cheeses + deli meats + unpasteurized milk</strong>. <em>Tumbling motility</em>, intracellular, β-hemolytic. Causes meningitis in <em>neonates, elderly, immunocompromised, pregnancy</em>. Tx: ampicillin (cephalosporins don't cover!). <em>Why amp + ceftriaxone empirically for neonatal/elderly meningitis</em>." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Watery diarrhea + LLQ cramping 7 days after starting oral antibiotics?",
    c:["Salmonella","C. difficile","Yersinia","C. perfringens"], a:1,
    p:"<strong>C. diff = pseudomembranous colitis after antibiotics</strong>. Any antibiotic can cause it. Dx: <em>stool toxin assay</em> (NOT culture). Tx: <em>ORAL vancomycin or fidaxomicin</em>. <em>Yersinia = bloody RLQ pain (mimics appendicitis), unpasteurized milk</em>. Don't confuse." },
  { topic:"Bacteria", tag:"TOX-mediated", q:"Floppy baby syndrome + ate honey?",
    c:["C. tetani","C. botulinum","Listeria","C. perfringens"], a:1,
    p:"<strong>Infant botulism = honey → C. botulinum spores</strong>. <em>Toxin = blocks ACh release at NMJ</em> → flaccid paralysis (floppy baby), descending paralysis. Tx: human botulism Ig (BabyBIG); ventilator support. <em>NEVER honey before age 1</em>." },
  { topic:"Bacteria", tag:"TOX-mediated", q:"Patient stepped on rusty nail. Trismus + risus sardonicus. Mechanism?",
    c:["α-toxin / phospholipase","Tetanospasmin blocks GABA/glycine release at Renshaw cells","Diphtheria toxin","TSST-1"], a:1,
    p:"<strong>Tetanus = C. tetani toxin (tetanospasmin) blocks GABA + glycine release</strong> from Renshaw cells in spinal cord → spastic paralysis. <em>Lockjaw, opisthotonos, risus sardonicus</em>. Prevent with vaccine + booster Q10y. Tx: anti-toxin + metronidazole + benzodiazepines + wound debridement." },

  // ── GRAM NEGATIVE ──────────────────────────────────────────────────
  { topic:"Bacteria", tag:"GRAM-", q:"Meningitis in college freshman in dorm + petechial rash + DIC?",
    c:["S. pneumoniae","N. meningitidis","H. influenzae","Listeria"], a:1,
    p:"<strong>N. meningitidis = gram(-) diplococci, college dorms/military barracks</strong>. <em>Waterhouse-Friderichsen = bilateral adrenal hemorrhage + DIC + shock</em>. Vaccinate: 11-12 yo + booster 16 yo. <em>Asplenia/complement (C5-C9) deficiency → recurrent Neisseria infections</em>. Tx: ceftriaxone; close contacts get rifampin/cipro." },
  { topic:"Bacteria", tag:"GRAM-", q:"Asthma exacerbation + COPD exacerbation. Most common bacteria?",
    c:["S. aureus","H. influenzae (non-typeable) + Moraxella","Pseudomonas","Mycoplasma"], a:1,
    p:"<strong>COPD/asthma exacerbation triggers: H. influenzae, Moraxella, Strep pneumo, viruses</strong>. <em>Non-typeable H. flu = no capsule, doesn't cause meningitis</em>. Type B (Hib) = epiglottitis, meningitis (rare since vaccine). Hib vaccine in kids. Tx: amoxicillin or augmentin." },
  { topic:"Bacteria", tag:"GRAM-", q:"UTI in young woman. #1 cause?",
    c:["Staph saprophyticus","E. coli (UPEC)","Klebsiella","Proteus"], a:1,
    p:"<strong>UTI #1 = E. coli (uropathogenic)</strong>. #2 in young sexually active women = <em>S. saprophyticus</em> (gram(+) cocci, novobiocin-resistant). <em>Proteus = struvite stones (urease, alkaline urine, staghorn calculi)</em>. Klebsiella = currant jelly sputum, alcoholics, aspiration. Pseudomonas = hospital UTI, catheter." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Pneumonia in cystic fibrosis adult. Most likely?",
    c:["S. pneumo","Pseudomonas aeruginosa","Mycoplasma","Legionella"], a:1,
    p:"<strong>CF lung infection: S. aureus < age 10, then Pseudomonas takes over</strong>. <em>Pseudomonas = gram(-) rod, oxidase(+), grape-like odor, blue-green pyocyanin pigment</em>. Other Pseudomonas: hot tub folliculitis, burn wound infections, malignant otitis externa in diabetics, ventilator-associated pneumonia. Tx: piperacillin-tazobactam, cefepime, ceftazidime, fluoroquinolones." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Pneumonia + diarrhea + hyponatremia + business conference?",
    c:["S. pneumoniae","Legionella pneumophila","Mycoplasma","Chlamydia"], a:1,
    p:"<strong>Legionella = pneumonia + diarrhea + hypoNa</strong>. Air conditioners, water systems, cruise ships, residential homes. <em>Silver stain</em>; charcoal-yeast extract agar. Dx: <em>urinary antigen</em>. Tx: macrolide or fluoroquinolone." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Bloody diarrhea + recent ground beef + HUS (anemia, thrombocytopenia, AKI)?",
    c:["E. coli ETEC","E. coli O157:H7 (EHEC) → Shiga-like toxin","Salmonella","Campylobacter"], a:1,
    p:"<strong>EHEC O157:H7 → HUS</strong> (microangiopathic hemolytic anemia + thrombocytopenia + AKI). Shiga-like toxin damages endothelium. Sources: <em>undercooked beef, petting zoos, contaminated water</em>. <em>NEVER give antibiotics — increases toxin release + HUS risk</em>. Supportive care only." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Watery diarrhea while traveling abroad. Most common bug?",
    c:["EHEC","ETEC (heat-labile + heat-stable toxins)","Vibrio cholerae","Shigella"], a:1,
    p:"<strong>Traveler's diarrhea = ETEC</strong>. Two toxins: <em>LT (cAMP↑) + ST (cGMP↑)</em>. Massive watery diarrhea. <em>Cholera = rice-water stools, also LT-mechanism, AB toxin permanently activates Gs</em>. Tx: oral rehydration, bismuth or fluoroquinolone." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Bloody diarrhea + reactive arthritis + Guillain-Barré association?",
    c:["Shigella","Campylobacter jejuni","Yersinia","Salmonella"], a:1,
    p:"<strong>Campylobacter = #1 bacterial diarrhea in US, #1 cause of GBS</strong>. <em>Comma/S-shaped, grows at 42°C</em>. Source: undercooked poultry, puppies. <em>Reactive arthritis (Reiter): can't see, can't pee, can't climb a tree</em> — also from Salmonella, Shigella, Chlamydia, Yersinia." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Pneumonia in cattle farmer. Organism?",
    c:["Mycoplasma","Coxiella burnetii (Q fever)","Francisella","Brucella"], a:1,
    p:"<strong>Cattle farmer pneumonia = Coxiella burnetii (Q fever)</strong>. No vector — inhaled spore-like particles. <em>Rabbits = Francisella tularensis. Bird owner = Chlamydia psittaci. Goats/sheep = Brucella (undulant fever)</em>. The animal-association vignettes are pure buzzword recognition." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Bilateral interstitial pneumonia + cold agglutinins + young adult?",
    c:["S. pneumo","Mycoplasma pneumoniae","Legionella","Coxiella"], a:1,
    p:"<strong>Mycoplasma = walking pneumonia + cold agglutinins (IgM against RBCs → hemolysis)</strong>. <em>Patchy bilateral interstitial infiltrates</em> >>> classic lobar. Common in college students, military barracks. <em>No cell wall → β-lactams useless</em>. Tx: macrolide or doxy or fluoroquinolone." },

  // ── ATYPICAL & SPIROCHETES ─────────────────────────────────────────
  { topic:"Bacteria", tag:"BUZZWORD", q:"Painless genital chancre. Test of choice?",
    c:["KOH prep","Dark-field microscopy (T. pallidum)","Wet mount","Gram stain"], a:1,
    p:"<strong>Primary syphilis = painless chancre → dark-field microscopy</strong> (Treponema doesn't gram-stain). <em>Secondary: 6 wks-6 mo later, body rash including PALMS+SOLES, condylomata lata</em>. <em>Tertiary: gummas, tabes dorsalis, Argyll-Robertson pupil ('prostitute's pupil' — accommodates but doesn't react)</em>. Screen RPR/VDRL → confirm FTA-ABS. Tx: penicillin." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Bull's eye rash (erythema migrans) after camping in Connecticut?",
    c:["Rocky Mountain spotted fever","Lyme (Borrelia burgdorferi → Ixodes tick)","Cellulitis","Tinea corporis"], a:1,
    p:"<strong>Lyme = Borrelia burgdorferi via Ixodes scapularis tick (also carries Babesia, Anaplasma)</strong>. <em>Stage 1: erythema migrans + flu-like</em>. <em>Stage 2: Bell's palsy, AV block, migratory arthritis</em>. <em>Stage 3: chronic arthritis, neuro</em>. Tx: <em>doxycycline (amoxicillin in kids/pregnancy)</em>." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Rash on PALMS+SOLES + fever + headache after tick bite in NC/Virginia?",
    c:["Lyme","Rocky Mountain Spotted Fever (Rickettsia rickettsii)","Syphilis","Coxsackie"], a:1,
    p:"<strong>RMSF = Rickettsia rickettsii via Dermacentor tick</strong>. <em>Rash: starts on wrists/ankles → spreads to palms/soles + trunk</em> (opposite of meningococcus). Tx: <em>doxycycline (even in kids — risk > benefit here)</em>. <strong>Palms/soles rash DDx</strong>: RMSF, syphilis (2°), coxsackie (hand-foot-mouth)." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Cervical lymphadenopathy + cat scratch. Organism?",
    c:["Bartonella henselae","Pasteurella multocida","Yersinia pestis","Toxoplasma"], a:0,
    p:"<strong>Cat scratch disease = Bartonella henselae</strong>. Tender lymphadenopathy near scratch site. <em>Cat/dog BITE = Pasteurella multocida (cellulitis fast, within 24hr)</em>. <em>Bartonella in HIV → bacillary angiomatosis (red papules, mistaken for Kaposi)</em>." },
  { topic:"Bacteria", tag:"BUZZWORD", q:"Mycobacterium tuberculosis: caseating granulomas + Ghon complex. Drug regimen?",
    c:["Vancomycin","RIPE (Rifampin, Isoniazid, Pyrazinamide, Ethambutol) × 2 mo, then RI × 4 mo","TMP-SMX","Levofloxacin"], a:1,
    p:"<strong>Active TB: RIPE × 2 mo, then RI × 4 mo (6 mo total)</strong>. Latent TB: <em>9 mo INH + B6</em>. <strong>Side effect quick reference</strong>: R = orange body fluids + P450 inducer; I = neuropathy (give B6) + hepatitis + drug-induced lupus; P = hyperuricemia (gout); E = optic neuritis (red-green color blindness). Always give B6 with INH." },

  // ── HERPES VIRUSES ─────────────────────────────────────────────────
  { topic:"Virus", tag:"HSV", q:"DNA, enveloped, LINEAR. Causes encephalitis with temporal lobe RBCs in CSF?",
    c:["HepB","Herpes simplex (HSV-1)","CMV","Adenovirus"], a:1,
    p:"<strong>Herpesviridae = DNA, enveloped, ds-LINEAR</strong>. (HepB = DNA, enveloped, CIRCULAR — common Step 1 distinction.) HSV-1 encephalitis: <em>fever + confusion + RBCs in CSF (temporal lobe hemorrhage)</em>. EEG: temporal spikes. Tx: IV acyclovir. Latency in trigeminal ganglion (HSV-1) or sacral (HSV-2)." },
  { topic:"Virus", tag:"HSV", q:"Mononucleosis = fever + lymphadenopathy + tonsillar exudate + splenomegaly. Cell type the virus invades?",
    c:["T cells","B cells (via CD21)","NK cells","Macrophages"], a:1,
    p:"<strong>EBV mono → infects B cells via CD21</strong>. CD8 'reactive/atypical lymphocytes' attack infected B cells. Heterophile antibody test (Monospot) +. <em>If amoxicillin given for presumed strep → diffuse rash (not penicillin allergy)</em>. <em>Splenomegaly → no contact sports for 3-4 wks (rupture risk)</em>. Cancer associations: Burkitt, Hodgkin, nasopharyngeal CA." },
  { topic:"Virus", tag:"HSV", q:"Owl's eye intranuclear inclusions on biopsy. Virus?",
    c:["HSV","CMV","EBV","HHV-8"], a:1,
    p:"<strong>CMV = 'owl's eye' intranuclear inclusions</strong>. <em>Most common congenital infection (TORCH)</em>: periventricular calcifications + sensorineural hearing loss + chorioretinitis. <em>HIV with CD4<50: CMV retinitis (cottage cheese with ketchup) → ganciclovir</em>. Heterophile-NEGATIVE mono. Transplant patients: CMV PCR monitoring." },
  { topic:"Virus", tag:"HSV", q:"Dermatomal vesicular rash that doesn't cross midline. Reactivation of?",
    c:["HSV-1","Varicella zoster virus (latent in dorsal root ganglia)","Smallpox","Coxsackie"], a:1,
    p:"<strong>Shingles = VZV reactivation from dorsal root ganglia</strong>. <em>Dermatomal, doesn't cross midline</em>. Risks: age, immunocompromise, stress. Complications: post-herpetic neuralgia, <em>ophthalmic zoster (V1 — Hutchinson sign on tip of nose)</em>, Ramsay Hunt (CN VII facial palsy + ear vesicles). Tx within 72hr: acyclovir/valacyclovir. Vaccine: shingrix at 50+." },

  // ── OTHER VIRUSES ──────────────────────────────────────────────────
  { topic:"Virus", tag:"BUZZWORD", q:"5th disease ('slapped cheek' rash) in kid. Adult complication?",
    c:["Roseola","Parvovirus B19 → aplastic crisis (esp. sickle cell), hydrops fetalis, arthritis","Measles","Coxsackie"], a:1,
    p:"<strong>Parvovirus B19 = ssDNA, naked virus</strong>. <em>5th disease (slapped cheek)</em> in kids; <em>arthritis</em> in adults; <em>aplastic anemia</em> in sickle cell (infects RBC precursors via P antigen); <em>hydrops fetalis</em> if pregnancy. The only HY ssDNA virus." },
  { topic:"Virus", tag:"BUZZWORD", q:"Vesicular lesions on hands, feet, AND mouth in kids. Virus?",
    c:["HSV","Coxsackie A (Picornavirus)","VZV","Parvovirus"], a:1,
    p:"<strong>Hand-foot-mouth = Coxsackie A</strong>. Daycare/summer. Self-limited. <em>Coxsackie B = dilated cardiomyopathy, pericarditis, pleurodynia, T1DM</em>. Picornavirus family also includes: <em>polio, echovirus, rhinovirus, HepA</em>. All ssRNA(+)." },
  { topic:"Virus", tag:"BUZZWORD", q:"Rotavirus = #1 cause of?",
    c:["Adult viral diarrhea","Severe diarrhea in kids 6mo–2yr","Bloody diarrhea","Bronchiolitis"], a:1,
    p:"<strong>Rotavirus = #1 viral diarrhea in kids 6mo–2yr</strong>. <em>dsRNA, naked, segmented (Reoviridae)</em>. Watery diarrhea, dehydration. Live oral vaccine (RotaTeq) — risk of intussusception (very rare). <em>Norovirus = #1 viral gastro in adults (cruise ships)</em>." },
  { topic:"Virus", tag:"BUZZWORD", q:"Bronchiolitis in infant <2yo + bilateral wheezing in winter. Virus?",
    c:["Influenza","RSV","Adenovirus","Coronavirus"], a:1,
    p:"<strong>RSV = #1 cause of bronchiolitis + pneumonia in <1yr</strong>. <em>Treat supportively</em>; ribavirin reserved for severe. <em>Palivizumab</em> = monoclonal anti-F protein for high-risk preemies (prophylaxis only). Croup ('barking cough', steeple sign) = parainfluenza. Hand-foot-mouth = Coxsackie A." },
  { topic:"Virus", tag:"BUZZWORD", q:"Hydrophobia + pharyngeal spasms after dog bite. Virus + post-exposure?",
    c:["Tetanus; toxoid","Rabies (Rhabdovirus); IG + vaccine + wash wound","Influenza; Tamiflu","HIV; PEP"], a:1,
    p:"<strong>Rabies = bullet-shaped Rhabdovirus, ssRNA(-)</strong>. <em>Negri bodies (eosinophilic cytoplasmic) in hippocampus/cerebellum</em>. Travels retrograde via dynein along nerves. <strong>Post-exposure: wash wound + rabies Ig (passive) + vaccine series (active)</strong>. Almost universally fatal once symptomatic. US: bats > raccoons > foxes." },
  { topic:"Virus", tag:"BUZZWORD", q:"Influenza viral structure?",
    c:["Naked DNA","Enveloped, segmented ssRNA(-) → reassortment causes pandemics","Enveloped DNA","Naked RNA"], a:1,
    p:"<strong>Influenza = Orthomyxovirus, enveloped, segmented ssRNA(-)</strong>. <em>Antigenic DRIFT</em> = point mutations → seasonal epidemics. <em>Antigenic SHIFT</em> = segment reassortment (human + animal strain) → pandemics. <em>Hemagglutinin = entry; neuraminidase = exit (oseltamivir blocks)</em>. Vaccine targets HA. Post-flu pneumonia → S. aureus." },
  { topic:"Virus", tag:"BUZZWORD", q:"HepB serology: HBsAg(+), HBeAg(+), HBcAb IgM(+), HBsAb(-). Stage?",
    c:["Window period","Acute infection (high infectivity)","Chronic infection","Resolved/immune"], a:1,
    p:"<strong>HepB serology cheat sheet</strong>:<br>• <em>Acute</em>: HBsAg(+), HBeAg(+), HBcAb IgM(+) — highly infectious.<br>• <em>Window</em>: HBsAg(-), HBsAb(-), HBcAb IgM(+) — only marker of infection.<br>• <em>Chronic</em>: HBsAg(+) >6 mo, HBcAb IgG(+).<br>• <em>Resolved</em>: HBsAb(+), HBcAb IgG(+).<br>• <em>Vaccinated</em>: HBsAb(+) only.<br><strong>HBeAg = high infectivity marker.</strong>" },
  { topic:"Virus", tag:"BUZZWORD", q:"Most common cause of acute hepatitis in US (community)?",
    c:["HepA","HepB","HepC","HepE"], a:0,
    p:"<strong>HepA = most common acute hepatitis in US</strong> (community-acquired, fecal-oral, travel-related). <em>RNA, naked, picornavirus</em>. IgM = acute; IgG = recovered. <em>HepC = most common CHRONIC hepatitis in US</em>. <em>HepE = fulminant hepatitis in PREGNANT women</em>. <em>HepD requires HepB to infect (envelope)</em>." },
  { topic:"Virus", tag:"BUZZWORD", q:"HIV: how does drug entry inhibitor maraviroc work?",
    c:["Blocks gp41 fusion","Blocks CCR5 chemokine receptor","Blocks reverse transcriptase","Blocks integrase"], a:1,
    p:"<strong>HIV entry inhibitors</strong>: <em>maraviroc = CCR5 chemokine receptor antagonist</em>; <em>enfuvirtide = gp41 fusion inhibitor</em>. HIV uses CD4 + co-receptor (CCR5 early, CXCR4 late). <em>CCR5 Δ32 homozygote = resistance to HIV infection</em>. HAART components: 2 NRTIs + 1 of (NNRTI / PI / INSTI)." },

  // ── FUNGI ──────────────────────────────────────────────────────────
  { topic:"Fungi", tag:"BUZZWORD", q:"AIDS patient + bilateral ground-glass infiltrates + CD4<200. Bug?",
    c:["TB","Pneumocystis jirovecii","Cryptococcus","Histoplasma"], a:1,
    p:"<strong>PCP = Pneumocystis jirovecii pneumonia</strong>. CD4<200. <em>Bilateral ground-glass on CXR</em>. Dx: <em>bronchoalveolar lavage with silver stain (or DFA)</em>. Tx + prophylaxis: <strong>TMP-SMX</strong>. Steroids if PaO2<70 or A-a gradient>35. Pentamidine if sulfa allergy." },
  { topic:"Fungi", tag:"BUZZWORD", q:"Immunocompromised patient + meningitis + India ink shows encapsulated yeast?",
    c:["Histoplasma","Cryptococcus neoformans","Candida","Coccidioides"], a:1,
    p:"<strong>Cryptococcus neoformans = HIV meningitis</strong>. <em>India ink: clear halo around yeast (capsule)</em>. Dx: <em>latex agglutination for cryptococcal antigen</em> (preferred over India ink if listed). Source: <em>pigeon droppings</em>. Tx: <em>amphotericin B + flucytosine, then fluconazole maintenance</em>." },
  { topic:"Fungi", tag:"BUZZWORD", q:"Pneumonia + flu-like illness in Mississippi/Ohio River valley + spelunker (caves)?",
    c:["Coccidioides","Histoplasma capsulatum","Blastomyces","Cryptococcus"], a:1,
    p:"<strong>Histoplasma = Mississippi/Ohio River, bird/bat droppings, caves</strong>. <em>Macrophages with intracellular yeast forms (Histo HIDES inside macrophages)</em>. Often asymptomatic or flu-like. Severe disseminated in HIV. Tx: itraconazole (mild) or amphotericin (severe)." },
  { topic:"Fungi", tag:"BUZZWORD", q:"Pneumonia in Southwest US + dust exposure (earthquake, archaeology)?",
    c:["Histoplasma","Coccidioides immitis","Blastomyces","Aspergillus"], a:1,
    p:"<strong>Coccidioides = San Joaquin Valley fever, Southwest US, after earthquakes/dust</strong>. <em>Spherules with endospores</em>. Often pulmonary; can cause erythema nodosum or multiforme. Rx: itraconazole or fluconazole; amphotericin if severe/disseminated." },
  { topic:"Fungi", tag:"BUZZWORD", q:"Diabetic in DKA + black necrotic eschar in nose/sinus?",
    c:["Aspergillus","Mucormycosis (Rhizopus, Mucor)","Coccidioides","Sporothrix"], a:1,
    p:"<strong>Mucor/Rhizopus → rhinocerebral mucormycosis in DKA + neutropenic patients</strong>. <em>Broad, NON-septate hyphae with right-angle branching</em>. Aggressively invasive. Tx: <em>surgical debridement + amphotericin B</em> (start ASAP). Compare: <em>Aspergillus = septate, acute (45°) angle branching</em>." },

  // ── PARASITES ──────────────────────────────────────────────────────
  { topic:"Parasites", tag:"BUZZWORD", q:"Hiker drinks from stream → fatty diarrhea + bloating. Bug?",
    c:["Cryptosporidium","Giardia lamblia","Entamoeba","E. coli"], a:1,
    p:"<strong>Giardia = stream water + campers/hikers/daycare</strong>. <em>Trophozoites with 4 flagella + 2 nuclei (look like clown faces)</em>. Steatorrhea (fat-soluble vitamin malabsorption), foul-smelling. <em>Common in IgA deficiency</em>. Tx: <em>metronidazole</em>. <em>Cryptosporidium = AIDS diarrhea, acid-fast oocysts, no good Rx</em>." },
  { topic:"Parasites", tag:"BUZZWORD", q:"AIDS patient + ring-enhancing brain lesion(s)?",
    c:["Primary CNS lymphoma","Toxoplasma gondii (if not on TMP-SMX prophylaxis)","Cryptococcus","Cysticercosis"], a:1,
    p:"<strong>HIV + ring-enhancing lesion</strong>:<br>• <em>If not on TMP-SMX prophylaxis</em> → Toxoplasma → Tx: <em>sulfadiazine + pyrimethamine</em>.<br>• <em>If on TMP-SMX</em> (CD4<100) → primary CNS lymphoma (EBV-driven).<br>• <em>Single lesion, periventricular</em> → favors lymphoma.<br>• <em>Multiple lesions</em> → favors Toxo.<br>Source: undercooked meat or cat litter." },
  { topic:"Parasites", tag:"BUZZWORD", q:"Cyclic fevers + travel to sub-Saharan Africa. Most dangerous species?",
    c:["P. vivax","P. falciparum (cerebral malaria, RBCs at all stages)","P. ovale","P. malariae"], a:1,
    p:"<strong>Plasmodium falciparum = most dangerous → cerebral malaria, no liver hypnozoite</strong>. <em>Vivax + ovale = hypnozoites in liver → relapse → need primaquine (check G6PD first)</em>. Dx: <em>thick + thin blood smears (Giemsa)</em>. Tx: chloroquine if sensitive area; <em>artesunate or atovaquone-proguanil for falciparum</em>." },
  { topic:"Parasites", tag:"BUZZWORD", q:"Perianal itching at night in school-age kid. Tape test positive. Bug?",
    c:["Ascaris","Enterobius vermicularis (pinworm)","Trichinella","Schistosoma"], a:1,
    p:"<strong>Pinworm = Enterobius vermicularis</strong>. <em>Scotch-tape test in early AM</em>. Most common helminth in US. Tx: <em>pyrantel pamoate or albendazole</em> for patient AND household. <em>Ascaris = travels to lungs (Loeffler syndrome) then back to GI</em>." },
  { topic:"Parasites", tag:"BUZZWORD", q:"Travel + cysts in brain on imaging + history of eating undercooked pork?",
    c:["Toxoplasma","Neurocysticercosis (Taenia solium)","Echinococcus","Strongyloides"], a:1,
    p:"<strong>Neurocysticercosis = Taenia solium (pork tapeworm)</strong>. <em>Multiple cysts on MRI</em>, often with calcifications. #1 cause of adult-onset seizures in endemic areas (Latin America). Tx: <em>albendazole or praziquantel + steroids (to prevent inflammation from dying parasites)</em>. <em>Echinococcus = hydatid cyst in liver — DON'T aspirate (anaphylaxis risk)</em>." },
  { topic:"Parasites", tag:"BUZZWORD", q:"Vaginal discharge: yellow-green, frothy + strawberry cervix?",
    c:["Candida","Trichomonas vaginalis (flagellated protozoan)","BV","Gonorrhea"], a:1,
    p:"<strong>Trichomonas = yellow-green frothy + strawberry cervix + motile flagellated trophs on wet mount</strong>. <em>Tx: metronidazole for patient AND partner</em>. Compare: <em>BV (Gardnerella) = thin gray, fishy, clue cells, +whiff test</em>; <em>Candida = thick white cottage cheese, KOH shows pseudohyphae</em>." },

  // ── VIGNETTE → BUG ─────────────────────────────────────────────────
  { topic:"Vignette", tag:"BUZZWORD", q:"Pneumonia + bird/parrot owner. Bug?",
    c:["Coxiella","Chlamydia psittaci","Francisella","Aspergillus"], a:1,
    p:"<strong>Bird owner pneumonia = Chlamydia psittaci</strong>. <em>Animal-association cheat sheet</em>:<br>• Birds → C. psittaci<br>• Cats (scratch) → Bartonella henselae<br>• Cats (litter) → Toxoplasma<br>• Cattle → Coxiella burnetii (Q fever)<br>• Rabbits → Francisella tularensis<br>• Goats → Brucella<br>• Dog/cat bite → Pasteurella multocida<br>• Rat bite → Spirillum minor<br>• Bats/caves → Histoplasma" },
  { topic:"Vignette", tag:"BUZZWORD", q:"Whipple disease finding?",
    c:["Anti-endomysial antibodies","PAS-positive macrophages in lamina propria (Tropheryma whipplei)","Acid-fast bacilli","Birefringent crystals"], a:1,
    p:"<strong>Whipple = Tropheryma whipplei → PAS(+) macrophages in lamina propria</strong>. Sx: arthritis, weight loss, malabsorptive diarrhea, neuro/cardiac involvement. Older men. Tx: <em>ceftriaxone IV → TMP-SMX × 1 year</em>." },
  { topic:"Vignette", tag:"BUZZWORD", q:"Pseudomembrane in throat + myocarditis. Toxin mechanism?",
    c:["Blocks ACh release","Diphtheria toxin: ADP-ribosylates EF-2 → inhibits protein synthesis","TSST-1 superantigen","Endotoxin/LPS"], a:1,
    p:"<strong>Diphtheria (C. diphtheriae) → ADP-ribosylates EF-2</strong>. <em>Pseudomembrane in throat (gray, bleeds on removal) + cervical lymphadenopathy ('bull neck') + myocarditis + neuropathy</em>. Same mechanism: <em>Pseudomonas exotoxin A</em>. Dx: <em>Loeffler/tellurite media, Elek test for toxin</em>. Tx: anti-toxin + erythromycin/penicillin. DTaP vaccine." },
  { topic:"Vignette", tag:"BUZZWORD", q:"Whooping cough — 100-day cough + paroxysmal cough with inspiratory whoop. Toxin mechanism?",
    c:["Inhibits protein synthesis","Pertussis toxin: ADP-ribosylates Gi → ↑cAMP → ↑lymphocytosis","Blocks GABA","Damages NMJ"], a:1,
    p:"<strong>Pertussis = Bordetella pertussis</strong>. Pertussis toxin <em>ADP-ribosylates Gi → ↑cAMP → lymphocytosis</em>. <em>3 phases: catarrhal (URI symptoms) → paroxysmal (whoop) → convalescent</em>. Tx: <em>macrolide (azithromycin)</em>. DTaP vaccine; Tdap booster in pregnancy + adolescents." },
  { topic:"Vignette", tag:"BUZZWORD", q:"Kid with sickle cell + osteomyelitis. Most likely organism?",
    c:["S. aureus","Salmonella","E. coli","Pseudomonas"], a:1,
    p:"<strong>Osteomyelitis decision tree</strong>:<br>• <em>General population → S. aureus #1</em><br>• <em>Sickle cell → Salmonella</em><br>• <em>Sexually active young adult → N. gonorrhoeae</em><br>• <em>Diabetic foot / puncture wound through shoe → Pseudomonas</em><br>• <em>IV drug user → S. aureus, Pseudomonas</em><br>• <em>Cat/dog bite → Pasteurella</em>" },
  { topic:"Vignette", tag:"BUZZWORD", q:"Abscess in kid with chronic granulomatous disease (CGD). Bug?",

function loadSave() {
  try {
    const v = localStorage.getItem('microbe_mayhem_save');
    if (v) {
      const data = JSON.parse(v);
      Object.assign(STATE, data);
      SYSTEMS.forEach(s => { if (!STATE.systemMastery[s]) STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
      toast('SAVE LOADED', 'xp');
    }
  } catch (e) {}
}
function save() {
  try {
    const data = {
      hp: STATE.hp, maxHp: STATE.maxHp, xp: STATE.xp, level: STATE.level,
      bestStreak: STATE.bestStreak, systemMastery: STATE.systemMastery,
      achievements: STATE.achievements, totalAnswered: STATE.totalAnswered,
      totalCorrect: STATE.totalCorrect
    };
    localStorage.setItem('microbe_mayhem_save', JSON.stringify(data));
  } catch (e) {}
}

// ============================================================================
// UTILS
// ============================================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickRandom(arr, n) { return shuffle(arr).slice(0, n); }
function toast(msg, cls='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + cls;
  setTimeout(() => t.className = 'toast ' + cls, 1800);
}
function unlock(id) {
  if (STATE.achievements[id]) return;
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach) return;
  STATE.achievements[id] = true;
  toast(`🏆 ${ach.name}!`, 'xp');
  save();
}
function checkAchievements() {
  if (STATE.totalAnswered >= 1) unlock('first_culture');
  if (STATE.streak >= 5) unlock('streak_5');
  if (STATE.streak >= 10) unlock('streak_10');
  if (STATE.level >= 5) unlock('level_5');
  if (STATE.level >= 10) unlock('level_10');
  ['Bacteria','Virus','Vignette'].forEach((sys, i) => {
    const m = STATE.systemMastery[sys];
    const threshold = i === 0 ? 5 : 4;
    if (m.seen >= threshold && (m.correct/m.seen) >= 0.9) {
      unlock(['master_bacteria','master_virus','master_vignette'][i]);
    }
  });
}

function renderHUD() {
  let hearts = '';
  for (let i = 0; i < STATE.maxHp; i++) {
    hearts += `<span class="heart ${i < STATE.hp ? '' : 'lost'}">♥</span>`;
  }
  document.getElementById('hearts').innerHTML = hearts;
  document.getElementById('xp-display').textContent = STATE.xp;
  document.getElementById('lvl-display').textContent = STATE.level;
  document.getElementById('streak-display').textContent = STATE.streak + '🔥';
}
function gainXP(amt) {
  STATE.xp += amt;
  const needed = STATE.level * 50;
  if (STATE.xp >= needed) {
    STATE.xp -= needed;
    STATE.level++;
    STATE.maxHp = Math.min(5, 3 + Math.floor(STATE.level / 5));
    STATE.hp = STATE.maxHp;
    toast(`LEVEL UP! Lvl ${STATE.level}`, 'xp');
  }
  renderHUD();
}

function startMode(mode) {
  STATE.mode = mode;
  STATE.modeStats = { correct: 0, total: 0 };
  STATE.modeIdx = 0;
  STATE.hp = STATE.maxHp;

  let pool = QBANK;
  let limit = 10;
  if (mode === 'bacteria') pool = QBANK.filter(q => q.topic === 'Bacteria');
  else if (mode === 'virus') pool = QBANK.filter(q => q.topic === 'Virus');
  else if (mode === 'fungiparasites') pool = QBANK.filter(q => ['Fungi','Parasites'].includes(q.topic));
  else if (mode === 'vignette') pool = QBANK.filter(q => q.topic === 'Vignette' || q.tag === 'BUZZWORD');
  else if (mode === 'treatment') pool = QBANK.filter(q => q.topic === 'Treatment' || q.tag === 'TX');
  else if (mode === 'endless') { pool = QBANK; limit = 999; }

  STATE.modeQs = mode === 'endless' ? shuffle(pool) : pickRandom(pool, Math.min(limit, pool.length));
  STATE.modeStats.total = STATE.modeQs.length;
  renderHUD();
  nextQuestion();
}

function nextQuestion() {
  if (STATE.hp <= 0) return endRound('LIFE LOST');
  if (STATE.modeIdx >= STATE.modeQs.length) {
    if (STATE.mode === 'endless') {
      STATE.modeQs = shuffle(QBANK); STATE.modeIdx = 0;
    } else return endRound('COMPLETE');
  }
  STATE.currentQ = STATE.modeQs[STATE.modeIdx];
  renderQuestion();
}

function renderQuestion() {
  const q = STATE.currentQ;
  const progressTxt = STATE.mode === 'endless'
    ? `Q${STATE.modeStats.correct + 1} • ENDLESS`
    : `Q${STATE.modeIdx + 1} / ${STATE.modeQs.length}`;
  panel.innerHTML = `
    <div class="question-area">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span class="q-tag">${q.tag} • ${q.topic}</span>
        <span style="font-family:'JetBrains Mono',monospace; color:var(--text-dim); font-size:14px;">${progressTxt}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="choices" id="choices">
        ${q.c.map((c, i) => `
          <button class="choice" data-idx="${i}" onclick="answer(${i})">
            <span class="key">${String.fromCharCode(65 + i)}</span>
            <span>${c}</span>
          </button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>
  `;
}

function answer(idx) {
  const q = STATE.currentQ;
  const isCorrect = idx === q.a;
  document.querySelectorAll('.choice').forEach((el, i) => {
    el.classList.add('disabled');
    el.onclick = null;
    if (i === q.a) el.classList.add('correct');
    else if (i === idx) el.classList.add('wrong');
  });

  STATE.totalAnswered++;
  STATE.systemMastery[q.topic].seen++;
  if (isCorrect) {
    STATE.totalCorrect++;
    STATE.systemMastery[q.topic].correct++;
    STATE.modeStats.correct++;
    STATE.streak++;
    if (STATE.streak > STATE.bestStreak) STATE.bestStreak = STATE.streak;
    const xpGain = 10 + Math.min(STATE.streak * 2, 20);
    gainXP(xpGain);
    toast(`+${xpGain} XP`, 'xp');
    if (STATE.mode === 'endless' && STATE.streak >= 20) unlock('survivor');
  } else {
    STATE.streak = 0;
    STATE.hp--;
    toast('-1 HP', 'error');
  }
  renderHUD();
  checkAchievements();
  save();

  document.getElementById('feedback').innerHTML = `
    <div class="pearl-box">
      <div class="pearl-label">💎 MEHLMAN PEARL</div>
      <div class="pearl-text">${q.p}</div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="renderMenu()">◄ MENU</button>
      <button class="btn" onclick="advance()">${STATE.modeIdx + 1 >= STATE.modeQs.length && STATE.mode !== 'endless' ? 'FINISH ►' : 'NEXT ►'}</button>
    </div>
  `;
}

function advance() {
  STATE.modeIdx++;
  nextQuestion();
}

function endRound(reason) {
  const correct = STATE.modeStats.correct;
  const total = STATE.modeStats.total;
  const livePct = total > 0 ? Math.round(correct/total*100) : 0;

  let rank, rankColor;
  if (livePct === 100 && total >= 10) { rank = 'S'; rankColor = 'var(--bio-yellow)'; unlock('perfect_round'); }
  else if (livePct >= 90) { rank = 'A'; rankColor = 'var(--plague-green)'; }
  else if (livePct >= 75) { rank = 'B'; rankColor = 'var(--lab-blue)'; }
  else if (livePct >= 60) { rank = 'C'; rankColor = 'var(--petri-pink)'; }
  else { rank = 'D'; rankColor = 'var(--crimson)'; }

  const reasonMsg = reason === 'LIFE LOST' ? 'CONTAINMENT BREACH — OUT OF HP' : 'ROUND COMPLETE';
  panel.innerHTML = `
    <div class="results-screen">
      <div class="results-title">${reasonMsg}</div>
      <div class="rank-badge" style="color:${rankColor}; border-color:${rankColor}; box-shadow: 0 0 30px ${rankColor};">RANK ${rank}</div>
      <div class="results-stats">
        <div class="stat-block"><span class="stat-num">${correct}</span><span class="stat-label">CORRECT</span></div>
        <div class="stat-block"><span class="stat-num">${livePct}%</span><span class="stat-label">ACCURACY</span></div>
        <div class="stat-block"><span class="stat-num">${STATE.bestStreak}</span><span class="stat-label">BEST STREAK</span></div>
      </div>
      <div class="controls" style="justify-content:center;">
        <button class="btn btn-secondary" onclick="renderMenu()">◄ MENU</button>
        <button class="btn" onclick="startMode('${STATE.mode}')">↻ RETRY</button>
      </div>
    </div>
  `;
  STATE.streak = 0;
  renderHUD();
  save();
}

function showSyncModal() {

      <div class="modal">
        <h2>🔄 SYNC SAVE</h2>

        <div style="margin-bottom:20px; padding:14px; background:rgba(0,0,0,0.25); border-radius:4px; border:1px solid rgba(128,128,128,0.25);">

          <textarea id="sync-export-code" readonly style="width:100%; height:90px; font-family:monospace; font-size:11px; padding:8px; background:rgba(0,0,0,0.45); color:inherit; border:1px solid rgba(128,128,128,0.4); border-radius:3px; resize:none; word-break:break-all;">${code}</textarea>
          <button class="btn btn-secondary" style="margin-top:10px; width:100%;" onclick="copyExportCode()">📋 Copy to Clipboard</button>
        </div>

        <div style="margin-bottom:20px; padding:14px; background:rgba(0,0,0,0.25); border-radius:4px; border:1px solid rgba(128,128,128,0.25);">
          <h3 style="font-size:15px; margin-bottom:8px; opacity:0.9;">📥 IMPORT &mdash; from another device</h3>
          <p style="font-size:13px; opacity:0.65; margin-bottom:8px;">Paste a save code from your other device:</p>
          <textarea id="sync-import-code" placeholder="Paste save code here..." style="width:100%; height:90px; font-family:monospace; font-size:11px; padding:8px; background:rgba(0,0,0,0.45); color:inherit; border:1px solid rgba(128,128,128,0.4); border-radius:3px; resize:none;"></textarea>
          <button class="btn" style="margin-top:10px; width:100%;" onclick="applyImport()">✓ Apply Import</button>
        </div>

        <div style="text-align:center;">
          <button class="btn btn-secondary" onclick="closeModal()">CLOSE</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function copyExportCode() {
  const ta = document.getElementById('sync-export-code');
  if (!ta) return;
  ta.select();
  ta.setSelectionRange(0, 99999);
  let ok = false;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(
      () => toast('COPIED!', 'xp'),
      () => {
        try { ok = document.execCommand('copy'); } catch (e) {}
        if (ok) toast('COPIED!', 'xp');
        else toast('Select & copy manually', 'error');
      }
    );
  } else {
    try { ok = document.execCommand('copy'); } catch (e) {}
    if (ok) toast('COPIED!', 'xp');
    else toast('Select & copy manually', 'error');
  }
}

function applyImport() {
  const ta = document.getElementById('sync-import-code');
  if (!ta) return;
  const code = ta.value.trim();
  if (!code) { toast('Paste a code first', 'error'); return; }
  try {
    let json;
    try { json = decodeURIComponent(escape(atob(code))); }
    catch (e) { json = atob(code); }
    const data = JSON.parse(json);
    if (typeof data.xp !== 'number' || !data.systemMastery) {
      throw new Error('Invalid save format');
    }
    if (!confirm('This will REPLACE your current progress on this device. Continue?')) return;
    Object.assign(STATE, data);
    SYSTEMS.forEach(s => { if (!STATE.systemMastery[s]) STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
    if (!STATE.achievements) STATE.achievements = {};
    save();
    closeModal();
    toast('SAVE IMPORTED!', 'xp');
    renderMenu();
  } catch (e) {
    toast('Invalid code — try again', 'error');
  }
}

            </div>`).join('')}
        </div>
        <button class="btn" onclick="closeModal()">CLOSE</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function showStats() {
  const totalPct = STATE.totalAnswered ? Math.round(STATE.totalCorrect/STATE.totalAnswered*100) : 0;
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>📊 LIFETIME STATS</h2>
        <p><strong style="color:var(--bio-yellow)">Total Answered:</strong> ${STATE.totalAnswered}</p>
        <p><strong style="color:var(--plague-green)">Total Correct:</strong> ${STATE.totalCorrect}</p>
        <p><strong style="color:var(--lab-blue)">Lifetime Accuracy:</strong> ${totalPct}%</p>
        <p><strong style="color:var(--petri-pink)">Best Streak:</strong> ${STATE.bestStreak}🔥</p>
        <p><strong style="color:var(--hazard-orange)">Current Level:</strong> ${STATE.level}</p>
        <p><strong>Achievements:</strong> ${Object.keys(STATE.achievements).length} / ${ACHIEVEMENTS.length}</p>
        <button class="btn" onclick="closeModal()">CLOSE</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeModal() { document.querySelector('.modal-overlay')?.remove(); }

function resetSave() {
  if (!confirm('Reset ALL Microbe Mayhem progress?')) return;
  try { localStorage.removeItem('microbe_mayhem_save'); } catch (e) {}
  STATE.hp = 3; STATE.maxHp = 3; STATE.xp = 0; STATE.level = 1;
  STATE.streak = 0; STATE.bestStreak = 0; STATE.totalAnswered = 0; STATE.totalCorrect = 0;
  STATE.achievements = {};
  SYSTEMS.forEach(s => { STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
  toast('SAVE RESET');
  renderMenu();
}

document.addEventListener('keydown', (e) => {
  if (STATE.mode === 'menu' || !STATE.currentQ) return;
  const choices = document.querySelectorAll('.choice:not(.disabled)');
  if (choices.length === 0) {
    if (e.key === 'Enter') {
      const nextBtn = document.querySelector('.controls .btn:not(.btn-secondary):not(.btn-danger)');
      nextBtn?.click();
    }
    return;
  }
  const keyIdx = ['a','b','c','d','1','2','3','4'].indexOf(e.key.toLowerCase());
  if (keyIdx >= 0) {
    const idx = keyIdx >= 4 ? keyIdx - 4 : keyIdx;
    if (choices[idx]) answer(idx);
  }
});

loadSave();
renderMenu();
</script>
</body>
</html>
