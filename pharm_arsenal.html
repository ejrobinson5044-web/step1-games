<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PHARM ARSENAL — Pharmacology</title>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@600;700;800&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f1f8;
  --bg2:#e9e3f0;
  --panel:#fffdff;
  --panel-hi:#f1ecf6;
  --cyan:#7c3aed;        /* violet primary (pharmacy) */
  --cyan-dim:#5b21b6;
  --amber:#b45309;       /* amber accent */
  --amber-hi:#92400e;
  --red:#b91c1c;
  --green:#15803d;
  --text:#221d2b;
  --dim:#6e6580;
  --line:rgba(124,58,237,.16);
  --glow:rgba(124,58,237,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Public Sans',sans-serif;min-height:100vh;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 18% 0%,rgba(124,58,237,.07),transparent 55%),
    radial-gradient(ellipse at 88% 100%,rgba(180,83,9,.05),transparent 55%),
    linear-gradient(180deg,#f4f1f8,#e9e3f0);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(var(--line) 1px,transparent 1px);
  background-size:27px 27px;
  mask-image:radial-gradient(ellipse at center,#000 33%,transparent 88%);opacity:.7;
}
#app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:18px}

.hdr{text-align:center;padding:18px 0 16px;border-bottom:2px solid var(--cyan-dim);margin-bottom:20px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:14px;
  background:linear-gradient(150deg,var(--cyan),var(--cyan-dim));color:#fffdff;
  font-family:'Schibsted Grotesk';font-weight:800;font-size:30px;margin-bottom:8px;box-shadow:0 4px 18px var(--glow)}
h1{font-family:'Schibsted Grotesk';font-weight:800;font-size:34px;letter-spacing:.2px;color:var(--cyan)}
.sub{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:4px;text-transform:uppercase}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:8px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(34,29,43,.05)}
.tile::after{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--cyan);opacity:.7}
.tile:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 22px rgba(34,29,43,.12)}
.tile.amber::after{background:var(--amber)}
.tile.special::after{background:linear-gradient(var(--amber),var(--cyan))}
.tile .ic{font-size:24px}
.tile h3{font-family:'Schibsted Grotesk';font-weight:700;font-size:17px;margin:7px 0 5px;letter-spacing:.1px;line-height:1.25}
.tile p{font-size:12.5px;color:var(--dim);line-height:1.45}
.tile .meta{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan);margin-top:9px;letter-spacing:1px}
.tile.amber .meta{color:var(--amber-hi)}

.section-label{font-family:'JetBrains Mono';font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}

.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'JetBrains Mono';font-size:12px}
.qcount{color:var(--dim)}
.streak{color:var(--amber-hi)}
.bar{height:6px;background:#ddd4e6;border-radius:4px;overflow:hidden;margin-bottom:18px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:.3s}
.modtag{display:inline-block;font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--cyan-dim);border-radius:20px;padding:3px 11px;margin-bottom:14px;text-transform:uppercase}
.stem{font-size:18.5px;line-height:1.5;font-weight:500;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:11px}
.choice{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:.14s;font-size:15.5px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 1px 2px rgba(34,29,43,.04)}
.choice .k{font-family:'JetBrains Mono';font-size:13px;color:var(--cyan);font-weight:600;flex-shrink:0}
.choice:hover{border-color:var(--cyan);background:var(--panel-hi)}
.choice.correct{border-color:var(--green);background:rgba(21,128,61,.10)}
.choice.correct .k{color:var(--green)}
.choice.wrong{border-color:var(--red);background:rgba(185,28,28,.08)}
.choice.wrong .k{color:var(--red)}
.choice.disabled{pointer-events:none;opacity:.9}

.explain{margin-top:18px;border-radius:12px;padding:15px 16px;background:var(--panel);border-left:3px solid var(--cyan);animation:rise .25s ease;box-shadow:0 1px 3px rgba(34,29,43,.06)}
.explain.miss{border-left-color:var(--red)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.explain .lab{font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.explain .why{font-size:14.5px;line-height:1.5}
.pearl{margin-top:11px;background:rgba(180,83,9,.08);border:1px dashed var(--amber);border-radius:10px;padding:11px 13px;font-size:14px;line-height:1.5}
.pearl b{color:var(--amber-hi);font-family:'Schibsted Grotesk';font-weight:800;font-size:13px}

.btn{font-family:'Schibsted Grotesk';font-weight:800;letter-spacing:.2px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;font-size:15px;transition:.15s}
.btn-next{background:linear-gradient(145deg,var(--cyan),var(--cyan-dim));color:#fffdff;margin-top:18px;width:100%}
.btn-next:hover{box-shadow:0 4px 16px var(--glow)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--dim);margin-top:18px}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}

.result{text-align:center;padding:30px 16px}
.score-big{font-family:'Schibsted Grotesk';font-weight:800;font-size:64px;color:var(--cyan);line-height:1}
.rank{font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:10px 0 22px}
.statrow{display:flex;justify-content:center;gap:30px;margin-bottom:24px}
.statrow div{font-family:'JetBrains Mono';font-size:12px;color:var(--dim)}
.statrow b{display:block;font-size:26px;color:var(--text);font-family:'Schibsted Grotesk';font-weight:800}

.vault-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:12px;border-left:3px solid var(--amber);box-shadow:0 1px 3px rgba(34,29,43,.05)}
.vault-card h4{font-family:'Schibsted Grotesk';font-weight:800;color:var(--amber-hi);font-size:16px;margin-bottom:7px;letter-spacing:.1px;line-height:1.25}
.vault-card p{font-size:14px;line-height:1.55;color:var(--text)}
.vault-card .tag{font-family:'JetBrains Mono';font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-top:7px}

.back{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:1px;display:inline-flex;gap:6px;align-items:center;margin-bottom:16px}
.back:hover{color:var(--cyan)}
footer{text-align:center;font-family:'JetBrains Mono';font-size:10px;color:var(--dim);margin:28px 0 8px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* correct = index into c[]; choices shuffle at render. Stems never contain the answer. */
const QBANK=[
/* ===== PHARMACOKINETICS & DYNAMICS ===== */
{m:"pkpd",q:"Bioavailability (F) is the fraction of an administered dose that reaches systemic circulation. For an intravenous drug, what is F?",c:["100% (1.0)","50%","Always less than 50%","0%"],a:0,why:"IV drugs bypass absorption and first-pass metabolism → F = 100%. Oral drugs are lower because of incomplete absorption and first-pass effect.",p:"<b>IV → F = 100%.</b> Oral is lower (incomplete absorption + first-pass).",v:"An anesthetic is injected directly into a vein, bypassing absorption barriers and first-pass metabolism. What is its bioavailability?"},
{m:"pkpd",q:"Why do many oral drugs have LOWER bioavailability than the same drug given intravenously?",c:["First-pass hepatic metabolism","Faster renal clearance","Higher protein binding","Lower potency"],a:0,why:"Orally absorbed drugs pass through the portal vein to the liver, where they can be metabolized before reaching systemic circulation (first-pass effect).",p:"Oral drugs hit the liver first via the portal vein → <b>first-pass metabolism</b> lowers F.",v:"A drug has much lower exposure when swallowed than when given intravenously because it is metabolized before reaching systemic circulation. What explains this?"},
{m:"pkpd",q:"A drug with a HIGH volume of distribution is found predominantly where?",c:["In the tissues (little stays in plasma)","Confined to the plasma","In bone only","Nowhere — it is excreted unchanged"],a:0,why:"Vd = amount in body / plasma concentration. A high Vd means the drug leaves plasma for the tissues (lipophilic, tissue-bound drugs).",p:"High Vd = drug hides in <b>tissues</b> (lipophilic). Low Vd = stays in plasma (water-soluble, large/charged).",v:"A lipophilic drug has a very high apparent volume of distribution. Where is most of the drug located?"},
{m:"pkpd",q:"Approximately how many half-lives are required for a drug to reach steady state (or to be about 94% eliminated)?",c:["4–5","1","10","20"],a:0,why:"It takes ~4–5 half-lives to reach steady state on continuous dosing, and the same number to eliminate ~94–97% of a drug after stopping.",p:"<b>~4–5 half-lives</b> to steady state (and to mostly eliminate).",v:"A patient starts a medication dosed at regular intervals. About how many half-lives are needed before the level is near steady state?"},
{m:"pkpd",q:"Which drugs are eliminated at a CONSTANT AMOUNT per unit time, regardless of concentration (zero-order kinetics)?",c:["Ethanol, phenytoin, and high-dose aspirin","Most drugs","Penicillin","No drugs"],a:0,why:"Zero-order kinetics (enzyme saturation): a constant amount is cleared per time → 'PEA' (Phenytoin, Ethanol, Aspirin at high dose). Most drugs are first-order (constant fraction).",p:"Zero-order = constant AMOUNT cleared = <b>'PEA'</b> (Phenytoin, Ethanol, Aspirin). Most drugs = first-order.",v:"A patient has ethanol intoxication, and elimination proceeds at a constant amount per hour once enzymes are saturated. Which drugs share this kinetic pattern?"},
{m:"pkpd",q:"The loading dose depends mainly on volume of distribution and is generally unchanged in renal failure. Which dose must be REDUCED in renal failure?",c:["The maintenance dose","The loading dose","Both equally","Neither"],a:0,why:"Loading dose depends on Vd (unchanged in organ failure). Maintenance dose depends on clearance, which falls in renal/hepatic failure → reduce it.",p:"Loading dose = Vd-based (unchanged). <b>Maintenance dose = clearance-based → reduce in renal/hepatic failure</b>.",v:"A patient with new renal failure needs chronic drug dosing adjusted downward, but the initial loading dose is unchanged. Which dose is most affected?"},
{m:"pkpd",q:"Two drugs reach the SAME maximal effect, but drug A requires a lower dose to do so. Drug A has greater what?",c:["Potency","Efficacy","Both","Neither"],a:0,why:"Potency = the dose needed for a given effect (lower dose = more potent). Efficacy = the maximal achievable effect (Emax), which is equal here.",p:"<b>Potency</b> = dose needed (lower = more potent). <b>Efficacy</b> = max effect (Emax)."},
{m:"pkpd",q:"A COMPETITIVE antagonist shifts the agonist dose-response curve to the right, but the maximal effect is unchanged. This is because the antagonist is what?",c:["Surmountable (overcome by more agonist)","Irreversible","An inverse agonist","Purely allosteric"],a:0,why:"Competitive antagonists bind the same site reversibly → ↓potency (right shift) but the SAME Emax (surmountable). Noncompetitive/irreversible antagonists lower Emax (↓efficacy).",p:"Competitive antagonist = <b>surmountable</b>, ↓potency, same Emax. Noncompetitive = ↓efficacy (↓Emax)."},

/* ===== AUTONOMIC PHARMACOLOGY ===== */
{m:"auto",q:"A farmer has diarrhea, urination, miosis, bronchospasm, lacrimation, salivation, and muscle fasciculations after pesticide exposure. The antidote is atropine PLUS what?",c:["Pralidoxime (2-PAM)","Physostigmine","Naloxone","Flumazenil"],a:0,why:"Organophosphates inhibit acetylcholinesterase → cholinergic excess (DUMBELS). Atropine blocks muscarinic effects; pralidoxime regenerates acetylcholinesterase (if given before 'aging').",p:"Organophosphate poisoning = cholinergic excess (DUMBELS). Antidote = <b>atropine + pralidoxime</b> (2-PAM)."},
{m:"auto",q:"Atropine blocks muscarinic receptors, producing which set of effects?",c:["Tachycardia, dry mouth, mydriasis, urinary retention","Miosis and bradycardia","Salivation and sweating","Bronchospasm and diarrhea"],a:0,why:"Muscarinic blockade → 'hot, dry, red, blind, mad': tachycardia, dry mouth/skin, mydriasis with blurred vision, urinary retention, constipation, hyperthermia.",p:"Antimuscarinic (atropine) = <b>dry, hot, red, blind, mad</b> + tachycardia + urinary retention."},
{m:"auto",q:"Beta-1 adrenergic receptors are found primarily in the heart. Beta-2 receptors predominate where?",c:["Lungs and vascular/bronchial smooth muscle","The heart","The kidney only","The brain"],a:0,why:"Beta-2 receptors mediate bronchodilation and vasodilation (lungs, vascular and bronchial smooth muscle, uterus). Beta-1 = heart (↑HR/contractility) and renin release.",p:"β1 = heart (1 heart). β2 = <b>lungs + smooth muscle</b> (2 lungs) → bronchodilation/vasodilation."},
{m:"auto",q:"Stimulation of alpha-1 adrenergic receptors causes what?",c:["Vasoconstriction (raising blood pressure)","Vasodilation","Bronchodilation","Increased heart rate"],a:0,why:"Alpha-1 → vascular smooth muscle contraction (vasoconstriction, ↑BP), mydriasis, and internal urethral sphincter contraction. Phenylephrine is a selective α1 agonist.",p:"α1 = <b>vasoconstriction</b> (↑BP), mydriasis, sphincter contraction. (Phenylephrine = α1 agonist.)"},
{m:"auto",q:"Clonidine lowers blood pressure by stimulating which receptor, reducing central sympathetic outflow?",c:["Alpha-2","Beta-1","Alpha-1","Muscarinic"],a:0,why:"Alpha-2 receptors are presynaptic/central; their stimulation (clonidine, methyldopa) reduces sympathetic outflow → lower BP. Rebound hypertension can follow abrupt withdrawal.",p:"α2 (presynaptic) → <b>↓ sympathetic outflow</b>. Clonidine, methyldopa. Watch for rebound HTN."},
{m:"auto",q:"Nicotinic acetylcholine receptors differ from muscarinic receptors because they are what type of receptor?",c:["Ligand-gated ion channels (ionotropic)","G-protein-coupled","Receptor tyrosine kinases","Intracellular/nuclear"],a:0,why:"Nicotinic receptors are ligand-gated ion channels (fast) at the neuromuscular junction, autonomic ganglia, and adrenal medulla. Muscarinic receptors are G-protein-coupled.",p:"Nicotinic = <b>ligand-gated ion channel</b> (NMJ, ganglia, adrenal medulla). Muscarinic = GPCR."},
{m:"auto",q:"Nonselective beta-blockers (e.g., propranolol) should be used cautiously in which patients, because of beta-2 blockade?",c:["Asthmatics (bronchospasm risk)","Hypertensive patients","Patients with angina","Elderly patients"],a:0,why:"Beta-2 blockade can trigger bronchoconstriction → caution in asthma/COPD. Cardioselective β1-blockers (metoprolol, atenolol) are safer.",p:"Nonselective β-blockers → bronchospasm in <b>asthma/COPD</b>. Use β1-selective (metoprolol/atenolol)."},
{m:"auto",q:"Bethanechol, a muscarinic agonist, is used to treat what?",c:["Urinary retention and postoperative ileus","Hypertension","Asthma","Open-angle glaucoma"],a:0,why:"Bethanechol stimulates muscarinic receptors → increased bladder detrusor and GI smooth muscle activity → relieves urinary retention and postoperative ileus (resistant to AChE).",p:"Bethanechol = muscarinic agonist → <b>bladder + gut motility</b> (urinary retention, ileus)."},

/* ===== CARDIOVASCULAR & DIURETICS ===== */
{m:"cv",q:"ACE inhibitors lower blood pressure by blocking angiotensin I-to-II conversion. Which renal effect makes them first-line in diabetic nephropathy?",c:["They dilate the efferent arteriole (↓intraglomerular pressure)","They constrict the afferent arteriole","They raise intraglomerular pressure","They block the aldosterone receptor"],a:0,why:"Less angiotensin II → efferent arteriolar dilation → lower intraglomerular pressure → reduced hyperfiltration and proteinuria (renoprotective). A small rise in creatinine is expected.",p:"ACEi/ARB → <b>efferent arteriole dilation</b> → ↓intraglomerular pressure (renoprotective in diabetes/proteinuria)."},
{m:"cv",q:"Furosemide acts on the thick ascending limb of the loop of Henle by inhibiting which transporter?",c:["The Na-K-2Cl cotransporter","The Na-Cl cotransporter","ENaC","Carbonic anhydrase"],a:0,why:"Loop diuretics block the Na-K-2Cl cotransporter (NKCC2) → most potent diuresis; side effects include ototoxicity, hypokalemia, hypocalcemia, and metabolic alkalosis.",p:"Loop diuretics (furosemide) = <b>Na-K-2Cl</b> in thick ascending limb. Most potent; ↓K, ↓Ca, ototoxic."},
{m:"cv",q:"Thiazide diuretics act at the distal convoluted tubule and characteristically cause RETENTION of which electrolyte (so they are used to prevent recurrent kidney stones)?",c:["Calcium","Potassium","Sodium","Magnesium"],a:0,why:"Thiazides (block the Na-Cl cotransporter) increase calcium reabsorption → useful for calcium stones. Side effects: hypokalemia, hyperGlycemia, hyperLipidemia, hyperUricemia, hyperCalcemia, hyponatremia.",p:"Thiazides = DCT (Na-Cl), <b>retain calcium</b> (treat Ca stones). Cause hypo-K + hyper-GLUC (Glucose, Lipids, Uric acid, Ca)."},
{m:"cv",q:"Spironolactone spares potassium by ANTAGONIZING which hormone's receptor in the collecting duct?",c:["Aldosterone","Antidiuretic hormone","Cortisol","Angiotensin II"],a:0,why:"Spironolactone/eplerenone block the aldosterone (mineralocorticoid) receptor → potassium sparing; spironolactone also causes gynecomastia. Amiloride/triamterene block ENaC directly.",p:"Spironolactone = <b>aldosterone-receptor antagonist</b> (K-sparing). Side effect: gynecomastia."},
{m:"cv",q:"Acetazolamide inhibits carbonic anhydrase in the proximal tubule, causing loss of which ion and a metabolic acidosis?",c:["Bicarbonate","Potassium","Calcium","Chloride"],a:0,why:"Carbonic anhydrase inhibition → bicarbonate wasting → metabolic acidosis (self-limiting diuresis). Uses: glaucoma, altitude sickness, alkalinizing urine.",p:"Acetazolamide (CA inhibitor, PCT) → <b>bicarbonate</b> loss → metabolic acidosis. Glaucoma, altitude sickness."},
{m:"cv",q:"Beta-blockers reduce mortality after a myocardial infarction primarily by doing what?",c:["Decreasing myocardial oxygen demand (↓HR and contractility)","Causing vasodilation","Increasing contractility","Producing diuresis"],a:0,why:"Beta-1 blockade lowers heart rate and contractility → reduced myocardial oxygen demand and remodeling → improved post-MI survival; also antiarrhythmic.",p:"β-blockers post-MI → <b>↓ myocardial O2 demand</b> (↓HR, ↓contractility) → ↓mortality + antiarrhythmic."},
{m:"cv",q:"Nitroglycerin relieves angina mainly by releasing nitric oxide, which causes venodilation and thereby reduces what?",c:["Preload","Afterload only","Heart rate","Contractility"],a:0,why:"Nitrates → NO → venodilation → reduced preload (and myocardial wall stress/oxygen demand). Tolerance and headache are common; avoid with PDE-5 inhibitors.",p:"Nitrates → NO → venodilation → <b>↓preload</b> (↓wall stress/O2 demand). Don't combine with sildenafil."},
{m:"cv",q:"Dihydropyridine calcium channel blockers (e.g., amlodipine, nifedipine) act mainly on which tissue?",c:["Vascular smooth muscle (vasodilation)","Cardiac conduction tissue","The kidney","The lungs"],a:0,why:"Dihydropyridines preferentially relax vascular smooth muscle (vasodilation, lower BP; side effect: peripheral edema). Non-DHPs (verapamil, diltiazem) act on the heart (↓HR/contractility).",p:"DHP CCBs (amlodipine) = <b>vascular</b> (vasodilation, edema). Non-DHP (verapamil/diltiazem) = heart."},

/* ===== TOXICITIES & ANTIDOTES ===== */
{m:"tox",q:"A patient on warfarin starts an antibiotic and their INR spikes dangerously high. The new drug is most likely a cytochrome P450 what?",c:["Inhibitor (raises warfarin levels)","Inducer (lowers warfarin levels)","Neither","Pure substrate"],a:0,why:"A CYP450 inhibitor slows warfarin metabolism → higher levels → elevated INR and bleeding risk. Inhibitors include macrolides, azoles, isoniazid, cimetidine, and grapefruit juice.",p:"CYP <b>inhibitor</b> → ↑ drug levels (↑INR on warfarin). Inhibitors: macrolides, azoles, INH, cimetidine, grapefruit."},
{m:"tox",q:"Rifampin can cause oral contraceptive failure because it is a potent cytochrome P450 what?",c:["Inducer (lowers drug levels)","Inhibitor (raises drug levels)","Substrate","Receptor antagonist"],a:0,why:"CYP450 inducers speed metabolism → lower drug levels (and OCP failure). Inducers: rifampin, phenytoin, carbamazepine, phenobarbital, St. John's wort, chronic alcohol, griseofulvin.",p:"CYP <b>inducer</b> → ↓ drug levels. Inducers: rifampin, phenytoin, carbamazepine, phenobarbital, St. John's wort."},
{m:"tox",q:"The anticoagulant effect of warfarin (which lowers vitamin K-dependent clotting factors) is reversed ACUTELY with what?",c:["Fresh frozen plasma or PCC, plus vitamin K","Protamine sulfate","Naloxone","Mesna"],a:0,why:"Acute warfarin reversal needs immediate factor replacement (FFP or prothrombin complex concentrate); vitamin K works but takes hours to days.",p:"Warfarin reversal: <b>FFP/PCC now + vitamin K</b> (vitamin K alone is too slow acutely)."},
{m:"tox",q:"The anticoagulant effect of unfractionated heparin is reversed by which agent?",c:["Protamine sulfate","Vitamin K","Fresh frozen plasma","Idarucizumab"],a:0,why:"Protamine sulfate binds and neutralizes heparin (partially reverses LMWH too). Vitamin K/FFP reverse warfarin; idarucizumab reverses dabigatran.",p:"Heparin reversal = <b>protamine sulfate</b>. (Dabigatran = idarucizumab; warfarin = vitamin K/FFP.)"},
{m:"tox",q:"Muscle pain with elevated creatine kinase (rarely rhabdomyolysis) is the characteristic adverse effect of which lipid-lowering class?",c:["Statins (HMG-CoA reductase inhibitors)","Bile acid resins","Niacin","Ezetimibe"],a:0,why:"Statin myopathy ranges from myalgia to rhabdomyolysis; risk rises with fibrates (gemfibrozil) and CYP inhibitors. Also monitor for hepatotoxicity.",p:"Statins → <b>myopathy/↑CK/rhabdomyolysis</b> (worse with fibrates) + hepatotoxicity."},
{m:"tox",q:"NSAIDs inhibit cyclooxygenase; besides gastric ulcers, what is their characteristic renal adverse effect?",c:["Acute kidney injury (afferent arteriole constriction)","Hyperkalemia as the only effect","Hypoglycemia","Hepatic necrosis"],a:0,why:"NSAIDs block prostaglandins that dilate the afferent arteriole → afferent constriction → reduced renal perfusion → acute kidney injury (especially with volume depletion).",p:"NSAIDs → block prostaglandins → <b>afferent constriction → AKI</b> (plus gastric ulcers). COX-1 protects the stomach."},
{m:"tox",q:"Which chemotherapy agent characteristically causes peripheral neuropathy because it inhibits microtubule formation?",c:["Vincristine","Doxorubicin","Cisplatin","Methotrexate"],a:0,why:"Vincristine (a vinca alkaloid) blocks microtubule polymerization → peripheral neuropathy. Doxorubicin → cardiotoxicity; cisplatin → nephro/ototoxicity; bleomycin → lung fibrosis.",p:"Vincristine = microtubule inhibitor → <b>peripheral neuropathy</b>. (Vinca = 'pins and needles.')"},
{m:"tox",q:"Nausea, blurry yellow-tinged vision, and arrhythmias, worsened by hypokalemia and reversed by a specific antibody-fragment antidote, indicate toxicity from which cardiac glycoside?",c:["Digoxin","Lithium","Warfarin","Theophylline"],a:0,why:"Digoxin toxicity: GI upset, yellow-green visual halos, and arrhythmias; hypokalemia worsens it (K competes at the Na/K ATPase). Antidote = digoxin-specific antibody fragments (Fab).",p:"Digoxin tox = nausea + yellow vision + arrhythmia; worse if hypokalemic. Antidote = <b>digoxin-specific Fab</b>."},

/* ===== MECHANISMS & MISC ===== */
{m:"moa",q:"Sulfonylureas (e.g., glipizide) lower blood glucose by CLOSING which channel on pancreatic beta cells, triggering insulin release?",c:["The ATP-sensitive potassium channel","A sodium channel","GLUT4","An L-type calcium channel"],a:0,why:"Sulfonylureas close beta-cell K-ATP channels → depolarization → calcium influx → insulin secretion. Main risk: hypoglycemia (and weight gain).",p:"Sulfonylureas close the <b>K-ATP channel</b> → insulin release. Risk: hypoglycemia."},
{m:"moa",q:"Metformin, the first-line drug for type 2 diabetes, lowers glucose mainly by inhibiting what?",c:["Hepatic gluconeogenesis","Insulin secretion","Intestinal glucose absorption","GLUT4 translocation"],a:0,why:"Metformin decreases hepatic gluconeogenesis (and improves insulin sensitivity) without causing hypoglycemia or weight gain; rare but serious risk is lactic acidosis.",p:"Metformin = ↓<b>hepatic gluconeogenesis</b>. No hypoglycemia/weight gain. Risk: lactic acidosis."},
{m:"moa",q:"Omeprazole reduces stomach acid by IRREVERSIBLY inhibiting which pump in gastric parietal cells?",c:["The H/K ATPase (proton pump)","The Na/K ATPase","The histamine H2 receptor","The muscarinic M3 receptor"],a:0,why:"Proton pump inhibitors irreversibly block the H/K ATPase (final step of acid secretion). Long-term risks: low B12/magnesium, C. difficile, fractures.",p:"PPIs (omeprazole) = irreversible <b>H/K ATPase</b> block. Long-term: ↓B12/Mg, C. diff, fractures."},
{m:"moa",q:"Heparin works IMMEDIATELY by activating which endogenous anticoagulant?",c:["Antithrombin III","Vitamin K","Protein C","Plasmin"],a:0,why:"Heparin potentiates antithrombin III → inhibits thrombin (IIa) and factor Xa; rapid onset, monitored by aPTT; risk of heparin-induced thrombocytopenia (HIT).",p:"Heparin activates <b>antithrombin III</b> (inhibits IIa + Xa). Immediate; monitor aPTT; watch for HIT."},
{m:"moa",q:"Warfarin inhibits the synthesis of vitamin K-dependent clotting factors by blocking which enzyme?",c:["Vitamin K epoxide reductase","Antithrombin III","Cyclooxygenase","Thrombin directly"],a:0,why:"Warfarin blocks vitamin K epoxide reductase → ↓ factors II, VII, IX, X (and proteins C and S); delayed onset, monitored by PT/INR; teratogenic. Initial transient hypercoagulability (protein C falls first).",p:"Warfarin blocks <b>vitamin K epoxide reductase</b> → ↓II,VII,IX,X. Delayed; monitor PT/INR; teratogen."},
{m:"moa",q:"Fluoxetine and sertraline treat depression by selectively blocking the reuptake of which neurotransmitter?",c:["Serotonin","Dopamine","Norepinephrine","GABA"],a:0,why:"SSRIs block presynaptic serotonin reuptake → more synaptic serotonin; first-line for depression and anxiety. Risk: serotonin syndrome (especially with MAO inhibitors).",p:"SSRIs (fluoxetine, sertraline) block <b>serotonin</b> reuptake. Risk: serotonin syndrome."},
{m:"moa",q:"Benzodiazepines enhance GABA-A receptor activity by increasing the FREQUENCY of chloride channel opening. Barbiturates instead increase what?",c:["The duration of channel opening","The frequency of opening","The channel amplitude","Nothing — they block GABA"],a:0,why:"Benzos increase the FREQUENCY of GABA-A Cl⁻ channel opening; barbiturates increase the DURATION (and are more dangerous in overdose: respiratory depression).",p:"Benzos = ↑<b>frequency</b> ('Frenzo-diazepines'); barbiturates = ↑<b>duration</b> ('barbiDURATES'). Both ↑ GABA-A Cl⁻ current."},
{m:"moa",q:"Penicillins and cephalosporins kill bacteria by inhibiting which process?",c:["Bacterial cell wall synthesis","Bacterial protein synthesis","DNA gyrase","Folate synthesis"],a:0,why:"Beta-lactams bind penicillin-binding proteins (transpeptidases) → block peptidoglycan cross-linking → cell wall synthesis inhibition → bactericidal.",p:"β-lactams (penicillins/cephalosporins) = inhibit <b>cell wall synthesis</b> (bind PBPs/transpeptidase)."}
];

const VAULT=[
{t:"PK Basics",b:"<b>Bioavailability (F):</b> IV = 100%; oral lower (first-pass). <b>Vd</b> = dose/[plasma] (high Vd = lipophilic, tissue-bound). <b>Half-life:</b> ~4–5 to steady state. <b>Clearance</b> sets the maintenance dose.",g:"PK/PD"},
{t:"Kinetics & Dosing",b:"<b>Zero-order</b> = constant AMOUNT cleared ('PEA': Phenytoin, Ethanol, Aspirin high-dose). <b>First-order</b> = constant fraction (most drugs). <b>Loading dose</b> = Vd-based (unchanged in failure); <b>maintenance dose</b> = clearance-based (↓ in renal/hepatic failure).",g:"PK/PD"},
{t:"Pharmacodynamics",b:"<b>Potency</b> = dose needed (left shift = more potent). <b>Efficacy</b> = max effect (Emax). <b>Competitive antagonist</b> = ↓potency, surmountable (same Emax). <b>Noncompetitive/irreversible</b> = ↓efficacy (↓Emax).",g:"PK/PD"},
{t:"Adrenergic Receptors",b:"<b>α1</b> = vasoconstriction, mydriasis, sphincters (phenylephrine). <b>α2</b> = ↓sympathetic outflow (clonidine). <b>β1</b> = heart + renin ('1 heart'). <b>β2</b> = bronchodilation/vasodilation ('2 lungs'). β3 = lipolysis/bladder.",g:"Autonomics"},
{t:"Cholinergic Crisis",b:"Organophosphates inhibit AChE → cholinergic excess: <b>DUMBELS</b> (Diarrhea, Urination, Miosis, Bronchospasm, Emesis, Lacrimation, Salivation) + fasciculations. Antidote = <b>atropine + pralidoxime (2-PAM)</b>. Antimuscarinic excess (atropine) = 'hot, dry, red, blind, mad' → physostigmine.",g:"Autonomics"},
{t:"Diuretic Sites",b:"<b>Acetazolamide</b> (PCT, CA inhibitor → ↓HCO3, acidosis). <b>Furosemide</b> (TAL, Na-K-2Cl → most potent, ↓K/Ca, ototoxic). <b>Thiazide</b> (DCT, Na-Cl → ↓K, ↑Ca/Glucose/Lipids/Urate, hyponatremia). <b>K-sparing</b> (collecting duct — spironolactone/aldo + gynecomastia; amiloride/ENaC).",g:"Cardio-renal"},
{t:"Antihypertensives",b:"<b>ACEi/ARB</b> = efferent dilation, renoprotective (cough/angioedema with ACEi). <b>CCB</b>: DHP (amlodipine = vascular, edema), non-DHP (verapamil/diltiazem = heart). <b>β-blockers</b> = ↓O2 demand, post-MI. <b>Nitrates</b> = ↓preload (venodilation).",g:"Cardio-renal"},
{t:"CYP450 Inducers vs Inhibitors",b:"<b>Inducers</b> (↓ drug levels): rifampin, phenytoin, carbamazepine, phenobarbital, St. John's wort, chronic alcohol, griseofulvin. <b>Inhibitors</b> (↑ drug levels): cimetidine, ketoconazole/azoles, macrolides, grapefruit, isoniazid, ritonavir, amiodarone.",g:"Tox"},
{t:"Anticoagulants",b:"<b>Heparin</b> = activates antithrombin III (IIa + Xa); immediate, monitor aPTT, reverse with protamine, risk HIT. <b>Warfarin</b> = blocks vitamin K epoxide reductase (↓II,VII,IX,X); delayed, monitor PT/INR, teratogen, reverse with vitamin K + FFP/PCC. <b>DOACs</b> = direct Xa (-xaban) or thrombin (dabigatran) inhibitors.",g:"Tox"},
{t:"Antidotes",b:"Acetaminophen → NAC · Opioids → naloxone · Benzos → flumazenil · Warfarin → vitamin K/FFP/PCC · Heparin → protamine · Digoxin → digoxin-Fab · Organophosphate → atropine + pralidoxime · Iron → deferoxamine · Methanol/ethylene glycol → fomepizole · Lead → EDTA/succimer.",g:"Tox"},
{t:"Diabetes Drugs",b:"<b>Metformin</b> (↓hepatic gluconeogenesis, no hypoglycemia, lactic acidosis — first-line). <b>Sulfonylureas</b> (close K-ATP → insulin, hypoglycemia). <b>SGLT2i</b> (-flozin). <b>GLP-1</b> (-tide). <b>DPP-4</b> (-gliptin). <b>TZDs</b> (-glitazone).",g:"Mechanisms"},
{t:"Antimicrobial MOA",b:"<b>Cell wall:</b> β-lactams, vancomycin. <b>Protein synthesis 30S:</b> aminoglycosides, tetracyclines. <b>50S:</b> macrolides, clindamycin, linezolid. <b>DNA gyrase:</b> fluoroquinolones. <b>Folate:</b> sulfonamides, trimethoprim. <b>RNA pol:</b> rifampin.",g:"Mechanisms"}
];

const MODES={
  daily:{name:"Daily Dose",ic:"💊",desc:"15 random questions across all of pharmacology. Quick warm-up.",pick:()=>shuffle([...QBANK]).slice(0,15)},
  endless:{name:"Endless Refill",ic:"♾️",desc:"Survival mode — answer until you miss. Beat the streak.",endless:true,pick:()=>shuffle([...QBANK])},
  pkpd:{name:"Pharmacokinetics & Dynamics",ic:"🦴",desc:"The foundation: bioavailability, Vd, half-life, kinetics order, potency vs efficacy.",pick:()=>shuffle(QBANK.filter(q=>q.m==="pkpd"))},
  auto:{name:"Autonomic Pharmacology",ic:"⚡",desc:"Cholinergic vs adrenergic receptors, organophosphates, and the toxidromes.",pick:()=>shuffle(QBANK.filter(q=>q.m==="auto"))},
  cv:{name:"Cardiovascular & Diuretics",ic:"❤️",desc:"ACEi/CCB/β-blockers/nitrates and the diuretic classes by site of action.",pick:()=>shuffle(QBANK.filter(q=>q.m==="cv"))},
  tox:{name:"Toxicities & Antidotes",ic:"☠️",desc:"CYP450 inducers/inhibitors, anticoagulant reversal, statins, digoxin.",pick:()=>shuffle(QBANK.filter(q=>q.m==="tox"))},
  moa:{name:"Mechanisms & Misc",ic:"🔬",desc:"Diabetes drugs, PPIs, anticoagulants, SSRIs, benzos, and beta-lactams.",pick:()=>shuffle(QBANK.filter(q=>q.m==="moa"))}
};
const MODE_TAGS={pkpd:"Pharmacokinetics / Dynamics",auto:"Autonomic Pharmacology",cv:"Cardiovascular / Diuretics",tox:"Toxicities / Antidotes",moa:"Mechanisms / Misc"};

const SAVE_KEY="pharm_arsenal_v2";
let save=load();
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{best:{},endlessBest:0,played:0}}catch(e){return{best:{},endlessBest:0,played:0}}}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save))}catch(e){}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let session=null;
const app=document.getElementById("app");

function menu(){
  session=null;const m=MODES;
  app.innerHTML=`
  <div class="hdr">
    <div class="badge">℞</div>
    <h1>PHARM ARSENAL</h1>
    <div class="sub">Pharmacology — ${QBANK.length} questions</div>
  </div>
  <div class="section-label">Quick Play</div>
  <div class="grid">${tile("daily",m.daily,"")}${tile("endless",m.endless,"amber")}</div>
  <div class="section-label">Topic Drills</div>
  <div class="grid">
    ${tile("pkpd",m.pkpd,"special")}${tile("auto",m.auto,"")}${tile("cv",m.cv,"")}${tile("tox",m.tox,"")}${tile("moa",m.moa,"")}
  </div>
  <div class="section-label">Reinforce</div>
  <div class="grid">
    <div class="tile amber" onclick="vault()">
      <div class="ic">💎</div><h3>Dirty Medicine Vault</h3>
      <p>The catchy pharm tools — kinetics, the receptor map, diuretic sites, CYP450, antidotes, and more.</p>
      <div class="meta">${VAULT.length} memory tools</div>
    </div>
  </div>
  <footer>Saves to this browser via localStorage · ${save.played||0} rounds · Endless best: ${save.endlessBest||0}</footer>`;
}
function tile(key,mode,cls){
  const best=key==="endless"?(save.endlessBest||0):(save.best[key]!=null?save.best[key]+"%":"—");
  const bestLbl=key==="endless"?`Best streak: ${best}`:`Best: ${best}`;
  return `<div class="tile ${cls}" onclick="start('${key}')"><div class="ic">${mode.ic}</div><h3>${mode.name}</h3><p>${mode.desc}</p><div class="meta">${bestLbl}</div></div>`;
}
function start(key){const mode=MODES[key];const qs=mode.pick();session={key,mode,qs,i:0,correct:0,streak:0,answered:false};renderQ();}
function renderQ(){
  const s=session;
  if(!s.mode.endless&&s.i>=s.qs.length)return results();
  if(s.mode.endless&&s.i>=s.qs.length){s.qs=shuffle([...QBANK]);s.i=0;}
  const q=s.qs[s.i];
  const order=shuffle(q.c.map((t,idx)=>({t,idx})));
  s.order=order;s.correctPos=order.findIndex(o=>o.idx===q.a);
  const total=s.mode.endless?"∞":s.qs.length;const num=s.i+1;
  const pct=s.mode.endless?Math.min(100,(s.streak%15)/15*100):(num-1)/s.qs.length*100;
  const tag=MODE_TAGS[q.m]||"Mixed";
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="quiz-top"><span class="qcount">Q ${num} / ${total}</span><span class="streak">🔥 Streak ${s.streak}</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <span class="modtag">${tag}</span>
    <div class="stem">${q.q}</div>
    <div class="choices" id="ch">${order.map((o,i)=>`<div class="choice" data-i="${i}" onclick="answer(${i})"><span class="k">${String.fromCharCode(65+i)}</span><span>${o.t}</span></div>`).join("")}</div>
    <div id="post"></div>`;
}
function answer(pos){
  const s=session;if(s.answered)return;s.answered=true;
  const q=s.qs[s.i];const correct=pos===s.correctPos;
  document.querySelectorAll(".choice").forEach((n,i)=>{n.classList.add("disabled");if(i===s.correctPos)n.classList.add("correct");if(i===pos&&!correct)n.classList.add("wrong");});
  if(correct){s.correct++;s.streak++;}else{s.streak=0;}
  const post=document.getElementById("post");
  const pearl=q.p?`<div class="pearl"><b>💎 Pearl:</b> ${q.p}</div>`:"";
  post.innerHTML=`<div class="explain ${correct?"":"miss"}"><div class="lab">${correct?"✔ Correct":"✕ Review"}</div><div class="why">${q.why}</div>${pearl}</div>`;
  if(s.mode.endless&&!correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}post.innerHTML+=`<button class="btn btn-ghost" onclick="results()">End Run — Streak ${s.correct}</button>`;return;}
  if(s.mode.endless&&correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}}
  post.innerHTML+=`<button class="btn btn-next" onclick="nextQ()">${(!s.mode.endless&&s.i+1>=s.qs.length)?"SEE RESULTS":"NEXT ›"}</button>`;
}
function nextQ(){session.i++;session.answered=false;renderQ();}
function results(){
  const s=session;const got=s.correct;
  const pctNum=s.mode.endless?null:Math.round(got/s.qs.length*100);
  if(!s.mode.endless){save.best[s.key]=Math.max(save.best[s.key]||0,pctNum);}
  save.played=(save.played||0)+1;persist();
  let rank,col;const p=s.mode.endless?Math.min(100,got*5):pctNum;
  if(p>=90){rank="ATTENDING — DOMINATED";col="var(--green)"}
  else if(p>=75){rank="RESIDENT — SOLID";col="var(--cyan)"}
  else if(p>=55){rank="INTERN — GETTING THERE";col="var(--amber-hi)"}
  else{rank="MS1 — DRILL AGAIN";col="var(--red)"}
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="result">
      <div class="score-big" style="color:${col}">${s.mode.endless?got:pctNum+"%"}</div>
      <div class="rank" style="color:${col}">${s.mode.endless?"STREAK: "+got:rank}</div>
      <div class="statrow">
        <div><b>${got}</b>${s.mode.endless?"in a row":"correct"}</div>
        ${s.mode.endless?"":`<div><b>${s.qs.length-got}</b>missed</div>`}
        <div><b>${s.mode.endless?(save.endlessBest||0):(save.best[s.key]+"%")}</b>best</div>
      </div>
      <button class="btn btn-next" style="max-width:300px;margin:0 auto" onclick="start('${s.key}')">RUN IT AGAIN</button>
      <button class="btn btn-ghost" style="max-width:300px;margin:14px auto 0" onclick="menu()">BACK TO MENU</button>
    </div>`;
}
function vault(){
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="hdr" style="padding-top:6px">
      <h1 style="color:var(--amber-hi);font-size:28px">💎 Dirty Medicine Vault</h1>
      <div class="sub">Pharm memory tools — catchy on purpose</div>
    </div>
    ${VAULT.map(v=>`<div class="vault-card"><h4>${v.t}</h4><p>${v.b}</p><span class="tag">▸ ${v.g}</span></div>`).join("")}
    <button class="btn btn-ghost" style="width:100%" onclick="menu()">BACK TO MENU</button>`;
}
document.addEventListener("keydown",e=>{
  if(!session||session.answered)return;
  const map={"1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3};
  const k=e.key.toLowerCase();
  if(map[k]!=null&&session.order&&map[k]<session.order.length)answer(map[k]);
});
</script>

menu();
