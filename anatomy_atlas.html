<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ANATOMY ATLAS — Visual Anatomy Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Cormorant+Garamond:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0604;
  --bg-mid: #1a0f08;
  --bg-card: #2a1810;
  --crimson: #c8324a;
  --burgundy: #7a2238;
  --ivory: #f5e6d3;
  --cream: #e8d4b0;
  --parchment: #d4b896;
  --vein-blue: #4a6f8a;
  --gold: #c9a961;
  --warning: #d65a31;
  --sepia: #8b6f47;
  --text: #f0e4d0;
  --text-dim: #8a7560;
  --grid: rgba(201, 169, 97, 0.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 18px;
  min-height: 100vh;
  overflow-x: hidden;
}
body {
  background:
    radial-gradient(ellipse at 25% 15%, rgba(200, 50, 74, 0.10), transparent 50%),
    radial-gradient(ellipse at 75% 80%, rgba(201, 169, 97, 0.08), transparent 50%),
    linear-gradient(180deg, #0a0604 0%, #1a0f08 100%);
  position: relative;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none; z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.10) 0px, rgba(0,0,0,0.10) 1px, transparent 1px, transparent 4px);
  pointer-events: none; z-index: 1000;
  mix-blend-mode: multiply;
}
#app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px; }

/* HEADER */
.title-bar {
  text-align: center;
  margin-bottom: 24px;
  padding: 16px 0 24px;
  border-bottom: 2px double var(--gold);
  position: relative;
}
.title-bar::before, .title-bar::after {
  content: '✦';
  color: var(--gold);
  font-size: 18px;
  position: absolute;
  bottom: -10px;
  background: var(--bg-deep);
  padding: 0 8px;
}
.title-bar::before { left: 30%; }
.title-bar::after { right: 30%; }
h1.game-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 48px;
  font-weight: 600;
  font-variant: small-caps;
  letter-spacing: 8px;
  background: linear-gradient(180deg, var(--gold), var(--crimson));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 20px rgba(201, 169, 97, 0.3);
}
.subtitle {
  color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px;
  font-style: italic;
  margin-top: 4px;
  letter-spacing: 3px;
}
.subtitle::before, .subtitle::after { content: '· '; color: var(--gold); }
.subtitle::after { content: ' ·'; }

/* HUD */
.hud { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
.hud-cell {
  background: linear-gradient(180deg, rgba(42, 24, 16, 0.85), rgba(26, 15, 8, 0.85));
  border: 1px solid var(--burgundy);
  border-radius: 2px;
  padding: 10px 14px;
  position: relative;
  box-shadow: inset 0 0 12px rgba(122, 34, 56, 0.20);
}
.hud-label {
  font-size: 12px;
  color: var(--sepia);
  text-transform: uppercase;
  letter-spacing: 3px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
}
.hud-value { font-size: 28px; margin-top: 4px; font-weight: bold; font-family: 'JetBrains Mono', monospace; }
.hud-value.hp { color: var(--crimson); }
.hud-value.xp { color: var(--gold); }
.hud-value.streak { color: var(--warning); }
.hud-value.lvl { color: var(--cream); }
.hearts { display: inline-flex; gap: 4px; }
.heart { font-size: 24px; filter: drop-shadow(0 0 4px var(--crimson)); }
.heart.lost { filter: grayscale(1) brightness(0.3); }

/* PANEL */
.panel {
  background: linear-gradient(180deg, rgba(42, 24, 16, 0.92), rgba(26, 15, 8, 0.92));
  border: 2px solid var(--gold);
  border-radius: 3px;
  padding: 32px;
  position: relative;
  box-shadow: 0 0 30px rgba(201, 169, 97, 0.12), inset 0 0 40px rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(2px);
  min-height: 400px;
}
.panel::before { content: '❦'; position: absolute; top: 8px; left: 16px; color: var(--gold); font-size: 18px; opacity: 0.5; }
.panel::after { content: '❦'; position: absolute; top: 8px; right: 16px; color: var(--gold); font-size: 18px; opacity: 0.5; }

/* MENU */
.menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.menu-card {
  background: linear-gradient(135deg, rgba(122, 34, 56, 0.10), rgba(201, 169, 97, 0.06)), rgba(26, 15, 8, 0.6);
  border: 1px solid var(--burgundy);
  border-radius: 2px;
  padding: 24px 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.menu-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 24px rgba(200, 50, 74, 0.30);
  border-color: var(--gold);
}
.menu-icon { font-size: 36px; margin-bottom: 12px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
.menu-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 18px;
  font-variant: small-caps;
  letter-spacing: 2px;
  color: var(--gold);
  margin-bottom: 6px;
}
.menu-desc { color: var(--text-dim); font-size: 16px; line-height: 1.4; }

/* QUESTION */
.question-area { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.q-tag {
  display: inline-block;
  background: var(--burgundy);
  color: var(--cream);
  padding: 4px 14px;
  border-radius: 2px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 13px;
  font-variant: small-caps;
  letter-spacing: 2px;
  margin-bottom: 16px;
  border: 1px solid var(--gold);
}
.q-text {
  font-size: 21px;
  line-height: 1.55;
  margin-bottom: 18px;
  color: var(--text);
  padding: 14px 20px;
  background: rgba(0, 0, 0, 0.35);
  border-left: 3px solid var(--crimson);
  border-radius: 2px;
  font-family: 'Cormorant Garamond', serif;
}
.diagram-container {
  background: linear-gradient(180deg, #f5e6d3 0%, #e8d4b0 100%);
  border: 2px solid var(--gold);
  border-radius: 3px;
  padding: 16px;
  margin-bottom: 20px;
  text-align: center;
  box-shadow: inset 0 0 30px rgba(139, 111, 71, 0.2);
  position: relative;
}
.diagram-container::before {
  content: 'PLATE';
  position: absolute;
  top: 6px; left: 12px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px;
  font-variant: small-caps;
  letter-spacing: 2px;
  color: var(--sepia);
  opacity: 0.6;
}
.diagram-container svg {
  max-width: 100%;
  height: auto;
  max-height: 360px;
}
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  background: rgba(26, 15, 8, 0.85);
  border: 1px solid var(--sepia);
  color: var(--text);
  padding: 14px 18px;
  border-radius: 2px;
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 14px;
}
.choice:hover:not(.disabled) {
  border-color: var(--gold);
  background: rgba(201, 169, 97, 0.08);
  transform: translateX(4px);
}
.choice .key {
  background: var(--gold);
  color: var(--bg-deep);
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-size: 16px;
  padding: 4px 11px;
  border-radius: 2px;
  flex-shrink: 0;
}
.choice.correct {
  background: rgba(122, 34, 56, 0.22);
  border-color: var(--crimson);
  animation: pulseRed 0.5s;
}
.choice.correct .key { background: var(--crimson); color: white; }
.choice.wrong {
  background: rgba(214, 90, 49, 0.18);
  border-color: var(--warning);
  animation: shake 0.4s;
}
.choice.wrong .key { background: var(--warning); color: white; }
.choice.disabled { cursor: default; opacity: 0.55; }
@keyframes pulseRed { 0%, 100% { box-shadow: 0 0 0 0 rgba(200, 50, 74, 0); } 50% { box-shadow: 0 0 30px 4px rgba(200, 50, 74, 0.4); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }

/* PEARL */
.pearl-box {
  margin-top: 24px;
  background: linear-gradient(135deg, rgba(201, 169, 97, 0.06), rgba(122, 34, 56, 0.10));
  border: 1px solid var(--gold);
  border-left: 4px solid var(--gold);
  padding: 20px;
  border-radius: 2px;
  animation: fadeIn 0.5s 0.2s both;
}
.pearl-label {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-variant: small-caps;
  font-size: 15px;
  color: var(--gold);
  letter-spacing: 3px;
  margin-bottom: 10px;
}
.pearl-text { font-size: 20px; line-height: 1.55; color: var(--ivory); font-family: 'Cormorant Garamond', serif; }
.pearl-text strong { color: var(--crimson); font-weight: 700; }
.pearl-text em { color: var(--gold); font-style: normal; font-weight: 600; }

/* CONTROLS */
.controls { display: flex; justify-content: space-between; margin-top: 24px; gap: 12px; flex-wrap: wrap; }
.btn {
  background: var(--crimson);
  color: var(--ivory);
  border: 1px solid var(--gold);
  padding: 12px 24px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 15px;
  font-variant: small-caps;
  letter-spacing: 3px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.btn:hover { background: var(--burgundy); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(200, 50, 74, 0.4); }
.btn-secondary { background: transparent; color: var(--gold); border: 1px solid var(--gold); }
.btn-secondary:hover { background: var(--gold); color: var(--bg-deep); }
.btn-danger { background: var(--warning); color: white; border-color: var(--warning); }

/* PROGRESS */
.system-progress { margin-top: 24px; }
.system-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
.system-name {
  width: 200px;
  font-size: 17px;
  color: var(--cream);
  font-family: 'Cormorant Garamond', serif;
  font-variant: small-caps;
  letter-spacing: 1px;
}
.bar-track {
  flex: 1;
  background: rgba(0,0,0,0.4);
  height: 18px;
  border-radius: 1px;
  overflow: hidden;
  border: 1px solid var(--sepia);
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--burgundy), var(--gold));
  transition: width 0.5s ease;
  position: relative;
}
.bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255, 230, 200, 0.20), transparent);
  animation: barShine 2.5s linear infinite;
}
@keyframes barShine { from { transform: translateX(-100%); } to { transform: translateX(100%); } }
.system-pct { width: 80px; text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 14px; color: var(--gold); }

/* TOAST */
.toast {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(-200%);
  background: var(--gold);
  color: var(--bg-deep);
  padding: 12px 30px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-variant: small-caps;
  font-size: 16px;
  letter-spacing: 2px;
  border-radius: 2px;
  box-shadow: 0 4px 20px rgba(201, 169, 97, 0.4);
  z-index: 9999;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--warning); color: white; }
.toast.xp { background: var(--cream); color: var(--bg-deep); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10, 6, 4, 0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 1001;
  backdrop-filter: blur(6px);
  animation: fadeIn 0.3s;
}
.modal {
  background: var(--bg-mid);
  border: 2px solid var(--gold);
  padding: 32px;
  border-radius: 3px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h2 { font-family: 'Cormorant Garamond', serif; font-variant: small-caps; font-weight: 600; font-size: 26px; color: var(--gold); margin-bottom: 16px; letter-spacing: 3px; }
.modal p { font-size: 19px; line-height: 1.55; margin-bottom: 12px; font-family: 'Cormorant Garamond', serif; }
.achievement-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 16px 0; }
.achievement {
  padding: 10px;
  border: 1px solid var(--sepia);
  border-radius: 2px;
  font-size: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Cormorant Garamond', serif;
}
.achievement.unlocked { border-color: var(--gold); background: rgba(201, 169, 97, 0.08); color: var(--gold); }
.achievement.locked { opacity: 0.4; }
.ach-icon { font-size: 22px; }

/* RESULTS */
.results-screen { text-align: center; padding: 20px; }
.results-title {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-variant: small-caps;
  font-size: 36px;
  color: var(--gold);
  margin-bottom: 24px;
  letter-spacing: 5px;
  text-shadow: 0 0 20px var(--gold);
}
.results-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin: 24px 0; }
.stat-block { padding: 16px; background: rgba(0,0,0,0.3); border: 1px solid var(--burgundy); border-radius: 2px; }
.stat-num { font-size: 36px; font-family: 'Cormorant Garamond', serif; font-weight: 700; color: var(--gold); display: block; }
.stat-label { font-size: 13px; color: var(--text-dim); letter-spacing: 2px; font-family: 'Cormorant Garamond', serif; font-variant: small-caps; }
.rank-badge {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-variant: small-caps;
  font-size: 36px;
  padding: 16px 32px;
  margin: 16px 0;
  border: 2px solid;
  border-radius: 3px;
  letter-spacing: 6px;
}

/* DECORATIVE ICON BAR */
.atlas-bar {
  height: 50px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  gap: 12px;
}
.atlas-icon {
  font-size: 28px;
  color: var(--gold);
  filter: drop-shadow(0 0 6px var(--gold));
  animation: anatFloat 3.5s ease-in-out infinite;
  opacity: 0.7;
}
.atlas-icon:nth-child(2n) { color: var(--crimson); animation-delay: 0.5s; filter: drop-shadow(0 0 6px var(--crimson)); }
.atlas-icon:nth-child(3n) { color: var(--cream); animation-delay: 1s; filter: drop-shadow(0 0 6px var(--cream)); }
@keyframes anatFloat {
  0%, 100% { transform: translateY(0); opacity: 0.6; }
  50% { transform: translateY(-6px); opacity: 1; }
}

@media (max-width: 700px) {
  h1.game-title { font-size: 28px; letter-spacing: 4px; }
  .hud { grid-template-columns: repeat(2, 1fr); }
  .menu-grid { grid-template-columns: 1fr; }
  .system-name { width: 130px; font-size: 14px; }
  .results-stats { grid-template-columns: 1fr; }
  .panel { padding: 18px; }
  .q-text { font-size: 19px; }
  .diagram-container svg { max-height: 280px; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="app">
  <div class="title-bar">
    <h1 class="game-title">Anatomy Atlas</h1>
    <div class="subtitle">Visual Pattern Recognition</div>
    <div class="atlas-bar">
      <span class="atlas-icon">⚱</span>
      <span class="atlas-icon">✥</span>
      <span class="atlas-icon">⚕</span>
      <span class="atlas-icon">☘</span>
      <span class="atlas-icon">⚱</span>
      <span class="atlas-icon">✥</span>
      <span class="atlas-icon">⚕</span>
      <span class="atlas-icon">☘</span>
      <span class="atlas-icon">⚱</span>
      <span class="atlas-icon">✥</span>
    </div>
  </div>

  <div class="hud">
    <div class="hud-cell"><div class="hud-label">Vitality</div><div class="hud-value hp"><span class="hearts" id="hearts"></span></div></div>
    <div class="hud-cell"><div class="hud-label">Knowledge</div><div class="hud-value xp" id="xp-display">0</div></div>
    <div class="hud-cell"><div class="hud-label">Rank</div><div class="hud-value lvl" id="lvl-display">1</div></div>
    <div class="hud-cell"><div class="hud-label">Streak</div><div class="hud-value streak" id="streak-display">0🔥</div></div>
  </div>

  <div class="panel" id="panel"></div>
</div>

<script>
// ============================================================================
// SVG DIAGRAM LIBRARY
// ============================================================================
const SVG = {

// ── HESSELBACH'S TRIANGLE — full anatomical view, right side ──────────
hesselbach_lateral: `<svg viewBox="0 0 500 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="360" fill="#fdf6e8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Cormorant Garamond" font-size="13" font-style="italic" fill="#8b6f47">Right inguinal region — internal view</text>

  <!-- Rectus abdominis (medial) -->
  <rect x="370" y="50" width="60" height="240" fill="#7a2238" opacity="0.45" stroke="#5a1828" stroke-width="2"/>
  <text x="378" y="180" font-family="Cormorant Garamond" font-size="13" fill="#3a0a18" font-weight="600">Rectus</text>
  <text x="378" y="195" font-family="Cormorant Garamond" font-size="13" fill="#3a0a18" font-weight="600">abdominis</text>

  <!-- Inguinal ligament (inferior) -->
  <line x1="80" y1="220" x2="370" y2="290" stroke="#c8324a" stroke-width="6"/>
  <text x="180" y="285" font-family="Cormorant Garamond" font-size="14" fill="#7a1a30" font-weight="700">Inguinal lig.</text>

  <!-- Inferior epigastric vessels (lateral border) -->
  <line x1="240" y1="265" x2="305" y2="80" stroke="#4a6f8a" stroke-width="3"/>
  <line x1="246" y1="265" x2="311" y2="80" stroke="#c8324a" stroke-width="3"/>
  <text x="270" y="55" font-family="Cormorant Garamond" font-size="12" fill="#1a3852" font-weight="600">Inf. epigastric</text>
  <text x="280" y="70" font-family="Cormorant Garamond" font-size="12" fill="#1a3852" font-weight="600">vessels</text>

  <!-- Hesselbach's triangle shaded -->
  <polygon points="246,265 305,80 370,80 370,285" fill="#c9a961" opacity="0.28" stroke="#8b6f47" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="315" y="180" font-family="Cormorant Garamond" font-size="14" fill="#5a4828" font-style="italic" font-weight="600">Hesselbach</text>

  <!-- ARROW pointing to inferior epigastric vessels -->
  <line x1="180" y1="170" x2="245" y2="180" stroke="#c8324a" stroke-width="2.5"/>
  <polygon points="245,180 234,176 236,186" fill="#c8324a"/>
  <text x="100" y="165" font-family="Cormorant Garamond" font-size="22" fill="#c8324a" font-weight="700">?</text>

  <!-- ASIS marker -->
  <circle cx="80" cy="220" r="6" fill="#5a4828"/>
  <text x="40" y="215" font-family="Cormorant Garamond" font-size="11" fill="#5a4828">ASIS</text>

  <!-- Pubic tubercle -->
  <circle cx="370" cy="290" r="6" fill="#5a4828"/>
  <text x="370" y="312" font-family="Cormorant Garamond" font-size="11" fill="#5a4828">Pubic tub.</text>
</svg>`,

// ── HESSELBACH — direct hernia path (medial to inf epigastric) ────────
hesselbach_direct: `<svg viewBox="0 0 500 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="360" fill="#fdf6e8"/>
  <text x="250" y="22" text-anchor="middle" font-family="Cormorant Garamond" font-size="13" font-style="italic" fill="#8b6f47">Hernia path indicated by arrow</text>

  <rect x="370" y="50" width="60" height="240" fill="#7a2238" opacity="0.45" stroke="#5a1828" stroke-width="2"/>
  <text x="378" y="180" font-family="Cormorant Garamond" font-size="13" fill="#3a0a18" font-weight="600">Rectus</text>

function loadSave() {

    const v = localStorage.getItem('anatomy_atlas_save');
    if (v) {
      const data = JSON.parse(v);
      Object.assign(STATE, data);
      SYSTEMS.forEach(s => { if (!STATE.systemMastery[s]) STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
      toast('SAVE LOADED', 'xp');
    }
  } catch (e) {}
}

  try {

      achievements: STATE.achievements, totalAnswered: STATE.totalAnswered,

  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickRandom(arr, n) { return shuffle(arr).slice(0, n); }
function toast(msg, cls='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + cls;
  setTimeout(() => t.className = 'toast ' + cls, 1800);
}
function unlock(id) {
  if (STATE.achievements[id]) return;
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach) return;
  STATE.achievements[id] = true;
  toast(`✦ ${ach.name}!`, 'xp');
  save();
}
function checkAchievements() {
  if (STATE.totalAnswered >= 1) unlock('first_plate');
  if (STATE.streak >= 5) unlock('streak_5');
  if (STATE.streak >= 10) unlock('streak_10');
  if (STATE.level >= 5) unlock('level_5');
  if (STATE.level >= 10) unlock('level_10');
  ['Hernia','Plexus','Cord'].forEach((sys, i) => {
    const m = STATE.systemMastery[sys];
    const threshold = i === 0 ? 5 : 3;
    if (m.seen >= threshold && (m.correct/m.seen) >= 0.9) {
      unlock(['master_hernia','master_plexus','master_cord'][i]);
    }
  });
}

// ============================================================================
// HUD
// ============================================================================
function renderHUD() {
  let hearts = '';
  for (let i = 0; i < STATE.maxHp; i++) {
    hearts += `<span class="heart ${i < STATE.hp ? '' : 'lost'}">♥</span>`;
  }
  document.getElementById('hearts').innerHTML = hearts;
  document.getElementById('xp-display').textContent = STATE.xp;
  document.getElementById('lvl-display').textContent = STATE.level;
  document.getElementById('streak-display').textContent = STATE.streak + '🔥';
}
function gainXP(amt) {
  STATE.xp += amt;
  const needed = STATE.level * 50;
  if (STATE.xp >= needed) {
    STATE.xp -= needed;
    STATE.level++;
    STATE.maxHp = Math.min(5, 3 + Math.floor(STATE.level / 5));
    STATE.hp = STATE.maxHp;
    toast(`RANK UP! Lvl ${STATE.level}`, 'xp');
  }
  renderHUD();
}

// ============================================================================
// SCREENS
// ============================================================================
const panel = document.getElementById('panel');

function renderMenu() {
  STATE.mode = 'menu';
  renderHUD();
  panel.innerHTML = `
    <h2 style="font-family:'Cormorant Garamond',serif; font-variant:small-caps; font-size:24px; color:var(--gold); margin-bottom:6px; text-align:center; letter-spacing:4px;">✦ Choose Your Plates ✦</h2>
    <p style="text-align:center; color:var(--text-dim); margin-bottom:20px; font-family:'Cormorant Garamond',serif; font-size:18px; font-style:italic;">— Each question shows a custom diagram. Drill the visuals. —</p>
    <div class="menu-grid">
      <div class="menu-card" onclick="startMode('daily')">
        <span class="menu-icon">⚱</span>
        <div class="menu-title">Daily Plates</div>
        <div class="menu-desc">10 mixed visual Qs.</div>
      </div>
      <div class="menu-card" onclick="startMode('endless')">
        <span class="menu-icon">⚔</span>
        <div class="menu-title">Endless Atlas</div>
        <div class="menu-desc">Survival mode.</div>
      </div>
      <div class="menu-card" onclick="startMode('hernia')" style="border-color:var(--crimson); background:linear-gradient(135deg, rgba(200,50,74,0.18), rgba(201,169,97,0.08));">
        <span class="menu-icon">⚕</span>
        <div class="menu-title" style="color:var(--crimson);">★ Hernia Plates ★</div>
        <div class="menu-desc">PRIORITY. Visual hernia drills.</div>
      </div>
      <div class="menu-card" onclick="startMode('plexus')">
        <span class="menu-icon">✥</span>
        <div class="menu-title">Plexus & Postures</div>
        <div class="menu-desc">Brachial plexus, Erb, Klumpke.</div>
      </div>
      <div class="menu-card" onclick="startMode('cord')">
        <span class="menu-icon">⚜</span>
        <div class="menu-title">Cord & Tracts</div>
        <div class="menu-desc">Cross-sections, syndromes.</div>
      </div>
      <div class="menu-card" onclick="startMode('derm')">
        <span class="menu-icon">☘</span>
        <div class="menu-title">Dermatome Maps</div>
        <div class="menu-desc">Upper + lower limb.</div>
      </div>
      <div class="menu-card" onclick="startMode('vessels')">
        <span class="menu-icon">⚱</span>
        <div class="menu-title">Vessels & Foramina</div>
        <div class="menu-desc">Aortic levels, skull base.</div>
      </div>
    </div>
    <div class="system-progress">
      <h3 style="font-family:'Cormorant Garamond',serif; font-variant:small-caps; font-size:18px; color:var(--crimson); margin:24px 0 12px; letter-spacing:3px;">— Visual Mastery Ledger —</h3>
      ${SYSTEMS.map(sys => {
        const m = STATE.systemMastery[sys];
        const pct = m.seen ? Math.round(m.correct / m.seen * 100) : 0;
        const displayName = {'CN':'Cranial Foramina','Cord':'Spinal Cord','Plexus':'Plexus / Upper','Dermatome':'Dermatomes','Vessels':'Aortic Levels'}[sys] || sys;
        return `
          <div class="system-bar">
            <div class="system-name">${displayName}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="system-pct">${pct}% (${m.correct}/${m.seen})</div>
          </div>`;
      }).join('')}
    </div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="showAchievements()">✦ Achievements</button>
      <button class="btn btn-secondary" onclick="showStats()">⚖ Stats</button>
      <button class="btn btn-secondary" onclick="showSyncModal()">🔄 Sync</button>
      <button class="btn btn-danger" onclick="resetSave()">✗ Reset</button>
    </div>
  `;
}

function startMode(mode) {
  STATE.mode = mode;
  STATE.modeStats = { correct: 0, total: 0 };
  STATE.modeIdx = 0;
  STATE.hp = STATE.maxHp;

  let pool = QBANK;
  let limit = 10;
  if (mode === 'hernia') pool = QBANK.filter(q => q.topic === 'Hernia');
  else if (mode === 'plexus') pool = QBANK.filter(q => q.topic === 'Plexus');
  else if (mode === 'cord') pool = QBANK.filter(q => q.topic === 'Cord');
  else if (mode === 'derm') pool = QBANK.filter(q => q.topic === 'Dermatome');
  else if (mode === 'vessels') pool = QBANK.filter(q => ['Vessels','CN'].includes(q.topic));
  else if (mode === 'endless') { pool = QBANK; limit = 999; }

  STATE.modeQs = mode === 'endless' ? shuffle(pool) : pickRandom(pool, Math.min(limit, pool.length));
  STATE.modeStats.total = STATE.modeQs.length;
  renderHUD();
  nextQuestion();
}

function nextQuestion() {
  if (STATE.hp <= 0) return endRound('LIFE LOST');
  if (STATE.modeIdx >= STATE.modeQs.length) {
    if (STATE.mode === 'endless') {
      STATE.modeQs = shuffle(QBANK); STATE.modeIdx = 0;
    } else return endRound('COMPLETE');
  }
  STATE.currentQ = STATE.modeQs[STATE.modeIdx];
  renderQuestion();
}

function renderQuestion() {
  const q = STATE.currentQ;
  const progressTxt = STATE.mode === 'endless'
    ? `Q${STATE.modeStats.correct + 1} • ENDLESS`
    : `Q${STATE.modeIdx + 1} / ${STATE.modeQs.length}`;
  panel.innerHTML = `
    <div class="question-area">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span class="q-tag">${q.tag} • ${q.topic}</span>
        <span style="font-family:'JetBrains Mono',monospace; color:var(--text-dim); font-size:14px;">${progressTxt}</span>
      </div>
      <div class="diagram-container">${q.svg}</div>
      <div class="q-text">${q.q}</div>
      <div class="choices" id="choices">
        ${q.c.map((c, i) => `
          <button class="choice" data-idx="${i}" onclick="answer(${i})">
            <span class="key">${String.fromCharCode(65 + i)}</span>
            <span>${c}</span>
          </button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>
  `;
}

function answer(idx) {
  const q = STATE.currentQ;
  const isCorrect = idx === q.a;
  document.querySelectorAll('.choice').forEach((el, i) => {
    el.classList.add('disabled');
    el.onclick = null;
    if (i === q.a) el.classList.add('correct');
    else if (i === idx) el.classList.add('wrong');
  });

  STATE.totalAnswered++;
  STATE.systemMastery[q.topic].seen++;
  if (isCorrect) {
    STATE.totalCorrect++;
    STATE.systemMastery[q.topic].correct++;
    STATE.modeStats.correct++;
    STATE.streak++;
    if (STATE.streak > STATE.bestStreak) STATE.bestStreak = STATE.streak;
    const xpGain = 10 + Math.min(STATE.streak * 2, 20);
    gainXP(xpGain);
    toast(`+${xpGain} XP`, 'xp');
    if (STATE.mode === 'endless' && STATE.streak >= 15) unlock('survivor');
  } else {
    STATE.streak = 0;
    STATE.hp--;
    toast('✗ -1 HP', 'error');
  }
  renderHUD();
  checkAchievements();
  save();

  document.getElementById('feedback').innerHTML = `
    <div class="pearl-box">
      <div class="pearl-label">✦ Mehlman Pearl ✦</div>
      <div class="pearl-text">${q.p}</div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="renderMenu()">◄ Menu</button>
      <button class="btn" onclick="advance()">${STATE.modeIdx + 1 >= STATE.modeQs.length && STATE.mode !== 'endless' ? 'Conclude ►' : 'Next ►'}</button>
    </div>
  `;
}

function advance() {
  STATE.modeIdx++;
  nextQuestion();
}

function endRound(reason) {
  const correct = STATE.modeStats.correct;
  const total = STATE.modeStats.total;
  const livePct = total > 0 ? Math.round(correct/total*100) : 0;

  let rank, rankColor;
  if (livePct === 100 && total >= 10) { rank = 'S'; rankColor = 'var(--gold)'; unlock('perfect_round'); }
  else if (livePct >= 90) { rank = 'A'; rankColor = 'var(--crimson)'; }
  else if (livePct >= 75) { rank = 'B'; rankColor = 'var(--cream)'; }
  else if (livePct >= 60) { rank = 'C'; rankColor = 'var(--sepia)'; }
  else { rank = 'D'; rankColor = 'var(--warning)'; }

  const reasonMsg = reason === 'LIFE LOST' ? 'Specimen Compromised' : 'Examination Complete';
  panel.innerHTML = `
    <div class="results-screen">
      <div class="results-title">${reasonMsg}</div>
      <div class="rank-badge" style="color:${rankColor}; border-color:${rankColor}; box-shadow: 0 0 30px ${rankColor};">Rank ${rank}</div>
      <div class="results-stats">
        <div class="stat-block"><span class="stat-num">${correct}</span><span class="stat-label">Correct</span></div>
        <div class="stat-block"><span class="stat-num">${livePct}%</span><span class="stat-label">Accuracy</span></div>
        <div class="stat-block"><span class="stat-num">${STATE.bestStreak}</span><span class="stat-label">Best Streak</span></div>
      </div>
      <div class="controls" style="justify-content:center;">
        <button class="btn btn-secondary" onclick="renderMenu()">◄ Menu</button>
        <button class="btn" onclick="startMode('${STATE.mode}')">↻ Repeat</button>
      </div>
    </div>
  `;
  STATE.streak = 0;
  renderHUD();
  save();
}


// ============================================================================
// SYNC — Export / Import save codes across devices
// ============================================================================
function showSyncModal() {
  const data = {
    hp: STATE.hp, maxHp: STATE.maxHp, xp: STATE.xp, level: STATE.level,
    bestStreak: STATE.bestStreak, systemMastery: STATE.systemMastery,
    achievements: STATE.achievements, totalAnswered: STATE.totalAnswered,
    totalCorrect: STATE.totalCorrect
  };
  const code = btoa(unescape(encodeURIComponent(JSON.stringify(data))));

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>🔄 SYNC SAVE</h2>
        <p style="font-size:14px; opacity:0.75; margin-bottom:18px;">Transfer your progress between devices. Copy code from one, paste on the other.</p>

        <div style="margin-bottom:20px; padding:14px; background:rgba(0,0,0,0.25); border-radius:4px; border:1px solid rgba(128,128,128,0.25);">
          <h3 style="font-size:15px; margin-bottom:8px; opacity:0.9;">📤 EXPORT &mdash; from this device</h3>
          <p style="font-size:13px; opacity:0.65; margin-bottom:8px;">Copy this code, then paste it on your other device:</p>
          <textarea id="sync-export-code" readonly style="width:100%; height:90px; font-family:monospace; font-size:11px; padding:8px; background:rgba(0,0,0,0.45); color:inherit; border:1px solid rgba(128,128,128,0.4); border-radius:3px; resize:none; word-break:break-all;">${code}</textarea>
          <button class="btn btn-secondary" style="margin-top:10px; width:100%;" onclick="copyExportCode()">📋 Copy to Clipboard</button>
        </div>

        <div style="margin-bottom:20px; padding:14px; background:rgba(0,0,0,0.25); border-radius:4px; border:1px solid rgba(128,128,128,0.25);">
          <h3 style="font-size:15px; margin-bottom:8px; opacity:0.9;">📥 IMPORT &mdash; from another device</h3>
          <p style="font-size:13px; opacity:0.65; margin-bottom:8px;">Paste a save code from your other device:</p>
          <textarea id="sync-import-code" placeholder="Paste save code here..." style="width:100%; height:90px; font-family:monospace; font-size:11px; padding:8px; background:rgba(0,0,0,0.45); color:inherit; border:1px solid rgba(128,128,128,0.4); border-radius:3px; resize:none;"></textarea>
          <button class="btn" style="margin-top:10px; width:100%;" onclick="applyImport()">✓ Apply Import</button>
        </div>

        <div style="text-align:center;">
          <button class="btn btn-secondary" onclick="closeModal()">CLOSE</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function copyExportCode() {
  const ta = document.getElementById('sync-export-code');
  if (!ta) return;
  ta.select();
  ta.setSelectionRange(0, 99999);
  let ok = false;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(
      () => toast('COPIED!', 'xp'),
      () => {
        try { ok = document.execCommand('copy'); } catch (e) {}
        if (ok) toast('COPIED!', 'xp');
        else toast('Select & copy manually', 'error');
      }
    );
  } else {
    try { ok = document.execCommand('copy'); } catch (e) {}
    if (ok) toast('COPIED!', 'xp');
    else toast('Select & copy manually', 'error');
  }
}

function applyImport() {
  const ta = document.getElementById('sync-import-code');
  if (!ta) return;
  const code = ta.value.trim();
  if (!code) { toast('Paste a code first', 'error'); return; }
  try {
    let json;
    try { json = decodeURIComponent(escape(atob(code))); }
    catch (e) { json = atob(code); }
    const data = JSON.parse(json);
    if (typeof data.xp !== 'number' || !data.systemMastery) {
      throw new Error('Invalid save format');
    }
    if (!confirm('This will REPLACE your current progress on this device. Continue?')) return;
    Object.assign(STATE, data);
    SYSTEMS.forEach(s => { if (!STATE.systemMastery[s]) STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
    if (!STATE.achievements) STATE.achievements = {};
    save();
    closeModal();
    toast('SAVE IMPORTED!', 'xp');
    renderMenu();
  } catch (e) {
    toast('Invalid code — try again', 'error');
  }
}

function showAchievements() {
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>✦ Achievements</h2>
        <div class="achievement-list">
          ${ACHIEVEMENTS.map(a => `
            <div class="achievement ${STATE.achievements[a.id] ? 'unlocked' : 'locked'}">
              <span class="ach-icon">${STATE.achievements[a.id] ? a.icon : '⚿'}</span>
              <div>
                <strong>${a.name}</strong><br>
                <span style="font-size:14px; color:var(--text-dim); font-style:italic;">${a.desc}</span>
              </div>
            </div>`).join('')}
        </div>
        <button class="btn" onclick="closeModal()">Close</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function showStats() {
  const totalPct = STATE.totalAnswered ? Math.round(STATE.totalCorrect/STATE.totalAnswered*100) : 0;
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>⚖ Lifetime Ledger</h2>
        <p><strong style="color:var(--gold)">Total Answered:</strong> ${STATE.totalAnswered}</p>
        <p><strong style="color:var(--cream)">Total Correct:</strong> ${STATE.totalCorrect}</p>
        <p><strong style="color:var(--crimson)">Lifetime Accuracy:</strong> ${totalPct}%</p>
        <p><strong style="color:var(--warning)">Best Streak:</strong> ${STATE.bestStreak}🔥</p>
        <p><strong style="color:var(--vein-blue)">Current Rank:</strong> ${STATE.level}</p>
        <p><strong>Achievements:</strong> ${Object.keys(STATE.achievements).length} / ${ACHIEVEMENTS.length}</p>
        <button class="btn" onclick="closeModal()">Close</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeModal() { document.querySelector('.modal-overlay')?.remove(); }

function resetSave() {
  if (!confirm('Reset ALL Anatomy Atlas progress?')) return;
  try { localStorage.removeItem('anatomy_atlas_save'); } catch (e) {}
  STATE.hp = 3; STATE.maxHp = 3; STATE.xp = 0; STATE.level = 1;
  STATE.streak = 0; STATE.bestStreak = 0; STATE.totalAnswered = 0; STATE.totalCorrect = 0;
  STATE.achievements = {};
  SYSTEMS.forEach(s => { STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
  toast('SAVE RESET');
  renderMenu();
}

document.addEventListener('keydown', (e) => {
  if (STATE.mode === 'menu' || !STATE.currentQ) return;
  const choices = document.querySelectorAll('.choice:not(.disabled)');
  if (choices.length === 0) {
    if (e.key === 'Enter') {
      const nextBtn = document.querySelector('.controls .btn:not(.btn-secondary):not(.btn-danger)');
      nextBtn?.click();
    }
    return;
  }
  const keyIdx = ['a','b','c','d','1','2','3','4'].indexOf(e.key.toLowerCase());
  if (keyIdx >= 0) {
    const idx = keyIdx >= 4 ? keyIdx - 4 : keyIdx;
    if (choices[idx]) answer(idx);
  }
});

loadSave();
renderMenu();
</script>

</html>
