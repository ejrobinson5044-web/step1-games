<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HORMONE HUNTER — Endocrine System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Karla:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#100a04;
  --bg2:#181006;
  --panel:#21160a;
  --panel-hi:#2c1e0e;
  --cyan:#f59e0b;        /* honey-amber primary */
  --cyan-dim:#b45309;
  --amber:#38bdf8;       /* sky-blue accent */
  --amber-hi:#7dd3fc;
  --red:#f87171;
  --green:#34d399;
  --text:#fdf2e0;
  --dim:#ad9474;
  --line:rgba(245,158,11,.15);
  --glow:rgba(245,158,11,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Karla',sans-serif;min-height:100vh;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 17% 0%,rgba(245,158,11,.12),transparent 55%),
    radial-gradient(ellipse at 88% 100%,rgba(56,189,248,.07),transparent 55%),
    linear-gradient(180deg,#100a04,#181006);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(var(--line) 1px,transparent 1px);
  background-size:26px 26px;
  mask-image:radial-gradient(ellipse at center,#000 32%,transparent 88%);
}
#app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:18px}

.hdr{text-align:center;padding:18px 0 16px;border-bottom:2px solid var(--cyan-dim);margin-bottom:20px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:14px;
  background:linear-gradient(150deg,var(--cyan),var(--cyan-dim));color:#21160a;
  font-family:'Plus Jakarta Sans';font-weight:800;font-size:26px;margin-bottom:8px;box-shadow:0 0 24px var(--glow)}
h1{font-family:'Plus Jakarta Sans';font-weight:800;font-size:33px;letter-spacing:.2px;color:var(--cyan)}
.sub{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:5px;text-transform:uppercase}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:8px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.tile::after{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--cyan);opacity:.6}
.tile:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 26px rgba(0,0,0,.5)}
.tile.amber::after{background:var(--amber)}
.tile.special::after{background:linear-gradient(var(--amber),var(--cyan))}
.tile .ic{font-size:24px}
.tile h3{font-family:'Plus Jakarta Sans';font-weight:700;font-size:17px;margin:7px 0 5px;letter-spacing:.1px;line-height:1.25}
.tile p{font-size:12.5px;color:var(--dim);line-height:1.45}
.tile .meta{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan);margin-top:9px;letter-spacing:1px}
.tile.amber .meta{color:var(--amber-hi)}

.section-label{font-family:'JetBrains Mono';font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}

.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'JetBrains Mono';font-size:12px}
.qcount{color:var(--dim)}
.streak{color:var(--amber-hi)}
.bar{height:6px;background:var(--panel);border-radius:4px;overflow:hidden;margin-bottom:18px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:.3s}
.modtag{display:inline-block;font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--cyan-dim);border-radius:20px;padding:3px 11px;margin-bottom:14px;text-transform:uppercase}
.stem{font-size:18.5px;line-height:1.5;font-weight:500;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:11px}
.choice{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:.14s;font-size:15.5px;display:flex;gap:12px;align-items:flex-start}
.choice .k{font-family:'JetBrains Mono';font-size:13px;color:var(--cyan);font-weight:600;flex-shrink:0}
.choice:hover{border-color:var(--cyan);background:var(--panel-hi)}
.choice.correct{border-color:var(--green);background:rgba(52,211,153,.13)}
.choice.correct .k{color:var(--green)}
.choice.wrong{border-color:var(--red);background:rgba(248,113,113,.13)}
.choice.wrong .k{color:var(--red)}
.choice.disabled{pointer-events:none;opacity:.85}

.explain{margin-top:18px;border-radius:12px;padding:15px 16px;background:var(--panel);border-left:3px solid var(--cyan);animation:rise .25s ease}
.explain.miss{border-left-color:var(--red)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.explain .lab{font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.explain .why{font-size:14.5px;line-height:1.5}
.pearl{margin-top:11px;background:rgba(56,189,248,.10);border:1px dashed var(--amber);border-radius:10px;padding:11px 13px;font-size:14px;line-height:1.5}
.pearl b{color:var(--amber-hi);font-family:'Plus Jakarta Sans';font-weight:800;font-size:13px}

.btn{font-family:'Plus Jakarta Sans';font-weight:800;letter-spacing:.2px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;font-size:15px;transition:.15s}
.btn-next{background:linear-gradient(145deg,var(--cyan),var(--cyan-dim));color:#21160a;margin-top:18px;width:100%}
.btn-next:hover{box-shadow:0 0 18px var(--glow)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--dim);margin-top:18px}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}

.result{text-align:center;padding:30px 16px}
.score-big{font-family:'Plus Jakarta Sans';font-weight:800;font-size:64px;color:var(--cyan);line-height:1}
.rank{font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:10px 0 22px}
.statrow{display:flex;justify-content:center;gap:30px;margin-bottom:24px}
.statrow div{font-family:'JetBrains Mono';font-size:12px;color:var(--dim)}
.statrow b{display:block;font-size:26px;color:var(--text);font-family:'Plus Jakarta Sans';font-weight:800}

.vault-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:12px;border-left:3px solid var(--amber)}
.vault-card h4{font-family:'Plus Jakarta Sans';font-weight:800;color:var(--amber-hi);font-size:16px;margin-bottom:7px;letter-spacing:.1px;line-height:1.25}
.vault-card p{font-size:14px;line-height:1.55;color:var(--text)}
.vault-card .tag{font-family:'JetBrains Mono';font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-top:7px}

.back{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:1px;display:inline-flex;gap:6px;align-items:center;margin-bottom:16px}
.back:hover{color:var(--cyan)}
footer{text-align:center;font-family:'JetBrains Mono';font-size:10px;color:var(--dim);margin:28px 0 8px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* correct = index into c[]; choices shuffle at render. Stems never contain the answer. */
const QBANK=[
/* ===== GLANDS, HORMONES & AXES ===== */
{m:"axis",q:"Which set of hormones is secreted by the ANTERIOR pituitary?",c:["FSH, LH, ACTH, TSH, prolactin, and growth hormone","Oxytocin and antidiuretic hormone","Cortisol and aldosterone","T3 and T4"],a:0,why:"Anterior pituitary = FLAT PiG: FSH, LH, ACTH, TSH, Prolactin, Growth hormone. The posterior pituitary only RELEASES ADH and oxytocin.",p:"Anterior pituitary = <b>FLAT PiG</b> (FSH, LH, ACTH, TSH, Prolactin, GH).",v:"A pituitary adenoma arises from glandular anterior pituitary cells. Which group of hormones can this tissue secrete?"},
{m:"axis",q:"Oxytocin and antidiuretic hormone are RELEASED from the posterior pituitary, but they are synthesized where?",c:["The hypothalamus","The anterior pituitary","The adrenal cortex","The pineal gland"],a:0,why:"ADH and oxytocin are made by hypothalamic neurons (supraoptic and paraventricular nuclei) and transported down axons to be stored/released in the posterior pituitary.",p:"Posterior pituitary hormones (ADH, oxytocin) are MADE in the <b>hypothalamus</b>, just stored/released posteriorly.",v:"A patient has central diabetes insipidus after hypothalamic injury, despite an intact posterior pituitary. Where is ADH normally synthesized?"},
{m:"axis",q:"Which second messenger is used by hormones such as ACTH, TSH, LH, FSH, PTH, and glucagon?",c:["cAMP","IP3 / calcium","cGMP","An intracellular receptor"],a:0,why:"These hormones (FLAT ChAMP) signal via Gs-coupled receptors → adenylate cyclase → cAMP → protein kinase A.",p:"cAMP = <b>FLAT ChAMP</b> (FSH, LH, ACTH, TSH, CRH, hCG, ADH-V2, MSH, PTH, calcitonin, GHRH, glucagon).",v:"A patient with pseudohypoparathyroidism has resistance to PTH signaling. Which second messenger pathway is normally used?"},
{m:"axis",q:"Steroid hormones (cortisol, aldosterone, sex steroids) and thyroid hormone act by binding receptors located where?",c:["Inside the cell (cytoplasmic/nuclear receptors)","On the cell surface (GPCRs)","At receptor tyrosine kinases","On ligand-gated ion channels"],a:0,why:"Being lipophilic, steroid and thyroid hormones cross the membrane and bind intracellular (cytoplasmic/nuclear) receptors that act as transcription factors.",p:"Steroid + thyroid hormones = lipophilic → <b>intracellular/nuclear receptors</b> (alter gene transcription).",v:"A patient takes prednisone, which changes gene transcription after binding an intracellular receptor. Where are steroid hormone receptors located?"},
{m:"axis",q:"Insulin, IGF-1, and many growth factors signal through which type of receptor?",c:["Receptor tyrosine kinase","Gs-coupled (cAMP) receptor","Intracellular steroid receptor","Ligand-gated chloride channel"],a:0,why:"Insulin/IGF-1/growth factors bind receptor tyrosine kinases → autophosphorylation → MAP kinase and PI3K pathways.",p:"Insulin, IGF-1, growth factors = <b>receptor tyrosine kinase</b> (MAP-K / PI3K).",v:"A patient with insulin resistance has impaired signaling through the insulin receptor. Which receptor class does insulin use?"},
{m:"axis",q:"In the hypothalamic-pituitary-adrenal axis, ACTH from the pituitary stimulates the adrenal cortex to release what?",c:["Cortisol","Aldosterone only","Epinephrine","Thyroxine"],a:0,why:"CRH → ACTH → cortisol (from the zona fasciculata). Cortisol then negatively feeds back on the hypothalamus and pituitary.",p:"HPA axis: <b>CRH → ACTH → cortisol</b>, with negative feedback.",v:"A patient with primary adrenal insufficiency cannot produce the main glucocorticoid normally stimulated by ACTH. Which hormone is deficient?"},
{m:"axis",q:"Exogenous high-dose glucocorticoids suppress the HPA axis by inhibiting release of CRH and what?",c:["ACTH","Aldosterone","Insulin","Calcitonin"],a:0,why:"High cortisol (endogenous or exogenous steroids) suppresses CRH and ACTH; abrupt steroid withdrawal can then cause adrenal insufficiency.",p:"Steroids suppress <b>CRH + ACTH</b> → adrenal atrophy. Never stop chronic steroids abruptly (taper)."},
{m:"axis",q:"Thyroid and steroid hormones circulate mostly bound to plasma proteins. Which fraction is biologically active?",c:["The free (unbound) fraction","The protein-bound fraction","Both equally","Neither"],a:0,why:"Only the free hormone is active and feedback-relevant; changes in binding proteins (e.g., pregnancy raises TBG) alter total but not free levels.",p:"Only the <b>free (unbound)</b> hormone is active. Binding-protein changes shift total, not free."},

/* ===== THYROID & PARATHYROID ===== */
{m:"thy",q:"Hyperthyroidism with exophthalmos, pretibial myxedema, and stimulating anti-TSH-receptor antibodies is which disease?",c:["Graves disease","Hashimoto thyroiditis","Subacute (de Quervain) thyroiditis","Toxic multinodular goiter"],a:0,why:"Graves = autoimmune hyperthyroidism from thyroid-stimulating immunoglobulin (anti-TSH-receptor Ab); unique features are exophthalmos and pretibial myxedema.",p:"Graves = <b>TSI (anti-TSHR Ab)</b>, hyperthyroid + exophthalmos + pretibial myxedema."},
{m:"thy",q:"Hypothyroidism with anti-thyroid-peroxidase antibodies and dense lymphocytic infiltration of the gland is which condition?",c:["Hashimoto thyroiditis","Graves disease","Riedel thyroiditis","Thyroid storm"],a:0,why:"Hashimoto = autoimmune hypothyroidism (anti-TPO, anti-thyroglobulin), lymphocytic infiltrate with germinal centers (Hürthle cells); raises risk of thyroid B-cell lymphoma.",p:"Hashimoto = <b>anti-TPO</b>, hypothyroid, lymphocytic infiltrate. ↑ risk of thyroid lymphoma."},
{m:"thy",q:"Weight loss, heat intolerance, palpitations, and a fine tremor with a SUPPRESSED TSH indicate what?",c:["Hyperthyroidism","Hypothyroidism","Cushing syndrome","Pheochromocytoma"],a:0,why:"Excess thyroid hormone → hypermetabolism: weight loss, heat intolerance, tachycardia, tremor; primary disease shows low TSH with high free T4.",p:"Hyperthyroid = weight loss, heat intolerance, tachycardia, tremor, <b>↓TSH ↑T4</b>."},
{m:"thy",q:"Weight gain, cold intolerance, fatigue, and constipation with an ELEVATED TSH indicate what?",c:["Hypothyroidism","Hyperthyroidism","Diabetes insipidus","Addison disease"],a:0,why:"Low thyroid hormone → hypometabolism: weight gain, cold intolerance, fatigue, constipation, bradycardia; primary disease shows high TSH with low free T4.",p:"Hypothyroid = weight gain, cold intolerance, fatigue, constipation, <b>↑TSH ↓T4</b>."},
{m:"thy",q:"Which enzyme catalyzes the oxidation and organification of iodide in thyroid hormone synthesis (and is blocked by methimazole)?",c:["Thyroid peroxidase","5'-deiodinase","Tyrosine hydroxylase","Carbonic anhydrase"],a:0,why:"Thyroid peroxidase oxidizes iodide, organifies it onto thyroglobulin tyrosines, and couples them; methimazole and PTU block it (PTU also blocks peripheral T4→T3).",p:"Synthesis enzyme = <b>thyroid peroxidase</b> (blocked by methimazole/PTU; PTU also blocks T4→T3)."},
{m:"thy",q:"Parathyroid hormone RAISES serum calcium. What effect does it have on serum phosphate?",c:["Lowers it (increases renal phosphate excretion)","Raises it","No effect","Raises potassium instead"],a:0,why:"PTH raises calcium (bone resorption, renal Ca reabsorption, ↑calcitriol) while LOWERING phosphate by increasing its renal excretion.",p:"PTH = <b>↑calcium, ↓phosphate</b>. (Activates vitamin D → ↑gut Ca absorption.)"},
{m:"thy",q:"Hypercalcemia with LOW phosphate and an inappropriately HIGH PTH, usually from a parathyroid adenoma, is which disorder?",c:["Primary hyperparathyroidism","Secondary hyperparathyroidism","Hypoparathyroidism","Pseudohypoparathyroidism"],a:0,why:"Primary hyperparathyroidism (usually an adenoma) → high Ca, low phosphate, high PTH; symptoms are 'stones, bones, groans, and psychiatric overtones.'",p:"Primary hyperPTH = <b>↑Ca, ↓phos, ↑PTH</b> (adenoma). Stones, bones, groans, psych overtones."},
{m:"thy",q:"Which hormone increases the absorption of both calcium and phosphate from the gut?",c:["Vitamin D (calcitriol)","Calcitonin","Aldosterone","Atrial natriuretic peptide"],a:0,why:"Active vitamin D (calcitriol) increases gut absorption of calcium AND phosphate. PTH acts mainly on bone and kidney; calcitonin lowers calcium.",p:"<b>Vitamin D</b> = ↑ gut absorption of Ca AND phosphate. (PTH = bone/kidney; calcitonin = ↓Ca.)"},

/* ===== ADRENAL ===== */
{m:"adr",q:"The zona glomerulosa of the adrenal cortex produces which hormone?",c:["Aldosterone","Cortisol","Androgens","Epinephrine"],a:0,why:"Cortex zones (GFR → 'salt, sugar, sex'): Glomerulosa = aldosterone, Fasciculata = cortisol, Reticularis = androgens. Medulla = catecholamines.",p:"Cortex 'GFR' = <b>Glomerulosa→aldosterone, Fasciculata→cortisol, Reticularis→androgens</b> (salt, sugar, sex)."},
{m:"adr",q:"Central obesity, moon facies, purple abdominal striae, hypertension, and hyperglycemia from excess cortisol is which syndrome?",c:["Cushing syndrome","Addison disease","Conn syndrome","Pheochromocytoma"],a:0,why:"Cortisol excess → central obesity, moon facies, buffalo hump, striae, hypertension, hyperglycemia, easy bruising, proximal weakness, osteoporosis.",p:"Cortisol excess = <b>Cushing syndrome</b> (moon face, buffalo hump, striae, HTN, hyperglycemia)."},
{m:"adr",q:"The most common ENDOGENOUS cause of hypercortisolism — an ACTH-secreting pituitary adenoma — is specifically called what?",c:["Cushing disease","Cushing syndrome from steroids","Conn syndrome","Addison disease"],a:0,why:"Cushing DISEASE = hypercortisolism specifically from a pituitary ACTH-secreting adenoma (the most common endogenous cause). Exogenous steroids are the most common cause overall.",p:"Cushing DISEASE = <b>pituitary ACTH adenoma</b> (top endogenous cause). Exogenous steroids = top overall."},
{m:"adr",q:"Fatigue, hypotension, hyperpigmentation, and hyperkalemia from destruction of the adrenal cortex is which disease?",c:["Addison disease","Cushing syndrome","Conn syndrome","Pheochromocytoma"],a:0,why:"Addison disease (primary adrenal insufficiency) → low cortisol AND aldosterone → fatigue, hypotension, hyponatremia, hyperkalemia, and hyperpigmentation (high ACTH/MSH).",p:"Addison = primary adrenal insufficiency: <b>↓cortisol + ↓aldosterone</b>, hyperpigmentation, hyperkalemia, hypotension."},
{m:"adr",q:"Hypertension with hypokalemia and metabolic alkalosis from an aldosterone-secreting adrenal adenoma (with LOW renin) is which condition?",c:["Primary hyperaldosteronism (Conn syndrome)","Addison disease","Cushing disease","Pheochromocytoma"],a:0,why:"Conn syndrome = autonomous aldosterone → sodium/water retention (HTN), potassium and hydrogen loss (hypokalemia, metabolic alkalosis), with SUPPRESSED renin.",p:"Conn = primary hyperaldosteronism: <b>HTN + hypokalemia + low renin</b> (high aldosterone:renin ratio)."},
{m:"adr",q:"Episodic headaches, palpitations, sweating, and paroxysmal hypertension from a catecholamine-secreting adrenal MEDULLA tumor is which condition?",c:["Pheochromocytoma","Conn syndrome","Cushing syndrome","Hypothyroidism"],a:0,why:"Pheochromocytoma (chromaffin-cell tumor) secretes catecholamines → episodic hypertension, headache, palpitations, diaphoresis; diagnose with plasma/urine metanephrines.",p:"Pheochromocytoma = episodic HTN + headache + sweating + palpitations. Dx: <b>metanephrines</b>; α-block BEFORE β-block."},
{m:"adr",q:"The most common congenital adrenal hyperplasia — causing virilization and salt-wasting from impaired cortisol and aldosterone synthesis — is a deficiency of which enzyme?",c:["21-hydroxylase","11-beta-hydroxylase","17-alpha-hydroxylase","Aromatase"],a:0,why:"21-hydroxylase deficiency (most common CAH) → low cortisol and aldosterone, shunting precursors to androgens → virilization + salt-wasting; 17-OH-progesterone is elevated.",p:"CAH (most common) = <b>21-hydroxylase</b> deficiency: ↓cortisol/aldosterone, ↑androgens (virilization), salt-wasting, ↑17-OHP."},
{m:"adr",q:"The adrenal MEDULLA secretes catecholamines from which cells, which are derived from neural crest?",c:["Chromaffin cells","Zona glomerulosa cells","Hürthle cells","Kupffer cells"],a:0,why:"Chromaffin cells of the adrenal medulla (neural crest-derived, essentially postganglionic sympathetic neurons) secrete epinephrine and norepinephrine.",p:"Adrenal medulla = <b>chromaffin cells</b> (neural crest) → epinephrine/norepinephrine."},

/* ===== PANCREAS & GLUCOSE ===== */
{m:"panc",q:"Insulin, released from pancreatic beta cells, lowers blood glucose largely by recruiting which glucose transporter in muscle and fat?",c:["GLUT4","GLUT2","GLUT1","SGLT2"],a:0,why:"Insulin triggers GLUT4 translocation to the membrane in muscle and adipose tissue → glucose uptake. (GLUT2 is the insulin-independent sensor in beta cells and liver.)",p:"Insulin → <b>GLUT4</b> in muscle + fat. (Beta cells/liver use insulin-independent GLUT2.)"},
{m:"panc",q:"Which pancreatic hormone, from alpha cells, RAISES blood glucose via glycogenolysis and gluconeogenesis?",c:["Glucagon","Insulin","Somatostatin","Amylin"],a:0,why:"Glucagon (alpha cells) opposes insulin: it stimulates hepatic glycogenolysis and gluconeogenesis to raise blood glucose during fasting.",p:"<b>Glucagon</b> (alpha cells) = ↑glucose (glycogenolysis + gluconeogenesis). Opposes insulin."},
{m:"panc",q:"Autoimmune destruction of pancreatic beta cells causing absolute insulin deficiency, often presenting in youth with ketoacidosis, is which type of diabetes?",c:["Type 1 diabetes","Type 2 diabetes","Gestational diabetes","Maturity-onset diabetes of the young"],a:0,why:"Type 1 diabetes = autoimmune beta-cell destruction (anti-GAD, islet-cell antibodies) → absolute insulin deficiency; presents younger and is prone to DKA.",p:"Type 1 = <b>autoimmune beta-cell loss</b> (anti-GAD), absolute insulin deficiency, DKA-prone, younger."},
{m:"panc",q:"Insulin resistance with relative insulin deficiency, associated with obesity and presenting in adults, is which type of diabetes?",c:["Type 2 diabetes","Type 1 diabetes","Type 1.5 (LADA)","Neonatal diabetes"],a:0,why:"Type 2 diabetes = peripheral insulin resistance + relative insulin deficiency; linked to obesity/metabolic syndrome; prone to hyperosmolar hyperglycemic state.",p:"Type 2 = <b>insulin resistance</b> + relative deficiency, obesity, adults, HHS-prone."},
{m:"panc",q:"Hyperglycemia with ketone production, an anion-gap metabolic acidosis, Kussmaul respirations, and a fruity breath odor, typically in type 1 diabetes, is what?",c:["Diabetic ketoacidosis","Hyperosmolar hyperglycemic state","Hypoglycemia","Lactic acidosis"],a:0,why:"DKA = insulin deficiency → lipolysis → ketone bodies → anion-gap acidosis, Kussmaul breathing, fruity breath, dehydration; treat with fluids, insulin, and potassium.",p:"DKA (type 1) = ketones + anion-gap acidosis + Kussmaul + fruity breath. Tx: <b>fluids + insulin + K⁺</b>."},
{m:"panc",q:"Profound hyperglycemia with very high serum osmolality and altered mental status, but WITHOUT significant ketosis, typically in type 2 diabetes, is what?",c:["Hyperosmolar hyperglycemic state","Diabetic ketoacidosis","Hypoglycemia","Diabetes insipidus"],a:0,why:"HHS = extreme hyperglycemia and hyperosmolarity with enough insulin to suppress ketogenesis → no significant ketones; severe dehydration and altered mental status.",p:"HHS (type 2) = extreme hyperglycemia + hyperosmolarity + AMS, <b>minimal ketones</b>. Aggressive fluids."},
{m:"panc",q:"Retinopathy, nephropathy, and peripheral neuropathy in diabetes are examples of which category of complication?",c:["Microvascular complications","Macrovascular complications","Acute metabolic complications","Infectious complications"],a:0,why:"Chronic hyperglycemia (sorbitol accumulation, non-enzymatic glycation) damages small vessels → retinopathy, nephropathy, neuropathy (microvascular). Macrovascular = CAD, stroke, PAD.",p:"Microvascular = <b>retinopathy, nephropathy, neuropathy</b> (sorbitol + glycation). Macrovascular = CAD/stroke/PAD."},
{m:"panc",q:"Which test reflects the average blood glucose over the preceding ~3 months and is used to diagnose and monitor diabetes?",c:["Hemoglobin A1c","Fasting C-peptide","Random urine glucose","Fructosamine over 1 week"],a:0,why:"HbA1c reflects ~3 months of glycemia (RBC lifespan); ≥6.5% diagnoses diabetes. Target is usually <7% in treated patients.",p:"<b>HbA1c</b> = ~3-month average glucose. ≥6.5% = diabetes; goal usually <7%."},

/* ===== PITUITARY & OTHER ===== */
{m:"pit",q:"Enlarged hands, feet, and jaw with coarsened facial features in an adult, from a growth-hormone-secreting pituitary tumor, is which condition?",c:["Acromegaly","Gigantism","Cushing disease","Prolactinoma"],a:0,why:"Excess GH AFTER growth plates fuse → acromegaly (enlarging hands/feet/jaw, coarse features, organomegaly, glucose intolerance); diagnose with IGF-1 and a glucose suppression test. Before fusion → gigantism.",p:"Acromegaly = GH excess in ADULTS (↑IGF-1). Big hands/jaw/feet. Before growth-plate fusion = gigantism."},
{m:"pit",q:"Amenorrhea, galactorrhea, and low libido from the most common functional pituitary tumor, treated with dopamine agonists, indicate what?",c:["Prolactinoma","Acromegaly","Cushing disease","Craniopharyngioma"],a:0,why:"Prolactinoma (most common functional pituitary adenoma) → high prolactin → amenorrhea/galactorrhea and low libido; first-line therapy is a dopamine agonist (cabergoline/bromocriptine).",p:"Prolactinoma = most common pituitary tumor → amenorrhea/galactorrhea. Tx: <b>dopamine agonist</b> (cabergoline)."},
{m:"pit",q:"Large volumes of dilute urine with high serum osmolality, due to a DEFICIENCY of ADH and corrected by desmopressin, is which type of diabetes insipidus?",c:["Central diabetes insipidus","Nephrogenic diabetes insipidus","Primary polydipsia","SIADH"],a:0,why:"Central DI = inadequate ADH production (pituitary/hypothalamic injury) → dilute polyuria and hypernatremia; it CORRECTS with desmopressin.",p:"Central DI = <b>no ADH</b> → responds to desmopressin. (Nephrogenic = ADH resistance, no response.)"},
{m:"pit",q:"Diabetes insipidus caused by renal RESISTANCE to ADH (for example from lithium), which does NOT respond to desmopressin, is which type?",c:["Nephrogenic diabetes insipidus","Central diabetes insipidus","SIADH","Primary polydipsia"],a:0,why:"Nephrogenic DI = kidneys don't respond to ADH (lithium, hypercalcemia, hereditary V2 defect) → dilute polyuria that does NOT improve with desmopressin; treat with thiazides/amiloride.",p:"Nephrogenic DI = <b>ADH resistance</b> (lithium, hypercalcemia). No desmopressin response; use thiazides."},
{m:"pit",q:"Euvolemic hyponatremia with inappropriately concentrated urine, from EXCESS ADH (e.g., small cell lung cancer), is what?",c:["SIADH","Diabetes insipidus","Conn syndrome","Addison disease"],a:0,why:"SIADH = too much ADH → water retention → euvolemic hyponatremia with concentrated urine; causes include small cell lung cancer, CNS disease, and drugs. Treat with fluid restriction.",p:"SIADH = <b>too much ADH</b> → euvolemic hyponatremia, concentrated urine. Causes: small cell lung CA, CNS, drugs."},
{m:"pit",q:"Tumors of the pituitary, parathyroid, and pancreas (the '3 P's') characterize which inherited syndrome?",c:["MEN 1","MEN 2A","MEN 2B","McCune-Albright syndrome"],a:0,why:"MEN 1 (MEN1 gene) = Pituitary adenoma, Parathyroid hyperplasia, and Pancreatic endocrine tumors (gastrinoma, insulinoma) — the 3 P's.",p:"MEN 1 = <b>3 P's</b> (Pituitary, Parathyroid, Pancreas). MEN1 gene."},
{m:"pit",q:"Medullary thyroid carcinoma, pheochromocytoma, and parathyroid hyperplasia, from a RET mutation, characterize which syndrome?",c:["MEN 2A","MEN 1","MEN 2B","Von Hippel-Lindau disease"],a:0,why:"MEN 2A (RET mutation) = Medullary thyroid carcinoma + Pheochromocytoma + Parathyroid hyperplasia. MEN 2B swaps parathyroid for mucosal neuromas/marfanoid habitus.",p:"MEN 2A = <b>Medullary thyroid CA + Pheo + Parathyroid</b> (RET). MEN 2B = medullary + pheo + mucosal neuromas."},
{m:"pit",q:"Prolactin is unique among the pituitary hormones because it is under TONIC INHIBITION by which hypothalamic factor?",c:["Dopamine","Somatostatin","GnRH","TRH"],a:0,why:"Dopamine tonically inhibits prolactin; that is why dopamine antagonists (antipsychotics) and pituitary stalk damage cause hyperprolactinemia, and dopamine agonists treat prolactinomas.",p:"Prolactin is tonically INHIBITED by <b>dopamine</b>. Block dopamine (antipsychotics) → ↑prolactin."}
];

const VAULT=[
{t:"Pituitary Hormones",b:"<b>Anterior (FLAT PiG):</b> FSH, LH, ACTH, TSH, Prolactin, GH. <b>Posterior</b> (made in hypothalamus, stored posteriorly): ADH + oxytocin.",g:"Axes"},
{t:"Signaling / Second Messengers",b:"<b>cAMP (FLAT ChAMP):</b> FSH, LH, ACTH, TSH, CRH, hCG, ADH-V2, MSH, PTH, calcitonin, GHRH, glucagon. <b>Steroid + thyroid</b> = intracellular/nuclear. <b>Insulin/IGF/GH</b> = receptor tyrosine kinase. Only the FREE hormone is active.",g:"Axes"},
{t:"Adrenal Cortex (GFR)",b:"<b>G</b>lomerulosa → aldosterone, <b>F</b>asciculata → cortisol, <b>R</b>eticularis → androgens ('salt, sugar, sex'). Medulla = catecholamines (chromaffin cells, neural crest).",g:"Adrenal"},
{t:"Cortisol Disorders",b:"<b>Cushing</b> = excess cortisol (moon face, striae, HTN, hyperglycemia; Cushing DISEASE = pituitary ACTH adenoma). <b>Addison</b> = primary insufficiency (↓cortisol+aldosterone, hyperpigmentation, hyperkalemia). <b>Conn</b> = primary hyperaldosteronism (HTN + hypokalemia + low renin).",g:"Adrenal"},
{t:"Congenital Adrenal Hyperplasia",b:"<b>21-hydroxylase</b> (most common): ↓cortisol/aldosterone, ↑androgens (virilization), salt-wasting, ↑17-OHP. <b>11β-hydroxylase</b>: HTN + virilization. <b>17α-hydroxylase</b>: HTN + low androgens.",g:"Adrenal"},
{t:"Pheochromocytoma",b:"Catecholamine tumor → episodic HTN, headache, sweating, palpitations. 'Rule of 10s.' Dx = plasma/urine <b>metanephrines</b>. Treat with <b>α-blockade (phenoxybenzamine) BEFORE β-blockade</b>.",g:"Adrenal"},
{t:"Thyroid Autoimmune",b:"<b>Graves</b> = hyper, TSI (anti-TSHR Ab), exophthalmos + pretibial myxedema. <b>Hashimoto</b> = hypo, anti-TPO, lymphocytic infiltrate (↑lymphoma risk). Synthesis enzyme = thyroid peroxidase (PTU/methimazole).",g:"Thyroid"},
{t:"Thyroid Labs",b:"<b>Primary hyper</b> = ↓TSH, ↑free T4. <b>Primary hypo</b> = ↑TSH, ↓free T4. TSH is the best screening test. PTU also blocks peripheral T4→T3 (preferred in pregnancy 1st trimester + thyroid storm).",g:"Thyroid"},
{t:"Calcium Regulation",b:"<b>PTH</b>: ↑Ca, ↓phosphate (bone resorption, renal Ca reabsorption + phosphate excretion, ↑calcitriol). <b>Vitamin D</b>: ↑gut Ca AND phosphate. <b>Calcitonin</b>: ↓Ca (minor). Primary hyperPTH = ↑Ca/↓phos/↑PTH.",g:"Parathyroid"},
{t:"Pancreatic Islet Cells",b:"<b>Beta</b> = insulin (↓glucose, GLUT4 in muscle/fat). <b>Alpha</b> = glucagon (↑glucose). <b>Delta</b> = somatostatin (inhibits both). Insulin & C-peptide released together (C-peptide low in exogenous insulin use).",g:"Pancreas"},
{t:"Type 1 vs Type 2 Diabetes",b:"<b>Type 1</b> = autoimmune beta-cell loss (anti-GAD), absolute deficiency, young, DKA-prone. <b>Type 2</b> = insulin resistance + relative deficiency, obesity, adults, HHS-prone. Dx: HbA1c ≥6.5%.",g:"Pancreas"},
{t:"DKA vs HHS",b:"<b>DKA</b> (type 1): ketones + anion-gap acidosis, Kussmaul, fruity breath. <b>HHS</b> (type 2): extreme hyperglycemia + hyperosmolarity, minimal ketones, AMS. Both: fluids + insulin + replace K⁺ (insulin drives K⁺ into cells).",g:"Pancreas"},
{t:"Pituitary Tumors & ADH",b:"<b>Prolactinoma</b> (most common → dopamine agonist). <b>GH adenoma</b> (acromegaly/gigantism, ↑IGF-1). <b>Central DI</b> = no ADH (desmopressin works) vs <b>nephrogenic DI</b> = ADH resistance (lithium; no response). <b>SIADH</b> = excess ADH, euvolemic hyponatremia.",g:"Pituitary"}
];

const MODES={
  daily:{name:"Daily Panel",ic:"🧬",desc:"15 random questions across all of endocrine. Quick warm-up.",pick:()=>shuffle([...QBANK]).slice(0,15)},
  endless:{name:"Endless Assay",ic:"♾️",desc:"Survival mode — answer until you miss. Beat the streak.",endless:true,pick:()=>shuffle([...QBANK])},
  axis:{name:"Glands, Hormones & Axes",ic:"🦴",desc:"The foundation: pituitary hormones, the HPA axis, receptors, and feedback.",pick:()=>shuffle(QBANK.filter(q=>q.m==="axis"))},
  thy:{name:"Thyroid & Parathyroid",ic:"🦋",desc:"Graves vs Hashimoto, hormone synthesis, and calcium regulation (PTH/vitamin D).",pick:()=>shuffle(QBANK.filter(q=>q.m==="thy"))},
  adr:{name:"Adrenal",ic:"🔺",desc:"Cortex zones, Cushing/Addison/Conn, CAH, and pheochromocytoma.",pick:()=>shuffle(QBANK.filter(q=>q.m==="adr"))},
  panc:{name:"Pancreas & Glucose",ic:"🍬",desc:"Insulin/glucagon, type 1 vs type 2, and DKA vs HHS.",pick:()=>shuffle(QBANK.filter(q=>q.m==="panc"))},
  pit:{name:"Pituitary & Other",ic:"🧠",desc:"Acromegaly, prolactinoma, the DIs vs SIADH, and the MEN syndromes.",pick:()=>shuffle(QBANK.filter(q=>q.m==="pit"))}
};
const MODE_TAGS={axis:"Glands / Hormones / Axes",thy:"Thyroid / Parathyroid",adr:"Adrenal",panc:"Pancreas / Glucose",pit:"Pituitary / Other"};

const SAVE_KEY="hormone_hunter_v2";
let save=load();
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{best:{},endlessBest:0,played:0}}catch(e){return{best:{},endlessBest:0,played:0}}}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save))}catch(e){}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let session=null;
const app=document.getElementById("app");

function menu(){
  session=null;const m=MODES;
  app.innerHTML=`
  <div class="hdr">
    <div class="badge">Hh</div>
    <h1>HORMONE HUNTER</h1>
    <div class="sub">Endocrine System — ${QBANK.length} questions</div>
  </div>
  <div class="section-label">Quick Play</div>
  <div class="grid">${tile("daily",m.daily,"")}${tile("endless",m.endless,"amber")}</div>
  <div class="section-label">Topic Drills</div>
  <div class="grid">
    ${tile("axis",m.axis,"special")}${tile("thy",m.thy,"")}${tile("adr",m.adr,"")}${tile("panc",m.panc,"")}${tile("pit",m.pit,"")}
  </div>
  <div class="section-label">Reinforce</div>
  <div class="grid">
    <div class="tile amber" onclick="vault()">
      <div class="ic">💎</div><h3>Dirty Medicine Vault</h3>
      <p>The catchy endo tools — FLAT PiG, the GFR cortex, Graves vs Hashimoto, DKA vs HHS, the MEN syndromes, and more.</p>
      <div class="meta">${VAULT.length} memory tools</div>
    </div>
  </div>
  <footer>Saves to this browser via localStorage · ${save.played||0} rounds · Endless best: ${save.endlessBest||0}</footer>`;
}
function tile(key,mode,cls){
  const best=key==="endless"?(save.endlessBest||0):(save.best[key]!=null?save.best[key]+"%":"—");
  const bestLbl=key==="endless"?`Best streak: ${best}`:`Best: ${best}`;
  return `<div class="tile ${cls}" onclick="start('${key}')"><div class="ic">${mode.ic}</div><h3>${mode.name}</h3><p>${mode.desc}</p><div class="meta">${bestLbl}</div></div>`;
}
function start(key){const mode=MODES[key];const qs=mode.pick();session={key,mode,qs,i:0,correct:0,streak:0,answered:false};renderQ();}
function renderQ(){
  const s=session;
  if(!s.mode.endless&&s.i>=s.qs.length)return results();
  if(s.mode.endless&&s.i>=s.qs.length){s.qs=shuffle([...QBANK]);s.i=0;}
  const q=s.qs[s.i];
  const order=shuffle(q.c.map((t,idx)=>({t,idx})));
  s.order=order;s.correctPos=order.findIndex(o=>o.idx===q.a);
  const total=s.mode.endless?"∞":s.qs.length;const num=s.i+1;
  const pct=s.mode.endless?Math.min(100,(s.streak%15)/15*100):(num-1)/s.qs.length*100;
  const tag=MODE_TAGS[q.m]||"Mixed";
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="quiz-top"><span class="qcount">Q ${num} / ${total}</span><span class="streak">🔥 Streak ${s.streak}</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <span class="modtag">${tag}</span>
    <div class="stem">${q.q}</div>
    <div class="choices" id="ch">${order.map((o,i)=>`<div class="choice" data-i="${i}" onclick="answer(${i})"><span class="k">${String.fromCharCode(65+i)}</span><span>${o.t}</span></div>`).join("")}</div>
    <div id="post"></div>`;
}
function answer(pos){
  const s=session;if(s.answered)return;s.answered=true;
  const q=s.qs[s.i];const correct=pos===s.correctPos;
  document.querySelectorAll(".choice").forEach((n,i)=>{n.classList.add("disabled");if(i===s.correctPos)n.classList.add("correct");if(i===pos&&!correct)n.classList.add("wrong");});
  if(correct){s.correct++;s.streak++;}else{s.streak=0;}
  const post=document.getElementById("post");
  const pearl=q.p?`<div class="pearl"><b>💎 Pearl:</b> ${q.p}</div>`:"";
  post.innerHTML=`<div class="explain ${correct?"":"miss"}"><div class="lab">${correct?"✔ Correct":"✕ Review"}</div><div class="why">${q.why}</div>${pearl}</div>`;
  if(s.mode.endless&&!correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}post.innerHTML+=`<button class="btn btn-ghost" onclick="results()">End Run — Streak ${s.correct}</button>`;return;}
  if(s.mode.endless&&correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}}
  post.innerHTML+=`<button class="btn btn-next" onclick="nextQ()">${(!s.mode.endless&&s.i+1>=s.qs.length)?"SEE RESULTS":"NEXT ›"}</button>`;
}
function nextQ(){session.i++;session.answered=false;renderQ();}
function results(){
  const s=session;const got=s.correct;
  const pctNum=s.mode.endless?null:Math.round(got/s.qs.length*100);
  if(!s.mode.endless){save.best[s.key]=Math.max(save.best[s.key]||0,pctNum);}
  save.played=(save.played||0)+1;persist();
  let rank,col;const p=s.mode.endless?Math.min(100,got*5):pctNum;
  if(p>=90){rank="ATTENDING — DOMINATED";col="var(--green)"}
  else if(p>=75){rank="RESIDENT — SOLID";col="var(--cyan)"}
  else if(p>=55){rank="INTERN — GETTING THERE";col="var(--amber-hi)"}
  else{rank="MS1 — DRILL AGAIN";col="var(--red)"}
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="result">
      <div class="score-big" style="color:${col}">${s.mode.endless?got:pctNum+"%"}</div>
      <div class="rank" style="color:${col}">${s.mode.endless?"STREAK: "+got:rank}</div>
      <div class="statrow">
        <div><b>${got}</b>${s.mode.endless?"in a row":"correct"}</div>
        ${s.mode.endless?"":`<div><b>${s.qs.length-got}</b>missed</div>`}
        <div><b>${s.mode.endless?(save.endlessBest||0):(save.best[s.key]+"%")}</b>best</div>
      </div>
      <button class="btn btn-next" style="max-width:300px;margin:0 auto" onclick="start('${s.key}')">RUN IT AGAIN</button>
      <button class="btn btn-ghost" style="max-width:300px;margin:14px auto 0" onclick="menu()">BACK TO MENU</button>
    </div>`;
}
function vault(){
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="hdr" style="padding-top:6px">
      <h1 style="color:var(--amber-hi);font-size:28px">💎 Dirty Medicine Vault</h1>
      <div class="sub">Endocrine memory tools — catchy on purpose</div>
    </div>
    ${VAULT.map(v=>`<div class="vault-card"><h4>${v.t}</h4><p>${v.b}</p><span class="tag">▸ ${v.g}</span></div>`).join("")}
    <button class="btn btn-ghost" style="width:100%" onclick="menu()">BACK TO MENU</button>`;
}
document.addEventListener("keydown",e=>{
  if(!session||session.answered)return;
  const map={"1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3};
  const k=e.key.toLowerCase();
  if(map[k]!=null&&session.order&&map[k]<session.order.length)answer(map[k]);
});
</script>
<script src="arcade_upgrade.js"></script>
<script>
menu();
</script>
</body>
</html>
