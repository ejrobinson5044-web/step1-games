<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Visual Memory Recall — Step 1 Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080c;--panel:#15151f;--panel-hi:#1e1e2b;--text:#eef0f7;--dim:#8b8aa3;--line:rgba(255,255,255,.09);--cyan:#22d3ee;--amber:#fbbf24;--green:#34d399;--red:#f87171;--purple:#a78bfa}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Hanken Grotesk',sans-serif;overflow-x:hidden}
body{background:radial-gradient(ellipse 70% 45% at 50% -10%,rgba(167,139,250,.14),transparent 60%),radial-gradient(ellipse 55% 40% at 95% 85%,rgba(34,211,238,.09),transparent 55%),linear-gradient(180deg,#08080c,#0e0e16)}
.wrap{max-width:980px;margin:0 auto;padding:18px 18px 54px;position:relative;z-index:1}.nav{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}.back{font-family:'JetBrains Mono';font-size:11px;letter-spacing:1px;color:var(--dim);text-decoration:none}.back:hover{color:var(--cyan)}
.hdr{text-align:center;padding:18px 0 20px;border-bottom:1px solid var(--line);margin-bottom:18px}.badge{display:inline-flex;align-items:center;justify-content:center;width:64px;height:64px;border-radius:17px;background:linear-gradient(135deg,var(--purple),var(--cyan));color:#08080c;font-family:'Unbounded';font-weight:800;font-size:28px;margin-bottom:10px;box-shadow:0 0 32px rgba(167,139,250,.22)}
h1{font-family:'Unbounded';font-size:clamp(30px,6vw,50px);line-height:1;color:var(--text)}.sub{color:var(--dim);font-size:14px;line-height:1.45;margin:10px auto 0;max-width:720px}.mini{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.panel{background:rgba(21,21,31,.75);border:1px solid var(--line);border-radius:16px;padding:18px;margin-top:16px}.topline{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.bar{height:7px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden;margin:14px 0 18px}.bar span{display:block;height:100%;background:linear-gradient(90deg,var(--purple),var(--cyan),var(--amber));transition:.2s}.tag{display:inline-flex;font-family:'JetBrains Mono';font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--cyan);border:1px solid rgba(34,211,238,.32);border-radius:999px;padding:4px 10px;margin:10px 0 12px}.prompt{font-size:19px;line-height:1.5;margin-bottom:16px}.scene{border:1px solid var(--line);border-radius:18px;background:radial-gradient(circle at 25% 20%,rgba(167,139,250,.16),transparent 30%),rgba(255,255,255,.035);padding:18px;margin-bottom:16px;display:grid;grid-template-columns:110px 1fr;gap:15px;align-items:center}.scene-art{height:110px;border-radius:16px;background:linear-gradient(135deg,rgba(34,211,238,.18),rgba(167,139,250,.14));display:flex;align-items:center;justify-content:center;font-size:50px;border:1px solid rgba(255,255,255,.09)}.scene b{display:block;font-family:'Unbounded';font-size:18px;line-height:1.15}.scene span{display:block;color:var(--dim);font-size:13px;line-height:1.45;margin-top:8px}.symbols{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.symbols i{font-style:normal;border:1px solid var(--line);border-radius:999px;padding:5px 9px;color:var(--amber);font-family:'JetBrains Mono';font-size:11px;background:rgba(251,191,36,.055)}.choices{display:grid;gap:10px}.choice{width:100%;text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px 15px;color:var(--text);font:inherit;cursor:pointer;display:flex;gap:12px}.choice:hover{border-color:var(--cyan);background:var(--panel-hi)}.choice.disabled{pointer-events:none;opacity:.9}.choice.correct{border-color:var(--green);background:rgba(52,211,153,.12)}.choice.wrong{border-color:var(--red);background:rgba(248,113,113,.12)}.key{font-family:'JetBrains Mono';color:var(--cyan);font-size:13px;flex:0 0 auto}.explain{margin-top:16px;border-left:3px solid var(--cyan);background:rgba(255,255,255,.045);border-radius:12px;padding:14px 15px;line-height:1.5}.explain.miss{border-left-color:var(--red)}.explain b{color:var(--amber)}.pearl{margin-top:10px;border:1px dashed rgba(251,191,36,.45);border-radius:10px;padding:10px 12px;background:rgba(251,191,36,.07)}.btn{display:inline-flex;align-items:center;justify-content:center;width:100%;border:0;border-radius:12px;padding:13px 16px;margin-top:14px;background:linear-gradient(135deg,var(--purple),var(--cyan));color:#08080c;font-weight:900;font-family:'Hanken Grotesk';cursor:pointer;text-decoration:none}.btn.ghost{background:transparent;color:var(--dim);border:1px solid var(--line)}.score{font-family:'Unbounded';font-size:64px;line-height:1;text-align:center}.rank{text-align:center;font-family:'JetBrains Mono';letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-top:10px}.statrow{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;margin:20px 0}.statrow div{min-width:120px;border:1px solid var(--line);border-radius:12px;padding:11px;background:rgba(255,255,255,.035);font-family:'JetBrains Mono';font-size:11px;color:var(--dim)}.statrow b{display:block;color:var(--text);font-size:24px;font-family:'Unbounded';line-height:1.1}.version{position:fixed;right:10px;bottom:10px;z-index:20;border:1px solid var(--line);border-radius:999px;background:rgba(8,8,12,.76);backdrop-filter:blur(10px);color:var(--dim);font-family:'JetBrains Mono';font-size:10px;letter-spacing:1px;padding:5px 9px}
@media(max-width:640px){.wrap{padding:14px}.scene{grid-template-columns:1fr}.scene-art{height:90px}.prompt{font-size:17px}.score{font-size:50px}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div class="version" id="versionBadge">Push 005</div>
<script src="app_version.js?v=push-005"></script>
<script>
const SAVE_KEY="visual_memory_recall_v1";
const QBANK=[
  {mode:"Micro visual", icon:"🧱", scene:"Gram-positive wall city", symbols:["thick wall","purple bricks","toxin tower"], q:"A visual scene shows a thick purple cell wall and toxin-producing bacteria. Which broad organism category does this best cue?", c:["Gram-positive bacteria","Gram-negative bacteria","Acid-fast bacteria","Spirochetes"], a:0, why:"A thick peptidoglycan wall that retains crystal violet is the core recognition cue for Gram-positive organisms.", p:"Visual cue: purple/thick wall = Gram-positive framework before narrowing to cocci vs rods."},
  {mode:"Micro visual", icon:"🛡️", scene:"Capsule shield outside the bug", symbols:["outer capsule","anti-phagocyte shield","slippery coat"], q:"A protective outer capsule in a visual mnemonic should make you think of what virulence function?", c:["Avoiding phagocytosis","Blocking folate synthesis","Inhibiting protein synthesis","Producing IgA protease only"], a:0, why:"Capsules are classic anti-phagocytic virulence factors and are important for organisms like S. pneumoniae, H. influenzae type b, N. meningitidis, Klebsiella, and others.", p:"Capsule = slippery shield from phagocytes."},
  {mode:"Pharm visual", icon:"🚦", scene:"Beta-blocker traffic stop", symbols:["blocked beta sign","slow heart","lower renin"], q:"A visual scene with a blocked beta receptor, slower heart rate, and lower renin most directly cues which drug class?", c:["Beta blockers","Calcium channel blockers","ACE inhibitors","Loop diuretics"], a:0, why:"Beta blockers decrease heart rate/contractility through beta-1 blockade and also reduce renin release from juxtaglomerular cells.", p:"Beta-1 lives in heart and kidney: slow the heart, lower renin."},
  {mode:"Pharm visual", icon:"💧", scene:"Loop waterfall in the thick ascending limb", symbols:["Na-K-2Cl pump","big diuresis","ototoxic bell"], q:"A visual mnemonic showing the Na-K-2Cl transporter in the thick ascending limb should point to which diuretic class?", c:["Loop diuretics","Thiazide diuretics","Potassium-sparing diuretics","Carbonic anhydrase inhibitors"], a:0, why:"Loop diuretics inhibit NKCC2 in the thick ascending limb, producing strong diuresis and possible ototoxicity.", p:"Loop = loud/big diuresis at NKCC2."},
  {mode:"Micro visual", icon:"🧫", scene:"Catalase bubble test", symbols:["bubbles","hydrogen peroxide","staph clue"], q:"A bubbling hydrogen peroxide symbol in a bacterial scene most directly represents which test?", c:["Catalase test","Coagulase test","Optochin sensitivity","Bile solubility"], a:0, why:"Catalase-positive organisms break down hydrogen peroxide into water and oxygen, producing bubbles.", p:"Catalase = bubbles. Use it early to separate staphylococci from streptococci."},
  {mode:"Pharm visual", icon:"🧠", scene:"Dopamine-serotonin scale", symbols:["D2 block","5-HT2A block","EPS warning"], q:"A scene emphasizing D2 receptor blockade with antipsychotic effects should make you watch for which adverse effect cluster?", c:["Extrapyramidal symptoms and hyperprolactinemia","Ototoxicity and nephrotoxicity","Hemorrhagic cystitis","Disulfiram-like reaction"], a:0, why:"D2 blockade in nigrostriatal pathways can cause EPS; tuberoinfundibular D2 blockade can increase prolactin.", p:"D2 blockade: psychosis down, dopamine side effects up."}
];
(function(){
  function appVersion(){return window.STEP1_APP_VERSION||{label:"Push 005",name:"Command Center"}}
  function versionLabel(){const v=appVersion();return v.name?`${v.label} · ${v.name}`:v.label}
  const vb=document.getElementById("versionBadge");if(vb)vb.textContent=versionLabel();
  const app=document.getElementById("app");
  let order=[...QBANK.keys()].sort(()=>Math.random()-.5), i=0, correct=0, answered=false, responses=[];
  function esc(v){return String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;")}
  function shell(){app.innerHTML=`<div class="nav"><a class="back" href="index.html">&lsaquo; COMMAND CENTER</a><span class="mini">Visual memory mode</span></div><div class="hdr"><div class="badge">🖼️</div><h1>Visual Memory Recall</h1><div class="sub">Image/scenario-first recall for Sketchy-style recognition without bundling proprietary Sketchy assets. Pair your own scenes with Step 1 questions.</div></div><div id="stage" class="panel"></div>`;renderQ()}
  function renderQ(){answered=false;if(i>=order.length)return results();const q=QBANK[order[i]], pct=(i/order.length)*100;document.getElementById("stage").innerHTML=`<div class="topline"><span class="mini">Q ${i+1} / ${order.length}</span><span class="mini">${esc(q.mode)}</span></div><div class="bar"><span style="width:${pct}%"></span></div><div class="scene"><div class="scene-art">${q.icon}</div><div><b>${esc(q.scene)}</b><span>Use the visual anchors first, then answer the Step 1 association.</span><div class="symbols">${q.symbols.map(s=>`<i>${esc(s)}</i>`).join("")}</div></div></div><span class="tag">Recognition → recall</span><div class="prompt">${q.q}</div><div class="choices">${q.c.map((c,idx)=>`<button class="choice" onclick="answer(${idx})"><span class="key">${String.fromCharCode(65+idx)}</span><span>${esc(c)}</span></button>`).join("")}</div><div id="post"></div>`}
  window.answer=function(pos){if(answered)return;answered=true;const q=QBANK[order[i]], ok=pos===q.a;if(ok)correct++;responses.push({q,ok,selected:q.c[pos]});document.querySelectorAll(".choice").forEach((n,idx)=>{n.classList.add("disabled");if(idx===q.a)n.classList.add("correct");if(idx===pos&&!ok)n.classList.add("wrong")});document.getElementById("post").innerHTML=`<div class="explain ${ok?"":"miss"}"><b>${ok?"Correct":"Review"}</b><br>${q.why}${ok?"":`<br><br><b>Your answer:</b> ${esc(q.c[pos])}<br><b>Best answer:</b> ${esc(q.c[q.a])}`}<div class="pearl"><b>Visual pearl:</b> ${q.p}</div></div><button class="btn" onclick="nextQ()">${i+1>=order.length?"SEE RESULTS":"NEXT ›"}</button>`}
  window.nextQ=function(){i++;renderQ()}
  function results(){const pct=Math.round(correct/order.length*100), missed=order.length-correct;document.getElementById("stage").innerHTML=`<div class="score">${pct}%</div><div class="rank">Visual Recall Complete</div><div class="statrow"><div><b>${correct}</b>correct</div><div><b>${missed}</b>missed</div><div><b>${order.length}</b>scenes</div></div><button class="btn" onclick="location.reload()">RUN AGAIN</button><a class="btn ghost" href="index.html">COMMAND CENTER</a>`}
  shell();
})();
</script>
</body>
</html>
