<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ANATOMY ATLAS — Gross Anatomy</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@600;700&family=Karla:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4efe4;
  --bg2:#e8e0cf;
  --panel:#fdfaf2;
  --panel-hi:#efe7d6;
  --cyan:#9a3412;        /* brick/rust primary (vintage plate ink) */
  --cyan-dim:#7c2d12;
  --amber:#1d4ed8;       /* ink-blue accent */
  --amber-hi:#1e40af;
  --red:#64748b;         /* slate used for WRONG */
  --green:#15803d;
  --text:#2c2418;
  --dim:#7a6f5c;
  --line:rgba(154,52,18,.16);
  --glow:rgba(154,52,18,.2);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Karla',sans-serif;min-height:100vh;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 17% 0%,rgba(154,52,18,.07),transparent 55%),
    radial-gradient(ellipse at 88% 100%,rgba(29,78,216,.05),transparent 55%),
    linear-gradient(180deg,#f4efe4,#e8e0cf);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:radial-gradient(var(--line) 1px,transparent 1px);
  background-size:24px 24px;
  mask-image:radial-gradient(ellipse at center,#000 32%,transparent 88%);opacity:.7;
}
#app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:18px}

.hdr{text-align:center;padding:18px 0 16px;border-bottom:2px solid var(--cyan-dim);margin-bottom:20px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:14px;
  background:linear-gradient(150deg,var(--cyan),var(--cyan-dim));color:#fdfaf2;
  font-family:'Lora';font-weight:700;font-size:26px;margin-bottom:8px;box-shadow:0 4px 18px var(--glow)}
h1{font-family:'Lora';font-weight:700;font-size:34px;letter-spacing:.2px;color:var(--cyan)}
.sub{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:5px;text-transform:uppercase}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:8px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden;box-shadow:0 1px 3px rgba(44,36,24,.06)}
.tile::after{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--cyan);opacity:.7}
.tile:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 22px rgba(44,36,24,.14)}
.tile.amber::after{background:var(--amber)}
.tile.special::after{background:linear-gradient(var(--amber),var(--cyan))}
.tile .ic{font-size:24px}
.tile h3{font-family:'Lora';font-weight:700;font-size:18px;margin:7px 0 5px;letter-spacing:.1px;line-height:1.25}
.tile p{font-size:12.5px;color:var(--dim);line-height:1.45}
.tile .meta{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan);margin-top:9px;letter-spacing:1px}
.tile.amber .meta{color:var(--amber-hi)}

.section-label{font-family:'JetBrains Mono';font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}

.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'JetBrains Mono';font-size:12px}
.qcount{color:var(--dim)}
.streak{color:var(--amber-hi)}
.bar{height:6px;background:#ddd3c2;border-radius:4px;overflow:hidden;margin-bottom:18px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:.3s}
.modtag{display:inline-block;font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--cyan-dim);border-radius:20px;padding:3px 11px;margin-bottom:14px;text-transform:uppercase}
.stem{font-size:18.5px;line-height:1.5;font-weight:500;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:11px}
.choice{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:.14s;font-size:15.5px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 1px 2px rgba(44,36,24,.04)}
.choice .k{font-family:'JetBrains Mono';font-size:13px;color:var(--cyan);font-weight:600;flex-shrink:0}
.choice:hover{border-color:var(--cyan);background:var(--panel-hi)}
.choice.correct{border-color:var(--green);background:rgba(21,128,61,.10)}
.choice.correct .k{color:var(--green)}
.choice.wrong{border-color:var(--red);background:rgba(100,116,139,.14)}
.choice.wrong .k{color:var(--red)}
.choice.disabled{pointer-events:none;opacity:.9}

.explain{margin-top:18px;border-radius:12px;padding:15px 16px;background:var(--panel);border-left:3px solid var(--cyan);animation:rise .25s ease;box-shadow:0 1px 3px rgba(44,36,24,.07)}
.explain.miss{border-left-color:var(--red)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.explain .lab{font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.explain .why{font-size:14.5px;line-height:1.5}
.pearl{margin-top:11px;background:rgba(29,78,216,.07);border:1px dashed var(--amber);border-radius:10px;padding:11px 13px;font-size:14px;line-height:1.5}
.pearl b{color:var(--amber-hi);font-family:'Lora';font-weight:700;font-size:13.5px}

.btn{font-family:'Lora';font-weight:700;letter-spacing:.2px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;font-size:16px;transition:.15s}
.btn-next{background:linear-gradient(145deg,var(--cyan),var(--cyan-dim));color:#fdfaf2;margin-top:18px;width:100%}
.btn-next:hover{box-shadow:0 4px 16px var(--glow)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--dim);margin-top:18px}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}

.result{text-align:center;padding:30px 16px}
.score-big{font-family:'Lora';font-weight:700;font-size:64px;color:var(--cyan);line-height:1}
.rank{font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:10px 0 22px}
.statrow{display:flex;justify-content:center;gap:30px;margin-bottom:24px}
.statrow div{font-family:'JetBrains Mono';font-size:12px;color:var(--dim)}
.statrow b{display:block;font-size:26px;color:var(--text);font-family:'Lora';font-weight:700}

.vault-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:12px;border-left:3px solid var(--amber);box-shadow:0 1px 3px rgba(44,36,24,.06)}
.vault-card h4{font-family:'Lora';font-weight:700;color:var(--amber-hi);font-size:17px;margin-bottom:7px;letter-spacing:.1px;line-height:1.25}
.vault-card p{font-size:14px;line-height:1.55;color:var(--text)}
.vault-card .tag{font-family:'JetBrains Mono';font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-top:7px}

.back{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:1px;display:inline-flex;gap:6px;align-items:center;margin-bottom:16px}
.back:hover{color:var(--cyan)}
footer{text-align:center;font-family:'JetBrains Mono';font-size:10px;color:var(--dim);margin:28px 0 8px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* correct = index into c[]; choices shuffle at render. Stems never contain the answer. */
const QBANK=[
/* ===== BRACHIAL PLEXUS & NERVE LESIONS ===== */
{m:"plex",q:"The brachial plexus is organized from proximal to distal as roots, trunks, divisions, cords, and what?",c:["Branches (terminal nerves)","Ganglia","Rami","Fascicles"],a:0,why:"Roots → Trunks → Divisions → Cords → Branches ('Randy Travis Drinks Cold Beer'), arising from spinal levels C5–T1.",p:"Plexus order = <b>Randy Travis Drinks Cold Beer</b>: Roots, Trunks, Divisions, Cords, Branches (C5–T1).",v:"A student is tracing the brachial plexus from C5-T1 outward and reaches the final named peripheral nerves. What is the last organizational level?"},
{m:"plex",q:"A patient cannot abduct the arm and has numbness over the lateral shoulder after an ANTERIOR shoulder dislocation. Which nerve is injured?",c:["Axillary nerve","Radial nerve","Median nerve","Musculocutaneous nerve"],a:0,why:"The axillary nerve (C5–C6) wraps the surgical neck of the humerus → injured by anterior dislocation or surgical-neck fracture → deltoid weakness (abduction 15–90°) and 'regimental badge' sensory loss.",p:"Axillary nerve = surgical neck / anterior dislocation → can't abduct + lateral shoulder numbness (deltoid).",v:"After an anterior shoulder dislocation, a patient cannot abduct the arm past 15 degrees and has numbness over the lateral shoulder. Which nerve is injured?"},
{m:"plex",q:"Wrist drop with loss of forearm, wrist, and finger EXTENSION after a midshaft humeral fracture indicates injury to which nerve?",c:["Radial nerve","Ulnar nerve","Median nerve","Axillary nerve"],a:0,why:"The radial nerve runs in the spiral groove of the midshaft humerus → fracture or 'Saturday night palsy' → wrist drop (extensors), with sensory loss over the dorsal hand.",p:"Radial nerve = midshaft humerus / Saturday-night palsy → <b>wrist drop</b> (loss of extension). 'BEST extensors.'",v:"After a midshaft humeral fracture, a patient has wrist drop and cannot extend the fingers. Which nerve is injured?"},
{m:"plex",q:"Thenar atrophy with loss of thumb opposition and numbness of the palmar lateral three-and-a-half fingers, as in carpal tunnel syndrome, points to which nerve?",c:["Median nerve","Ulnar nerve","Radial nerve","Axillary nerve"],a:0,why:"The median nerve is compressed at the carpal tunnel (or injured by supracondylar fracture) → thenar atrophy, lost opposition ('ape hand'), and sensory loss of the palmar lateral 3.5 digits; a proximal lesion gives the 'hand of benediction.'",p:"Median nerve = carpal tunnel/supracondylar → thenar atrophy, lateral 3.5 digits, 'ape hand'/benediction.",v:"A patient with carpal tunnel syndrome has thenar atrophy and numbness over the palmar lateral three-and-a-half digits. Which nerve is compressed?"},
{m:"plex",q:"A 'claw hand' with loss of finger abduction/adduction and numbness of the medial one-and-a-half fingers, after a medial epicondyle fracture, indicates which nerve?",c:["Ulnar nerve","Median nerve","Radial nerve","Musculocutaneous nerve"],a:0,why:"The ulnar nerve passes behind the medial epicondyle ('funny bone') and at the hook of the hamate → claw hand, loss of the interossei (finger ab/adduction), and sensory loss of the medial 1.5 digits.",p:"Ulnar nerve = medial epicondyle / hook of hamate → <b>claw hand</b>, lost finger ab/adduction, medial 1.5 digits.",v:"After a medial epicondyle fracture, a patient develops clawing and loses finger abduction/adduction. Which nerve is injured?"},
{m:"plex",q:"A 'winged scapula' (the medial scapula protrudes when pushing against a wall) after axillary lymph node dissection indicates injury to which nerve?",c:["Long thoracic nerve","Spinal accessory nerve","Dorsal scapular nerve","Axillary nerve"],a:0,why:"The long thoracic nerve (C5–C7) supplies the serratus anterior; injury (mastectomy/axillary surgery, stab wound) → winged scapula and inability to abduct the arm above horizontal.",p:"Winged scapula = <b>long thoracic nerve</b> (serratus anterior), injured in axillary surgery/mastectomy.",v:"After axillary lymph node dissection, a patient has medial scapular winging when pushing against a wall. Which nerve was injured?"},
{m:"plex",q:"A newborn's arm hangs adducted and internally rotated with the forearm pronated ('waiter's tip') after a difficult delivery. This UPPER-trunk (C5–C6) injury is called what?",c:["Erb palsy","Klumpke palsy","Carpal tunnel syndrome","Radial nerve palsy"],a:0,why:"Erb palsy = upper trunk (C5–C6) injury (birth trauma, fall on shoulder) → loss of deltoid/biceps/supraspinatus → 'waiter's tip' posture (adducted, internally rotated, pronated).",p:"Erb palsy = upper trunk C5–C6 → <b>waiter's tip</b> (adducted, internally rotated, pronated)."},
{m:"plex",q:"A LOWER-trunk (C8–T1) injury producing a 'total claw hand,' sometimes with Horner syndrome, from grabbing onto something during a fall, is called what?",c:["Klumpke palsy","Erb palsy","Wrist drop","Winged scapula"],a:0,why:"Klumpke palsy = lower trunk (C8–T1) injury (grabbing a branch in a fall, birth trauma) → intrinsic hand muscle loss ('total claw hand'); proximal T1 involvement can give Horner syndrome.",p:"Klumpke palsy = lower trunk C8–T1 → 'total claw hand' ± <b>Horner syndrome</b>."},

/* ===== UPPER LIMB ===== */
{m:"ul",q:"Which rotator cuff muscle initiates the first ~15° of arm abduction and is the one most commonly torn or impinged?",c:["Supraspinatus","Infraspinatus","Subscapularis","Teres minor"],a:0,why:"Rotator cuff = SItS: Supraspinatus (abduction; suprascapular nerve; most commonly torn), Infraspinatus (external rotation), teres minor (external rotation), Subscapularis (internal rotation).",p:"Rotator cuff = <b>SItS</b>. Supraspinatus = abduction, most commonly torn (suprascapular nerve)."},
{m:"ul",q:"Tenderness in the anatomical snuffbox after a fall on an outstretched hand suggests a fracture of which carpal bone (at risk for avascular necrosis)?",c:["Scaphoid","Lunate","Hamate","Trapezium"],a:0,why:"The scaphoid is the most commonly fractured carpal bone (FOOSH → snuffbox tenderness). Its retrograde blood supply means proximal fractures risk avascular necrosis; initial x-rays may be normal.",p:"Snuffbox tenderness after FOOSH = <b>scaphoid fracture</b> → AVN risk (retrograde supply). Splint even if x-ray normal."},
{m:"ul",q:"Which nerve innervates the biceps brachii and the other anterior arm flexors, and supplies sensation to the lateral forearm?",c:["Musculocutaneous nerve","Radial nerve","Median nerve","Ulnar nerve"],a:0,why:"The musculocutaneous nerve (C5–C7) supplies the anterior arm flexors (biceps, brachialis, coracobrachialis) → forearm flexion and supination; it continues as the lateral antebrachial cutaneous nerve.",p:"Musculocutaneous nerve = biceps/brachialis (flexion + supination) + lateral forearm sensation."},
{m:"ul",q:"Anterior dislocation of which carpal bone can acutely compress the median nerve and cause carpal tunnel symptoms?",c:["Lunate","Scaphoid","Pisiform","Capitate"],a:0,why:"The lunate dislocates anteriorly (e.g., FOOSH) into the carpal tunnel → acute median nerve compression. (The scaphoid is the most commonly fractured carpal bone.)",p:"Lunate dislocates anteriorly → acute <b>median nerve</b> compression (carpal tunnel). 'Lunate Loonies the median.'"},
{m:"ul",q:"Blood pressure is measured over which artery, which bifurcates into the radial and ulnar arteries at the elbow?",c:["Brachial artery","Axillary artery","Radial artery","Subclavian artery"],a:0,why:"The brachial artery runs medially down the arm into the antecubital fossa (where BP is auscultated) and divides into the radial and ulnar arteries.",p:"Brachial artery = arm supply / BP cuff site → splits into radial + ulnar at the elbow."},
{m:"ul",q:"The superficial and deep palmar arches of the hand are formed by anastomosis of the ulnar artery and which other artery?",c:["Radial artery","Brachial artery","Axillary artery","Posterior interosseous artery"],a:0,why:"The radial and ulnar arteries anastomose to form the superficial and deep palmar arches; the Allen test checks this dual supply before radial artery cannulation.",p:"Palmar arches = radial + ulnar anastomosis. <b>Allen test</b> confirms dual supply before radial line."},
{m:"ul",q:"The vast majority of glenohumeral (shoulder) dislocations occur in which direction?",c:["Anterior","Posterior","Inferior","Superior"],a:0,why:"~95% of shoulder dislocations are anterior (abduction + external rotation force) → risk to the axillary nerve. Posterior dislocations are classically from seizures or electrocution.",p:"Shoulder dislocations are mostly <b>anterior</b> (~95%) → axillary nerve risk. Posterior = seizure/electrocution."},
{m:"ul",q:"Which superficial vein runs along the lateral (radial) side of the upper limb and is commonly used for venipuncture and PICC lines?",c:["Cephalic vein","Basilic vein","Brachial vein","Great saphenous vein"],a:0,why:"The cephalic vein runs laterally (radial side); the basilic vein runs medially. They connect via the median cubital vein in the antecubital fossa (common venipuncture site).",p:"Cephalic vein = LATERAL (radial) arm. Basilic = medial. Connected by the median cubital vein (blood draws)."},

/* ===== LOWER LIMB ===== */
{m:"ll",q:"Foot drop with loss of dorsiflexion and eversion (and a high-stepping gait) after a fibular neck fracture indicates injury to which nerve?",c:["Common peroneal nerve","Tibial nerve","Femoral nerve","Obturator nerve"],a:0,why:"The common peroneal (fibular) nerve wraps the fibular neck → injured by fracture or tight casts → foot drop (loss of dorsiflexion and eversion), steppage gait, and dorsal foot numbness. 'PED = Peroneal Everts and Dorsiflexes.'",p:"Common peroneal nerve = fibular neck → <b>foot drop</b> (loss of dorsiflexion/eversion). 'PED.'"},
{m:"ll",q:"Inability to plantarflex and invert the foot, with numbness of the SOLE, indicates injury to which nerve?",c:["Tibial nerve","Common peroneal nerve","Femoral nerve","Superior gluteal nerve"],a:0,why:"The tibial nerve (tarsal tunnel) supplies plantarflexion, inversion, and the sole. 'TIP = Tibial Inverts and Plantarflexes.'",p:"Tibial nerve = plantarflexion + inversion + sole sensation. 'TIP' (tarsal tunnel)."},
{m:"ll",q:"Weakness of knee extension with a lost patellar reflex and numbness over the anterior thigh indicates injury to which nerve?",c:["Femoral nerve","Sciatic nerve","Obturator nerve","Tibial nerve"],a:0,why:"The femoral nerve (L2–L4) supplies the quadriceps (knee extension), the patellar reflex, and anterior thigh/medial leg sensation; injured by pelvic fracture or hip surgery.",p:"Femoral nerve (L2–L4) = knee extension (quadriceps) + patellar reflex + anterior thigh sensation."},
{m:"ll",q:"A positive Trendelenburg sign (the pelvis drops on the side OPPOSITE a weak hip) indicates injury to which nerve supplying the gluteus medius and minimus?",c:["Superior gluteal nerve","Inferior gluteal nerve","Femoral nerve","Obturator nerve"],a:0,why:"The superior gluteal nerve supplies the gluteus medius/minimus (hip abductors/stabilizers). Injury → contralateral pelvic drop on standing on the affected leg (Trendelenburg).",p:"Superior gluteal nerve = gluteus medius/minimus. Lesion → <b>contralateral pelvic drop</b> (Trendelenburg)."},
{m:"ll",q:"The sciatic nerve splits into the tibial nerve and which other nerve in the posterior thigh?",c:["Common peroneal nerve","Femoral nerve","Obturator nerve","Pudendal nerve"],a:0,why:"The sciatic nerve (L4–S3) divides into the tibial and common peroneal nerves; injured by herniated disc, posterior hip dislocation, or improper intramuscular injection.",p:"Sciatic nerve = tibial + <b>common peroneal</b>. Injured by disc herniation, posterior hip dislocation, bad IM injection."},
{m:"ll",q:"A positive anterior drawer test (the tibia slides forward on the femur) indicates a tear of which ligament?",c:["Anterior cruciate ligament","Posterior cruciate ligament","Medial collateral ligament","Lateral collateral ligament"],a:0,why:"The ACL prevents anterior translation of the tibia → torn in non-contact pivoting injuries → positive anterior drawer and Lachman tests.",p:"Anterior drawer/Lachman positive = <b>ACL</b> tear (prevents anterior tibial translation; non-contact pivot)."},
{m:"ll",q:"The 'unhappy triad' knee injury classically involves the ACL, the medial meniscus, and which other structure?",c:["Medial collateral ligament","Posterior cruciate ligament","Lateral meniscus","Patellar tendon"],a:0,why:"The 'unhappy triad' (lateral blow to a planted knee) = ACL + medial collateral ligament + medial meniscus (the medial meniscus is attached to the MCL, so it tears with it).",p:"Unhappy triad = ACL + <b>MCL</b> + medial meniscus (medial meniscus is tethered to the MCL)."},
{m:"ll",q:"Arterial access for cardiac catheterization is commonly obtained from which artery, palpated just below the inguinal ligament?",c:["Femoral artery","Popliteal artery","Dorsalis pedis artery","Posterior tibial artery"],a:0,why:"The femoral artery (the continuation of the external iliac below the inguinal ligament) is the classic site for cardiac catheterization and ABG/large-bore access.",p:"Femoral artery = below the inguinal ligament; classic <b>cardiac cath</b> / large-bore access site."},

/* ===== THORAX ===== */
{m:"thx",q:"The aortic valve is best auscultated at which location?",c:["Right second intercostal space (right upper sternal border)","Left second intercostal space","Left fifth intercostal space, midclavicular line","Left lower sternal border"],a:0,why:"Auscultation: Aortic (right 2nd ICS), Pulmonic (left 2nd ICS), Tricuspid (left lower sternal border), Mitral (apex). 'APT M.'",p:"Auscultation 'APT M': Aortic (R 2nd ICS), Pulmonic (L 2nd ICS), Tricuspid (L lower sternal border), Mitral (apex)."},
{m:"thx",q:"The mitral valve is best heard at the cardiac apex, which lies at which surface landmark?",c:["The left fifth intercostal space at the midclavicular line","The right second intercostal space","The left second intercostal space","The xiphoid process"],a:0,why:"The cardiac apex (mitral area) is at the left 5th intercostal space, midclavicular line; a displaced apex beat suggests cardiomegaly.",p:"Mitral/apex = <b>left 5th ICS, midclavicular line</b>. Displaced apex = cardiomegaly."},
{m:"thx",q:"In most people the posterior descending artery and the SA and AV nodes arise from which coronary artery?",c:["The right coronary artery","The left anterior descending artery","The left circumflex artery","The left main artery"],a:0,why:"~85% are 'right dominant' (RCA gives the PDA). The RCA usually supplies the SA and AV nodes → inferior MI can cause bradycardia and AV block.",p:"RCA = PDA (85% right-dominant) + SA/AV nodes → inferior MI → <b>bradycardia/AV block</b>."},
{m:"thx",q:"Which coronary artery — the most commonly occluded — supplies the anterior left ventricle and the anterior two-thirds of the interventricular septum?",c:["The left anterior descending artery","The right coronary artery","The left circumflex artery","The posterior descending artery"],a:0,why:"The LAD supplies the anterior LV wall and anterior 2/3 of the septum; it is the most commonly occluded coronary → anterior wall MI (leads V1–V4).",p:"LAD = anterior LV + anterior 2/3 septum, MOST occluded → anterior MI (V1–V4)."},
{m:"thx",q:"An aspirated object in a supine patient most commonly lodges where, because that main bronchus is wider and more vertical?",c:["The right lung (right lower lobe)","The left lung","The trachea above the carina","The left upper lobe"],a:0,why:"The right main bronchus is wider, shorter, and more vertical → aspirated material goes right. Supine → superior segment of the right lower lobe; upright → basal segments of the RLL.",p:"Aspiration → <b>right lung</b> (wider/more vertical bronchus). Supine = RLL superior segment; upright = RLL base."},
{m:"thx",q:"The RIGHT lung has how many lobes (separated by the horizontal and oblique fissures)?",c:["Three","Two","Four","One"],a:0,why:"Right lung = 3 lobes (upper, middle, lower; horizontal + oblique fissures). Left lung = 2 lobes + lingula + cardiac notch (the heart sits left).",p:"Right lung = <b>3 lobes</b> (horizontal + oblique fissures). Left = 2 lobes + lingula (cardiac notch)."},
{m:"thx",q:"The thoracic duct empties lymph from most of the body into the venous system on which side?",c:["The left side (left venous angle)","The right side","Both sides equally","Directly into the right atrium"],a:0,why:"The thoracic duct drains all the body except the right upper quadrant into the left venous angle (left subclavian–internal jugular junction). Injury → chylothorax (milky fluid).",p:"Thoracic duct → <b>LEFT venous angle</b> (drains all but the right upper body). Injury → chylothorax."},
{m:"thx",q:"The diaphragm receives its motor innervation from the phrenic nerve, which arises from which spinal levels?",c:["C3–C5","C1–C3","T1–T4","L1–L3"],a:0,why:"'C3, 4, 5 keep the diaphragm alive.' Diaphragmatic/phrenic irritation causes referred pain to the shoulder (C3–C5 dermatomes).",p:"Phrenic nerve = <b>C3, 4, 5</b> ('keep the diaphragm alive'). Irritation → referred shoulder-tip pain."},

/* ===== HEAD, NECK & BACK ===== */
{m:"hnb",q:"Drooping of one ENTIRE half of the face including the forehead (Bell palsy) is a lower-motor-neuron lesion of which cranial nerve?",c:["The facial nerve (CN VII)","The trigeminal nerve (CN V)","The oculomotor nerve (CN III)","The hypoglossal nerve (CN XII)"],a:0,why:"CN VII controls facial expression. A lower-motor-neuron lesion (Bell palsy) paralyzes the whole half of the face including the forehead; an upper-motor-neuron lesion (stroke) spares the forehead (bilateral cortical input).",p:"CN VII LMN (Bell palsy) = whole half of face incl. forehead. UMN (stroke) = <b>spares the forehead</b>."},
{m:"hnb",q:"The mandibular division of the trigeminal nerve (CN V3) exits the skull through which foramen?",c:["Foramen ovale","Foramen rotundum","Superior orbital fissure","Jugular foramen"],a:0,why:"Trigeminal exits: V1 via superior orbital fissure, V2 via foramen rotundum, V3 via foramen ovale ('Standing Room Only'). V3 also carries motor fibers to the muscles of mastication.",p:"V branches exit 'Standing Room Only': V1 Superior orbital fissure, V2 Rotundum, V3 <b>Ovale</b>."},
{m:"hnb",q:"Cranial nerves IX, X, and XI exit the skull together through which foramen?",c:["The jugular foramen","The foramen magnum","The foramen ovale","The optic canal"],a:0,why:"CN IX (glossopharyngeal), X (vagus), and XI (accessory) exit via the jugular foramen with the internal jugular vein. A jugular foramen syndrome affects all three.",p:"CN IX, X, XI exit the <b>jugular foramen</b> (with the internal jugular vein)."},
{m:"hnb",q:"With a hypoglossal (CN XII) nerve lesion, the protruded tongue deviates in which direction?",c:["Toward the side of the lesion","Away from the lesion","It cannot move at all","It curls upward"],a:0,why:"The genioglossus protrudes the tongue; with a lower-motor-neuron CN XII lesion the weak side can't push, so the tongue deviates TOWARD the lesion ('lick your wounds').",p:"CN XII lesion → tongue deviates <b>TOWARD the lesion</b> ('lick your wounds')."},
{m:"hnb",q:"The common carotid artery bifurcates into the internal and external carotid arteries at approximately which vertebral level?",c:["C4 (upper border of the thyroid cartilage)","C2","C6","T1"],a:0,why:"The carotid bifurcation is at ~C4 (upper border of the thyroid cartilage). The carotid sinus (baroreceptor) and carotid body (chemoreceptor) sit here.",p:"Carotid bifurcation ≈ <b>C4</b> (thyroid cartilage). Carotid sinus = baroreceptor; carotid body = chemoreceptor."},
{m:"hnb",q:"Hoarseness after thyroidectomy results from injury to which nerve, a branch of the vagus that loops under the aortic arch on the left?",c:["Recurrent laryngeal nerve","Phrenic nerve","Hypoglossal nerve","Superior laryngeal nerve"],a:0,why:"The recurrent laryngeal nerve (vagus branch) supplies most intrinsic laryngeal muscles; it loops under the aortic arch (left) / right subclavian and runs near the thyroid → injured in thyroid surgery → hoarseness.",p:"Recurrent laryngeal nerve = vagus branch (loops under aortic arch L / subclavian R). Thyroid surgery → <b>hoarseness</b>."},
{m:"hnb",q:"In adults the spinal cord (conus medullaris) ends at about L1–L2, so a lumbar puncture is safely performed at which level?",c:["Below L3–L4 (in the cauda equina region)","At T12","At L1","At S2"],a:0,why:"Because the cord ends ~L1–L2, lumbar puncture is done at L3–L4 or L4–L5 (the iliac crests mark L4) to sample CSF without hitting the cord — only floating cauda equina roots are there.",p:"Cord ends ~L1–L2 → LP <b>below L3–L4</b> (iliac crests = L4). Cauda equina roots only."},
{m:"hnb",q:"The sternal angle (angle of Louis) marks the level of the tracheal bifurcation (carina) at which vertebral level?",c:["T4–T5","T1–T2","T8","L1"],a:0,why:"The sternal angle (T4–T5) marks the carina (tracheal bifurcation), the aortic arch, the azygos vein, and the start/end of the aortic arch — a key surface landmark.",p:"Sternal angle = <b>T4–T5</b> = carina + aortic arch + azygos. (Manubriosternal junction.)"}
];

const VAULT=[
{t:"Brachial Plexus",b:"<b>Randy Travis Drinks Cold Beer</b>: Roots (C5–T1) → Trunks (upper/middle/lower) → Divisions (ant/post) → Cords (lateral/posterior/medial) → Branches.",g:"Plexus"},
{t:"Upper-Limb Nerve Lesions",b:"<b>Axillary</b> (surgical neck/dislocation → can't abduct, lateral shoulder). <b>Radial</b> (midshaft humerus → wrist drop). <b>Median</b> (carpal tunnel/supracondylar → thenar atrophy, lateral 3.5 digits, 'ape hand'). <b>Ulnar</b> (medial epicondyle/hamate → claw hand, medial 1.5 digits). <b>Musculocutaneous</b> (biceps, lateral forearm).",g:"Plexus"},
{t:"Erb vs Klumpke",b:"<b>Erb</b> (upper trunk C5–C6) = 'waiter's tip' (adducted, internally rotated, pronated); birth/shoulder trauma. <b>Klumpke</b> (lower trunk C8–T1) = 'total claw hand' ± Horner; grabbing fall. <b>Winged scapula</b> = long thoracic nerve (serratus anterior).",g:"Plexus"},
{t:"Rotator Cuff (SItS)",b:"<b>S</b>upraspinatus (abduction; suprascapular nerve; most torn), <b>I</b>nfraspinatus (external rotation), <b>t</b>eres minor (external rotation), <b>S</b>ubscapularis (internal rotation).",g:"Upper Limb"},
{t:"Wrist & Hand Pitfalls",b:"<b>Scaphoid</b> fracture (snuffbox tenderness after FOOSH → AVN risk, retrograde supply; splint even if x-ray normal). <b>Lunate</b> dislocation (anterior → acute median nerve/carpal tunnel). <b>Hook of hamate</b> (ulnar nerve/artery).",g:"Upper Limb"},
{t:"Lower-Limb Nerves",b:"<b>Common peroneal/fibular</b> (fibular neck → foot drop; 'PED' everts/dorsiflexes). <b>Tibial</b> (tarsal tunnel → can't plantarflex/invert; 'TIP'). <b>Femoral</b> (L2–4 → knee extension, patellar reflex). <b>Obturator</b> (medial thigh adduction). Sciatic = tibial + common peroneal.",g:"Lower Limb"},
{t:"Gluteal Nerves & Knee",b:"<b>Superior gluteal</b> (medius/minimus → abduction; lesion = contralateral Trendelenburg drop). <b>Inferior gluteal</b> (gluteus maximus → rising/stairs). <b>ACL</b> (anterior drawer/Lachman; non-contact pivot). <b>Unhappy triad</b> = ACL + MCL + medial meniscus.",g:"Lower Limb"},
{t:"Heart Auscultation (APT M)",b:"<b>A</b>ortic (right 2nd ICS), <b>P</b>ulmonic (left 2nd ICS), <b>T</b>ricuspid (left lower sternal border), <b>M</b>itral (apex, left 5th ICS midclavicular). Right-sided murmurs ↑ with inspiration; left-sided ↑ with expiration.",g:"Thorax"},
{t:"Coronary Arteries",b:"<b>LAD</b> = anterior LV + anterior 2/3 septum, most occluded (anterior MI, V1–V4). <b>RCA</b> = inferior LV + SA/AV nodes (inferior MI → bradycardia/block; 85% right-dominant → PDA). <b>Circumflex</b> = lateral LV.",g:"Thorax"},
{t:"Lungs & Aspiration",b:"Right lung = 3 lobes (horizontal + oblique fissures); left = 2 lobes + lingula (cardiac notch). Aspiration → right (wider, more vertical bronchus): supine → RLL superior segment; upright → RLL base.",g:"Thorax"},
{t:"Thorax Lines",b:"Phrenic nerve = C3–C5 ('keep the diaphragm alive'; referred shoulder pain). Thoracic duct → left venous angle (injury → chylothorax). Recurrent laryngeal (vagus; loops under aortic arch L / subclavian R; thyroid surgery → hoarseness).",g:"Thorax"},
{t:"Cranial Nerve Foramina",b:"Cribriform (I), optic canal (II), superior orbital fissure (III, IV, V1, VI), foramen <b>R</b>otundum (V2), foramen <b>O</b>vale (V3), internal acoustic meatus (VII, VIII), jugular foramen (IX, X, XI), hypoglossal canal (XII). V branches = 'Standing Room Only.'",g:"Head/Neck"},
{t:"CN Localizing Signs",b:"<b>CN XII</b> lesion → tongue deviates TOWARD the lesion. <b>CN VII</b>: LMN (Bell palsy) = whole half of face incl. forehead; UMN (stroke) = spares forehead. <b>CN X</b>: uvula deviates AWAY from the lesion.",g:"Head/Neck"},
{t:"Vertebral Levels",b:"<b>C4</b> = carotid bifurcation/thyroid cartilage. <b>T4–T5</b> = sternal angle (carina, aortic arch, azygos). Diaphragm: T8 IVC, T10 esophagus, T12 aorta. <b>L1</b> = conus medullaris/transpyloric plane. <b>L4</b> = iliac crests/aortic bifurcation → LP below L3–L4.",g:"Back"}
];

const MODES={
  daily:{name:"Daily Plate",ic:"📖",desc:"15 random questions across the whole atlas. Quick warm-up.",pick:()=>shuffle([...QBANK]).slice(0,15)},
  endless:{name:"Endless Atlas",ic:"♾️",desc:"Survival mode — answer until you miss. Beat the streak.",endless:true,pick:()=>shuffle([...QBANK])},
  plex:{name:"Brachial Plexus & Nerve Lesions",ic:"🦴",desc:"The high-yield core: the plexus map and every classic upper-limb nerve lesion.",pick:()=>shuffle(QBANK.filter(q=>q.m==="plex"))},
  ul:{name:"Upper Limb",ic:"💪",desc:"Rotator cuff, the scaphoid/lunate traps, arm vessels, and shoulder dislocation.",pick:()=>shuffle(QBANK.filter(q=>q.m==="ul"))},
  ll:{name:"Lower Limb",ic:"🦵",desc:"Peroneal/tibial/femoral/gluteal nerves, foot drop, Trendelenburg, and the knee.",pick:()=>shuffle(QBANK.filter(q=>q.m==="ll"))},
  thx:{name:"Thorax",ic:"🫁",desc:"Valve auscultation, coronary arteries, lung lobes/aspiration, and the phrenic nerve.",pick:()=>shuffle(QBANK.filter(q=>q.m==="thx"))},
  hnb:{name:"Head, Neck & Back",ic:"🧠",desc:"Cranial nerves & foramina, the carotid, recurrent laryngeal nerve, and vertebral levels.",pick:()=>shuffle(QBANK.filter(q=>q.m==="hnb"))}
};
const MODE_TAGS={plex:"Brachial Plexus / Nerve Lesions",ul:"Upper Limb",ll:"Lower Limb",thx:"Thorax",hnb:"Head / Neck / Back"};

const SAVE_KEY="anatomy_atlas_v2";
let save=load();
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{best:{},endlessBest:0,played:0}}catch(e){return{best:{},endlessBest:0,played:0}}}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save))}catch(e){}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let session=null;
const app=document.getElementById("app");

function menu(){
  session=null;const m=MODES;
  app.innerHTML=`
  <div class="hdr">
    <div class="badge">AA</div>
    <h1>ANATOMY ATLAS</h1>
    <div class="sub">Gross Anatomy · Limbs · Thorax · Head &amp; Neck — ${QBANK.length} questions</div>
  </div>
  <div class="section-label">Quick Play</div>
  <div class="grid">${tile("daily",m.daily,"")}${tile("endless",m.endless,"amber")}</div>
  <div class="section-label">Topic Drills</div>
  <div class="grid">
    ${tile("plex",m.plex,"special")}${tile("ul",m.ul,"")}${tile("ll",m.ll,"")}${tile("thx",m.thx,"")}${tile("hnb",m.hnb,"")}
  </div>
  <div class="section-label">Reinforce</div>
  <div class="grid">
    <div class="tile amber" onclick="vault()">
      <div class="ic">💎</div><h3>Dirty Medicine Vault</h3>
      <p>The catchy anatomy tools — Randy Travis, SItS, PED/TIP, APT M, the CN foramina, vertebral levels, and more.</p>
      <div class="meta">${VAULT.length} memory tools</div>
    </div>
  </div>
  <footer>Saves to this browser via localStorage · ${save.played||0} rounds · Endless best: ${save.endlessBest||0}</footer>`;
}
function tile(key,mode,cls){
  const best=key==="endless"?(save.endlessBest||0):(save.best[key]!=null?save.best[key]+"%":"—");
  const bestLbl=key==="endless"?`Best streak: ${best}`:`Best: ${best}`;
  return `<div class="tile ${cls}" onclick="start('${key}')"><div class="ic">${mode.ic}</div><h3>${mode.name}</h3><p>${mode.desc}</p><div class="meta">${bestLbl}</div></div>`;
}
function start(key){const mode=MODES[key];const qs=mode.pick();session={key,mode,qs,i:0,correct:0,streak:0,answered:false};renderQ();}
function renderQ(){
  const s=session;
  if(!s.mode.endless&&s.i>=s.qs.length)return results();
  if(s.mode.endless&&s.i>=s.qs.length){s.qs=shuffle([...QBANK]);s.i=0;}
  const q=s.qs[s.i];
  const order=shuffle(q.c.map((t,idx)=>({t,idx})));
  s.order=order;s.correctPos=order.findIndex(o=>o.idx===q.a);
  const total=s.mode.endless?"∞":s.qs.length;const num=s.i+1;
  const pct=s.mode.endless?Math.min(100,(s.streak%15)/15*100):(num-1)/s.qs.length*100;
  const tag=MODE_TAGS[q.m]||"Mixed";
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="quiz-top"><span class="qcount">Q ${num} / ${total}</span><span class="streak">🔥 Streak ${s.streak}</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <span class="modtag">${tag}</span>
    <div class="stem">${q.q}</div>
    <div class="choices" id="ch">${order.map((o,i)=>`<div class="choice" data-i="${i}" onclick="answer(${i})"><span class="k">${String.fromCharCode(65+i)}</span><span>${o.t}</span></div>`).join("")}</div>
    <div id="post"></div>`;
}
function answer(pos){
  const s=session;if(s.answered)return;s.answered=true;
  const q=s.qs[s.i];const correct=pos===s.correctPos;
  document.querySelectorAll(".choice").forEach((n,i)=>{n.classList.add("disabled");if(i===s.correctPos)n.classList.add("correct");if(i===pos&&!correct)n.classList.add("wrong");});
  if(correct){s.correct++;s.streak++;}else{s.streak=0;}
  const post=document.getElementById("post");
  const pearl=q.p?`<div class="pearl"><b>💎 Pearl:</b> ${q.p}</div>`:"";
  post.innerHTML=`<div class="explain ${correct?"":"miss"}"><div class="lab">${correct?"✔ Correct":"✕ Review"}</div><div class="why">${q.why}</div>${pearl}</div>`;
  if(s.mode.endless&&!correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}post.innerHTML+=`<button class="btn btn-ghost" onclick="results()">End Run — Streak ${s.correct}</button>`;return;}
  if(s.mode.endless&&correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}}
  post.innerHTML+=`<button class="btn btn-next" onclick="nextQ()">${(!s.mode.endless&&s.i+1>=s.qs.length)?"SEE RESULTS":"NEXT ›"}</button>`;
}
function nextQ(){session.i++;session.answered=false;renderQ();}
function results(){
  const s=session;const got=s.correct;
  const pctNum=s.mode.endless?null:Math.round(got/s.qs.length*100);
  if(!s.mode.endless){save.best[s.key]=Math.max(save.best[s.key]||0,pctNum);}
  save.played=(save.played||0)+1;persist();
  let rank,col;const p=s.mode.endless?Math.min(100,got*5):pctNum;
  if(p>=90){rank="ATTENDING — DOMINATED";col="var(--green)"}
  else if(p>=75){rank="RESIDENT — SOLID";col="var(--cyan)"}
  else if(p>=55){rank="INTERN — GETTING THERE";col="var(--amber-hi)"}
  else{rank="MS1 — DRILL AGAIN";col="var(--red)"}
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="result">
      <div class="score-big" style="color:${col}">${s.mode.endless?got:pctNum+"%"}</div>
      <div class="rank" style="color:${col}">${s.mode.endless?"STREAK: "+got:rank}</div>
      <div class="statrow">
        <div><b>${got}</b>${s.mode.endless?"in a row":"correct"}</div>
        ${s.mode.endless?"":`<div><b>${s.qs.length-got}</b>missed</div>`}
        <div><b>${s.mode.endless?(save.endlessBest||0):(save.best[s.key]+"%")}</b>best</div>
      </div>
      <button class="btn btn-next" style="max-width:300px;margin:0 auto" onclick="start('${s.key}')">RUN IT AGAIN</button>
      <button class="btn btn-ghost" style="max-width:300px;margin:14px auto 0" onclick="menu()">BACK TO MENU</button>
    </div>`;
}
function vault(){
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="hdr" style="padding-top:6px">
      <h1 style="color:var(--amber-hi);font-size:28px">💎 Dirty Medicine Vault</h1>
      <div class="sub">Anatomy memory tools — catchy on purpose</div>
    </div>
    ${VAULT.map(v=>`<div class="vault-card"><h4>${v.t}</h4><p>${v.b}</p><span class="tag">▸ ${v.g}</span></div>`).join("")}
    <button class="btn btn-ghost" style="width:100%" onclick="menu()">BACK TO MENU</button>`;
}
document.addEventListener("keydown",e=>{
  if(!session||session.answered)return;
  const map={"1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3};
  const k=e.key.toLowerCase();
  if(map[k]!=null&&session.order&&map[k]<session.order.length)answer(map[k]);
});
</script>

<script>
menu();
