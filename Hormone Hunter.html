<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HORMONE HUNTER — Repro/Endo Survival</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0418;
  --bg-mid: #1a0a2e;
  --bg-card: #2a1248;
  --neon-pink: #ff5cc4;
  --neon-gold: #ffd93d;
  --neon-mint: #6bffa0;
  --neon-purple: #c77dff;
  --neon-coral: #ff6b6b;
  --neon-violet: #9d4edd;
  --text: #faf3ff;
  --text-dim: #9a8aae;
  --grid: rgba(199, 125, 255, 0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'VT323', monospace;
  font-size: 18px;
  min-height: 100vh;
  overflow-x: hidden;
}
body {
  background:
    radial-gradient(ellipse at 30% 20%, rgba(255, 92, 196, 0.18), transparent 50%),
    radial-gradient(ellipse at 75% 75%, rgba(255, 217, 61, 0.12), transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(157, 78, 221, 0.08), transparent 60%),
    linear-gradient(180deg, #0a0418 0%, #1a0a2e 100%);
  position: relative;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%);
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(0deg,
    rgba(0,0,0,0.15) 0px, rgba(0,0,0,0.15) 1px,
    transparent 1px, transparent 3px);
  pointer-events: none;
  z-index: 1000;
  mix-blend-mode: multiply;
}
#app {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 20px;
}

/* HEADER */
.title-bar {
  text-align: center;
  margin-bottom: 24px;
  padding: 16px 0 24px;
  border-bottom: 2px solid var(--neon-gold);
  box-shadow: 0 4px 20px rgba(255, 217, 61, 0.15);
}
h1.game-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 36px;
  background: linear-gradient(90deg, var(--neon-pink), var(--neon-gold), var(--neon-purple));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(255, 92, 196, 0.5);
  animation: titleGlow 3s ease-in-out infinite alternate;
}
@keyframes titleGlow {
  from { filter: drop-shadow(0 0 8px rgba(255, 217, 61, 0.4)); }
  to { filter: drop-shadow(0 0 20px rgba(255, 92, 196, 0.6)); }
}
.subtitle {
  color: var(--neon-mint);
  font-size: 22px;
  margin-top: 8px;
  letter-spacing: 2px;
}

/* HUD */
.hud {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.hud-cell {
  background: rgba(42, 18, 72, 0.7);
  border: 1px solid var(--neon-purple);
  border-radius: 4px;
  padding: 10px 14px;
  position: relative;
  box-shadow: inset 0 0 12px rgba(199, 125, 255, 0.15);
}
.hud-label {
  font-size: 13px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: 'Press Start 2P', monospace;
}
.hud-value {
  font-size: 28px;
  margin-top: 4px;
  font-weight: bold;
  font-family: 'JetBrains Mono', monospace;
}
.hud-value.hp { color: var(--neon-coral); }
.hud-value.xp { color: var(--neon-gold); }
.hud-value.streak { color: var(--neon-pink); }
.hud-value.lvl { color: var(--neon-mint); }

.hearts { display: inline-flex; gap: 4px; }
.heart {
  font-size: 24px;
  filter: drop-shadow(0 0 4px var(--neon-coral));
}
.heart.lost { filter: grayscale(1) brightness(0.3); }

/* MAIN PANEL */
.panel {
  background: rgba(42, 18, 72, 0.85);
  border: 2px solid var(--neon-gold);
  border-radius: 6px;
  padding: 28px;
  position: relative;
  box-shadow:
    0 0 30px rgba(255, 217, 61, 0.2),
    inset 0 0 20px rgba(255, 217, 61, 0.05);
  backdrop-filter: blur(4px);
  min-height: 400px;
}
.panel::before {
  content: '';
  position: absolute;
  top: -2px; left: 12px;
  width: 14px; height: 6px;
  background: var(--bg-deep);
  border-left: 2px solid var(--neon-gold);
  border-right: 2px solid var(--neon-gold);
}

/* MENU */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.menu-card {
  background: linear-gradient(135deg, rgba(255, 92, 196, 0.08), rgba(255, 217, 61, 0.08));
  border: 2px solid var(--neon-pink);
  border-radius: 4px;
  padding: 24px 18px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.menu-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(255, 92, 196, 0.4);
  border-color: var(--neon-gold);
}
.menu-card:hover::after {
  content: '';
  position: absolute;
  top: -100%; left: -100%;
  width: 300%; height: 300%;
  background: linear-gradient(45deg, transparent 30%, rgba(255, 217, 61, 0.15) 50%, transparent 70%);
  animation: shimmer 1s linear;
}
@keyframes shimmer { to { transform: translate(50%, 50%); } }
.menu-icon { font-size: 40px; margin-bottom: 12px; display: block; }
.menu-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  color: var(--neon-mint);
  margin-bottom: 8px;
  letter-spacing: 1px;
}
.menu-desc { color: var(--text-dim); font-size: 16px; line-height: 1.4; }

/* QUESTIONS */
.question-area { animation: fadeIn 0.4s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.q-tag {
  display: inline-block;
  background: var(--neon-violet);
  color: white;
  padding: 4px 12px;
  border-radius: 3px;
  font-family: 'Press Start 2P', monospace;
  font-size: 10px;
  margin-bottom: 16px;
  letter-spacing: 1px;
}
.q-text {
  font-size: 22px;
  line-height: 1.5;
  margin-bottom: 24px;
  color: var(--text);
  padding: 16px;
  background: rgba(0, 0, 0, 0.3);
  border-left: 4px solid var(--neon-gold);
  border-radius: 2px;
}
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice {
  background: rgba(42, 18, 72, 0.9);
  border: 2px solid var(--text-dim);
  color: var(--text);
  padding: 14px 18px;
  border-radius: 4px;
  font-family: 'VT323', monospace;
  font-size: 19px;
  text-align: left;
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.choice:hover:not(.disabled) {
  border-color: var(--neon-gold);
  background: rgba(255, 217, 61, 0.08);
  transform: translateX(4px);
}
.choice .key {
  background: var(--neon-gold);
  color: var(--bg-deep);
  font-family: 'Press Start 2P', monospace;
  font-size: 12px;
  padding: 6px 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.choice.correct {
  background: rgba(107, 255, 160, 0.15);
  border-color: var(--neon-mint);
  animation: pulseGreen 0.5s;
}
.choice.correct .key { background: var(--neon-mint); }
.choice.wrong {
  background: rgba(255, 107, 107, 0.15);
  border-color: var(--neon-coral);
  animation: shake 0.4s;
}
.choice.wrong .key { background: var(--neon-coral); }
.choice.disabled { cursor: default; opacity: 0.5; }
@keyframes pulseGreen {
  0%, 100% { box-shadow: 0 0 0 0 rgba(107, 255, 160, 0); }
  50% { box-shadow: 0 0 30px 4px rgba(107, 255, 160, 0.4); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20%, 60% { transform: translateX(-6px); }
  40%, 80% { transform: translateX(6px); }
}

/* PEARL BOX */
.pearl-box {
  margin-top: 24px;
  background: linear-gradient(135deg, rgba(255, 217, 61, 0.08), rgba(255, 92, 196, 0.08));
  border: 2px dashed var(--neon-gold);
  padding: 18px;
  border-radius: 4px;
  animation: fadeIn 0.5s 0.2s both;
}
.pearl-label {
  font-family: 'Press Start 2P', monospace;
  font-size: 11px;
  color: var(--neon-gold);
  letter-spacing: 2px;
  margin-bottom: 10px;
  text-shadow: 0 0 6px rgba(255, 217, 61, 0.5);
}
.pearl-text { font-size: 19px; line-height: 1.5; color: #fff; }
.pearl-text strong { color: var(--neon-pink); }
.pearl-text em { color: var(--neon-mint); font-style: normal; }

/* CONTROLS */
.controls {
  display: flex;
  justify-content: space-between;
  margin-top: 24px;
  gap: 12px;
  flex-wrap: wrap;
}
.btn {
  background: var(--neon-gold);
  color: var(--bg-deep);
  border: none;
  padding: 12px 24px;
  font-family: 'Press Start 2P', monospace;
  font-size: 13px;
  letter-spacing: 1px;
  cursor: pointer;
  border-radius: 3px;
  transition: all 0.15s;
  text-transform: uppercase;
}
.btn:hover {
  background: var(--neon-pink);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px rgba(255, 92, 196, 0.4);
}
.btn-secondary {
  background: transparent;
  color: var(--neon-gold);
  border: 2px solid var(--neon-gold);
}
.btn-secondary:hover {
  background: var(--neon-gold);
  color: var(--bg-deep);
}
.btn-danger { background: var(--neon-coral); color: white; }

/* PROGRESS BARS */
.system-progress { margin-top: 24px; }
.system-bar {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}
.system-name { width: 200px; font-size: 16px; color: var(--text-dim); }
.bar-track {
  flex: 1;
  background: rgba(255,255,255,0.05);
  height: 18px;
  border-radius: 2px;
  overflow: hidden;
  border: 1px solid rgba(255, 217, 61, 0.2);
}
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--neon-gold), var(--neon-pink));
  transition: width 0.5s ease;
  position: relative;
}
.bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation: barShine 2s linear infinite;
}
@keyframes barShine {
  from { transform: translateX(-100%); }
  to { transform: translateX(100%); }
}
.system-pct {
  width: 80px;
  text-align: right;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--neon-mint);
}

/* TOAST */
.toast {
  position: fixed;
  top: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(-200%);
  background: var(--neon-mint);
  color: var(--bg-deep);
  padding: 12px 30px;
  font-family: 'Press Start 2P', monospace;
  font-size: 14px;
  border-radius: 4px;
  box-shadow: 0 4px 20px rgba(107, 255, 160, 0.5);
  z-index: 9999;
  transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--neon-coral); color: white; }
.toast.xp { background: var(--neon-gold); color: var(--bg-deep); }

/* DECORATIVE DNA HELIX BAR */
.dna-bar {
  height: 50px;
  margin-bottom: 16px;
  position: relative;
}
.dna-bar svg { width: 100%; height: 100%; overflow: visible; }
.dna-strand {
  fill: none;
  stroke-width: 2;
  filter: drop-shadow(0 0 4px currentColor);
}
.dna-pink { stroke: var(--neon-pink); animation: dnaPulse 2.5s ease-in-out infinite; }
.dna-gold { stroke: var(--neon-gold); animation: dnaPulse 2.5s ease-in-out infinite reverse; }
@keyframes dnaPulse { 0%, 100% { opacity: 0.7; } 50% { opacity: 1; } }
.dna-rung { stroke: var(--neon-mint); stroke-width: 1.5; opacity: 0.5; }

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 4, 24, 0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1001;
  backdrop-filter: blur(6px);
  animation: fadeIn 0.3s;
}
.modal {
  background: var(--bg-mid);
  border: 2px solid var(--neon-pink);
  padding: 32px;
  border-radius: 6px;
  max-width: 600px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 0 40px rgba(255, 92, 196, 0.3);
}
.modal h2 {
  font-family: 'Press Start 2P', monospace;
  font-size: 18px;
  color: var(--neon-gold);
  margin-bottom: 16px;
}
.modal p { font-size: 18px; line-height: 1.5; margin-bottom: 12px; }
.achievement-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin: 16px 0;
}
.achievement {
  padding: 10px;
  border: 1px solid var(--text-dim);
  border-radius: 3px;
  font-size: 15px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.achievement.unlocked {
  border-color: var(--neon-gold);
  background: rgba(255, 217, 61, 0.08);
  color: var(--neon-gold);
}
.achievement.locked { opacity: 0.4; }
.ach-icon { font-size: 22px; }

/* RESULTS */
.results-screen { text-align: center; padding: 20px; }
.results-title {
  font-family: 'Press Start 2P', monospace;
  font-size: 28px;
  color: var(--neon-gold);
  margin-bottom: 24px;
  text-shadow: 0 0 20px var(--neon-gold);
}
.results-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin: 24px 0;
}
.stat-block {
  padding: 16px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--neon-gold);
  border-radius: 4px;
}
.stat-num {
  font-size: 36px;
  font-family: 'Press Start 2P', monospace;
  color: var(--neon-gold);
  display: block;
}
.stat-label { font-size: 14px; color: var(--text-dim); letter-spacing: 1px; }
.rank-badge {
  display: inline-block;
  font-family: 'Press Start 2P', monospace;
  font-size: 32px;
  padding: 16px 32px;
  margin: 16px 0;
  border: 3px solid;
  border-radius: 6px;
}

/* ARROW QUESTIONS — special widget */
.arrow-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px;
  margin: 16px 0;
}
.arrow-cell {
  background: rgba(0,0,0,0.3);
  border: 2px solid var(--neon-violet);
  padding: 10px 14px;
  border-radius: 3px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 17px;
}
.arrow-cell .label { display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 4px; }
.arrow-cell .val { font-size: 20px; color: var(--neon-gold); font-weight: bold; }

@media (max-width: 700px) {
  h1.game-title { font-size: 22px; letter-spacing: 2px; }
  .hud { grid-template-columns: repeat(2, 1fr); }
  .menu-grid { grid-template-columns: 1fr; }
  .system-name { width: 140px; font-size: 14px; }
  .results-stats { grid-template-columns: 1fr; }
  .panel { padding: 18px; }
  .q-text { font-size: 18px; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="app">
  <div class="title-bar">
    <h1 class="game-title">HORMONE HUNTER</h1>
    <div class="subtitle">★ REPRO + ENDO SURVIVAL ★</div>
    <div class="dna-bar">
      <svg viewBox="0 0 1000 50" preserveAspectRatio="none">
        <path class="dna-strand dna-pink" d="M0,25 Q50,5 100,25 T200,25 T300,25 T400,25 T500,25 T600,25 T700,25 T800,25 T900,25 T1000,25" />
        <path class="dna-strand dna-gold" d="M0,25 Q50,45 100,25 T200,25 T300,25 T400,25 T500,25 T600,25 T700,25 T800,25 T900,25 T1000,25" />
        <line class="dna-rung" x1="50" y1="10" x2="50" y2="40" />
        <line class="dna-rung" x1="150" y1="10" x2="150" y2="40" />
        <line class="dna-rung" x1="250" y1="10" x2="250" y2="40" />
        <line class="dna-rung" x1="350" y1="10" x2="350" y2="40" />
        <line class="dna-rung" x1="450" y1="10" x2="450" y2="40" />
        <line class="dna-rung" x1="550" y1="10" x2="550" y2="40" />
        <line class="dna-rung" x1="650" y1="10" x2="650" y2="40" />
        <line class="dna-rung" x1="750" y1="10" x2="750" y2="40" />
        <line class="dna-rung" x1="850" y1="10" x2="850" y2="40" />
        <line class="dna-rung" x1="950" y1="10" x2="950" y2="40" />
      </svg>
    </div>
  </div>

  <div class="hud">
    <div class="hud-cell">
      <div class="hud-label">HP</div>
      <div class="hud-value hp" id="hp-display"><span class="hearts" id="hearts"></span></div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">XP</div>
      <div class="hud-value xp" id="xp-display">0</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">LEVEL</div>
      <div class="hud-value lvl" id="lvl-display">1</div>
    </div>
    <div class="hud-cell">
      <div class="hud-label">STREAK</div>
      <div class="hud-value streak" id="streak-display">0🔥</div>
    </div>
  </div>

  <div class="panel" id="panel"></div>
</div>

<script>
// ============================================================================
// QUESTION BANK — comprehensive HY Repro + HY Endo coverage
// Topics: HPG axis, Thyroid, Adrenal/Cushing/CAH, Pituitary, Diabetes,
//          Calcium/PTH, Pheo/MEN, PCOS, Menstrual cycle, Sex disorders,
//          Pregnancy, Ovarian tumors, Endometrial path, Pharm
// ============================================================================
const QBANK = [
  // ── THYROID ─────────────────────────────────────────────────────────
  { topic:"Thyroid", tag:"AUTOIMMUNE", q:"32F + weight gain + cold intolerance + bradycardia + ↑ CK + ↑ TSH. Antibodies?",
    c:["Anti-TSH receptor (stimulating)","Anti-TPO + anti-thyroglobulin","Anti-mitochondrial","Anti-smooth muscle"], a:1,
    p:"<strong>Hashimoto = anti-TPO (anti-microsomal) + anti-thyroglobulin Ab</strong>. Primary hypothyroid: ↓T3, ↓T4, ↑TSH. Lymphocytic infiltrate on biopsy. <em>HY findings often missed:</em> ↑CK myopathy, carpal tunnel (GAG deposits), ↑ cholesterol, transaminitis. ↑ risk of non-Hodgkin lymphoma." },
  { topic:"Thyroid", tag:"AUTOIMMUNE", q:"30F + heat intolerance + tachycardia + exophthalmos + pretibial myxedema. Antibody?",
    c:["Anti-TPO","Thyroid-stimulating immunoglobulin (TSI) — activates TSH receptor","Anti-thyroglobulin","Anti-Jo-1"], a:1,
    p:"<strong>Graves = TSI (activating Ab against TSH receptor)</strong>. ↑T3, ↑T4, ↓TSH. <strong>Exophthalmos + pretibial myxedema = Graves-specific</strong>. Diffusely ↑ I-131 uptake. Can cause AF in young patient. Storm precipitated by surgery/trauma/infection." },
  { topic:"Thyroid", tag:"ARROWS", q:"Patient takes exogenous T3. What happens to T3, T4, TSH?",
    c:["↑T3, ↑T4, ↓TSH","↑T3, ↓T4, ↓TSH","↑T3, ↑T4, ↑TSH","↓T3, ↓T4, ↑TSH"], a:1,
    p:"<strong>Exogenous T3 → ↑T3, ↓T4, ↓TSH</strong>. Key: <em>T4 → T3 happens, but T3 → T4 does NOT</em>. So giving T3 suppresses TSH (negative feedback) → ↓ endogenous T4 production. Exogenous T4 gives ↑T3, ↑T4, ↓TSH." },
  { topic:"Thyroid", tag:"PREG", q:"Pregnant woman + thyroid storm at 34 weeks. Best treatment?",
    c:["Methimazole","PTU","Radioactive iodine","Levothyroxine"], a:1,
    p:"<strong>Pregnancy thyroid storm → PTU</strong>. <em>Methimazole = teratogenic in 1st trimester (aplasia cutis)</em>. Switch to methimazole in 2nd-3rd trimester (PTU = hepatotoxic long-term). Pregnancy thyroid labs: <strong>↑ total T4, normal free T4, normal TSH</strong> (↑TBG from estrogen)." },
  { topic:"Thyroid", tag:"POSTPARTUM", q:"6 months postpartum: dry skin + enlarged non-tender thyroid + ↑TSH + ↓T4. Diagnosis?",
    c:["Hashimoto","Postpartum thyroiditis","Graves disease","Sick euthyroid"], a:1,
    p:"<strong>Postpartum thyroiditis</strong> (silent thyroiditis variant). 5-10% of women. Hyper phase 1-4mo postpartum → hypo phase 4-8mo. Caused by postpartum immune rebound. ↑ risk of progression to Hashimoto. Tx: short propranolol or levothyroxine course as needed." },

  // ── ADRENAL / CUSHING / CAH ─────────────────────────────────────────
  { topic:"Adrenal", tag:"CUSHING", q:"Cushingoid patient. Low-dose dex doesn't suppress cortisol, but high-dose dex DOES suppress. Diagnosis?",
    c:["Cushing disease (pituitary ACTH tumor)","Adrenal adenoma","Small cell lung cancer","Exogenous steroids"], a:0,
    p:"<strong>Dex suppression algorithm</strong>:<br>• <em>Low-dose dex suppresses</em> → no Cushings.<br>• <em>Low-dose fails, high-dose suppresses</em> → <strong>Cushing disease</strong> (pituitary).<br>• <em>Neither suppresses + ↓ACTH</em> → adrenal adenoma.<br>• <em>Neither suppresses + ↑ACTH</em> → ectopic (small cell lung CA)." },
  { topic:"Adrenal", tag:"CUSHING", q:"Highest-yield Cushing findings on USMLE (per Mehlman)?",
    c:["Buffalo hump + moon facies","Purple striae + osteoporosis (vertebral compression) + AVN of femoral head","HTN + DM2","Central obesity + muscle wasting"], a:1,
    p:"Mehlman emphasizes <strong>3 HY findings</strong>: (1) <em>purple striae on abdomen</em>, (2) <em>osteoporosis with compression fractures</em>, (3) <em>AVN of femoral head (hip pain)</em>. Buffalo hump/moon facies are real but pass-level. Cushings can also cause hypoK (cortisol has mineralocorticoid effect)." },
  { topic:"Adrenal", tag:"ADDISON", q:"Patient on chronic prednisone for SLE, goes for surgery, BP drops to 80/40 not responsive to fluids/pressors. Next step?",
    c:["More fluids","IV hydrocortisone","Epinephrine drip","Norepinephrine"], a:1,
    p:"<strong>Adrenal crisis = IV hydrocortisone</strong>. Chronic steroids → atrophied adrenals → can't mount stress response. Key concept: <em>'Glucocorticoids are permissive of catecholamines'</em> — without cortisol, α1 receptors don't express → pressors don't work. Labs: ↓Na, ↑K, ↓pH, ↓bicarb, ↑eos." },
  { topic:"Adrenal", tag:"CAH", q:"Neonate with ambiguous genitalia + ↑K + ↓Na + ↓BP + ↑17-OH-progesterone. Enzyme deficient?",
    c:["21-hydroxylase","11-hydroxylase","17-hydroxylase","5-alpha reductase"], a:0,
    p:"<strong>21-hydroxylase deficiency</strong> = most common CAH. <em>Looks like Addison</em> (↑K, ↓Na, ↓bicarb, ↓pH, ↓glucose, ↓BP). ↑17-OH substrates and ↑DHEA-S/androstenedione. <strong>Mehlman trick</strong>: if 17-OH substrates ↑ → deficiency is 21 OR 11. Then BP/K decides: ↓BP/↑K = 21; ↑BP = 11." },
  { topic:"Adrenal", tag:"CAH", q:"Patient has HTN + ↓K + ambiguous genitalia + ↑17-OH-progesterone. Enzyme?",
    c:["21-hydroxylase","11-hydroxylase","17-hydroxylase","Aromatase"], a:1,
    p:"<strong>11-hydroxylase deficiency</strong> = HTN + ↓K (precursors have weak mineralocorticoid effect → BP up). 17-OH substrates still ↑ (because 11 is downstream). <em>21-deficiency = LOW BP; 11-deficiency = HIGH BP. Easy memory hook.</em>" },
  { topic:"Adrenal", tag:"PHEO", q:"Pheochromocytoma treatment order?",
    c:["β-blocker first, then α-blocker","α-blocker (phenoxybenzamine) first, then β-blocker","β-blocker only","Surgery without medical prep"], a:1,
    p:"<strong>α-block FIRST with phenoxybenzamine</strong> (irreversible α1 blocker), then β-blocker. <em>If you β-block first → 'unopposed alpha' → BP shoots ↑↑ → kills patient</em>. Dx: urinary/serum metanephrines first, THEN CT abdomen. Pheo = adrenal medulla, neural crest origin, calcifies." },
  { topic:"Adrenal", tag:"PHEO", q:"Pediatric tumor with opsoclonus-myoclonus (dancing eyes) + violaceous eyelids + ↑VMA/HVA?",
    c:["Pheochromocytoma","Neuroblastoma (N-myc)","Wilms tumor","Medulloblastoma"], a:1,
    p:"<strong>Neuroblastoma = pediatric pheo</strong>. <em>N-myc oncogene</em>. Midline sympathetic chain (usually abdominal, can be posterior mediastinum). Calcifies. Dx: <strong>urinary HVA + VMA</strong> (catecholamine metabolites), then MIBG scan." },

  // ── MEN SYNDROMES / CARNEY ─────────────────────────────────────────
  { topic:"MEN", tag:"GENETIC", q:"MEN 1 components?",
    c:["Parathyroid + pituitary + pancreatic","Parathyroid + pheo + medullary thyroid","Mucosal neuromas + pheo + medullary thyroid","Atrial myxoma + endocrine + skin"], a:0,
    p:"<strong>MEN syndromes (all AD)</strong>:<br>• <em>MEN 1 = 3 P's</em>: Parathyroid, Pituitary (prolactinoma HY), Pancreatic (Zollinger-Ellison gastrinoma HY). Gene: MEN1.<br>• <em>MEN 2A</em>: Parathyroid + Pheo + Medullary thyroid. Gene: RET.<br>• <em>MEN 2B</em>: Marfanoid + Mucosal neuromas + Pheo + Medullary thyroid. Gene: RET." },
  { topic:"MEN", tag:"GENETIC", q:"Before thyroidectomy for medullary thyroid CA, must check for what?",
    c:["Parathyroid adenoma","Pheochromocytoma (urinary metanephrines)","Hashimoto antibodies","Calcitonin level"], a:1,
    p:"<strong>Always check for pheo before MTC surgery</strong>. If MEN2 and undiagnosed pheo → surgical stress → catecholamine surge → death. Order urinary metanephrines first, then CT if positive." },

  // ── PITUITARY ──────────────────────────────────────────────────────
  { topic:"Pituitary", tag:"PIT", q:"Severed pituitary stalk: which hormone goes UP?",
    c:["TSH","Prolactin","ACTH","GH"], a:1,
    p:"<strong>Stalk section → prolactin ↑ (only one)</strong>. Why? Dopamine normally INHIBITS prolactin. Lose stalk → lose dopamine signal → prolactin rises. All other anterior pituitary hormones DROP because they lose <em>positive</em> hypothalamic signaling." },
  { topic:"Pituitary", tag:"PIT", q:"First-line treatment for prolactinoma?",
    c:["Surgery","Bromocriptine or cabergoline (D2 agonist)","Octreotide","Radiation"], a:1,
    p:"<strong>Prolactinoma → D2 agonist (bromocriptine, cabergoline)</strong>. Dopamine inhibits prolactin, so D2 agonists shrink the tumor. <em>Antipsychotics + metoclopramide (D2 antagonists) cause hyperprolactinemia</em> as side effect." },
  { topic:"Pituitary", tag:"PIT", q:"Postpartum woman: hemorrhage during delivery + can't lactate + amenorrhea. Diagnosis?",
    c:["Postpartum thyroiditis","Sheehan syndrome (pituitary infarction)","Prolactinoma","Hashimoto"], a:1,
    p:"<strong>Sheehan syndrome</strong> = ischemic anterior pituitary infarct postpartum (pituitary enlarged in pregnancy → vulnerable to hypoperfusion from PPH). <em>Failure to lactate = first sign</em>. Causes panhypopituitarism: ↓ all anterior pituitary hormones including TSH (secondary hypothyroid)." },

  // ── DIABETES ───────────────────────────────────────────────────────
  { topic:"Diabetes", tag:"DM", q:"DKA management priority order?",
    c:["Insulin → fluids → K","Fluids → K (if low/normal) → insulin","Bicarb → insulin → fluids","Insulin alone"], a:1,
    p:"<strong>DKA: Fluids → check K → insulin</strong>. Insulin drives K intracellular — if you give insulin to hypokalemic patient, K drops dangerously low → arrhythmia. Always replete K before/with insulin if K <5.0. Bicarb only if pH <6.9." },
  { topic:"Diabetes", tag:"DM", q:"Drug commonly causing diabetes (immunosuppressant)?",
    c:["Cyclosporine","Tacrolimus","Mycophenolate","Azathioprine"], a:1,
    p:"<strong>Tacrolimus → diabetes (HY on USMLE)</strong>. Calcineurin inhibitor, ↓ IL-2 synthesis. Other diabetogenic drugs: glucocorticoids, thiazides, atypical antipsychotics, protease inhibitors. Pancreatectomy obviously also." },
  { topic:"Diabetes", tag:"DM", q:"Mechanism of insulin secretion from β-cells?",
    c:["GLUT4 → ATP → Ca channel opens","GLUT2 → ATP → closes K-ATP channel → depolarization → Ca influx → insulin release","cAMP → PKA → exocytosis","GLP-1 receptor activation only"], a:1,
    p:"<strong>β-cell insulin secretion</strong>: Glucose enters via <em>GLUT2</em> → metabolism makes ATP → <em>ATP closes K+ channel</em> → cell depolarizes → <em>Ca2+ influx</em> → vesicle release. Sulfonylureas block the K-ATP channel directly to trigger insulin." },

  // ── PARATHYROID / Ca ───────────────────────────────────────────────
  { topic:"Parathyroid", tag:"CA", q:"Stones, bones, abdominal groans, psychiatric overtones + ↑Ca + ↑PTH + ↓PO4?",
    c:["Secondary hyperparathyroidism","Primary hyperparathyroidism (adenoma)","Tertiary hyperparathyroidism","Pseudohypoparathyroidism"], a:1,
    p:"<strong>Primary hyperPTH</strong>: ↑Ca, ↑PTH, ↓PO4, ↑urinary cAMP. Most common = parathyroid adenoma. Can be MEN1 or 2A. <strong>Secondary</strong> = renal failure (↓vitD, ↑PO4, ↓Ca → ↑↑PTH). <strong>Tertiary</strong> = autonomous PTH after long-standing secondary." },
  { topic:"Parathyroid", tag:"CA", q:"HY hypercalcemia causes?",
    c:["Hyperventilation","Primary hyperPTH, malignancy, sarcoidosis (↑vitD), thiazides, MM","Hypoalbuminemia","Loop diuretics"], a:1,
    p:"<strong>Hypercalcemia HY causes</strong>: 1° hyperPTH, malignancy (bone mets, PTHrP), <em>sarcoidosis</em> (granulomas make 1α-hydroxylase → ↑vitD), MM, <em>thiazides</em> (↑Ca reabsorption in DCT), milk-alkali. Loops cause hypoCa." },
  { topic:"Parathyroid", tag:"CA", q:"Albright hereditary osteodystrophy (short 4th/5th metacarpals, round face) + low Ca + HIGH PTH. Diagnosis?",
    c:["Hypoparathyroidism","Pseudohypoparathyroidism type 1","Hyperparathyroidism","DiGeorge"], a:1,
    p:"<strong>Pseudohypoparathyroidism type 1</strong> = end-organ resistance to PTH. PTH ↑ but tissues don't respond. Ca low, PO4 high. <em>Albright phenotype</em>: shortened 4th/5th metacarpals, round face. No response to exogenous PTH (vs. true hypoPTH)." },

  // ── HPG AXIS / PCOS / AMENORRHEA ───────────────────────────────────
  { topic:"HPG", tag:"PCOS", q:"PCOS hormone arrows?",
    c:["↓LH, ↑FSH","↑LH, ↓FSH (↑LH/FSH ratio)","↑LH, ↑FSH","Both normal"], a:1,
    p:"<strong>PCOS = ↑LH, ↓FSH (↑ ratio)</strong>. Mechanism: <em>insulin resistance → abnormal GnRH pulsation</em>. ↑LH → theca cells make excess androgen → hirsutism. ↓FSH → no follicle rupture → anovulation → cyst retention. <strong>Anovulation + hirsutism = PCOS</strong>." },
  { topic:"HPG", tag:"PCOS", q:"Best Tx for PCOS in obese woman wanting pregnancy?",
    c:["OCPs","Weight loss first → clomiphene if needed","Metformin","Spironolactone"], a:1,
    p:"<strong>PCOS Tx</strong>: <em>Weight loss FIRST</em> (always on USMLE if BMI high). Then: <strong>OCPs</strong> if not wanting pregnancy; <strong>clomiphene</strong> if wanting pregnancy (estrogen receptor partial agonist → ↑ GnRH outflow). PCOS ↑ risk of endometrial cancer (unopposed estrogen) + T2DM." },
  { topic:"HPG", tag:"AMEN", q:"Female athlete + amenorrhea + low BMI + low body fat. LH/FSH?",
    c:["↑LH, ↓FSH","↓LH, ↓FSH","↑LH, ↑FSH","Both normal"], a:1,
    p:"<strong>Functional hypothalamic amenorrhea (anorexia/athlete)</strong> = ↓LH AND ↓FSH. <em>Mechanism: low leptin → ↓ GnRH pulsation</em>. Leptin = satiety, low in 'hungry' state. Treat with weight gain/nutrition." },
  { topic:"HPG", tag:"PHARM", q:"Continuous leuprolide is pharmacologically a GnRH agonist. Why does it act like an antagonist clinically?",
    c:["Direct receptor blockade","Receptor desensitization → ↓ LH/FSH","Inhibits LH release only","Blocks aromatase"], a:1,
    p:"<strong>Continuous GnRH agonist = receptor desensitization</strong>. Pulsatile release is required for normal signaling; constant stimulation downregulates receptors → ↓LH/FSH. Used for prostate CA, endometriosis, fibroids, precocious puberty. <em>Pulsatile leuprolide can ↑ LH/FSH (used for fertility).</em>" },

  // ── SEX DISORDERS — HIGH YIELD ─────────────────────────────────────
  { topic:"SexDev", tag:"GENETIC", q:"15F + never had period + vagina ends in blind pouch + ABSENT pubic/axillary hair. Diagnosis?",
    c:["Mullerian agenesis","Androgen insensitivity syndrome (46XY)","Turner syndrome","5α-reductase deficiency"], a:1,
    p:"<strong>AIS = 46XY + female phenotype + ABSENT pubic/axillary hair</strong>. Defective androgen receptor. <em>Testosterone/DHT high</em> (no negative feedback). Testes intra-abdominal — orchiectomy after puberty (dysgerminoma risk).<br><br><em>Compare to Mullerian agenesis</em>: 46XX, NORMAL pubic/axillary hair, blind vagina, no uterus. Same presentation otherwise." },
  { topic:"SexDev", tag:"GENETIC", q:"15F + never had period + vagina ends in blind pouch + NORMAL pubic/axillary hair. Diagnosis?",
    c:["Androgen insensitivity","Mullerian agenesis (Mayer-Rokitansky)","Turner","Imperforate hymen"], a:1,
    p:"<strong>Mullerian agenesis = 46XX, normal hair pattern</strong>. Mullerian ducts fail → no uterus, no Fallopian tubes, no upper vagina. <em>Ovaries present</em> (not Mullerian-derived) → normal hormones → normal Tanner stages. <strong>Hair pattern is the differentiator from AIS.</strong>" },
  { topic:"SexDev", tag:"GENETIC", q:"12F: grew 4 inches in 4 months + acne + hair on lip + clitoral enlargement to 3-4 cm. Karyotype?",
    c:["46XX","46XY (5α-reductase deficiency)","45XO","47XXY"], a:1,
    p:"<strong>'Phallus at age 12' = 5α-reductase deficiency = 46XY</strong>. Enzyme converts testosterone → DHT. DHT needed for external male development → female phenotype until puberty. <em>Puberty's testosterone surge overwhelms partial deficiency</em> → DHT threshold reached → masculinization." },
  { topic:"SexDev", tag:"GENETIC", q:"Short female (<5'1\") + shield chest + cystic hygroma (webbed neck) + bicuspid aortic valve. Karyotype?",
    c:["46XX","45XO (Turner)","47XXX","46XY"], a:1,
    p:"<strong>Turner = 45XO</strong>. <em>'Menopause before menarche'</em> (streak ovaries). LH/FSH high (1° hypogonadism). <strong>HY associations</strong>: coarctation of aorta, bicuspid AV → AS, scattered nevi, lymphedema. No Barr body. Pregnancy possible via IVF + donor egg + exogenous hormones." },
  { topic:"SexDev", tag:"GENETIC", q:"Tall male + small testes + gynecomastia + low IQ. Karyotype?",
    c:["46XY","47XXY (Klinefelter)","46XX/SRY+","45XO/46XY mosaic"], a:1,
    p:"<strong>Klinefelter = 47XXY</strong>. Tall, eunuchoid (wide hips), small testes, gyneco. <em>Seminiferous tubule dysgenesis → ↑LH, ↑FSH</em>. ↑ aromatase from adipose → ↑estrogen/androgen ratio → gynecomastia + ↑ breast cancer risk. Has Barr body." },
  { topic:"SexDev", tag:"GENETIC", q:"Neonate appears phenotypically male but karyotype is 46XX. Mechanism?",
    c:["AIS","Mullerian agenesis","SRY gene translocation onto X","CAH"], a:2,
    p:"<strong>SRY translocation</strong>: SRY normally on Y, translocates to X → 46XX phenotypic male. Testes form (SRY's only job). MIF made → no Mullerian. Testosterone/DHT made → male external. Often small testes + hypo/epispadias." },

  // ── MENSTRUAL CYCLE / PREGNANCY ────────────────────────────────────
  { topic:"Cycle", tag:"PHYSIO", q:"Trigger for the LH surge that causes ovulation?",
    c:["Estrogen DROP","Estrogen reaches threshold → switches from negative to POSITIVE feedback","Progesterone rise","FSH spike"], a:1,
    p:"<strong>LH surge = estrogen flip from negative to POSITIVE feedback</strong> at threshold level. Late follicular phase: dominant follicle → ↑↑ estradiol → flips feedback at hypothalamus → LH surge → ovulation ~36hr later. <em>Luteal phase always = 14 days; cycle length variation = follicular phase variation</em>." },
  { topic:"Cycle", tag:"PHYSIO", q:"hCG peaks at what week of pregnancy?",
    c:["4 weeks","8-10 weeks","20 weeks","Term"], a:1,
    p:"<strong>hCG peaks at 8-10 weeks</strong>. Function: maintains corpus luteum → progesterone → preserves endometrium. After 8-10 wks, placenta takes over progesterone production, hCG falls. <em>Peak hCG explains 1st-trimester N/V</em> (severe = hyperemesis gravidarum)." },
  { topic:"Cycle", tag:"PHYSIO", q:"Why doesn't lactation occur during pregnancy despite high prolactin?",
    c:["Estrogen blocks prolactin","Progesterone inhibits prolactin's effect at breast alveolar receptors","Oxytocin is low","Dopamine is high"], a:1,
    p:"<strong>Progesterone blocks prolactin's effect at breast</strong> during pregnancy. After placenta delivered → progesterone falls → prolactin can finally act → lactation begins. <em>Progesterone-only contraception is safe while breastfeeding</em> (low dose doesn't suppress); estrogen in combined OCPs ↓ breast milk protein content." },
  { topic:"Cycle", tag:"PREG", q:"hPL (human placental lactogen) main effect on mother?",
    c:["Stimulates milk production","Increases insulin resistance to ↑ glucose for fetus","Maintains corpus luteum","Triggers labor"], a:1,
    p:"<strong>hPL → ↑ insulin resistance in mom</strong> → ↑ serum glucose → fetal supply maximized. Trade-off: <em>↑ risk of gestational diabetes</em>. Highest in 3rd trimester. Made by syncytiotrophoblasts (same as hCG)." },

  // ── PCOS-RELATED / ENDOMETRIAL ─────────────────────────────────────
  { topic:"GynPath", tag:"PATH", q:"Postmenopausal woman + obese + vaginal bleeding. Next step?",
    c:["Pap smear","Endometrial biopsy","Pelvic US first","Reassure"], a:1,
    p:"<strong>Postmenopausal bleeding = endometrial biopsy until proven otherwise</strong>. <em>Mechanism: unopposed estrogen → endometrial hyperplasia → adenocarcinoma</em>. Risk factors: PCOS history, obesity (peripheral aromatization), HRT without progesterone, granulosa cell tumor, tamoxifen, nulliparity, late menopause." },
  { topic:"GynPath", tag:"PATH", q:"Severely painful periods + dyspareunia + uterosacral nodularity + 'chocolate cysts.' Diagnosis?",
    c:["Adenomyosis","Endometriosis","Primary dysmenorrhea","Fibroids"], a:1,
    p:"<strong>Endometriosis</strong> = ectopic endometrial tissue (commonly ovary). <em>Dx: diagnostic laparoscopy</em>. Tx: NSAIDs + OCPs short-term; <strong>laparoscopic removal = definitive</strong>. Don't confuse: <em>adenomyosis</em> = endometrial tissue in MYOmetrium → diffusely enlarged uterus, woman 30s-50s. <em>Primary dysmenorrhea</em> = normal exam, prostaglandin-mediated, NSAIDs." },
  { topic:"GynPath", tag:"PATH", q:"Why does PCOS increase endometrial cancer risk?",
    c:["Direct carcinogenic effect of insulin","Anovulation → no corpus luteum → no progesterone → unopposed estrogen","High testosterone","Low FSH"], a:1,
    p:"<strong>PCOS → no corpus luteum → no progesterone → unopposed estrogen → endometrial hyperplasia → cancer</strong>. <em>'Unopposed estrogen' = the most HY phrase in repro</em>. Three key sources tested: (1) PCOS, (2) HRT without progesterone, (3) granulosa cell tumor." },

  // ── OVARIAN TUMORS ─────────────────────────────────────────────────
  { topic:"OvTumor", tag:"PATH", q:"3-year-old girl with ovarian mass + ↑AFP. Schiller-Duval bodies on histo. Tumor?",
    c:["Dysgerminoma","Yolk sac tumor (endodermal sinus)","Granulosa cell tumor","Teratoma"], a:1,
    p:"<strong>Yolk sac tumor</strong> = pediatric ovarian tumor. <em>↑ AFP, Schiller-Duval bodies (resemble glomeruli)</em>. Compare to <strong>embryonal carcinoma</strong> (adult, ↑ AFP AND ↑ hCG, undifferentiated cells)." },
  { topic:"OvTumor", tag:"PATH", q:"Postmenopausal woman + ovarian mass + thickened endometrial stripe + vaginal bleeding. Tumor type?",

    p:"<strong>Granulosa cell tumor</strong> = estrogen-producing → endometrial hyperplasia + bleeding. <em>Call-Exner bodies on histo</em>. Inhibin-positive. Sex cord-stromal tumor. <strong>Sertoli-Leydig tumor</strong> = testosterone-producing → virilization." },
  { topic:"OvTumor", tag:"PATH", q:"Bilateral ovarian masses + signet-ring cells + mucinous + history of gastric cancer?",
    c:["Brenner tumor","Krukenberg tumor","Granulosa cell","Struma ovarii"], a:1,
    p:"<strong>Krukenberg = bilateral ovarian METS from gastric (or other GI) signet-ring cancer</strong>. Hematogenous spread. Mucin-containing signet-ring cells. <em>Struma ovarii</em> = benign ovarian tumor that secretes thyroid hormone (subset of teratoma)." },

  // ── REPRO PHARM ────────────────────────────────────────────────────
  { topic:"ReproPharm", tag:"PHARM", q:"Tamoxifen vs raloxifene: which can you give to a woman with a uterus?",
    c:["Tamoxifen","Raloxifene (no endometrial agonist effect)","Both safe","Neither"], a:1,
    p:"<strong>Tamoxifen = partial agonist at endometrium → ↑ endometrial cancer risk</strong>. <em>Never give tamoxifen to woman with intact uterus if alternatives exist</em>. <strong>Raloxifene = pure antagonist at endometrium</strong> — safer, used for osteoporosis + breast CA prevention. Both: antagonist at breast, agonist at bone." },
  { topic:"ReproPharm", tag:"PHARM", q:"Drug for BPH and androgenetic alopecia (5α-reductase inhibitor)?",
    c:["Tamsulosin","Finasteride","Sildenafil","Spironolactone"], a:1,
    p:"<strong>Finasteride = 5α-reductase inhibitor</strong> → ↓ DHT. Used for BPH + male pattern baldness. Side effects: <em>↓ libido, gynecomastia, ED</em>. Tamsulosin is α1-blocker (relaxes prostate smooth muscle), used acutely for BPH symptoms." },
  { topic:"ReproPharm", tag:"PHARM", q:"Mechanism of clomiphene for infertility?",
    c:["FSH analog","Estrogen receptor partial agonist at hypothalamus → ↑ GnRH → ↑LH/FSH","GnRH antagonist","Aromatase inhibitor"], a:1,
    p:"<strong>Clomiphene = SERM, ER partial agonist/antagonist at hypothalamus</strong>. Blocks negative feedback → ↑ GnRH → ↑LH/FSH → ovulation induction. Side effect: <em>ovarian hyperstimulation syndrome (OHSS)</em>." },

  // ── PREGNANCY COMPLICATIONS ────────────────────────────────────────
  { topic:"Pregnancy", tag:"OB", q:"32-week pregnancy + BP 160/110 + proteinuria + headache + RUQ pain. Diagnosis + Tx?",
    c:["Gestational HTN; observe","Pre-eclampsia; labetalol/methyldopa, definitive Tx = delivery","Eclampsia; magnesium","Chronic HTN"], a:1,
    p:"<strong>Pre-eclampsia</strong> = HTN + proteinuria after 20 wks. Tx: BP control (labetalol, methyldopa, hydralazine for emergency); <em>definitive = delivery</em>. <strong>Eclampsia</strong> adds seizures → Mg sulfate + delivery. <strong>HELLP</strong> = Hemolysis, ↑LFTs, ↓Plts." },
  { topic:"Pregnancy", tag:"OB", q:"'Snowstorm' on US + bilateral theca-lutein cysts + hCG very high + uterus larger than dates?",
    c:["Twin pregnancy","Complete hydatidiform mole (46, all paternal)","Partial mole","Choriocarcinoma"], a:1,
    p:"<strong>Complete mole = 46 chromosomes, ALL paternal</strong> (empty egg + sperm that duplicates). 'Bunches of grapes/snowstorm' on US, no fetal parts. Higher choriocarcinoma risk than partial. <em>Partial mole = 69 (triploid), some fetal parts visible.</em>" },
  { topic:"Pregnancy", tag:"OB", q:"Best test to evaluate thyroid function in pregnancy?",
    c:["TSH","Free T4","Total T4","Total T3"], a:1,
    p:"<strong>Pregnancy → free T4 is best</strong>. Why? Estrogen ↑ TBG → total T4 rises but free is normal. TSH = best non-pregnant screen. <em>Hashimoto patients may need ↑ levothyroxine dose by up to 50% in pregnancy</em>." },

  // ── GERM LAYERS / EMBRYO ───────────────────────────────────────────
  { topic:"Embryo", tag:"DEV", q:"3rd pharyngeal pouch becomes?",
    c:["Superior parathyroids","Inferior parathyroids + thymus","Thyroid","Maxillary artery"], a:1,
    p:"<strong>3rd pouch = inferior parathyroids + thymus</strong>. <em>4th pouch = superior parathyroids</em>. (Counterintuitive: 3rd is below 4th anatomically!) DiGeorge = 3rd + 4th pouch fail → no thymus (T-cell deficiency) + no parathyroids (hypoCa). 22q11 deletion." },
  { topic:"Embryo", tag:"DEV", q:"Bicornuate uterus on hysterosalpingogram. Mechanism?",
    c:["Wolffian duct failure","Mullerian (paramesonephric) duct fusion failure","Urogenital sinus failure","SRY mutation"], a:1,
    p:"<strong>Bicornuate/didelphys uterus = failure of Mullerian duct fusion</strong>. Mullerian = paramesonephric ducts → Fallopian tubes, uterus, cervix, upper vagina. <em>Wolffian = mesonephric → male structures</em> (epididymis, vas deferens, seminal vesicles, ejaculatory duct)." },

  // ── BONUS: ELECTROLYTES / MISC ENDO ────────────────────────────────
  { topic:"Misc", tag:"ELECTROLYTES", q:"Hypocalcemia non-responsive to Ca supplementation. Likely cause?",
    c:["Vitamin D deficiency","Hypomagnesemia (often alcoholics)","Hyperphosphatemia","Hypoalbuminemia"], a:1,
    p:"<strong>Hypomagnesemia → unresponsive hypoCa AND hypoK</strong>. Mg required for PTH release + action. Classic in <em>alcoholics</em>. Always correct Mg first. <em>Hypocalcemia signs: Chvostek (facial twitch), Trousseau (carpal spasm with BP cuff), QT prolongation, tetany</em>." },
  { topic:"Misc", tag:"CARCINOID", q:"Flushing + diarrhea + tricuspid regurgitation + ↑urinary 5-HIAA?",
    c:["Pheochromocytoma","Carcinoid syndrome","Mastocytosis","Zollinger-Ellison"], a:1,

  { id: 'level_5', name: 'Resident', desc: 'Reach Level 5', icon: '🎓' },
  { id: 'level_10', name: 'Endocrinologist', desc: 'Reach Level 10', icon: '👨‍⚕️' },
  { id: 'master_thyroid', name: 'Thyroid Tactician', desc: 'Master Thyroid (90%+, 4+ seen)', icon: '🦋' },
  { id: 'master_sexdev', name: 'Karyotype King', desc: 'Master SexDev (90%+, 4+ seen)', icon: '🧬' },
  { id: 'master_adrenal', name: 'Cortisol Crusher', desc: 'Master Adrenal (90%+, 4+ seen)', icon: '⚙️' },
  { id: 'perfect_round', name: 'Flawless Cycle', desc: 'Perfect 10/10 round', icon: '💯' },
  { id: 'survivor', name: 'Hormone Hunter', desc: 'Endless: 20 in a row', icon: '🏹' }
];

// ============================================================================
// PERSISTENCE
// ============================================================================
function loadSave() {
  try {
    const v = localStorage.getItem('hormone_hunter_save');
    if (v) {
      const data = JSON.parse(v);
      Object.assign(STATE, data);
      SYSTEMS.forEach(s => { if (!STATE.systemMastery[s]) STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
      toast('SAVE LOADED', 'xp');
    }
  } catch (e) {}
}
function save() {
  try {
    const data = {
      hp: STATE.hp, maxHp: STATE.maxHp, xp: STATE.xp, level: STATE.level,
      bestStreak: STATE.bestStreak, systemMastery: STATE.systemMastery,
      achievements: STATE.achievements, totalAnswered: STATE.totalAnswered,
      totalCorrect: STATE.totalCorrect
    };
    localStorage.setItem('hormone_hunter_save', JSON.stringify(data));
  } catch (e) {}
}

// ============================================================================
// UTILS
// ============================================================================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function pickRandom(arr, n) { return shuffle(arr).slice(0, n); }
function toast(msg, cls='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + cls;
  setTimeout(() => t.className = 'toast ' + cls, 1800);
}
function unlock(id) {
  if (STATE.achievements[id]) return;
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach) return;
  STATE.achievements[id] = true;
  toast(`🏆 ${ach.name}!`, 'xp');
  save();
}
function checkAchievements() {
  if (STATE.totalAnswered >= 1) unlock('first_blood');
  if (STATE.streak >= 5) unlock('streak_5');
  if (STATE.streak >= 10) unlock('streak_10');
  if (STATE.level >= 5) unlock('level_5');
  if (STATE.level >= 10) unlock('level_10');
  ['Thyroid','SexDev','Adrenal'].forEach((sys, i) => {
    const m = STATE.systemMastery[sys];
    if (m.seen >= 4 && (m.correct/m.seen) >= 0.9) {
      unlock(['master_thyroid','master_sexdev','master_adrenal'][i]);
    }
  });
}

// ============================================================================
// HUD
// ============================================================================
function renderHUD() {
  let hearts = '';
  for (let i = 0; i < STATE.maxHp; i++) {
    hearts += `<span class="heart ${i < STATE.hp ? '' : 'lost'}">♥</span>`;
  }
  document.getElementById('hearts').innerHTML = hearts;
  document.getElementById('xp-display').textContent = STATE.xp;
  document.getElementById('lvl-display').textContent = STATE.level;
  document.getElementById('streak-display').textContent = STATE.streak + '🔥';
}
function gainXP(amt) {
  STATE.xp += amt;
  const needed = STATE.level * 50;
  if (STATE.xp >= needed) {
    STATE.xp -= needed;
    STATE.level++;
    STATE.maxHp = Math.min(5, 3 + Math.floor(STATE.level / 5));
    STATE.hp = STATE.maxHp;
    toast(`LEVEL UP! Lvl ${STATE.level}`, 'xp');
  }
  renderHUD();
}

// ============================================================================
// SCREENS
// ============================================================================
const panel = document.getElementById('panel');

function renderMenu() {
  STATE.mode = 'menu';
  renderHUD();
  panel.innerHTML = `
    <h2 style="font-family:'Press Start 2P',monospace; font-size:18px; color:var(--neon-gold); margin-bottom:20px; text-align:center;">★ SELECT MODE ★</h2>
    <div class="menu-grid">
      <div class="menu-card" onclick="startMode('daily')">
        <span class="menu-icon">🧪</span>
        <div class="menu-title">DAILY LAB</div>
        <div class="menu-desc">10 mixed cases. Quick warm-up.</div>
      </div>
      <div class="menu-card" onclick="startMode('endless')">
        <span class="menu-icon">🏹</span>
        <div class="menu-title">HORMONE HUNT</div>
        <div class="menu-desc">Endless gauntlet. Survive.</div>
      </div>
      <div class="menu-card" onclick="startMode('thyroid')">
        <span class="menu-icon">🦋</span>
        <div class="menu-title">THYROID TOWER</div>
        <div class="menu-desc">Hashimoto, Graves, storm.</div>
      </div>
      <div class="menu-card" onclick="startMode('adrenal')">
        <span class="menu-icon">⚙️</span>
        <div class="menu-title">ADRENAL ARENA</div>
        <div class="menu-desc">Cushing, CAH, pheo, MEN.</div>
      </div>
      <div class="menu-card" onclick="startMode('sexdev')">
        <span class="menu-icon">🧬</span>
        <div class="menu-title">KARYOTYPE LAB</div>
        <div class="menu-desc">Turner, AIS, 5α, Klinefelter.</div>
      </div>
      <div class="menu-card" onclick="startMode('repro')">
        <span class="menu-icon">🌸</span>
        <div class="menu-title">CYCLE STUDIES</div>
        <div class="menu-desc">PCOS, menstrual, pregnancy.</div>
      </div>
    </div>
    <div class="system-progress">
      <h3 style="font-family:'Press Start 2P',monospace; font-size:13px; color:var(--neon-pink); margin:24px 0 12px;">⊟ SYSTEM MASTERY ⊟</h3>
      ${SYSTEMS.map(sys => {
        const m = STATE.systemMastery[sys];
        const pct = m.seen ? Math.round(m.correct / m.seen * 100) : 0;
        return `
          <div class="system-bar">
            <div class="system-name">${sys}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="system-pct">${pct}% (${m.correct}/${m.seen})</div>
          </div>`;
      }).join('')}
    </div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="showAchievements()">🏆 ACHIEVEMENTS</button>
      <button class="btn btn-secondary" onclick="showStats()">📊 STATS</button>
      <button class="btn btn-secondary" onclick="showSyncModal()">🔄 SYNC</button>
      <button class="btn btn-danger" onclick="resetSave()">⟲ RESET</button>
    </div>
  `;
}

function startMode(mode) {
  STATE.mode = mode;
  STATE.modeStats = { correct: 0, total: 0 };
  STATE.modeIdx = 0;
  STATE.hp = STATE.maxHp;

  let pool = QBANK;
  let limit = 10;
  if (mode === 'thyroid') pool = QBANK.filter(q => q.topic === 'Thyroid');
  else if (mode === 'adrenal') pool = QBANK.filter(q => ['Adrenal','MEN','Parathyroid'].includes(q.topic));
  else if (mode === 'sexdev') pool = QBANK.filter(q => ['SexDev','Embryo','HPG'].includes(q.topic));
  else if (mode === 'repro') pool = QBANK.filter(q => ['Cycle','GynPath','OvTumor','ReproPharm','Pregnancy'].includes(q.topic));
  else if (mode === 'endless') { pool = QBANK; limit = 999; }

  STATE.modeQs = mode === 'endless' ? shuffle(pool) : pickRandom(pool, Math.min(limit, pool.length));
  STATE.modeStats.total = STATE.modeQs.length;
  renderHUD();
  nextQuestion();
}

function nextQuestion() {
  if (STATE.hp <= 0) return endRound('LIFE LOST');
  if (STATE.modeIdx >= STATE.modeQs.length) {
    if (STATE.mode === 'endless') {
      STATE.modeQs = shuffle(QBANK); STATE.modeIdx = 0;
    } else return endRound('COMPLETE');
  }
  STATE.currentQ = STATE.modeQs[STATE.modeIdx];
  renderQuestion();
}

function renderQuestion() {
  const q = STATE.currentQ;
  const progressTxt = STATE.mode === 'endless'
    ? `Q${STATE.modeStats.correct + 1} • ENDLESS`
    : `Q${STATE.modeIdx + 1} / ${STATE.modeQs.length}`;
  panel.innerHTML = `
    <div class="question-area">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span class="q-tag">${q.tag} • ${q.topic}</span>
        <span style="font-family:'JetBrains Mono',monospace; color:var(--text-dim); font-size:14px;">${progressTxt}</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="choices" id="choices">
        ${q.c.map((c, i) => `
          <button class="choice" data-idx="${i}" onclick="answer(${i})">
            <span class="key">${String.fromCharCode(65 + i)}</span>
            <span>${c}</span>
          </button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>
  `;
}

function answer(idx) {
  const q = STATE.currentQ;
  const isCorrect = idx === q.a;
  document.querySelectorAll('.choice').forEach((el, i) => {
    el.classList.add('disabled');
    el.onclick = null;
    if (i === q.a) el.classList.add('correct');
    else if (i === idx) el.classList.add('wrong');
  });

  STATE.totalAnswered++;
  STATE.systemMastery[q.topic].seen++;
  if (isCorrect) {
    STATE.totalCorrect++;
    STATE.systemMastery[q.topic].correct++;
    STATE.modeStats.correct++;
    STATE.streak++;
    if (STATE.streak > STATE.bestStreak) STATE.bestStreak = STATE.streak;
    const xpGain = 10 + Math.min(STATE.streak * 2, 20);
    gainXP(xpGain);
    toast(`+${xpGain} XP`, 'xp');
    if (STATE.mode === 'endless' && STATE.streak >= 20) unlock('survivor');
  } else {
    STATE.streak = 0;
    STATE.hp--;
    toast('-1 HP', 'error');
  }
  renderHUD();
  checkAchievements();
  save();

  document.getElementById('feedback').innerHTML = `
    <div class="pearl-box">
      <div class="pearl-label">💎 MEHLMAN PEARL</div>
      <div class="pearl-text">${q.p}</div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="renderMenu()">◄ MENU</button>
      <button class="btn" onclick="advance()">${STATE.modeIdx + 1 >= STATE.modeQs.length && STATE.mode !== 'endless' ? 'FINISH ►' : 'NEXT ►'}</button>
    </div>
  `;
}

function advance() {
  STATE.modeIdx++;
  nextQuestion();
}

function endRound(reason) {
  const correct = STATE.modeStats.correct;
  const total = STATE.modeStats.total;
  const livePct = total > 0 ? Math.round(correct/total*100) : 0;

  let rank, rankColor;
  if (livePct === 100 && total >= 10) { rank = 'S'; rankColor = 'var(--neon-gold)'; unlock('perfect_round'); }
  else if (livePct >= 90) { rank = 'A'; rankColor = 'var(--neon-mint)'; }
  else if (livePct >= 75) { rank = 'B'; rankColor = 'var(--neon-pink)'; }
  else if (livePct >= 60) { rank = 'C'; rankColor = 'var(--neon-purple)'; }
  else { rank = 'D'; rankColor = 'var(--neon-coral)'; }

  const reasonMsg = reason === 'LIFE LOST' ? 'OUT OF HP' : 'ROUND COMPLETE';
  panel.innerHTML = `
    <div class="results-screen">
      <div class="results-title">${reasonMsg}</div>
      <div class="rank-badge" style="color:${rankColor}; border-color:${rankColor}; box-shadow: 0 0 30px ${rankColor};">RANK ${rank}</div>
      <div class="results-stats">
        <div class="stat-block">
          <span class="stat-num">${correct}</span>
          <span class="stat-label">CORRECT</span>
        </div>
        <div class="stat-block">
          <span class="stat-num">${livePct}%</span>
          <span class="stat-label">ACCURACY</span>
        </div>
        <div class="stat-block">
          <span class="stat-num">${STATE.bestStreak}</span>
          <span class="stat-label">BEST STREAK</span>
        </div>
      </div>
      <div class="controls" style="justify-content:center;">
        <button class="btn btn-secondary" onclick="renderMenu()">◄ MENU</button>
        <button class="btn" onclick="startMode('${STATE.mode}')">↻ RETRY</button>
      </div>
    </div>
  `;
  STATE.streak = 0;
  renderHUD();
  save();
}


// ============================================================================
// SYNC — Export / Import save codes across devices
// ============================================================================
function showSyncModal() {
  const data = {
    hp: STATE.hp, maxHp: STATE.maxHp, xp: STATE.xp, level: STATE.level,
    bestStreak: STATE.bestStreak, systemMastery: STATE.systemMastery,
    achievements: STATE.achievements, totalAnswered: STATE.totalAnswered,
    totalCorrect: STATE.totalCorrect
  };
  const code = btoa(unescape(encodeURIComponent(JSON.stringify(data))));

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>🔄 SYNC SAVE</h2>
        <p style="font-size:14px; opacity:0.75; margin-bottom:18px;">Transfer your progress between devices. Copy code from one, paste on the other.</p>

        <div style="margin-bottom:20px; padding:14px; background:rgba(0,0,0,0.25); border-radius:4px; border:1px solid rgba(128,128,128,0.25);">
          <h3 style="font-size:15px; margin-bottom:8px; opacity:0.9;">📤 EXPORT &mdash; from this device</h3>
          <p style="font-size:13px; opacity:0.65; margin-bottom:8px;">Copy this code, then paste it on your other device:</p>
          <textarea id="sync-export-code" readonly style="width:100%; height:90px; font-family:monospace; font-size:11px; padding:8px; background:rgba(0,0,0,0.45); color:inherit; border:1px solid rgba(128,128,128,0.4); border-radius:3px; resize:none; word-break:break-all;">${code}</textarea>
          <button class="btn btn-secondary" style="margin-top:10px; width:100%;" onclick="copyExportCode()">📋 Copy to Clipboard</button>
        </div>

        <div style="margin-bottom:20px; padding:14px; background:rgba(0,0,0,0.25); border-radius:4px; border:1px solid rgba(128,128,128,0.25);">
          <h3 style="font-size:15px; margin-bottom:8px; opacity:0.9;">📥 IMPORT &mdash; from another device</h3>
          <p style="font-size:13px; opacity:0.65; margin-bottom:8px;">Paste a save code from your other device:</p>
          <textarea id="sync-import-code" placeholder="Paste save code here..." style="width:100%; height:90px; font-family:monospace; font-size:11px; padding:8px; background:rgba(0,0,0,0.45); color:inherit; border:1px solid rgba(128,128,128,0.4); border-radius:3px; resize:none;"></textarea>
          <button class="btn" style="margin-top:10px; width:100%;" onclick="applyImport()">✓ Apply Import</button>
        </div>

        <div style="text-align:center;">
          <button class="btn btn-secondary" onclick="closeModal()">CLOSE</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function copyExportCode() {
  const ta = document.getElementById('sync-export-code');
  if (!ta) return;
  ta.select();
  ta.setSelectionRange(0, 99999);
  let ok = false;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(
      () => toast('COPIED!', 'xp'),
      () => {
        try { ok = document.execCommand('copy'); } catch (e) {}
        if (ok) toast('COPIED!', 'xp');
        else toast('Select & copy manually', 'error');
      }
    );
  } else {
    try { ok = document.execCommand('copy'); } catch (e) {}
    if (ok) toast('COPIED!', 'xp');
    else toast('Select & copy manually', 'error');
  }
}

function applyImport() {
  const ta = document.getElementById('sync-import-code');
  if (!ta) return;
  const code = ta.value.trim();
  if (!code) { toast('Paste a code first', 'error'); return; }
  try {
    let json;
    try { json = decodeURIComponent(escape(atob(code))); }
    catch (e) { json = atob(code); }
    const data = JSON.parse(json);
    if (typeof data.xp !== 'number' || !data.systemMastery) {
      throw new Error('Invalid save format');
    }
    if (!confirm('This will REPLACE your current progress on this device. Continue?')) return;
    Object.assign(STATE, data);
    SYSTEMS.forEach(s => { if (!STATE.systemMastery[s]) STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
    if (!STATE.achievements) STATE.achievements = {};
    save();
    closeModal();
    toast('SAVE IMPORTED!', 'xp');
    renderMenu();
  } catch (e) {
    toast('Invalid code — try again', 'error');
  }
}

function showAchievements() {
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>🏆 ACHIEVEMENTS</h2>
        <div class="achievement-list">
          ${ACHIEVEMENTS.map(a => `
            <div class="achievement ${STATE.achievements[a.id] ? 'unlocked' : 'locked'}">
              <span class="ach-icon">${STATE.achievements[a.id] ? a.icon : '🔒'}</span>
              <div>
                <strong>${a.name}</strong><br>
                <span style="font-size:13px; color:var(--text-dim);">${a.desc}</span>
              </div>
            </div>`).join('')}
        </div>
        <button class="btn" onclick="closeModal()">CLOSE</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function showStats() {
  const totalPct = STATE.totalAnswered ? Math.round(STATE.totalCorrect/STATE.totalAnswered*100) : 0;
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>📊 LIFETIME STATS</h2>
        <p><strong style="color:var(--neon-gold)">Total Answered:</strong> ${STATE.totalAnswered}</p>
        <p><strong style="color:var(--neon-mint)">Total Correct:</strong> ${STATE.totalCorrect}</p>
        <p><strong style="color:var(--neon-pink)">Lifetime Accuracy:</strong> ${totalPct}%</p>
        <p><strong style="color:var(--neon-coral)">Best Streak:</strong> ${STATE.bestStreak}🔥</p>
        <p><strong style="color:var(--neon-purple)">Current Level:</strong> ${STATE.level}</p>
        <p><strong>Achievements:</strong> ${Object.keys(STATE.achievements).length} / ${ACHIEVEMENTS.length}</p>
        <button class="btn" onclick="closeModal()">CLOSE</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeModal() { document.querySelector('.modal-overlay')?.remove(); }

function resetSave() {
  if (!confirm('Reset ALL Hormone Hunter progress?')) return;
  try { localStorage.removeItem('hormone_hunter_save'); } catch (e) {}
  STATE.hp = 3; STATE.maxHp = 3; STATE.xp = 0; STATE.level = 1;
  STATE.streak = 0; STATE.bestStreak = 0; STATE.totalAnswered = 0; STATE.totalCorrect = 0;
  STATE.achievements = {};
  SYSTEMS.forEach(s => { STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
  toast('SAVE RESET');
  renderMenu();
}

document.addEventListener('keydown', (e) => {
  if (STATE.mode === 'menu' || !STATE.currentQ) return;
  const choices = document.querySelectorAll('.choice:not(.disabled)');
  if (choices.length === 0) {
    if (e.key === 'Enter') {
      const nextBtn = document.querySelector('.controls .btn:not(.btn-secondary):not(.btn-danger)');
      nextBtn?.click();
    }
    return;
  }
  const keyIdx = ['a','b','c','d','1','2','3','4'].indexOf(e.key.toLowerCase());
  if (keyIdx >= 0) {
    const idx = keyIdx >= 4 ? keyIdx - 4 : keyIdx;
    if (choices[idx]) answer(idx);
  }
});

loadSave();
renderMenu();
</script>

</html>
