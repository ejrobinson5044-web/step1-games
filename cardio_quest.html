<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CARDIO QUEST — Cardiovascular System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800&family=Figtree:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0608;
  --bg2:#140a0d;
  --panel:#1d1015;
  --panel-hi:#28161c;
  --cyan:#ef4444;        /* arterial red primary */
  --cyan-dim:#991b1b;
  --amber:#fbbf24;       /* gold accent */
  --amber-hi:#fde047;
  --red:#64748b;         /* WRONG = slate (avoids clash with red theme) */
  --green:#34d399;
  --text:#fde8ea;
  --dim:#b08a90;
  --line:rgba(239,68,68,.15);
  --glow:rgba(239,68,68,.45);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;min-height:100vh;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 17% 0%,rgba(239,68,68,.12),transparent 55%),
    radial-gradient(ellipse at 88% 100%,rgba(251,191,36,.06),transparent 55%),
    linear-gradient(180deg,#0c0608,#140a0d);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:repeating-linear-gradient(0deg,var(--line) 0 1px,transparent 1px 32px);
  mask-image:radial-gradient(ellipse at center,#000 30%,transparent 88%);opacity:.5;
}
#app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:18px}

.hdr{text-align:center;padding:18px 0 16px;border-bottom:2px solid var(--cyan-dim);margin-bottom:20px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:14px;
  background:linear-gradient(150deg,var(--cyan),var(--cyan-dim));color:#1d1015;
  font-family:'Outfit';font-weight:800;font-size:30px;margin-bottom:8px;box-shadow:0 0 24px var(--glow)}
h1{font-family:'Outfit';font-weight:800;font-size:34px;letter-spacing:.3px;color:var(--cyan)}
.sub{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:5px;text-transform:uppercase}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:8px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.tile::after{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--cyan);opacity:.6}
.tile:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 26px rgba(0,0,0,.5)}
.tile.amber::after{background:var(--amber)}
.tile.special::after{background:linear-gradient(var(--amber),var(--cyan))}
.tile .ic{font-size:24px}
.tile h3{font-family:'Outfit';font-weight:700;font-size:17px;margin:7px 0 5px;letter-spacing:.2px;line-height:1.25}
.tile p{font-size:12.5px;color:var(--dim);line-height:1.45}
.tile .meta{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan);margin-top:9px;letter-spacing:1px}
.tile.amber .meta{color:var(--amber-hi)}

.section-label{font-family:'JetBrains Mono';font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}

.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'JetBrains Mono';font-size:12px}
.qcount{color:var(--dim)}
.streak{color:var(--amber-hi)}
.bar{height:6px;background:var(--panel);border-radius:4px;overflow:hidden;margin-bottom:18px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:.3s}
.modtag{display:inline-block;font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--cyan-dim);border-radius:20px;padding:3px 11px;margin-bottom:14px;text-transform:uppercase}
.stem{font-size:18.5px;line-height:1.5;font-weight:500;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:11px}
.choice{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:.14s;font-size:15.5px;display:flex;gap:12px;align-items:flex-start}
.choice .k{font-family:'JetBrains Mono';font-size:13px;color:var(--cyan);font-weight:600;flex-shrink:0}
.choice:hover{border-color:var(--cyan);background:var(--panel-hi)}
.choice.correct{border-color:var(--green);background:rgba(52,211,153,.13)}
.choice.correct .k{color:var(--green)}
.choice.wrong{border-color:var(--red);background:rgba(100,116,139,.16)}
.choice.wrong .k{color:var(--red)}
.choice.disabled{pointer-events:none;opacity:.85}

.explain{margin-top:18px;border-radius:12px;padding:15px 16px;background:var(--panel);border-left:3px solid var(--cyan);animation:rise .25s ease}
.explain.miss{border-left-color:var(--red)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.explain .lab{font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.explain .why{font-size:14.5px;line-height:1.5}
.pearl{margin-top:11px;background:rgba(251,191,36,.10);border:1px dashed var(--amber);border-radius:10px;padding:11px 13px;font-size:14px;line-height:1.5}
.pearl b{color:var(--amber-hi);font-family:'Outfit';font-weight:800;font-size:13px}

.btn{font-family:'Outfit';font-weight:800;letter-spacing:.3px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;font-size:15px;transition:.15s}
.btn-next{background:linear-gradient(145deg,var(--cyan),var(--cyan-dim));color:#fde8ea;margin-top:18px;width:100%}
.btn-next:hover{box-shadow:0 0 18px var(--glow)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--dim);margin-top:18px}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}

.result{text-align:center;padding:30px 16px}
.score-big{font-family:'Outfit';font-weight:800;font-size:64px;color:var(--cyan);line-height:1}
.rank{font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:10px 0 22px}
.statrow{display:flex;justify-content:center;gap:30px;margin-bottom:24px}
.statrow div{font-family:'JetBrains Mono';font-size:12px;color:var(--dim)}
.statrow b{display:block;font-size:26px;color:var(--text);font-family:'Outfit';font-weight:800}

.vault-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:12px;border-left:3px solid var(--amber)}
.vault-card h4{font-family:'Outfit';font-weight:800;color:var(--amber-hi);font-size:16px;margin-bottom:7px;letter-spacing:.2px;line-height:1.25}
.vault-card p{font-size:14px;line-height:1.55;color:var(--text)}
.vault-card .tag{font-family:'JetBrains Mono';font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-top:7px}

.back{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:1px;display:inline-flex;gap:6px;align-items:center;margin-bottom:16px}
.back:hover{color:var(--cyan)}
footer{text-align:center;font-family:'JetBrains Mono';font-size:10px;color:var(--dim);margin:28px 0 8px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* correct = index into c[]; choices shuffle at render. Stems never contain the answer. */
const QBANK=[
/* ===== ANATOMY & CONDUCTION ===== */
{m:"ana",q:"The left anterior descending artery supplies the anterior left ventricle, the apex, and which portion of the interventricular septum?",c:["Anterior two-thirds","Posterior two-thirds","The entire septum","None of the septum"],a:0,why:"LAD supplies the anterior LV wall, apex, and anterior 2/3 of the interventricular septum. The posterior 1/3 comes from the posterior descending artery (usually off the RCA).",p:"LAD = anterior LV + apex + <b>anterior 2/3 septum</b>. Most commonly occluded artery."},
{m:"ana",q:"In most people, the SA and AV nodes receive their blood supply from which coronary artery?",c:["Right coronary artery","Left anterior descending","Left circumflex","Left main"],a:0,why:"In right-dominant circulation (~85%), the RCA supplies the SA and AV nodes; that is why an inferior MI (RCA) can cause bradycardia and heart block.",p:"SA + AV nodes = <b>RCA</b> (in 85%). Inferior MI → bradyarrhythmias/AV block."},
{m:"ana",q:"Which coronary artery is the most commonly occluded, producing an anterior wall myocardial infarction?",c:["Left anterior descending","Right coronary artery","Left circumflex","Posterior descending"],a:0,why:"The LAD ('widow-maker') is the most frequently occluded coronary, causing anterior wall MIs (ECG changes in V1–V4).",p:"Most occluded = <b>LAD</b> (anterior MI, V1–V4). 'LAD = widow-maker.'"},
{m:"ana",q:"The cardiac impulse begins in the SA node and travels next to which structure, the only normal electrical connection between the atria and ventricles?",c:["AV node","Bundle of His","Purkinje fibers","Left bundle branch"],a:0,why:"The AV node is the sole normal electrical bridge from atria to ventricles; the fibrous skeleton insulates the rest.",p:"Conduction: <b>SA → AV node → His → bundle branches → Purkinje</b>. AV node = only A-to-V path."},
{m:"ana",q:"The AV node introduces a conduction DELAY, which allows time for what?",c:["Ventricular filling to complete","The heart rate to increase","Coronary perfusion to peak","The aortic valve to open"],a:0,why:"The AV nodal delay (~0.1 s) lets the atria finish contracting and fill the ventricles before ventricular systole.",p:"AV delay → time for the <b>atrial kick / ventricular filling</b> before systole."},
{m:"ana",q:"The SA node sets the heart rate because it has the fastest rate of spontaneous depolarization. This pacemaker property is called what?",c:["Automaticity","Refractoriness","Contractility","Conductivity"],a:0,why:"Automaticity = the ability to spontaneously depolarize. The SA node's is fastest, so it is the dominant pacemaker (overdrive suppression).",p:"<b>Automaticity</b> = spontaneous depolarization. SA node fastest → the pacemaker."},
{m:"ana",q:"In the fetus, which shunt allows blood to bypass the lungs by flowing from the pulmonary artery to the aorta?",c:["Ductus arteriosus","Foramen ovale","Ductus venosus","Umbilical vein"],a:0,why:"The ductus arteriosus shunts blood from the pulmonary artery to the aorta in utero; it closes after birth to become the ligamentum arteriosum.",p:"<b>Ductus arteriosus</b> = pulmonary artery → aorta (becomes ligamentum arteriosum)."},
{m:"ana",q:"Which fetal structure allows blood to flow from the right atrium directly to the left atrium, bypassing the lungs?",c:["Foramen ovale","Ductus arteriosus","Ductus venosus","Coronary sinus"],a:0,why:"The foramen ovale shunts oxygenated blood from the right atrium to the left atrium in utero; it closes to become the fossa ovalis.",p:"<b>Foramen ovale</b> = right atrium → left atrium (becomes fossa ovalis)."},

/* ===== PHYSIOLOGY & HEMODYNAMICS ===== */
{m:"phys",q:"Cardiac output is the product of stroke volume and what?",c:["Heart rate","Afterload","Preload","Blood pressure"],a:0,why:"CO = stroke volume × heart rate. Stroke volume depends on preload, afterload, and contractility.",p:"<b>CO = SV × HR.</b> SV is set by preload, afterload, and contractility."},
{m:"phys",q:"Preload, the ventricular stretch at the end of diastole, is best approximated by which volume?",c:["End-diastolic volume","End-systolic volume","Stroke volume","Cardiac output"],a:0,why:"Preload ≈ end-diastolic volume (ventricular filling); it rises with increased venous return and falls with venodilators (nitroglycerin).",p:"Preload ≈ <b>end-diastolic volume</b> (filling). ↑ by venous return; ↓ by nitrates/bleeding."},
{m:"phys",q:"Afterload, the resistance the ventricle must pump against, is increased most by a rise in what?",c:["Arterial (aortic) pressure","Venous return","Preload","Heart rate"],a:0,why:"Afterload ≈ systemic arterial pressure / vascular resistance; hypertension and aortic stenosis raise it. Vasodilators reduce it.",p:"Afterload ≈ <b>arterial pressure / SVR</b>. ↑ in HTN + aortic stenosis. Lowered by vasodilators."},
{m:"phys",q:"By the Frank-Starling mechanism, greater ventricular filling (preload) produces what effect on stroke volume?",c:["It increases","It decreases","No change","It becomes zero"],a:0,why:"Frank-Starling: greater preload stretches sarcomeres to optimal overlap → stronger contraction → larger stroke volume.",p:"Frank-Starling: <b>↑ preload → ↑ stroke volume</b> (more stretch, stronger contraction)."},
{m:"phys",q:"Mean arterial pressure equals cardiac output multiplied by what?",c:["Total peripheral resistance","Heart rate","Stroke volume","Preload"],a:0,why:"MAP = CO × TPR. It can also be estimated as diastolic pressure + 1/3 of the pulse pressure.",p:"<b>MAP = CO × TPR</b> ≈ DBP + 1/3(pulse pressure)."},
{m:"phys",q:"An S3 heart sound, heard in early diastole during rapid ventricular filling, classically indicates what?",c:["Ventricular volume overload","A stiff, hypertrophied ventricle","Aortic stenosis","Pericardial constriction"],a:0,why:"S3 = a dilated, volume-overloaded ventricle (systolic heart failure, mitral regurgitation); it can be normal in children and pregnancy.",p:"<b>S3 = volume overload / dilated ventricle</b> (CHF, MR). Normal in young + pregnant."},
{m:"phys",q:"An S4 heart sound (late diastole) indicates a STIFF, noncompliant ventricle, as seen in which condition?",c:["Left ventricular hypertrophy","Mitral regurgitation","Acute volume overload","Tricuspid stenosis"],a:0,why:"S4 = atrium contracting against a stiff, hypertrophied ventricle (chronic hypertension, aortic stenosis, diastolic dysfunction).",p:"<b>S4 = stiff/hypertrophied ventricle</b> (chronic HTN, AS). Atrial kick into a noncompliant LV."},
{m:"phys",q:"A sudden rise in blood pressure stimulates carotid sinus baroreceptors, triggering a reflex that does what to the heart rate?",c:["Decreases it","Increases it","No effect","Stops it permanently"],a:0,why:"Baroreceptor reflex: ↑BP → carotid sinus stretch → ↑parasympathetic and ↓sympathetic output → ↓HR and vasodilation (and the reverse for ↓BP).",p:"↑BP → baroreceptors → <b>↓HR</b> (↑vagal tone). ↓BP → reflex tachycardia."},

/* ===== MURMURS & VALVES ===== */
{m:"mur",q:"A harsh crescendo-decrescendo systolic murmur radiating to the carotids, with exertional syncope, indicates which valve lesion?",c:["Aortic stenosis","Mitral regurgitation","Aortic regurgitation","Pulmonic stenosis"],a:0,why:"Aortic stenosis = systolic crescendo-decrescendo murmur radiating to the carotids; classic triad of angina, syncope, and dyspnea (the SAD triad).",p:"AS = crescendo-decrescendo systolic → <b>carotids</b>; triad = Syncope, Angina, Dyspnea (SAD)."},
{m:"mur",q:"A holosystolic murmur best heard at the apex and radiating to the axilla indicates which valve lesion?",c:["Mitral regurgitation","Aortic stenosis","Mitral stenosis","Tricuspid stenosis"],a:0,why:"Mitral regurgitation = holosystolic murmur at the apex radiating to the axilla; causes include MVP, rheumatic disease, and post-MI papillary muscle rupture.",p:"MR = holosystolic at apex → <b>axilla</b>. (Tricuspid regurg = holosystolic, ↑ with inspiration.)"},
{m:"mur",q:"An early diastolic decrescendo murmur with a wide pulse pressure and bounding 'water-hammer' pulses indicates which valve lesion?",c:["Aortic regurgitation","Mitral stenosis","Aortic stenosis","Pulmonic regurgitation"],a:0,why:"Aortic regurgitation = early diastolic decrescendo murmur, wide pulse pressure, bounding pulses (water-hammer, head bobbing); causes include bicuspid valve, endocarditis, and aortic root dilation.",p:"AR = early diastolic decrescendo + <b>wide pulse pressure</b> + bounding pulses."},
{m:"mur",q:"An opening snap followed by a mid-diastolic rumble at the apex, often from prior rheumatic fever, indicates which valve lesion?",c:["Mitral stenosis","Mitral regurgitation","Aortic stenosis","Tricuspid regurgitation"],a:0,why:"Mitral stenosis = opening snap + mid-diastolic rumble; almost always from rheumatic heart disease; can cause left atrial enlargement and atrial fibrillation.",p:"MS = <b>opening snap + diastolic rumble</b>, rheumatic. Leads to LA enlargement + AFib."},
{m:"mur",q:"A mid-systolic click, sometimes with a late systolic murmur, in an otherwise healthy young patient indicates what?",c:["Mitral valve prolapse","Aortic stenosis","Ventricular septal defect","Pericarditis"],a:0,why:"Mitral valve prolapse = mid-systolic click ± late systolic murmur; the most common valvular lesion, associated with Marfan and Ehlers-Danlos.",p:"<b>Mitral valve prolapse</b> = mid-systolic click. Most common valve lesion; assoc. Marfan/EDS."},
{m:"mur",q:"Which maneuver INCREASES the intensity of right-sided heart murmurs by increasing venous return?",c:["Inspiration","Expiration","Valsalva","Standing"],a:0,why:"Inspiration drops intrathoracic pressure, boosting venous return to the right heart → louder right-sided murmurs (Carvallo sign for tricuspid regurgitation).",p:"<b>Inspiration → louder RIGHT-sided</b> murmurs (more venous return). Expiration → left-sided."},
{m:"mur",q:"The murmurs of hypertrophic cardiomyopathy and mitral valve prolapse get LOUDER with which maneuver, which decreases preload?",c:["Valsalva (or standing)","Squatting","Sustained handgrip","Passive leg raise"],a:0,why:"Valsalva and standing decrease preload (LV volume); in HOCM this worsens outflow obstruction (louder), and MVP clicks earlier/louder. Squatting and handgrip do the opposite.",p:"↓Preload (Valsalva/standing) → <b>louder HOCM + MVP</b>. Squatting/handgrip → softer."},
{m:"mur",q:"Sustained handgrip increases afterload, which makes which murmur LOUDER?",c:["Mitral regurgitation","Aortic stenosis","Hypertrophic cardiomyopathy","Mitral valve prolapse"],a:0,why:"Handgrip raises afterload (systemic resistance), increasing regurgitant flow → louder MR, AR, and VSD; it decreases the AS and HOCM murmurs.",p:"Handgrip (↑afterload) → louder <b>MR/AR/VSD</b>; softer AS + HOCM."},

/* ===== ISCHEMIA & VESSELS ===== */
{m:"isch",q:"Chest pain on exertion, relieved by rest or nitroglycerin and caused by a fixed coronary plaque, is which condition?",c:["Stable angina","Prinzmetal angina","Myocardial infarction","Pericarditis"],a:0,why:"Stable angina = demand ischemia from a fixed atherosclerotic stenosis; pain is reproducible with exertion and relieved by rest/nitrates, with no troponin rise.",p:"Stable angina = <b>fixed plaque</b>, exertional, relieved by rest/nitro, no troponin rise."},
{m:"isch",q:"Chest pain occurring at REST with ST depression but NO rise in troponin indicates which condition?",c:["Unstable angina","ST-elevation MI","Stable angina","Prinzmetal angina"],a:0,why:"Unstable angina = rest pain from a partially occluding thrombus, with ischemic ECG changes but NORMAL troponin. A troponin rise would make it an NSTEMI.",p:"Unstable angina = rest pain, ST depression, <b>troponin NORMAL</b>. (+Troponin = NSTEMI.)"},
{m:"isch",q:"ST-segment ELEVATION on ECG together with a rise in troponin indicates which type of myocardial infarction?",c:["Transmural (STEMI)","Subendocardial (NSTEMI)","Stable angina","Vasospastic angina"],a:0,why:"STEMI = full-thickness (transmural) infarct from complete coronary occlusion → ST elevation; requires emergent reperfusion (PCI or thrombolytics).",p:"<b>STEMI = transmural</b>, ST elevation, full occlusion → emergent PCI. NSTEMI = subendocardial."},
{m:"isch",q:"Cardiac troponin, the most specific marker of myocardial infarction, rises within 2–4 hours and remains elevated for about how long?",c:["7–10 days","1 hour","12 hours","1 month"],a:0,why:"Troponin rises in 2–4 h, peaks ~24 h, and stays elevated 7–10 days (good for late diagnosis). CK-MB normalizes in 2–3 days and is better for detecting REinfarction.",p:"Troponin: rises 2–4 h, stays <b>7–10 days</b>. CK-MB normalizes in 2–3 days (reinfarction)."},
{m:"isch",q:"ST elevations in leads II, III, and aVF localize a myocardial infarction to which wall (usually the right coronary artery)?",c:["Inferior wall","Anterior wall","Lateral wall","Posterior wall"],a:0,why:"Leads II, III, aVF = inferior wall (RCA). Anterior = V1–V4 (LAD); lateral = I, aVL, V5–V6 (LCX).",p:"II/III/aVF = <b>inferior</b> (RCA). V1–V4 = anterior (LAD). I/aVL/V5–V6 = lateral (LCX)."},
{m:"isch",q:"What is the single most common site of atherosclerosis in the body?",c:["Abdominal aorta","Coronary arteries","Carotid arteries","Renal arteries"],a:0,why:"The abdominal aorta is the most common site of atherosclerosis, followed by the coronary, popliteal, and carotid arteries.",p:"Atherosclerosis order: <b>abdominal aorta > coronary > popliteal > carotid</b>."},
{m:"isch",q:"Sudden 'tearing' chest pain radiating to the back, with a widened mediastinum on X-ray, in a hypertensive patient indicates what?",c:["Aortic dissection","Myocardial infarction","Pulmonary embolism","Pericarditis"],a:0,why:"Aortic dissection = tearing pain radiating to the back, widened mediastinum, possible unequal arm pulses/BP; risk factors are hypertension and Marfan/connective tissue disease.",p:"Tearing pain to back + widened mediastinum = <b>aortic dissection</b> (HTN, Marfan)."},
{m:"isch",q:"Cold, clammy skin with hypotension following a large myocardial infarction (pump failure) indicates which type of shock?",c:["Cardiogenic shock","Hypovolemic shock","Septic shock","Anaphylactic shock"],a:0,why:"Cardiogenic shock = pump failure → low cardiac output, high PCWP, cold/clammy skin, high SVR. Distributive (septic/anaphylactic) shock is warm with low SVR.",p:"Post-MI pump failure = <b>cardiogenic shock</b> (cold, ↑PCWP, ↑SVR). Septic = warm, ↓SVR."},

/* ===== FAILURE / ARRHYTHMIA / CONGENITAL ===== */
{m:"fail",q:"Pulmonary congestion, orthopnea, and paroxysmal nocturnal dyspnea are features of which type of heart failure?",c:["Left-sided heart failure","Right-sided heart failure","High-output failure","Constrictive pericarditis"],a:0,why:"Left heart failure backs blood up into the lungs → pulmonary edema, orthopnea, PND, crackles. (Right HF causes systemic congestion.)",p:"Left HF = <b>pulmonary</b> (orthopnea, PND, crackles). Backs up into the lungs."},
{m:"fail",q:"Jugular venous distension, peripheral edema, and hepatomegaly are features of which type of heart failure (most often caused by left heart failure)?",c:["Right-sided heart failure","Left-sided heart failure","Diastolic dysfunction alone","Aortic stenosis"],a:0,why:"Right heart failure backs blood up into the systemic veins → JVD, peripheral edema, hepatomegaly, ascites. Its most common cause is left heart failure.",p:"Right HF = <b>systemic</b> (JVD, edema, hepatomegaly). #1 cause = left HF."},
{m:"fail",q:"An irregularly irregular rhythm with no discrete P waves, carrying a risk of embolic stroke, is which arrhythmia?",c:["Atrial fibrillation","Atrial flutter","Ventricular tachycardia","First-degree AV block"],a:0,why:"Atrial fibrillation = irregularly irregular, absent P waves; stasis in the left atrium → thrombus → embolic stroke (anticoagulate per CHA2DS2-VASc).",p:"AFib = <b>irregularly irregular, no P waves</b>. Stroke risk → anticoagulate (CHA2DS2-VASc)."},
{m:"fail",q:"A chaotic, disorganized rhythm arising from the lower chambers with no effective cardiac output, requiring immediate defibrillation, is what?",c:["Ventricular fibrillation","Atrial fibrillation","Sinus tachycardia","Wenckebach block"],a:0,why:"Ventricular fibrillation = disorganized ventricular electrical activity, no cardiac output → cardiac arrest; treat with immediate defibrillation and CPR.",p:"VFib = no output → <b>defibrillate immediately</b> + CPR. (Pulseless VT is treated the same way.)"},
{m:"fail",q:"The most common congenital heart defect, producing a holosystolic murmur and a left-to-right shunt, is what?",c:["Ventricular septal defect","Tetralogy of Fallot","Coarctation of the aorta","Transposition of the great vessels"],a:0,why:"VSD is the most common congenital heart defect; small ones cause a loud holosystolic murmur and a left-to-right shunt (acyanotic).",p:"<b>VSD</b> = most common congenital defect, holosystolic murmur, L→R (acyanotic)."},
{m:"fail",q:"The most common CYANOTIC congenital heart disease, with a 'boot-shaped' heart and 'tet spells,' is what?",c:["Tetralogy of Fallot","Atrial septal defect","Patent ductus arteriosus","Ventricular septal defect"],a:0,why:"Tetralogy of Fallot (Pulmonary stenosis, RVH, Overriding aorta, VSD) is the most common cyanotic CHD; boot-shaped heart; 'tet spells' relieved by squatting (↑afterload).",p:"Tetralogy of Fallot = most common cyanotic. PROVe; boot-shaped heart; squatting relieves tet spells."},
{m:"fail",q:"An uncorrected left-to-right shunt that raises pulmonary pressure and eventually REVERSES to a right-to-left shunt (causing late cyanosis) is called what?",c:["Eisenmenger syndrome","Tetralogy of Fallot","Cardiac tamponade","Coarctation of the aorta"],a:0,why:"Eisenmenger syndrome = a chronic L→R shunt (VSD/ASD/PDA) drives pulmonary hypertension until the shunt reverses to R→L → late cyanosis, clubbing, polycythemia.",p:"Eisenmenger = uncorrected L→R shunt → pulmonary HTN → <b>shunt reverses to R→L</b> (late cyanosis)."},
{m:"fail",q:"Hypotension, distended neck veins, and muffled heart sounds (Beck's triad), with pulsus paradoxus, indicate what?",c:["Cardiac tamponade","Acute myocardial infarction","Tension pneumothorax","Aortic stenosis"],a:0,why:"Cardiac tamponade = pericardial fluid compresses the heart → Beck's triad (hypotension, JVD, muffled sounds), pulsus paradoxus, and electrical alternans; treat with pericardiocentesis.",p:"Tamponade = <b>Beck's triad</b> (hypotension + JVD + muffled sounds) + pulsus paradoxus → pericardiocentesis."}
];

const VAULT=[
{t:"Coronary Anatomy",b:"<b>LAD</b> = anterior LV + apex + anterior 2/3 septum (anterior MI, V1–V4; 'widow-maker'). <b>RCA</b> = inferior LV + RV + SA/AV nodes (inferior MI, II/III/aVF, bradyarrhythmias). <b>LCX</b> = lateral LV (I/aVL/V5–V6). Most occluded = LAD; dominant = RCA (~85%).",g:"Anatomy"},
{t:"Conduction System",b:"<b>SA node</b> (pacemaker, fastest) → <b>AV node</b> (delay for filling) → <b>bundle of His</b> → R/L bundle branches → <b>Purkinje fibers</b>. AV node = the only normal atria-to-ventricle path; usually RCA-supplied.",g:"Anatomy"},
{t:"MI: ECG & Markers",b:"<b>Anterior</b> = V1–V4 (LAD). <b>Inferior</b> = II/III/aVF (RCA). <b>Lateral</b> = I/aVL/V5–V6 (LCX). <b>Troponin</b>: rises 2–4 h, peaks ~24 h, lasts 7–10 days. <b>CK-MB</b>: normalizes 2–3 d (best for reinfarction).",g:"Ischemia"},
{t:"Hemodynamics Formulas",b:"<b>CO = SV × HR.</b> <b>MAP = CO × TPR</b> ≈ DBP + 1/3(pulse pressure). <b>Preload</b> ≈ end-diastolic volume (↑ venous return). <b>Afterload</b> ≈ arterial pressure/SVR. Frank-Starling: ↑preload → ↑SV.",g:"Physiology"},
{t:"Heart Sounds",b:"<b>S3</b> = volume overload / dilated ventricle (CHF, MR; normal in young/pregnant). <b>S4</b> = stiff/hypertrophied ventricle (chronic HTN, AS). Wide split S2 on inspiration is normal.",g:"Physiology"},
{t:"Systolic Murmurs",b:"<b>Aortic stenosis</b> = crescendo-decrescendo → carotids (Syncope/Angina/Dyspnea). <b>Mitral regurg</b> = holosystolic → axilla. <b>MVP</b> = mid-systolic click. <b>VSD</b> = holosystolic at left sternal border.",g:"Murmurs"},
{t:"Diastolic Murmurs",b:"<b>Aortic regurg</b> = early decrescendo + wide pulse pressure + water-hammer pulses. <b>Mitral stenosis</b> = opening snap + mid-diastolic rumble (rheumatic → LA enlargement → AFib).",g:"Murmurs"},
{t:"Murmur Maneuvers",b:"<b>Inspiration</b> → ↑ right-sided. <b>Valsalva / standing</b> (↓preload) → ↑ HOCM + MVP. <b>Squatting / handgrip</b> (↑afterload/preload) → ↑ MR/AR/VSD, ↓ HOCM + AS.",g:"Murmurs"},
{t:"Congenital Heart Disease",b:"<b>Acyanotic (L→R):</b> VSD (most common overall), ASD (fixed split S2), PDA (continuous machine-like). <b>Cyanotic (R→L, 5 T's):</b> Tetralogy (most common cyanotic), Transposition, Truncus, Tricuspid atresia, TAPVR. Late reversal = Eisenmenger.",g:"Congenital"},
{t:"Tetralogy of Fallot (PROVe)",b:"<b>P</b>ulmonary stenosis (sets cyanosis severity) · <b>R</b>ight ventricular hypertrophy (boot-shaped heart) · <b>O</b>verriding aorta · <b>V</b>SD. Tet spells relieved by SQUATTING (↑afterload reduces R→L shunt).",g:"Congenital"},
{t:"Shock Types",b:"<b>Cardiogenic</b> (pump fails — cold, ↑PCWP, ↑SVR). <b>Hypovolemic</b> (cold, ↓PCWP). <b>Distributive/septic</b> (warm, ↓SVR). <b>Obstructive</b> (tamponade, massive PE, tension pneumothorax).",g:"Ischemia"},
{t:"Pericardium",b:"<b>Tamponade</b> = Beck's triad (hypotension + JVD + muffled sounds) + pulsus paradoxus + electrical alternans → pericardiocentesis. <b>Pericarditis</b> = friction rub, diffuse ST elevation, pain relieved leaning forward.",g:"Pathology"},
{t:"Vessels & Ischemia",b:"Most common atherosclerosis site = <b>abdominal aorta</b>. <b>AAA</b> = smoking. <b>Dissection</b> = HTN/Marfan, tearing pain to back, widened mediastinum. <b>Stable</b> angina = fixed plaque; <b>unstable</b> = thrombus, rest pain; <b>Prinzmetal</b> = vasospasm.",g:"Ischemia"}
];

const MODES={
  daily:{name:"Daily Rounds",ic:"❤️",desc:"15 random questions across all of cardiovascular. Quick warm-up.",pick:()=>shuffle([...QBANK]).slice(0,15)},
  endless:{name:"Endless Code",ic:"♾️",desc:"Survival mode — answer until you miss. Beat the streak.",endless:true,pick:()=>shuffle([...QBANK])},
  ana:{name:"Anatomy & Conduction",ic:"🦴",desc:"The foundation: coronary anatomy, the conduction system, and fetal shunts.",pick:()=>shuffle(QBANK.filter(q=>q.m==="ana"))},
  phys:{name:"Physiology & Hemodynamics",ic:"📈",desc:"CO/SV/preload/afterload, MAP, Frank-Starling, heart sounds, the baroreflex.",pick:()=>shuffle(QBANK.filter(q=>q.m==="phys"))},
  mur:{name:"Murmurs & Valves",ic:"🎵",desc:"AS/MR/AR/MS/MVP and the maneuvers that change each one.",pick:()=>shuffle(QBANK.filter(q=>q.m==="mur"))},
  isch:{name:"Ischemia & Vessels",ic:"🩸",desc:"Angina vs MI, the ECG leads, troponin, atherosclerosis, dissection, shock.",pick:()=>shuffle(QBANK.filter(q=>q.m==="isch"))},
  fail:{name:"Failure, Arrhythmia & Congenital",ic:"⚡",desc:"Left vs right HF, AFib/VFib, and the congenital defects (VSD, ToF, Eisenmenger).",pick:()=>shuffle(QBANK.filter(q=>q.m==="fail"))}
};
const MODE_TAGS={ana:"Anatomy / Conduction",phys:"Physiology / Hemodynamics",mur:"Murmurs / Valves",isch:"Ischemia / Vessels",fail:"Failure / Arrhythmia / Congenital"};

const SAVE_KEY="cardio_quest_v2";
let save=load();
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{best:{},endlessBest:0,played:0}}catch(e){return{best:{},endlessBest:0,played:0}}}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save))}catch(e){}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let session=null;
const app=document.getElementById("app");

function menu(){
  session=null;const m=MODES;
  app.innerHTML=`
  <div class="hdr">
    <div class="badge">♥</div>
    <h1>CARDIO QUEST</h1>
    <div class="sub">Cardiovascular System — ${QBANK.length} questions</div>
  </div>
  <div class="section-label">Quick Play</div>
  <div class="grid">${tile("daily",m.daily,"")}${tile("endless",m.endless,"amber")}</div>
  <div class="section-label">Topic Drills</div>
  <div class="grid">
    ${tile("ana",m.ana,"special")}${tile("phys",m.phys,"")}${tile("mur",m.mur,"")}${tile("isch",m.isch,"")}${tile("fail",m.fail,"")}
  </div>
  <div class="section-label">Reinforce</div>
  <div class="grid">
    <div class="tile amber" onclick="vault()">
      <div class="ic">💎</div><h3>Dirty Medicine Vault</h3>
      <p>The catchy cardio tools — coronary anatomy, ECG leads, the murmur maneuvers, congenital shunts, and more.</p>
      <div class="meta">${VAULT.length} memory tools</div>
    </div>
  </div>
  <footer>Saves to this browser via localStorage · ${save.played||0} rounds · Endless best: ${save.endlessBest||0}</footer>`;
}
function tile(key,mode,cls){
  const best=key==="endless"?(save.endlessBest||0):(save.best[key]!=null?save.best[key]+"%":"—");
  const bestLbl=key==="endless"?`Best streak: ${best}`:`Best: ${best}`;
  return `<div class="tile ${cls}" onclick="start('${key}')"><div class="ic">${mode.ic}</div><h3>${mode.name}</h3><p>${mode.desc}</p><div class="meta">${bestLbl}</div></div>`;
}
function start(key){const mode=MODES[key];const qs=mode.pick();session={key,mode,qs,i:0,correct:0,streak:0,answered:false};renderQ();}
function renderQ(){
  const s=session;
  if(!s.mode.endless&&s.i>=s.qs.length)return results();
  if(s.mode.endless&&s.i>=s.qs.length){s.qs=shuffle([...QBANK]);s.i=0;}
  const q=s.qs[s.i];
  const order=shuffle(q.c.map((t,idx)=>({t,idx})));
  s.order=order;s.correctPos=order.findIndex(o=>o.idx===q.a);
  const total=s.mode.endless?"∞":s.qs.length;const num=s.i+1;
  const pct=s.mode.endless?Math.min(100,(s.streak%15)/15*100):(num-1)/s.qs.length*100;
  const tag=MODE_TAGS[q.m]||"Mixed";
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="quiz-top"><span class="qcount">Q ${num} / ${total}</span><span class="streak">🔥 Streak ${s.streak}</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <span class="modtag">${tag}</span>
    <div class="stem">${q.q}</div>
    <div class="choices" id="ch">${order.map((o,i)=>`<div class="choice" data-i="${i}" onclick="answer(${i})"><span class="k">${String.fromCharCode(65+i)}</span><span>${o.t}</span></div>`).join("")}</div>
    <div id="post"></div>`;
}
function answer(pos){
  const s=session;if(s.answered)return;s.answered=true;
  const q=s.qs[s.i];const correct=pos===s.correctPos;
  document.querySelectorAll(".choice").forEach((n,i)=>{n.classList.add("disabled");if(i===s.correctPos)n.classList.add("correct");if(i===pos&&!correct)n.classList.add("wrong");});
  if(correct){s.correct++;s.streak++;}else{s.streak=0;}
  const post=document.getElementById("post");
  const pearl=q.p?`<div class="pearl"><b>💎 Pearl:</b> ${q.p}</div>`:"";
  post.innerHTML=`<div class="explain ${correct?"":"miss"}"><div class="lab">${correct?"✔ Correct":"✕ Review"}</div><div class="why">${q.why}</div>${pearl}</div>`;
  if(s.mode.endless&&!correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}post.innerHTML+=`<button class="btn btn-ghost" onclick="results()">End Run — Streak ${s.correct}</button>`;return;}
  if(s.mode.endless&&correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}}
  post.innerHTML+=`<button class="btn btn-next" onclick="nextQ()">${(!s.mode.endless&&s.i+1>=s.qs.length)?"SEE RESULTS":"NEXT ›"}</button>`;
}
function nextQ(){session.i++;session.answered=false;renderQ();}
function results(){
  const s=session;const got=s.correct;
  const pctNum=s.mode.endless?null:Math.round(got/s.qs.length*100);
  if(!s.mode.endless){save.best[s.key]=Math.max(save.best[s.key]||0,pctNum);}
  save.played=(save.played||0)+1;persist();
  let rank,col;const p=s.mode.endless?Math.min(100,got*5):pctNum;
  if(p>=90){rank="ATTENDING — DOMINATED";col="var(--green)"}
  else if(p>=75){rank="RESIDENT — SOLID";col="var(--cyan)"}
  else if(p>=55){rank="INTERN — GETTING THERE";col="var(--amber-hi)"}
  else{rank="MS1 — DRILL AGAIN";col="var(--red)"}
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="result">
      <div class="score-big" style="color:${col}">${s.mode.endless?got:pctNum+"%"}</div>
      <div class="rank" style="color:${col}">${s.mode.endless?"STREAK: "+got:rank}</div>
      <div class="statrow">
        <div><b>${got}</b>${s.mode.endless?"in a row":"correct"}</div>
        ${s.mode.endless?"":`<div><b>${s.qs.length-got}</b>missed</div>`}
        <div><b>${s.mode.endless?(save.endlessBest||0):(save.best[s.key]+"%")}</b>best</div>
      </div>
      <button class="btn btn-next" style="max-width:300px;margin:0 auto" onclick="start('${s.key}')">RUN IT AGAIN</button>
      <button class="btn btn-ghost" style="max-width:300px;margin:14px auto 0" onclick="menu()">BACK TO MENU</button>
    </div>`;
}
function vault(){
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="hdr" style="padding-top:6px">
      <h1 style="color:var(--amber-hi);font-size:28px">💎 Dirty Medicine Vault</h1>
      <div class="sub">Cardio memory tools — catchy on purpose</div>
    </div>
    ${VAULT.map(v=>`<div class="vault-card"><h4>${v.t}</h4><p>${v.b}</p><span class="tag">▸ ${v.g}</span></div>`).join("")}
    <button class="btn btn-ghost" style="width:100%" onclick="menu()">BACK TO MENU</button>`;
}
document.addEventListener("keydown",e=>{
  if(!session||session.answered)return;
  const map={"1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3};
  const k=e.key.toLowerCase();
  if(map[k]!=null&&session.order&&map[k]<session.order.length)answer(map[k]);
});
</script>
<script src="arcade_upgrade.js"></script>
<script src="supabase_config.js"></script>

menu();
</script>
