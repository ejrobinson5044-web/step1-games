<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DISSECTION DOJO — Gross Anatomy</title>
<link href="https://fonts.googleapis.com/css2?family=Spectral:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0f0a0c;
  --bg2:#170d10;
  --panel:#1f1418;
  --panel-hi:#2a1c20;
  --cyan:#be123c;        /* oxblood/wine primary */
  --cyan-dim:#881337;
  --amber:#cbb389;       /* bone/parchment accent */
  --amber-hi:#e3d2ac;
  --red:#94a3b8;         /* slate used for WRONG (avoids clash with wine primary) */
  --green:#4ade80;
  --text:#fbe8ec;
  --dim:#b89aa2;
  --line:rgba(190,18,60,.16);
  --glow:rgba(190,18,60,.4);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 16% 0%,rgba(190,18,60,.13),transparent 55%),
    radial-gradient(ellipse at 88% 100%,rgba(203,179,137,.06),transparent 55%),
    linear-gradient(180deg,#0f0a0c,#170d10);
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:30px 30px;
  mask-image:radial-gradient(ellipse at center,#000 30%,transparent 86%);
}
#app{position:relative;z-index:1;max-width:880px;margin:0 auto;padding:18px}

.hdr{text-align:center;padding:18px 0 16px;border-bottom:2px solid var(--cyan-dim);margin-bottom:20px}
.badge{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:14px;
  background:linear-gradient(150deg,var(--cyan),var(--cyan-dim));color:#fbe8ec;
  font-family:'Spectral';font-weight:800;font-size:26px;margin-bottom:8px;box-shadow:0 0 24px var(--glow)}
h1{font-family:'Spectral';font-weight:800;font-size:34px;letter-spacing:.2px;color:var(--cyan)}
.sub{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);letter-spacing:2px;margin-top:5px;text-transform:uppercase}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:8px}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.tile::after{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--cyan);opacity:.65}
.tile:hover{transform:translateY(-3px);border-color:var(--cyan);box-shadow:0 8px 26px rgba(0,0,0,.55)}
.tile.amber::after{background:var(--amber)}
.tile.special::after{background:linear-gradient(var(--amber),var(--cyan))}
.tile .ic{font-size:24px}
.tile h3{font-family:'Spectral';font-weight:700;font-size:18px;margin:7px 0 5px;letter-spacing:.1px;line-height:1.25}
.tile p{font-size:12.5px;color:var(--dim);line-height:1.45}
.tile .meta{font-family:'JetBrains Mono';font-size:10px;color:var(--cyan);margin-top:9px;letter-spacing:1px}
.tile.amber .meta{color:var(--amber-hi)}

.section-label{font-family:'JetBrains Mono';font-size:10px;letter-spacing:3px;color:var(--dim);text-transform:uppercase;margin:22px 0 10px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--line)}

.quiz-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-family:'JetBrains Mono';font-size:12px}
.qcount{color:var(--dim)}
.streak{color:var(--amber-hi)}
.bar{height:6px;background:var(--panel);border-radius:4px;overflow:hidden;margin-bottom:18px}
.bar>span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:.3s}
.modtag{display:inline-block;font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;color:var(--cyan);border:1px solid var(--cyan-dim);border-radius:20px;padding:3px 11px;margin-bottom:14px;text-transform:uppercase}
.stem{font-size:18.5px;line-height:1.5;font-weight:500;margin-bottom:20px}
.choices{display:flex;flex-direction:column;gap:11px}
.choice{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:14px 16px;cursor:pointer;transition:.14s;font-size:15.5px;display:flex;gap:12px;align-items:flex-start}
.choice .k{font-family:'JetBrains Mono';font-size:13px;color:var(--cyan);font-weight:600;flex-shrink:0}
.choice:hover{border-color:var(--cyan);background:var(--panel-hi)}
.choice.correct{border-color:var(--green);background:rgba(74,222,128,.13)}
.choice.correct .k{color:var(--green)}
.choice.wrong{border-color:var(--red);background:rgba(148,163,184,.14)}
.choice.wrong .k{color:var(--red)}
.choice.disabled{pointer-events:none;opacity:.85}

.explain{margin-top:18px;border-radius:12px;padding:15px 16px;background:var(--panel);border-left:3px solid var(--cyan);animation:rise .25s ease}
.explain.miss{border-left-color:var(--red)}
@keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.explain .lab{font-family:'JetBrains Mono';font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin-bottom:6px}
.explain .why{font-size:14.5px;line-height:1.5}
.pearl{margin-top:11px;background:rgba(203,179,137,.10);border:1px dashed var(--amber);border-radius:10px;padding:11px 13px;font-size:14px;line-height:1.5}
.pearl b{color:var(--amber-hi);font-family:'Spectral';font-weight:800;font-size:13px}

.btn{font-family:'Spectral';font-weight:800;letter-spacing:.2px;border:none;border-radius:10px;padding:13px 22px;cursor:pointer;font-size:16px;transition:.15s}
.btn-next{background:linear-gradient(145deg,var(--cyan),var(--cyan-dim));color:#fbe8ec;margin-top:18px;width:100%}
.btn-next:hover{box-shadow:0 0 18px var(--glow)}
.btn-ghost{background:transparent;border:1px solid var(--line);color:var(--dim);margin-top:18px}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan)}

.result{text-align:center;padding:30px 16px}
.score-big{font-family:'Spectral';font-weight:800;font-size:64px;color:var(--cyan);line-height:1}
.rank{font-family:'JetBrains Mono';font-size:13px;letter-spacing:3px;text-transform:uppercase;margin:10px 0 22px}
.statrow{display:flex;justify-content:center;gap:30px;margin-bottom:24px}
.statrow div{font-family:'JetBrains Mono';font-size:12px;color:var(--dim)}
.statrow b{display:block;font-size:26px;color:var(--text);font-family:'Spectral';font-weight:800}

.vault-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:12px;border-left:3px solid var(--amber)}
.vault-card h4{font-family:'Spectral';font-weight:800;color:var(--amber-hi);font-size:17px;margin-bottom:7px;letter-spacing:.1px;line-height:1.25}
.vault-card p{font-size:14px;line-height:1.55;color:var(--text)}
.vault-card .tag{font-family:'JetBrains Mono';font-size:10px;color:var(--dim);letter-spacing:1px;display:block;margin-top:7px}

.back{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);cursor:pointer;letter-spacing:1px;display:inline-flex;gap:6px;align-items:center;margin-bottom:16px}
.back:hover{color:var(--cyan)}
footer{text-align:center;font-family:'JetBrains Mono';font-size:10px;color:var(--dim);margin:28px 0 8px;letter-spacing:1px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* correct = index into c[]; choices shuffle at render. Stems never contain the answer. */
const QBANK=[
/* ===== HERNIAS & THE INGUINAL CANAL ===== */
{m:"hern",q:"An inguinal hernia that protrudes through the deep inguinal ring LATERAL to the inferior epigastric vessels, often descending into the scrotum, is which type?",c:["Indirect inguinal hernia","Direct inguinal hernia","Femoral hernia","Umbilical hernia"],a:0,why:"Indirect inguinal hernias pass through the deep (internal) ring lateral to the inferior epigastric vessels (from a patent processus vaginalis) → into the scrotum; common in infants/young males. Covered by all three spermatic fascia layers.",p:"Indirect = through deep ring, <b>LATERAL</b> to inferior epigastrics, into scrotum, patent processus vaginalis (young males).",v:"A young man has a hernia entering the deep inguinal ring lateral to the inferior epigastric vessels and descending toward the scrotum. Which hernia is this?"},
{m:"hern",q:"An inguinal hernia that protrudes MEDIAL to the inferior epigastric vessels through Hesselbach triangle, bulging through the superficial ring, typically in older men, is which type?",c:["Direct inguinal hernia","Indirect inguinal hernia","Femoral hernia","Paraesophageal hernia"],a:0,why:"Direct inguinal hernias push through the weakened transversalis fascia of Hesselbach triangle, medial to the inferior epigastric vessels; acquired, in older men. They go through the superficial ring only (not into the scrotum typically).",p:"Direct = through Hesselbach triangle, <b>MEDIAL</b> to inferior epigastrics (older men, acquired wall weakness). 'MD's don't LIE: Medial=Direct.'",v:"An older man has a groin bulge that pushes through Hesselbach triangle medial to the inferior epigastric vessels. Which hernia is this?"},
{m:"hern",q:"The borders of Hesselbach triangle are the rectus abdominis medially, the inguinal ligament inferiorly, and WHAT laterally?",c:["The inferior epigastric vessels","The femoral artery","The spermatic cord","The external oblique aponeurosis"],a:0,why:"Hesselbach triangle = rectus abdominis (medial), inguinal ligament (inferior), inferior epigastric vessels (lateral). Direct hernias occur within it.",p:"Hesselbach triangle: rectus (medial), inguinal ligament (inferior), <b>inferior epigastric vessels</b> (lateral) = site of DIRECT hernias.",v:"A surgeon outlines Hesselbach triangle using the rectus abdominis and inguinal ligament. Which structure forms the lateral border?"},
{m:"hern",q:"A hernia protruding BELOW the inguinal ligament through the femoral canal (medial to the femoral vein), more common in women and prone to strangulation, is which type?",c:["Femoral hernia","Direct inguinal hernia","Indirect inguinal hernia","Umbilical hernia"],a:0,why:"Femoral hernias pass below the inguinal ligament into the femoral canal, medial to the femoral vein; more common in women; highest risk of incarceration/strangulation because of the narrow, rigid canal.",p:"Femoral hernia = BELOW inguinal ligament, medial to the vein, <b>women</b>, highest strangulation risk.",v:"A woman has a painful groin hernia below the inguinal ligament, medial to the femoral vein, with high incarceration risk. Which hernia is this?"},
{m:"hern",q:"Relative to the inferior epigastric vessels, an INDIRECT inguinal hernia is located where?",c:["Lateral","Medial","Superior","Posterior"],a:0,why:"'MD's don't LIE': Medial = Direct, Lateral = Indirect. The indirect hernia exits the deep ring, which sits lateral to the inferior epigastric vessels.",p:"<b>L</b>ateral = Indirect, <b>M</b>edial = Direct (relative to inferior epigastric vessels).",v:"A hernia passes through the deep inguinal ring. Relative to the inferior epigastric vessels, where is it located?"},
{m:"hern",q:"In females, the inguinal canal transmits which structure (in place of the spermatic cord)?",c:["The round ligament of the uterus","The ovarian artery","The ureter","The broad ligament"],a:0,why:"The round ligament of the uterus passes through the female inguinal canal (and the genital branch of the genitofemoral nerve). The ovarian vessels travel via the suspensory ligament, not the canal.",p:"Female inguinal canal = <b>round ligament of the uterus</b> (+ genital branch of genitofemoral nerve).",v:"A female patient has a structure passing through the inguinal canal toward the labia majora. Which structure is this?"},
{m:"hern",q:"The most common type of hiatal hernia, in which the gastroesophageal junction moves upward through the diaphragm and which is associated with reflux, is which type?",c:["Sliding hiatal hernia","Paraesophageal hernia","Femoral hernia","Direct inguinal hernia"],a:0,why:"Sliding hiatal hernia (~95%): the GE junction and cardia slide above the diaphragm ('hourglass' stomach) → associated with GERD. Treated medically for reflux.",p:"Sliding hiatal hernia = GE junction slips up ('hourglass'), MOST common, → GERD."},
{m:"hern",q:"In which hiatal hernia does the gastric FUNDUS herniate up beside the esophagus while the gastroesophageal junction stays in place (risking strangulation)?",c:["Paraesophageal hernia","Sliding hiatal hernia","Umbilical hernia","Indirect inguinal hernia"],a:0,why:"Paraesophageal hernia: the fundus herniates alongside the esophagus while the GE junction remains below the diaphragm; reflux is uncommon but there is a strangulation risk → often repaired surgically.",p:"Paraesophageal = fundus up, GE junction stays put → <b>strangulation risk</b> (usually surgical)."},

/* ===== ABDOMINAL WALL & LANDMARKS ===== */
{m:"wall",q:"Which abdominal wall muscle's aponeurosis forms the inguinal ligament and the external spermatic fascia?",c:["External oblique","Internal oblique","Transversus abdominis","Rectus abdominis"],a:0,why:"The external oblique aponeurosis forms the inguinal ligament (ASIS to pubic tubercle) and contributes the external spermatic fascia to the cord. Internal oblique → cremaster; transversalis fascia → internal spermatic fascia.",p:"External oblique → inguinal ligament + external spermatic fascia. (Internal oblique → cremaster; transversalis → internal spermatic.)"},
{m:"wall",q:"The cremaster muscle, which covers the spermatic cord and produces the cremasteric reflex, is derived from which muscle layer?",c:["Internal oblique","External oblique","Transversus abdominis","Transversalis fascia"],a:0,why:"The cremaster is derived from the internal oblique. The cremasteric reflex is mediated by the genitofemoral nerve (L1–L2); absence suggests testicular torsion.",p:"Cremaster = from <b>internal oblique</b>. Cremasteric reflex = genitofemoral nerve (L1–L2); absent in torsion."},
{m:"wall",q:"Below the arcuate line, the posterior rectus sheath is absent because all three aponeuroses pass WHERE relative to the rectus abdominis?",c:["Anterior to it (in front)","Posterior to it (behind)","They split around it equally","Lateral to it only"],a:0,why:"Below the arcuate line (~midway between umbilicus and pubis), the aponeuroses of all three flat muscles pass anterior to the rectus → no posterior sheath; only transversalis fascia lies behind the muscle there.",p:"Below the arcuate line: all aponeuroses go <b>anterior</b> → no posterior rectus sheath (transversalis fascia only behind)."},
{m:"wall",q:"Maximal tenderness at McBurney point (one-third of the way from the anterior superior iliac spine to the umbilicus) suggests inflammation of which structure?",c:["The appendix","The gallbladder","The spleen","The left kidney"],a:0,why:"McBurney point marks the typical surface location of the appendix base → tenderness there suggests appendicitis. (Murphy sign = gallbladder; costovertebral angle = kidney.)",p:"McBurney point tenderness = <b>appendicitis</b> (1/3 from ASIS to umbilicus)."},
{m:"wall",q:"The inguinal ligament runs between the pubic tubercle and which bony landmark?",c:["The anterior superior iliac spine","The ischial spine","The pubic symphysis","The midpoint of the iliac crest"],a:0,why:"The inguinal ligament (the folded lower border of the external oblique aponeurosis) spans the anterior superior iliac spine to the pubic tubercle, forming the floor of the inguinal canal.",p:"Inguinal ligament = <b>ASIS → pubic tubercle</b> (lower border of external oblique aponeurosis)."},
{m:"wall",q:"The umbilicus corresponds to which spinal dermatome?",c:["T10","T4","L1","L4"],a:0,why:"Dermatome landmarks: T4 = nipple, T6 = xiphoid, T10 = umbilicus, L1 = inguinal/groin. 'T10 at the belly butTEN.'",p:"Dermatomes: T4 nipple, T6 xiphoid, <b>T10 umbilicus</b>, L1 inguinal. ('belly-butTEN = T10.')"},
{m:"wall",q:"The midline tendinous raphe between the two rectus abdominis muscles, a relatively avascular surgical landmark, is called what?",c:["The linea alba","The linea semilunaris","The arcuate line","The conjoint tendon"],a:0,why:"The linea alba is the avascular midline fusion of the rectus sheaths (good for vertical incisions). The linea semilunaris is the lateral border of the rectus.",p:"Linea alba = avascular midline raphe (vertical-incision landmark). Linea semilunaris = lateral rectus border."},
{m:"wall",q:"Within the femoral triangle, from lateral to medial the order is femoral Nerve, Artery, Vein — then what (the site of femoral hernias)?",c:["The femoral canal (empty space / lymphatics)","Another femoral nerve","The inguinal ligament","The pubic tubercle"],a:0,why:"Femoral region lateral→medial = Nerve, Artery, Vein, Empty space (canal), Lymphatics ('NAVEL'). The femoral canal (empty space) is where femoral hernias descend. The nerve lies OUTSIDE the femoral sheath.",p:"Femoral region (lateral→medial) = <b>NAVEL</b>: Nerve, Artery, Vein, Empty space (canal = hernia site), Lymphatics."},

/* ===== PEDIATRIC GI EMERGENCIES ===== */
{m:"peds",q:"A 4-week-old has NONbilious projectile vomiting and a palpable olive-shaped epigastric mass, with a hypochloremic hypokalemic metabolic alkalosis. What is the diagnosis?",c:["Hypertrophic pyloric stenosis","Duodenal atresia","Intussusception","Midgut volvulus"],a:0,why:"Pyloric stenosis (firstborn males, 3–6 weeks): hypertrophied pylorus → nonbilious projectile vomiting, palpable 'olive,' visible peristalsis, and a hypochloremic hypokalemic metabolic alkalosis (vomiting HCl). Treat with pyloromyotomy.",p:"Pyloric stenosis = 3–6 wk, NONbilious projectile vomit, palpable olive, <b>hypochloremic hypokalemic metabolic alkalosis</b>. Tx: pyloromyotomy."},
{m:"peds",q:"A newborn with Down syndrome has bilious vomiting and a 'double bubble' sign on abdominal x-ray. What is the diagnosis?",c:["Duodenal atresia","Pyloric stenosis","Hirschsprung disease","Necrotizing enterocolitis"],a:0,why:"Duodenal atresia (failure to recanalize) → 'double bubble' (distended stomach + proximal duodenum), bilious vomiting, strongly associated with Down syndrome.",p:"Duodenal atresia = <b>double bubble</b> + bilious vomiting + Down syndrome (failure to recanalize)."},
{m:"peds",q:"A 1-year-old has episodic colicky abdominal pain, draws the legs up, and passes 'currant jelly' stool, with a target/bull's-eye sign on ultrasound. What is the diagnosis?",c:["Intussusception","Pyloric stenosis","Midgut volvulus","Appendicitis"],a:0,why:"Intussusception (telescoping of bowel, usually ileocolic, 6 mo–2 yr): colicky pain with legs drawn up, currant-jelly stools, sausage-shaped mass, target sign on ultrasound. Often post-viral or with a Meckel/lymphoma lead point. Air/contrast enema is diagnostic and therapeutic.",p:"Intussusception = currant-jelly stool + <b>target sign</b>, 6 mo–2 yr. Air/contrast enema = dx AND tx."},
{m:"peds",q:"A neonate has sudden BILIOUS vomiting and a 'corkscrew' duodenum on upper GI series, from twisting of the midgut around the superior mesenteric artery. What is the diagnosis?",c:["Malrotation with midgut volvulus","Pyloric stenosis","Duodenal atresia","Intussusception"],a:0,why:"Malrotation with midgut volvulus: the bowel twists around the SMA pedicle (Ladd bands) → bilious vomiting and a 'corkscrew' on upper GI. A surgical emergency (risk of midgut ischemia/necrosis).",p:"Malrotation/volvulus = bilious vomiting + <b>corkscrew</b> on upper GI = surgical EMERGENCY (midgut ischemia)."},
{m:"peds",q:"A newborn fails to pass meconium in the first 48 hours and has abdominal distension; rectal biopsy shows ABSENT ganglion cells. What is the diagnosis?",c:["Hirschsprung disease","Pyloric stenosis","Duodenal atresia","Intussusception"],a:0,why:"Hirschsprung disease: failed neural-crest migration → absent ganglion cells (Auerbach/Meissner plexuses) in the distal colon → no peristalsis, failure to pass meconium, distension. Associated with Down syndrome; rectal suction biopsy confirms.",p:"Hirschsprung = no meconium in 48 h + <b>absent ganglion cells</b> (failed neural-crest migration). Rectal biopsy confirms."},
{m:"peds",q:"A premature, formula-fed neonate develops abdominal distension, bloody stools, and 'pneumatosis intestinalis' (air in the bowel wall) on x-ray. What is the diagnosis?",c:["Necrotizing enterocolitis","Hirschsprung disease","Intussusception","Pyloric stenosis"],a:0,why:"Necrotizing enterocolitis (premature, formula-fed): ischemic/inflammatory bowel necrosis → distension, bloody stools, and pneumatosis intestinalis (pathognomonic air in the bowel wall). Can progress to perforation.",p:"NEC = premature + bloody stools + <b>pneumatosis intestinalis</b>. Risk of perforation; stop feeds."},
{m:"peds",q:"Painless lower GI bleeding in a 2-year-old, from a TRUE diverticulum containing ectopic gastric mucosa (a persistent vitelline duct remnant), is which condition?",c:["Meckel diverticulum","Intussusception","Hirschsprung disease","Duodenal atresia"],a:0,why:"Meckel diverticulum (rule of 2s: 2% of people, 2 feet from ileocecal valve, 2 inches long, by age 2): a true diverticulum from a persistent vitelline (omphalomesenteric) duct, often with ectopic gastric/pancreatic tissue → painless bleeding. Technetium-99m (Meckel) scan.",p:"Meckel = <b>rule of 2s</b>, ectopic gastric mucosa, painless bleed, vitelline duct remnant. Tc-99m scan."},
{m:"peds",q:"A newborn drools excessively, coughs and turns cyanotic with feeds, and a nasogastric tube coils in the upper chest. What is the most likely diagnosis?",c:["Esophageal atresia with tracheoesophageal fistula","Pyloric stenosis","Duodenal atresia","Hirschsprung disease"],a:0,why:"Esophageal atresia with distal tracheoesophageal fistula (most common type): drooling, choking/cyanosis with feeds, inability to pass an NG tube (coils in the upper pouch), and polyhydramnios. Part of the VACTERL association.",p:"EA/TEF = drooling + can't pass NG tube (coils) + choking with feeds. Polyhydramnios; <b>VACTERL</b> association."},

/* ===== VISCERA & VASCULATURE ===== */
{m:"vasc",q:"Which artery supplies the foregut — the stomach, liver, gallbladder, spleen, and proximal duodenum?",c:["The celiac trunk","The superior mesenteric artery","The inferior mesenteric artery","The internal iliac artery"],a:0,why:"The celiac trunk (T12) supplies foregut derivatives. Foregut pain refers to the epigastrium.",p:"Foregut = <b>celiac trunk</b> (T12) → stomach, liver, gallbladder, spleen, proximal duodenum. Epigastric referred pain."},
{m:"vasc",q:"Which artery supplies the midgut — from the distal duodenum to the proximal two-thirds of the transverse colon?",c:["The superior mesenteric artery","The celiac trunk","The inferior mesenteric artery","The splenic artery"],a:0,why:"The SMA (L1) supplies midgut derivatives. Midgut pain refers to the periumbilical region (e.g., early appendicitis). SMA syndrome compresses the third part of the duodenum.",p:"Midgut = <b>SMA</b> (L1) → distal duodenum to proximal 2/3 transverse colon. Periumbilical referred pain."},
{m:"vasc",q:"Which artery supplies the hindgut — from the distal third of the transverse colon to the upper rectum?",c:["The inferior mesenteric artery","The superior mesenteric artery","The celiac trunk","The external iliac artery"],a:0,why:"The IMA (L3) supplies hindgut derivatives. Hindgut pain refers to the hypogastrium/suprapubic region.",p:"Hindgut = <b>IMA</b> (L3) → distal 1/3 transverse colon to upper rectum. Hypogastric referred pain."},
{m:"vasc",q:"Which of the following is a RETROPERITONEAL structure?",c:["The ascending and descending colon","The transverse colon","The sigmoid colon","The stomach"],a:0,why:"Retroperitoneal structures ('SAD PUCKER'): Suprarenals, Aorta/IVC, Duodenum (2nd–4th), Pancreas (except tail), Ureters, Colon (ascending/descending), Kidneys, Esophagus (lower), Rectum. Transverse/sigmoid colon and stomach are intraperitoneal.",p:"Retroperitoneal = <b>SAD PUCKER</b>. Ascending/descending colon are retroperitoneal; transverse/sigmoid are not."},
{m:"vasc",q:"Esophageal varices in portal hypertension result from anastomosis between the left gastric vein and which systemic vein?",c:["The azygos vein","The inferior mesenteric vein","The splenic vein","The renal vein"],a:0,why:"Portosystemic shunts: esophageal varices = left gastric (portal) ↔ azygos (systemic); caput medusae = paraumbilical ↔ epigastric; anorectal varices = superior rectal ↔ middle/inferior rectal. TIPS decompresses them.",p:"Esophageal varices = left gastric ↔ <b>azygos</b>. (Caput medusae = paraumbilical↔epigastric; anorectal = rectal veins.)"},
{m:"vasc",q:"Ischemic colitis classically strikes the 'watershed' region at the splenic flexure, between the territories of the SMA and which artery?",c:["The inferior mesenteric artery","The celiac trunk","The internal iliac artery","The superior mesenteric artery"],a:0,why:"Watershed zones (vulnerable to hypoperfusion): splenic flexure (SMA/IMA border) and rectosigmoid junction (IMA/internal iliac). These get ischemic in hypotension.",p:"Colonic watershed = splenic flexure (<b>SMA/IMA</b>) + rectosigmoid (IMA/internal iliac). Ischemic in hypotension."},
{m:"vasc",q:"The common bile duct is formed by the union of the common hepatic duct and which structure?",c:["The cystic duct","The pancreatic duct","The right hepatic duct","The ampulla of Vater"],a:0,why:"Common hepatic duct + cystic duct = common bile duct, which joins the pancreatic duct at the ampulla of Vater (sphincter of Oddi). A stone in the cystic duct → cholecystitis; in the CBD → obstructive jaundice/cholangitis.",p:"CBD = common hepatic duct + <b>cystic duct</b>. Joins pancreatic duct at ampulla of Vater (sphincter of Oddi)."},
{m:"vasc",q:"The hepatoduodenal ligament contains three structures — the common bile duct, the hepatic artery, and what third structure (compressed in the Pringle maneuver)?",c:["The portal vein","The inferior vena cava","The splenic vein","The superior mesenteric artery"],a:0,why:"The portal triad (in the hepatoduodenal ligament) = common bile duct, proper hepatic artery, and portal vein. The Pringle maneuver clamps this ligament to control bleeding and helps localize the epiploic foramen.",p:"Portal triad = CBD + hepatic artery + <b>portal vein</b> (in hepatoduodenal ligament; clamped in Pringle maneuver)."},

/* ===== PELVIS / PERINEUM / RETROPERITONEUM ===== */
{m:"pelv",q:"During a hysterectomy, the ureter is at risk because it passes directly UNDER which structure ('water under the bridge')?",c:["The uterine artery","The ovarian artery","The internal iliac vein","The round ligament"],a:0,why:"'Water (ureter) under the bridge (uterine artery)': the ureter passes inferior to the uterine artery near the cervix → easily injured/ligated in hysterectomy. In males the ureter passes under the ductus deferens.",p:"'Water under the bridge': ureter runs UNDER the <b>uterine artery</b> (at risk in hysterectomy)."},
{m:"pelv",q:"Sensory and motor innervation of the perineum (including the external urethral and anal sphincters), derived from S2–S4, comes from which nerve?",c:["The pudendal nerve","The obturator nerve","The femoral nerve","The genitofemoral nerve"],a:0,why:"The pudendal nerve (S2–S4) supplies the perineum and external sphincters; blocked at the ischial spine for delivery. 'S2,3,4 keep the pee/poop off the floor.'",p:"Pudendal nerve = <b>S2–S4</b>, perineum + external sphincters. Block at the ischial spine. ('S2,3,4...')"},
{m:"pelv",q:"Which muscle group forms the pelvic diaphragm that supports the pelvic organs and maintains continence?",c:["The levator ani","The rectus abdominis","The psoas major","The external oblique"],a:0,why:"The levator ani (puborectalis, pubococcygeus, iliococcygeus) plus coccygeus form the pelvic diaphragm. Weakness → prolapse and stress incontinence (Kegel exercises strengthen it).",p:"Pelvic diaphragm = <b>levator ani</b> (puborectalis + pubococcygeus + iliococcygeus). Weakness → prolapse/incontinence."},
{m:"pelv",q:"The LEFT gonadal (testicular/ovarian) vein drains into which vessel, explaining why varicoceles are usually left-sided?",c:["The left renal vein","The inferior vena cava directly","The portal vein","The splenic vein"],a:0,why:"The left gonadal vein drains into the left renal vein (longer, higher-pressure, joins at a right angle) → left-sided varicoceles; can be compressed in 'nutcracker syndrome.' The right gonadal vein drains directly into the IVC.",p:"Left gonadal vein → <b>left renal vein</b> (right gonadal → IVC). Why varicoceles are usually LEFT-sided."},
{m:"pelv",q:"Pain on extension of the right hip (a positive 'psoas sign') suggests irritation of the psoas muscle, classically from what?",c:["Retrocecal appendicitis (or a psoas abscess)","Acute cholecystitis","Acute pancreatitis","Sigmoid diverticulitis"],a:0,why:"A retrocecal appendix or a psoas abscess irritates the iliopsoas → pain on hip extension (psoas sign). Obturator sign (pain on internal rotation) suggests a pelvic appendix.",p:"Psoas sign (pain on hip extension) = <b>retrocecal appendicitis</b> or psoas abscess."},
{m:"pelv",q:"Cancer of the testis spreads to which lymph nodes (NOT the inguinal nodes), because of its embryologic origin?",c:["Para-aortic (retroperitoneal) lymph nodes","Superficial inguinal nodes","External iliac nodes","Popliteal nodes"],a:0,why:"The testes descend from the abdomen, so their lymphatics drain to para-aortic (retroperitoneal) nodes. The scrotal skin drains to superficial inguinal nodes. Lymphatic drainage follows embryologic origin.",p:"Testis → <b>para-aortic nodes</b> (embryologic origin). Scrotum skin → superficial inguinal nodes."},
{m:"pelv",q:"Internal hemorrhoids (above the pectinate line) are PAINLESS because that region receives what kind of innervation?",c:["Visceral (autonomic) innervation","Somatic innervation","No innervation at all","Purely sympathetic innervation"],a:0,why:"Above the pectinate line = visceral (autonomic) innervation (painless internal hemorrhoids, portal drainage via superior rectal, adenocarcinoma). Below = somatic pudendal innervation (painful external hemorrhoids, systemic drainage, squamous cell carcinoma).",p:"Above pectinate line = <b>visceral</b> (painLESS, portal drainage, adenocarcinoma). Below = somatic (painful, squamous)."},
{m:"pelv",q:"The esophagus and the vagus nerves pass through the diaphragm at which vertebral level?",c:["T10","T8","T12","T6"],a:0,why:"Diaphragm apertures: T8 = IVC ('I 8 eggs'), T10 = esophagus + vagal trunks ('10 eggs at the dinner table'), T12 = aorta + thoracic duct + azygos ('12 aortic').",p:"Diaphragm: <b>T8 IVC, T10 esophagus + vagus, T12 aorta</b> (+ thoracic duct + azygos). 'I 8, 10 at dinner, 12 aortic.'"}
];

const VAULT=[
{t:"Inguinal Hernias — MD's don't LIE",b:"<b>Medial = Direct</b> (through Hesselbach triangle, medial to inferior epigastrics, older men, acquired, bulges through superficial ring only). <b>Lateral = Indirect</b> (through deep ring lateral to inferior epigastrics, into scrotum, patent processus vaginalis, young males, covered by all 3 spermatic fascia).",g:"Hernias"},
{t:"Hesselbach Triangle",b:"Borders = rectus abdominis (medial), inguinal ligament (inferior), <b>inferior epigastric vessels</b> (lateral). It is the site of DIRECT inguinal hernias.",g:"Hernias"},
{t:"Femoral Hernia",b:"Passes BELOW the inguinal ligament through the femoral canal, medial to the femoral vein. More common in <b>women</b>; HIGHEST risk of incarceration/strangulation (narrow rigid canal). NAVEL: Nerve (outside sheath), Artery, Vein, Empty space (canal = hernia site), Lymphatics.",g:"Hernias"},
{t:"Hiatal Hernias",b:"<b>Sliding</b> (~95%): GE junction slides up ('hourglass') → GERD; usually medical management. <b>Paraesophageal</b>: fundus herniates beside the esophagus, GE junction stays put → strangulation risk → often surgical.",g:"Hernias"},
{t:"Abdominal Wall & Cord Layers",b:"Outside→in: skin → Camper's (fatty) → Scarpa's (membranous) → external oblique → internal oblique → transversus → transversalis fascia → peritoneum. Cord coverings: external spermatic (ext. oblique), cremaster (int. oblique), internal spermatic (transversalis).",g:"Wall"},
{t:"Dermatome Landmarks",b:"<b>T4</b> nipple · <b>T6</b> xiphoid · <b>T10</b> umbilicus ('belly-butTEN') · <b>L1</b> inguinal/groin. (Also: C6 thumb, C8 little finger, L4 knee, S1 little toe.)",g:"Wall"},
{t:"Pyloric Stenosis vs Duodenal Atresia",b:"<b>Pyloric stenosis</b>: 3–6 wk, NONbilious projectile vomit, palpable olive, hypochloremic hypokalemic metabolic alkalosis → pyloromyotomy. <b>Duodenal atresia</b>: newborn, BILIOUS vomit, double bubble, Down syndrome.",g:"Peds GI"},
{t:"Bilious-Vomiting Emergencies",b:"<b>Malrotation/midgut volvulus</b> (corkscrew on upper GI, Ladd bands, SURGICAL emergency — midgut ischemia). <b>Duodenal atresia</b> (double bubble). <b>Jejunal/ileal atresia</b> (apple-peel; in-utero vascular accident, linked to maternal cocaine/smoking).",g:"Peds GI"},
{t:"Other Peds GI",b:"<b>Intussusception</b> (6 mo–2 yr, currant-jelly stool, target sign, post-viral/Meckel lead point; enema = dx+tx). <b>Hirschsprung</b> (no meconium 48 h, absent ganglion cells, Down). <b>NEC</b> (premature, pneumatosis intestinalis, bloody stools). <b>Meckel</b> (rule of 2s, ectopic gastric mucosa, painless bleed, Tc-99m scan).",g:"Peds GI"},
{t:"Gut Blood Supply",b:"<b>Foregut</b> = celiac (T12) → epigastric pain. <b>Midgut</b> = SMA (L1) → periumbilical pain. <b>Hindgut</b> = IMA (L3) → hypogastric pain. Watershed: splenic flexure (SMA/IMA) + rectosigmoid. SMA syndrome compresses the 3rd part of duodenum.",g:"Viscera"},
{t:"Retroperitoneal — SAD PUCKER",b:"<b>S</b>uprarenals, <b>A</b>orta/IVC, <b>D</b>uodenum (2nd–4th), <b>P</b>ancreas (except tail), <b>U</b>reters, <b>C</b>olon (ascending/descending), <b>K</b>idneys, <b>E</b>sophagus (lower), <b>R</b>ectum.",g:"Viscera"},
{t:"Portosystemic Anastomoses",b:"<b>Esophageal varices</b> = left gastric ↔ azygos. <b>Caput medusae</b> = paraumbilical ↔ epigastric. <b>Anorectal varices</b> = superior rectal ↔ middle/inferior rectal. Decompressed by TIPS.",g:"Viscera"},
{t:"Pectinate (Dentate) Line",b:"<b>Above</b> = visceral (autonomic): internal hemorrhoids PAINLESS, superior rectal (portal) drainage, adenocarcinoma. <b>Below</b> = somatic (pudendal): external hemorrhoids PAINFUL, inferior rectal→internal iliac drainage, squamous cell carcinoma.",g:"Pelvis"},
{t:"Pelvis Pearls",b:"Ureter = 'water under the bridge' (under uterine artery / ductus deferens). Pudendal nerve S2–S4 ('keep pee/poop off the floor'). Left gonadal vein → left renal vein (left varicocele; nutcracker). Testicular cancer → para-aortic nodes (not inguinal). Diaphragm: T8 IVC, T10 esophagus+vagus, T12 aorta.",g:"Pelvis"}
];

const MODES={
  daily:{name:"Daily Drill",ic:"🥋",desc:"15 random questions across the whole dojo. Quick warm-up.",pick:()=>shuffle([...QBANK]).slice(0,15)},
  endless:{name:"Endless Sparring",ic:"♾️",desc:"Survival mode — answer until you miss. Beat the streak.",endless:true,pick:()=>shuffle([...QBANK])},
  hern:{name:"Hernias & the Inguinal Canal",ic:"🦴",desc:"Your blind spot, head-on: direct vs indirect, femoral, Hesselbach, and hiatal hernias.",pick:()=>shuffle(QBANK.filter(q=>q.m==="hern"))},
  wall:{name:"Abdominal Wall & Landmarks",ic:"🧱",desc:"Wall layers, cord coverings, the arcuate line, dermatomes, and surface landmarks.",pick:()=>shuffle(QBANK.filter(q=>q.m==="wall"))},
  peds:{name:"Pediatric GI Emergencies",ic:"👶",desc:"Pyloric stenosis, atresias, volvulus, intussusception, Hirschsprung, NEC, Meckel, TEF.",pick:()=>shuffle(QBANK.filter(q=>q.m==="peds"))},
  vasc:{name:"Viscera & Vasculature",ic:"🩸",desc:"Foregut/midgut/hindgut supply, retroperitoneum, portosystemic shunts, biliary tree.",pick:()=>shuffle(QBANK.filter(q=>q.m==="vasc"))},
  pelv:{name:"Pelvis, Perineum & Retroperitoneum",ic:"⚓",desc:"Ureter course, pudendal nerve, pelvic floor, gonadal drainage, the pectinate line.",pick:()=>shuffle(QBANK.filter(q=>q.m==="pelv"))}
};
const MODE_TAGS={hern:"Hernias / Inguinal Canal",wall:"Abdominal Wall / Landmarks",peds:"Pediatric GI Emergencies",vasc:"Viscera / Vasculature",pelv:"Pelvis / Perineum / Retroperitoneum"};

const SAVE_KEY="dissection_dojo_v2";
let save=load();
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{best:{},endlessBest:0,played:0}}catch(e){return{best:{},endlessBest:0,played:0}}}
function persist(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(save))}catch(e){}}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

let session=null;
const app=document.getElementById("app");

function menu(){
  session=null;const m=MODES;
  app.innerHTML=`
  <div class="hdr">
    <div class="badge">DD</div>
    <h1>DISSECTION DOJO</h1>
    <div class="sub">Gross Anatomy · Abdomen · Hernias · Peds GI — ${QBANK.length} questions</div>
  </div>
  <div class="section-label">Quick Play</div>
  <div class="grid">${tile("daily",m.daily,"")}${tile("endless",m.endless,"amber")}</div>
  <div class="section-label">Topic Drills</div>
  <div class="grid">
    ${tile("hern",m.hern,"special")}${tile("wall",m.wall,"")}${tile("peds",m.peds,"")}${tile("vasc",m.vasc,"")}${tile("pelv",m.pelv,"")}
  </div>
  <div class="section-label">Reinforce</div>
  <div class="grid">
    <div class="tile amber" onclick="vault()">
      <div class="ic">💎</div><h3>Dirty Medicine Vault</h3>
      <p>The catchy anatomy tools — MD's don't LIE, Hesselbach, NAVEL, SAD PUCKER, the peds-GI quick hits, and more.</p>
      <div class="meta">${VAULT.length} memory tools</div>
    </div>
  </div>
  <footer>Saves to this browser via localStorage · ${save.played||0} rounds · Endless best: ${save.endlessBest||0}</footer>`;
}
function tile(key,mode,cls){
  const best=key==="endless"?(save.endlessBest||0):(save.best[key]!=null?save.best[key]+"%":"—");
  const bestLbl=key==="endless"?`Best streak: ${best}`:`Best: ${best}`;
  return `<div class="tile ${cls}" onclick="start('${key}')"><div class="ic">${mode.ic}</div><h3>${mode.name}</h3><p>${mode.desc}</p><div class="meta">${bestLbl}</div></div>`;
}
function start(key){const mode=MODES[key];const qs=mode.pick();session={key,mode,qs,i:0,correct:0,streak:0,answered:false};renderQ();}
function renderQ(){
  const s=session;
  if(!s.mode.endless&&s.i>=s.qs.length)return results();
  if(s.mode.endless&&s.i>=s.qs.length){s.qs=shuffle([...QBANK]);s.i=0;}
  const q=s.qs[s.i];
  const order=shuffle(q.c.map((t,idx)=>({t,idx})));
  s.order=order;s.correctPos=order.findIndex(o=>o.idx===q.a);
  const total=s.mode.endless?"∞":s.qs.length;const num=s.i+1;
  const pct=s.mode.endless?Math.min(100,(s.streak%15)/15*100):(num-1)/s.qs.length*100;
  const tag=MODE_TAGS[q.m]||"Mixed";
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="quiz-top"><span class="qcount">Q ${num} / ${total}</span><span class="streak">🔥 Streak ${s.streak}</span></div>
    <div class="bar"><span style="width:${pct}%"></span></div>
    <span class="modtag">${tag}</span>
    <div class="stem">${q.q}</div>
    <div class="choices" id="ch">${order.map((o,i)=>`<div class="choice" data-i="${i}" onclick="answer(${i})"><span class="k">${String.fromCharCode(65+i)}</span><span>${o.t}</span></div>`).join("")}</div>
    <div id="post"></div>`;
}
function answer(pos){
  const s=session;if(s.answered)return;s.answered=true;
  const q=s.qs[s.i];const correct=pos===s.correctPos;
  document.querySelectorAll(".choice").forEach((n,i)=>{n.classList.add("disabled");if(i===s.correctPos)n.classList.add("correct");if(i===pos&&!correct)n.classList.add("wrong");});
  if(correct){s.correct++;s.streak++;}else{s.streak=0;}
  const post=document.getElementById("post");
  const pearl=q.p?`<div class="pearl"><b>💎 Pearl:</b> ${q.p}</div>`:"";
  post.innerHTML=`<div class="explain ${correct?"":"miss"}"><div class="lab">${correct?"✔ Correct":"✕ Review"}</div><div class="why">${q.why}</div>${pearl}</div>`;
  if(s.mode.endless&&!correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}post.innerHTML+=`<button class="btn btn-ghost" onclick="results()">End Run — Streak ${s.correct}</button>`;return;}
  if(s.mode.endless&&correct){if(s.correct>(save.endlessBest||0)){save.endlessBest=s.correct;persist();}}
  post.innerHTML+=`<button class="btn btn-next" onclick="nextQ()">${(!s.mode.endless&&s.i+1>=s.qs.length)?"SEE RESULTS":"NEXT ›"}</button>`;
}
function nextQ(){session.i++;session.answered=false;renderQ();}
function results(){
  const s=session;const got=s.correct;
  const pctNum=s.mode.endless?null:Math.round(got/s.qs.length*100);
  if(!s.mode.endless){save.best[s.key]=Math.max(save.best[s.key]||0,pctNum);}
  save.played=(save.played||0)+1;persist();
  let rank,col;const p=s.mode.endless?Math.min(100,got*5):pctNum;
  if(p>=90){rank="ATTENDING — DOMINATED";col="var(--green)"}
  else if(p>=75){rank="RESIDENT — SOLID";col="var(--cyan)"}
  else if(p>=55){rank="INTERN — GETTING THERE";col="var(--amber-hi)"}
  else{rank="MS1 — DRILL AGAIN";col="var(--red)"}
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="result">
      <div class="score-big" style="color:${col}">${s.mode.endless?got:pctNum+"%"}</div>
      <div class="rank" style="color:${col}">${s.mode.endless?"STREAK: "+got:rank}</div>
      <div class="statrow">
        <div><b>${got}</b>${s.mode.endless?"in a row":"correct"}</div>
        ${s.mode.endless?"":`<div><b>${s.qs.length-got}</b>missed</div>`}
        <div><b>${s.mode.endless?(save.endlessBest||0):(save.best[s.key]+"%")}</b>best</div>
      </div>
      <button class="btn btn-next" style="max-width:300px;margin:0 auto" onclick="start('${s.key}')">RUN IT AGAIN</button>
      <button class="btn btn-ghost" style="max-width:300px;margin:14px auto 0" onclick="menu()">BACK TO MENU</button>
    </div>`;
}
function vault(){
  app.innerHTML=`
    <div class="back" onclick="menu()">‹ MENU</div>
    <div class="hdr" style="padding-top:6px">
      <h1 style="color:var(--amber-hi);font-size:28px">💎 Dirty Medicine Vault</h1>
      <div class="sub">Anatomy memory tools — catchy on purpose</div>
    </div>
    ${VAULT.map(v=>`<div class="vault-card"><h4>${v.t}</h4><p>${v.b}</p><span class="tag">▸ ${v.g}</span></div>`).join("")}
    <button class="btn btn-ghost" style="width:100%" onclick="menu()">BACK TO MENU</button>`;
}
document.addEventListener("keydown",e=>{
  if(!session||session.answered)return;
  const map={"1":0,"2":1,"3":2,"4":3,"a":0,"b":1,"c":2,"d":3};
  const k=e.key.toLowerCase();
  if(map[k]!=null&&session.order&&map[k]<session.order.length)answer(map[k]);
});
</script>

menu();
