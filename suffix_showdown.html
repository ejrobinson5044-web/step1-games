<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SUFFIX SHOWDOWN — Drug Naming Conventions</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=IBM+Plex+Mono:wght@400;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #0a0e14;
  --bg-mid: #131a22;
  --bg-card: #1c2530;
  --rx-green: #2d8a4f;
  --rx-green-bright: #4dbb70;
  --rx-amber: #f4a82c;
  --rx-amber-bright: #ffc459;
  --caution-red: #e84858;
  --paper: #f5ecd9;
  --paper-deep: #e8dcbf;
  --ink: #1a1a1a;
  --muted-blue: #5882a8;
  --text: #f0e8d5;
  --text-dim: #7a8090;
  --grid: rgba(244, 168, 44, 0.04);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: var(--bg-deep);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 16px;
  min-height: 100vh;
  overflow-x: hidden;
}
body {
  background:
    radial-gradient(ellipse at 30% 20%, rgba(45, 138, 79, 0.10), transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(244, 168, 44, 0.08), transparent 50%),
    linear-gradient(180deg, #0a0e14 0%, #131a22 100%);
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 50px 50px;
  pointer-events: none; z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 30%, transparent 85%);
}
#app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 20px; }

/* HEADER */
.title-bar {
  text-align: center;
  margin-bottom: 24px;
  padding: 12px 0 20px;
  border-bottom: 3px solid var(--rx-amber);
  position: relative;
}
.rx-stamp {
  display: inline-block;
  background: var(--rx-green);
  color: var(--paper);
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  width: 60px;
  height: 60px;
  line-height: 60px;
  border-radius: 50%;
  margin-bottom: 8px;
  letter-spacing: 0;
  border: 3px solid var(--rx-amber);
  box-shadow: 0 0 20px rgba(45, 138, 79, 0.4);
}
h1.game-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 46px;
  font-weight: 400;
  letter-spacing: 8px;
  color: var(--rx-amber);
  text-shadow: 0 0 20px rgba(244, 168, 44, 0.4);
  margin-top: 4px;
}
.subtitle {
  color: var(--rx-green-bright);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  margin-top: 4px;
  letter-spacing: 4px;
  text-transform: uppercase;
}
.subtitle::before, .subtitle::after { content: '◆ '; color: var(--rx-amber); }
.subtitle::after { content: ' ◆'; }

/* HUD */
.hud { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
.hud-cell {
  background: var(--bg-card);
  border: 1px solid var(--rx-green);
  border-radius: 4px;
  padding: 8px 12px;
  position: relative;
}
.hud-label {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 2px;
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 600;
}
.hud-value { font-size: 24px; margin-top: 2px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; }
.hud-value.hp { color: var(--caution-red); }
.hud-value.xp { color: var(--rx-amber); }
.hud-value.streak { color: var(--rx-green-bright); }
.hud-value.lvl { color: var(--paper); }
.hearts { display: inline-flex; gap: 4px; }
.heart { font-size: 22px; filter: drop-shadow(0 0 4px var(--caution-red)); }
.heart.lost { filter: grayscale(1) brightness(0.3); }

/* PANEL — looks like a prescription pad */
.panel {
  background:
    repeating-linear-gradient(0deg, rgba(45, 138, 79, 0.03) 0px, rgba(45, 138, 79, 0.03) 1px, transparent 1px, transparent 32px),
    linear-gradient(180deg, var(--bg-card), var(--bg-mid));
  border: 2px solid var(--rx-amber);
  border-radius: 4px;
  padding: 28px;
  position: relative;
  box-shadow: 0 0 30px rgba(244, 168, 44, 0.12), inset 0 0 30px rgba(0, 0, 0, 0.3);
  min-height: 400px;
}
.panel::before {
  content: '℞';
  position: absolute;
  top: 6px; left: 14px;
  color: var(--rx-amber);
  font-size: 24px;
  font-weight: 700;
  opacity: 0.6;
}

/* MENU */
.menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.menu-card {
  background: linear-gradient(135deg, rgba(45, 138, 79, 0.08), rgba(244, 168, 44, 0.06));
  border: 1px solid var(--rx-green);
  border-radius: 3px;
  padding: 20px 16px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
  text-align: center;
}
.menu-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(45, 138, 79, 0.30);
  border-color: var(--rx-amber);
}
.menu-icon { font-size: 32px; margin-bottom: 10px; display: block; }
.menu-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--rx-amber);
  margin-bottom: 4px;
}
.menu-desc { color: var(--text-dim); font-size: 13px; line-height: 1.4; }

/* QUESTION — emphasis on the SUFFIX visually */
.question-area { animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.q-tag {
  display: inline-block;
  background: var(--rx-green);
  color: var(--paper);
  padding: 4px 12px;
  border-radius: 2px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  margin-bottom: 12px;
  font-weight: 600;
  text-transform: uppercase;
}

/* THE SUFFIX/DRUG DISPLAY — big and front-and-center */
.drug-display {
  background:
    repeating-linear-gradient(0deg, rgba(45, 138, 79, 0.05) 0px, rgba(45, 138, 79, 0.05) 1px, transparent 1px, transparent 28px),
    var(--paper);
  border: 3px solid var(--ink);
  border-radius: 4px;
  padding: 32px 24px;
  margin-bottom: 18px;
  text-align: center;
  position: relative;
  box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1), 0 4px 12px rgba(0, 0, 0, 0.4);
}
.drug-display::before {
  content: 'PRESCRIPTION';
  position: absolute;
  top: 6px; left: 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--ink);
  opacity: 0.4;
  font-weight: 600;
}
.drug-display::after {
  content: '℞';
  position: absolute;
  top: 4px; right: 14px;
  color: var(--rx-green);
  font-size: 22px;
  font-weight: 700;
  opacity: 0.6;
}
.drug-display .label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  color: var(--ink);
  opacity: 0.5;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
  font-weight: 600;
}
.drug-display .drug-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 64px;
  color: var(--ink);
  letter-spacing: 4px;
  line-height: 1;
}
.drug-display .drug-name .stem {
  color: var(--caution-red);
  text-decoration: underline;
  text-decoration-thickness: 3px;
  text-decoration-color: var(--rx-amber);
  text-underline-offset: 8px;
}
.drug-display.suffix-only .drug-name {
  font-size: 80px;
  color: var(--caution-red);
}
.drug-display.suffix-only .drug-name::before {
  content: '— ';
  color: var(--ink);
  opacity: 0.4;
}

.q-text {
  font-size: 18px;
  line-height: 1.5;
  margin-bottom: 18px;
  color: var(--text);
  padding: 12px 16px;
  background: rgba(0, 0, 0, 0.3);
  border-left: 3px solid var(--rx-amber);
  border-radius: 2px;
  font-family: 'IBM Plex Mono', monospace;
}

.choices { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
.choice {
  background: var(--bg-card);
  border: 1px solid var(--text-dim);
  color: var(--text);
  padding: 14px 16px;
  border-radius: 3px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 15px;
  font-weight: 500;
  text-align: left;
  cursor: pointer;
  transition: all 0.12s;
  display: flex;
  align-items: center;
  gap: 12px;
}
.choice:hover:not(.disabled) {
  border-color: var(--rx-green-bright);
  background: rgba(45, 138, 79, 0.08);
  transform: translateY(-1px);
}
.choice .key {
  background: var(--rx-amber);
  color: var(--ink);
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 700;
  font-size: 18px;
  width: 32px;
  height: 32px;
  line-height: 32px;
  text-align: center;
  border-radius: 3px;
  flex-shrink: 0;
}
.choice.correct {
  background: rgba(45, 138, 79, 0.20);
  border-color: var(--rx-green-bright);
  animation: pulseGreen 0.5s;
}
.choice.correct .key { background: var(--rx-green-bright); color: var(--bg-deep); }
.choice.wrong {
  background: rgba(232, 72, 88, 0.18);
  border-color: var(--caution-red);
  animation: shake 0.4s;
}
.choice.wrong .key { background: var(--caution-red); color: white; }
.choice.disabled { cursor: default; opacity: 0.55; }
@keyframes pulseGreen { 0%, 100% { box-shadow: 0 0 0 0 rgba(77, 187, 112, 0); } 50% { box-shadow: 0 0 25px 3px rgba(77, 187, 112, 0.4); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }

/* PEARL — quick and snappy */
.pearl-box {
  margin-top: 18px;
  background: linear-gradient(135deg, rgba(244, 168, 44, 0.10), rgba(45, 138, 79, 0.06));
  border: 1px solid var(--rx-amber);
  border-left: 4px solid var(--rx-amber);
  padding: 14px 18px;
  border-radius: 3px;
  animation: fadeIn 0.4s 0.15s both;
}
.pearl-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  color: var(--rx-amber);
  letter-spacing: 3px;
  margin-bottom: 6px;
}
.pearl-text { font-size: 16px; line-height: 1.5; color: var(--paper); }
.pearl-text strong { color: var(--rx-amber-bright); font-weight: 700; }
.pearl-text em { color: var(--rx-green-bright); font-style: normal; font-weight: 600; }
.pearl-text code { background: rgba(244, 168, 44, 0.15); color: var(--rx-amber-bright); padding: 1px 6px; border-radius: 2px; font-family: 'IBM Plex Mono', monospace; }

/* CONTROLS */
.controls { display: flex; justify-content: space-between; margin-top: 20px; gap: 10px; flex-wrap: wrap; }
.btn {
  background: var(--rx-amber);
  color: var(--ink);
  border: none;
  padding: 10px 22px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 3px;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.12s;
}
.btn:hover { background: var(--rx-amber-bright); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(244, 168, 44, 0.4); }
.btn-secondary { background: transparent; color: var(--rx-amber); border: 1px solid var(--rx-amber); }
.btn-secondary:hover { background: var(--rx-amber); color: var(--ink); }
.btn-danger { background: var(--caution-red); color: white; }

/* PROGRESS */
.system-progress { margin-top: 22px; }
.system-bar { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
.system-name { width: 180px; font-size: 14px; color: var(--paper); font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
.bar-track { flex: 1; background: rgba(0,0,0,0.4); height: 16px; border-radius: 2px; overflow: hidden; border: 1px solid var(--text-dim); }
.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--rx-green), var(--rx-amber));
  transition: width 0.5s ease;
}
.system-pct { width: 80px; text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 13px; color: var(--rx-amber-bright); font-weight: 700; }

/* TOAST */
.toast {
  position: fixed;
  top: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(-200%);
  background: var(--rx-amber);
  color: var(--ink);
  padding: 10px 26px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 2px;
  border-radius: 3px;
  box-shadow: 0 4px 16px rgba(244, 168, 44, 0.5);
  z-index: 9999;
  transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: var(--caution-red); color: white; }
.toast.xp { background: var(--rx-green-bright); color: var(--bg-deep); }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(10, 14, 20, 0.85);
  display: flex; align-items: center; justify-content: center;
  z-index: 1001;
  backdrop-filter: blur(6px);
  animation: fadeIn 0.3s;
}
.modal {
  background: var(--bg-mid);
  border: 2px solid var(--rx-amber);
  padding: 28px;
  border-radius: 4px;
  max-width: 580px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
}
.modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; color: var(--rx-amber); margin-bottom: 14px; letter-spacing: 3px; }
.modal p { font-size: 15px; line-height: 1.5; margin-bottom: 10px; }
.achievement-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin: 14px 0; }
.achievement {
  padding: 8px 10px;
  border: 1px solid var(--text-dim);
  border-radius: 2px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.achievement.unlocked { border-color: var(--rx-amber); background: rgba(244, 168, 44, 0.08); color: var(--rx-amber-bright); }
.achievement.locked { opacity: 0.4; }
.ach-icon { font-size: 20px; }

/* RESULTS */
.results-screen { text-align: center; padding: 20px; }
.results-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  color: var(--rx-amber);
  margin-bottom: 20px;
  letter-spacing: 5px;
  text-shadow: 0 0 18px var(--rx-amber);
}
.results-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; margin: 20px 0; }
.stat-block { padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--rx-green); border-radius: 3px; }
.stat-num { font-size: 32px; font-family: 'Bebas Neue', sans-serif; color: var(--rx-amber); display: block; }
.stat-label { font-size: 11px; color: var(--text-dim); letter-spacing: 2px; font-family: 'IBM Plex Mono', monospace; text-transform: uppercase; }
.rank-badge {
  display: inline-block;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 40px;
  padding: 12px 28px;
  margin: 14px 0;
  border: 3px solid;
  border-radius: 4px;
  letter-spacing: 6px;
}

@media (max-width: 700px) {
  h1.game-title { font-size: 32px; letter-spacing: 4px; }
  .hud { grid-template-columns: repeat(2, 1fr); }
  .menu-grid { grid-template-columns: 1fr; }
  .system-name { width: 120px; font-size: 12px; }
  .results-stats { grid-template-columns: 1fr; }
  .panel { padding: 18px; }
  .drug-display .drug-name { font-size: 42px; letter-spacing: 2px; }
  .drug-display.suffix-only .drug-name { font-size: 54px; }
  .choices { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div id="app">
  <div class="title-bar">
    <div class="rx-stamp">℞</div>
    <h1 class="game-title">SUFFIX SHOWDOWN</h1>
    <div class="subtitle">Drug Naming Conventions</div>
  </div>

  <div class="hud">
    <div class="hud-cell"><div class="hud-label">Vitality</div><div class="hud-value hp"><span class="hearts" id="hearts"></span></div></div>
    <div class="hud-cell"><div class="hud-label">XP</div><div class="hud-value xp" id="xp-display">0</div></div>
    <div class="hud-cell"><div class="hud-label">Rank</div><div class="hud-value lvl" id="lvl-display">1</div></div>
    <div class="hud-cell"><div class="hud-label">Streak</div><div class="hud-value streak" id="streak-display">0🔥</div></div>
  </div>

  <div class="panel" id="panel"></div>
</div>

<script>
// ============================================================================
// QUESTION BANK — drug suffix recognition
// type: 's2c' = stem to class, 'd2c' = drug name to class,
//       'c2s' = class to stem, 'tricky' = confusion pairs
// ============================================================================
const QBANK = [

  // ── CARDIO ─────────────────────────────────────────────────────────
  { topic:"Cardio", type:"s2c", stem:"-olol", q:"What class does this suffix indicate?",
    c:["α1-blocker","β-blocker","ACE inhibitor","Calcium channel blocker"], a:1,
    p:"<strong>-olol = β-blocker</strong>. Propran<em>olol</em>, aten<em>olol</em>, metopr<em>olol</em>, biso<em>prolol</em>, carvedi<em>lol</em>, labeta<em>lol</em>. <em>Carvedilol + labetalol</em> are the mixed α/β blockers." },

  { topic:"Cardio", type:"d2c", drug:"Lisinopril", stem:"-pril", q:"Class?",
    c:["β-blocker","ARB","ACE inhibitor","α1-blocker"], a:2,
    p:"<strong>-pril = ACE inhibitor</strong>. Lisino<em>pril</em>, capto<em>pril</em>, enala<em>pril</em>, rami<em>pril</em>. <em>Side effects: dry cough + angioedema (from bradykinin buildup), hyperK, ARF in bilateral RAS, teratogenic</em>." },

  { topic:"Cardio", type:"s2c", stem:"-sartan", q:"What class?",
    c:["ACE inhibitor","ARB (angiotensin II receptor blocker)","β-blocker","Statin"], a:1,
    p:"<strong>-sartan = ARB</strong>. Lo<em>sartan</em>, val<em>sartan</em>, irbe<em>sartan</em>, telmi<em>sartan</em>. <em>Same indications as ACEi but NO cough/angioedema (doesn't affect bradykinin)</em>. Still teratogenic + hyperK." },

  { topic:"Cardio", type:"s2c", stem:"-dipine", q:"What class?",
    c:["Non-DHP CCB","Dihydropyridine CCB","β-blocker","Diuretic"], a:1,
    p:"<strong>-dipine = dihydropyridine (DHP) calcium channel blocker</strong>. Amlo<em>dipine</em>, nife<em>dipine</em>, nicar<em>dipine</em>, clevi<em>dipine</em>. <em>Acts on vascular smooth muscle → peripheral edema common</em>. Non-DHP (verapamil, diltiazem) = act on cardiac nodes." },

  { topic:"Cardio", type:"s2c", stem:"-statin", q:"What class?",
    c:["β-blocker","HMG-CoA reductase inhibitor","ACE inhibitor","Bile acid sequestrant"], a:1,
    p:"<strong>-statin = HMG-CoA reductase inhibitor</strong>. Atorva<em>statin</em>, rosuva<em>statin</em>, simva<em>statin</em>, prava<em>statin</em>. <em>SE: myopathy (#1 on NBME) + hepatotoxicity</em>. Lowers LDL primarily." },

  { topic:"Cardio", type:"s2c", stem:"-zosin", q:"What class?",
    c:["β-blocker","α1-blocker","α2-agonist","CCB"], a:1,
    p:"<strong>-zosin = α1-blocker</strong>. Pra<em>zosin</em>, doxa<em>zosin</em>, tera<em>zosin</em>, tamsu<em>losin</em>. <em>Uses: BPH (relax prostate smooth muscle), HTN, PTSD nightmares (prazosin)</em>. SE: <em>1st-dose orthostatic hypotension</em>." },

  { topic:"Cardio", type:"d2c", drug:"Sildenafil", stem:"-afil", q:"Class?",
    c:["PDE-5 inhibitor","β-blocker","Vasodilator (nitrate)","CCB"], a:0,
    p:"<strong>-afil = PDE-5 inhibitor</strong>. Silden<em>afil</em>, tadal<em>afil</em>, varden<em>afil</em>. <em>Uses: ED, pulmonary HTN</em>. <em>CONTRAINDICATED with nitrates → severe hypotension</em>." },

  { topic:"Cardio", type:"s2c", stem:"-xaban", q:"What class?",
    c:["Direct thrombin inhibitor","Direct factor Xa inhibitor","Heparin","Vitamin K antagonist"], a:1,
    p:"<strong>-xaban = direct factor Xa inhibitor</strong>. Riva<em>roxaban</em>, api<em>xaban</em>, edo<em>xaban</em>. <em>Oral, no INR monitoring needed</em>. Reversal: <em>andexanet alfa</em>. Compare: <em>-gatran = direct thrombin inhibitor</em> (dabigatran)." },

  { topic:"Cardio", type:"s2c", stem:"-parin", q:"What class?",
    c:["Vitamin K antagonist","Heparin / LMWH","Factor Xa inhibitor","Antiplatelet"], a:1,
    p:"<strong>-parin = heparin / LMWH</strong>. He<em>parin</em>, enoxa<em>parin</em>, dalte<em>parin</em>, fondapari<em>nux</em>. <em>Activates antithrombin III → inhibits IIa + Xa</em>. Reversal: <em>protamine sulfate</em>. Monitor PTT (UFH only)." },

  { topic:"Cardio", type:"tricky", drug:"Warfarin", stem:"-arin", q:"Warfarin's class? (don't be fooled by '-arin' looking like heparin)",
    c:["LMWH","Vitamin K antagonist","Factor Xa inhibitor","Direct thrombin inhibitor"], a:1,
    p:"<strong>Warfarin = vitamin K antagonist</strong>, NOT a heparin despite ending in '-arin.' <em>Inhibits vitamin K epoxide reductase → ↓ factors II, VII, IX, X + protein C/S</em>. Monitor: PT/INR. Reversal: <em>vitamin K (slow), FFP/PCC (fast)</em>. Teratogenic." },

  // ── ANTIMICROBIALS ────────────────────────────────────────────────
  { topic:"Antimicro", type:"s2c", stem:"-cillin", q:"What class?",
    c:["Macrolide","Penicillin","Cephalosporin","Tetracycline"], a:1,
    p:"<strong>-cillin = penicillin</strong>. Peni<em>cillin</em>, amoxi<em>cillin</em>, ampi<em>cillin</em>, oxa<em>cillin</em>, piperacillin. <em>β-lactam, inhibits transpeptidase → ↓ cell wall</em>. Bactericidal. Resistance: β-lactamase, altered PBP." },

  { topic:"Antimicro", type:"s2c", stem:"-floxacin", q:"What class?",
    c:["Tetracycline","Aminoglycoside","Fluoroquinolone","Macrolide"], a:2,
    p:"<strong>-floxacin = fluoroquinolone</strong>. Cipro<em>floxacin</em>, levo<em>floxacin</em>, moxi<em>floxacin</em>. <em>Inhibits DNA gyrase + topo IV</em>. SE: <em>tendinitis (Achilles rupture), QT prolongation, cartilage damage (avoid in kids/pregnancy)</em>. Chelated by Ca/Mg/Al/Fe." },

  { topic:"Antimicro", type:"s2c", stem:"-cycline", q:"What class?",
    c:["Tetracycline","Macrolide","Cephalosporin","Aminoglycoside"], a:0,
    p:"<strong>-cycline = tetracycline</strong>. Tetra<em>cycline</em>, doxy<em>cycline</em>, mino<em>cycline</em>, tige<em>cycline</em>. <em>30S ribosome inhibitor</em>. SE: <em>tooth discoloration (avoid <8yo), photosensitivity, Fanconi syndrome (expired)</em>. Used for: Lyme, Rickettsia, Chlamydia, MRSA skin." },

  { topic:"Antimicro", type:"tricky", drug:"Azithromycin", stem:"-mycin", q:"This drug is a... (careful — '-mycin' is tricky!)",
    c:["Aminoglycoside","Macrolide","Tetracycline","Sulfa drug"], a:1,
    p:"<strong>Azithromycin = MACROLIDE</strong> despite ending in '-mycin.' Eryth<em>romycin</em>, clarithromycin, azithromycin = macrolides (50S inhibitors). <em>Strepto<em>mycin</em>, genta<em>micin</em>, neo<em>mycin</em> = AMINOGLYCOSIDES</em> (30S inhibitors). <strong>Trick: the '-thromycin' subset is macrolides; '-micin/-mycin' alone is more often aminoglycoside.</strong>" },

  { topic:"Antimicro", type:"d2c", drug:"Gentamicin", stem:"-micin", q:"Class?",
    c:["Macrolide","Aminoglycoside","Tetracycline","Cephalosporin"], a:1,
    p:"<strong>Gentamicin = aminoglycoside</strong>. Genta<em>micin</em>, neo<em>mycin</em>, tobra<em>mycin</em>, strepto<em>mycin</em>, amika<em>cin</em>. <em>30S ribosome inhibitor</em>. SE: <em>nephrotox + ototox + NMJ blockade</em>. Synergize with β-lactams. Requires O2 — useless vs anaerobes." },

  { topic:"Antimicro", type:"s2c", stem:"cef-/ceph-", q:"What class? (this stem is at the BEGINNING of the name)",
    c:["Cephalosporin","Penicillin","Carbapenem","Macrolide"], a:0,
    p:"<strong>cef-/ceph- = cephalosporin</strong>. <em>Cef</em>azolin, <em>cef</em>triaxone, <em>cef</em>tazidime, <em>ceph</em>alexin, <em>cef</em>epime. β-lactam ring like penicillins. <em>Cross-allergy with PCN ~5-10%</em>. Generations 1-5 = increasing gram(-) coverage. 4th gen (cefepime) + 5th gen (ceftaroline) cover Pseudomonas + MRSA respectively." },

  { topic:"Antimicro", type:"s2c", stem:"-penem", q:"What class?",
    c:["Penicillin","Cephalosporin","Carbapenem","Monobactam"], a:2,
    p:"<strong>-penem = carbapenem</strong>. Imi<em>penem</em>, mero<em>penem</em>, doripenem, ertapenem. <em>Broadest-spectrum β-lactams</em>. Imipenem given with cilastatin (inhibits renal dehydropeptidase that breaks it down). SE: seizures (esp. imipenem in renal failure)." },

  { topic:"Antimicro", type:"s2c", stem:"-bactam", q:"What class?",
    c:["β-lactamase inhibitor","Cephalosporin","Aminoglycoside","Macrolide"], a:0,
    p:"<strong>-bactam = β-lactamase inhibitor</strong>. Sul<em>bactam</em>, tazo<em>bactam</em>, avi<em>bactam</em>, clavulanate (the exception — no -bactam). <em>NOT antibiotics themselves</em> — combined with β-lactams to extend coverage. Augmentin = amox + clavulanate; piperacillin-tazobactam = Zosyn." },

  { topic:"Antimicro", type:"tricky", stem:"-azole", q:"This suffix has TWO uses. Pick the more common pharm class:",
    c:["Antifungal (most '-azoles')","Antiprotozoal","Both — depends on the specific drug","β-blocker"], a:2,
    p:"<strong>'-azole' is split-use</strong>:<br>• <em>Antifungals</em>: fluconazole, ketoconazole, itraconazole, voriconazole, posaconazole (inhibit 14-α demethylase → ↓ ergosterol).<br>• <em>Antiprotozoals</em>: metroni<em>dazole</em>, tini<em>dazole</em> (forms toxic free radicals in anaerobes/protozoa).<br><strong>Tip: '-conazole' = antifungal. 'metro-/tini-' starts the antiprotozoals.</strong>" },

  { topic:"Antimicro", type:"s2c", stem:"-vir", q:"What class?",
    c:["Antifungal","Antibacterial","Antiviral","Anthelmintic"], a:2,
    p:"<strong>-vir = antiviral</strong>. Acyclo<em>vir</em>, ganci<em>clovir</em>, valacy<em>clovir</em>, oseltami<em>vir</em>, rito<em>navir</em>. <em>Subclasses</em>: -<em>navir</em> = HIV protease inhibitor; -<em>tegravir</em> = HIV integrase inhibitor; -<em>tamivir</em> = neuraminidase inhibitor (flu)." },

  { topic:"Antimicro", type:"s2c", stem:"-navir", q:"What HIV drug class?",
    c:["NRTI","NNRTI","Protease inhibitor","Integrase inhibitor"], a:2,
    p:"<strong>-navir = HIV protease inhibitor</strong>. Rito<em>navir</em>, ata<em>zanavir</em>, dar<em>unavir</em>, lopi<em>navir</em>. <em>Block HIV protease → uncleaved polyprotein → non-infectious virion</em>. SE: hyperglycemia/lipodystrophy, GI upset, P450 inhibition (ritonavir = booster)." },

  { topic:"Antimicro", type:"s2c", stem:"-tegravir", q:"What HIV drug class?",
    c:["Protease inhibitor","Integrase inhibitor","NRTI","Fusion inhibitor"], a:1,
    p:"<strong>-tegravir = HIV integrase inhibitor</strong>. Dolu<em>tegravir</em>, ralte<em>gravir</em>, elvi<em>tegravir</em>, bicte<em>gravir</em>. <em>Block integrase → HIV DNA can't insert into host genome</em>. First-line in modern HAART regimens. Few SE: weight gain, headache." },

  { topic:"Antimicro", type:"s2c", stem:"-tamivir", q:"What class?",
    c:["HIV protease inhibitor","Neuraminidase inhibitor (influenza)","Antifungal","Antiprotozoal"], a:1,
    p:"<strong>-tamivir = neuraminidase inhibitor (influenza)</strong>. Osel<em>tamivir</em> (oral), zana<em>mivir</em> (inhaled), peramivir (IV). <em>Block neuraminidase → virion can't bud from host cell</em>. Effective if started within 48hr of symptom onset." },

  // ── CNS / PSYCH ────────────────────────────────────────────────────
  { topic:"CNS", type:"s2c", stem:"-zepam / -zolam", q:"What class?",
    c:["Barbiturate","Benzodiazepine","SSRI","TCA"], a:1,
    p:"<strong>-zepam / -zolam = benzodiazepine</strong>. Loraz<em>epam</em>, diaz<em>epam</em>, midaz<em>olam</em>, alpraz<em>olam</em>, clonaz<em>epam</em>, triaz<em>olam</em>. <em>Bind GABA-A → ↑ frequency of Cl- channel opening</em>. Antidote: <em>flumazenil</em>." },

  { topic:"CNS", type:"s2c", stem:"-barbital", q:"What class?",
    c:["Benzodiazepine","Barbiturate","SSRI","Antipsychotic"], a:1,
    p:"<strong>-barbital = barbiturate</strong>. Pheno<em>barbital</em>, pento<em>barbital</em>, secobarbital, thiopental. <em>Bind GABA-A → ↑ DURATION of Cl- channel opening</em>. <em>More dangerous than benzos</em> — no respiratory ceiling. Induce CYP450. No good antidote." },

  { topic:"CNS", type:"s2c", stem:"-triptyline / -ipramine", q:"What class?",
    c:["SSRI","SNRI","TCA (tricyclic antidepressant)","MAOI"], a:2,
    p:"<strong>-triptyline / -ipramine = TCA</strong>. Ami<em>triptyline</em>, nor<em>triptyline</em>, imi<em>pramine</em>, clomi<em>pramine</em>, desi<em>pramine</em>. <em>Block NE + 5HT reuptake + anticholinergic + α1 block + Na channel</em>. <strong>'3 C's of OD: Coma, Convulsions, Cardiotoxicity'</strong>. Antidote: sodium bicarb." },

  { topic:"CNS", type:"tricky", drug:"Sumatriptan", stem:"-triptan", q:"Don't confuse — what is '-triptan'?",
    c:["TCA","Migraine abortive (5-HT1B/1D agonist)","Antipsychotic","SSRI"], a:1,
    p:"<strong>-triptan = migraine abortive</strong>, NOT a TCA! Suma<em>triptan</em>, riza<em>triptan</em>. <em>5-HT1B/1D agonist → vasoconstriction</em>. <em>Don't confuse with -triptyline (TCA)</em>. Avoid in CAD (vasoconstriction). Avoid combining with SSRI/MAOI (serotonin syndrome)." },

  { topic:"CNS", type:"s2c", stem:"-oxetine", q:"What class?",
    c:["TCA","SSRI / SNRI","MAOI","Antipsychotic"], a:1,
    p:"<strong>-oxetine = SSRI / SNRI</strong>. Flu<em>oxetine</em>, par<em>oxetine</em>, dul<em>oxetine</em> (SNRI), atom<em>oxetine</em> (ADHD). <em>Most are pure SSRI; duloxetine is SNRI</em>. <em>-pram/-pram = also SSRI</em> (citalo<em>pram</em>, escitalo<em>pram</em>)." },

  { topic:"CNS", type:"s2c", stem:"-peridol / -peridone", q:"What class?",
    c:["Benzodiazepine","Antipsychotic","SSRI","Barbiturate"], a:1,
    p:"<strong>-peridol / -peridone = antipsychotic</strong>. Halo<em>peridol</em> (typical, 1st gen), risperi<em>done</em> (atypical), paliperi<em>done</em>. <em>Typicals (-peridol) → high EPS risk; atypicals (-peridone, -pine, -done) → metabolic SE</em>. <strong>Mnemonic: 'old peridol = typical, new peridone = atypical.'</strong>" },

  { topic:"CNS", type:"s2c", stem:"-azine", q:"What class? (e.g., chlorpromazine)",
    c:["Atypical antipsychotic","Typical antipsychotic (phenothiazine)","Benzodiazepine","Antimuscarinic"], a:1,
    p:"<strong>-azine = phenothiazine (typical antipsychotic)</strong>. Chlorprom<em>azine</em>, fluphen<em>azine</em>, prochlorper<em>azine</em>, promethazine. <em>D2 antagonists → EPS, hyperprolactinemia, NMS</em>. Chlorpromazine = corneal deposits; thioridazine = retinal deposits." },

  { topic:"CNS", type:"s2c", stem:"-caine", q:"What class?",
    c:["Local anesthetic","Inhaled anesthetic","Opioid","Benzodiazepine"], a:0,
    p:"<strong>-caine = local anesthetic</strong>. Lido<em>caine</em>, bupiva<em>caine</em>, mepiva<em>caine</em>, procaine, cocaine. <em>Block Na channels</em>. <strong>Esters (1 'i' in name, like procaine)</strong> → PABA metabolite → allergy risk. <strong>Amides (2 'i's, like lidocaine)</strong> → metabolized by liver → safer." },

  { topic:"CNS", type:"s2c", stem:"-flurane", q:"What class?",
    c:["Local anesthetic","Inhaled anesthetic","NMJ blocker","Opioid"], a:1,
    p:"<strong>-flurane = inhaled anesthetic</strong>. Iso<em>flurane</em>, sevo<em>flurane</em>, des<em>flurane</em>, en<em>flurane</em>, halothane (exception). <em>Trigger malignant hyperthermia in susceptible patients (RYR1 mutation) → dantrolene</em>." },

  { topic:"CNS", type:"s2c", stem:"-curium / -curonium", q:"What class?",
    c:["Depolarizing NMJ blocker","Non-depolarizing NMJ blocker","Inhaled anesthetic","Local anesthetic"], a:1,
    p:"<strong>-curium / -curonium = non-depolarizing NMJ blocker</strong>. Atra<em>curium</em>, cis<em>atracurium</em>, vec<em>uronium</em>, roc<em>uronium</em>, pancuronium. <em>Competitive ACh antagonists at NMJ</em>. Reversal: <em>neostigmine + glycopyrrolate</em>. Depolarizing = succinylcholine (no antidote until block wears off; can cause MH + hyperK)." },

  // ── ENDO / DIABETES ────────────────────────────────────────────────
  { topic:"Endo", type:"s2c", stem:"-glitazone", q:"What class?",
    c:["Sulfonylurea","Thiazolidinedione (TZD)","DPP-4 inhibitor","SGLT-2 inhibitor"], a:1,
    p:"<strong>-glitazone = TZD (thiazolidinedione)</strong>. Pio<em>glitazone</em>, rosi<em>glitazone</em>. <em>PPAR-γ agonist → ↑ insulin sensitivity</em>. SE: <em>weight gain, edema, HF, fractures, hepatotoxicity</em>. Black box: HF risk." },

  { topic:"Endo", type:"s2c", stem:"-gliptin", q:"What class?",
    c:["GLP-1 agonist","DPP-4 inhibitor","SGLT-2 inhibitor","TZD"], a:1,
    p:"<strong>-gliptin = DPP-4 inhibitor</strong>. Sita<em>gliptin</em>, lina<em>gliptin</em>, saxa<em>gliptin</em>, alo<em>gliptin</em>. <em>Block DPP-4 → ↑ endogenous GLP-1 → ↑ insulin, ↓ glucagon</em>. Weight neutral, low hypoglycemia risk. SE: pancreatitis (rare), URI." },

  { topic:"Endo", type:"s2c", stem:"-flozin", q:"What class?",
    c:["SGLT-2 inhibitor","DPP-4 inhibitor","TZD","Sulfonylurea"], a:0,
    p:"<strong>-flozin = SGLT-2 inhibitor</strong>. Cana<em>gliflozin</em>, dapa<em>gliflozin</em>, empa<em>gliflozin</em>, ertu<em>gliflozin</em>. <em>Block glucose reabsorption in PCT → glucosuria</em>. <strong>BIG: ↓ CV mortality + slow CKD progression</strong>. SE: GU infections, euglycemic DKA, volume depletion." },

  { topic:"Endo", type:"s2c", stem:"-glutide / -natide", q:"What class?",
    c:["DPP-4 inhibitor","GLP-1 agonist","Insulin","SGLT-2 inhibitor"], a:1,
    p:"<strong>-glutide / -natide = GLP-1 agonist</strong>. Lira<em>glutide</em>, sema<em>glutide</em>, dula<em>glutide</em>, exe<em>natide</em>. <em>↑ insulin, ↓ glucagon, slow gastric emptying → weight loss</em>. Indications now: T2DM + obesity. SE: nausea, pancreatitis (rare), thyroid C-cell tumors (black box). SC injection (oral semaglutide exists)." },

  { topic:"Endo", type:"s2c", stem:"-asone / -isolone / -olone", q:"What class?",
    c:["Antiandrogen","Corticosteroid","Estrogen","Thyroid hormone"], a:1,
    p:"<strong>-asone / -isolone / -olone = corticosteroid</strong>. Dexameth<em>asone</em>, beclometh<em>asone</em>, fluticasone, prednis<em>olone</em>, methylprednis<em>olone</em>, hydrocortisone. <em>SE: hyperglycemia, osteoporosis, immunosuppression, weight gain, HPA axis suppression, cataracts, AVN, psychosis</em>." },

  { topic:"Endo", type:"s2c", stem:"-lutamide", q:"What class?",
    c:["Estrogen","Progestin","Antiandrogen","Androgen"], a:2,
    p:"<strong>-lutamide = antiandrogen</strong>. Fl<em>utamide</em>, bical<em>utamide</em>, nil<em>utamide</em>, en<em>zalutamide</em>. <em>Block androgen receptor</em>. Used for prostate cancer. <em>'Lut' = anti-luteinizing/anti-androgenic effect</em>." },

  // ── GI / GU ────────────────────────────────────────────────────────
  { topic:"GI", type:"s2c", stem:"-prazole", q:"What class?",
    c:["H2 blocker","PPI","Antacid","5-HT3 antagonist"], a:1,
    p:"<strong>-prazole = PPI (proton pump inhibitor)</strong>. Ome<em>prazole</em>, pantopr<em>azole</em>, esomeprazole, lansoprazole. <em>Irreversibly inhibit H/K-ATPase</em> on gastric parietal cells. SE long-term: <em>B12 deficiency, hypoMg, C. diff, CAP, osteoporosis, rebound acid</em>." },

  { topic:"GI", type:"tricky", stem:"-tidine", q:"What class?",
    c:["PPI","H2 blocker","Antacid","5-HT3 antagonist"], a:1,
    p:"<strong>-tidine = H2 blocker</strong>. Cime<em>tidine</em>, rani<em>tidine</em> (withdrawn — NDMA), famo<em>tidine</em>, niza<em>tidine</em>. <em>Block H2 receptors on parietal cells → ↓ acid</em>. <strong>Cimetidine = P450 inhibitor + antiandrogen (gynecomastia)</strong>. <em>Don't confuse with -tigine (lamotrigine = anticonvulsant) or -dine alone</em>." },

  { topic:"GI", type:"s2c", stem:"-setron", q:"What class?",
    c:["H2 blocker","D2 antagonist antiemetic","5-HT3 antagonist (antiemetic)","Antacid"], a:2,
    p:"<strong>-setron = 5-HT3 antagonist (antiemetic)</strong>. Ondan<em>setron</em>, granise<em>tron</em>, palonosetron, dolase<em>tron</em>. <em>Used for chemo/post-op/radiation N/V</em>. SE: <em>QT prolongation, headache, constipation, serotonin syndrome (rare)</em>. First-line for chemo nausea." },

  { topic:"GI", type:"s2c", stem:"-prost / -prostol", q:"What class?",
    c:["Antimuscarinic","Prostaglandin analog","Steroid","Bile acid"], a:1,
    p:"<strong>-prost / -prostol = prostaglandin analog</strong>. Mi<em>soprostol</em> (PGE1 — NSAID ulcer prevention, cervical ripening, medical abortion), latano<em>prost</em>/bimato<em>prost</em>/travo<em>prost</em> (PGF2α — glaucoma, ↑ uveoscleral outflow), epo<em>prostenol</em> (pulm HTN)." },

  // ── PULM / IMMUNO ──────────────────────────────────────────────────
  { topic:"Pulm", type:"s2c", stem:"-terol", q:"What class?",
    c:["β-blocker","β2-agonist (bronchodilator)","Inhaled steroid","Anticholinergic"], a:1,
    p:"<strong>-terol = β2-agonist</strong>. Albu<em>terol</em>, salme<em>terol</em>, forme<em>terol</em>, terbu<em>taline</em>, levalbu<em>terol</em>. <em>Short-acting (SABA): albuterol, levalbuterol</em>. <em>Long-acting (LABA): salmeterol, formoterol</em>. SE: <em>tremor, tachycardia, hypoK</em>. Terbutaline = tocolytic." },

  { topic:"Pulm", type:"tricky", drug:"Atenolol", stem:"-terol vs -olol", q:"Atenolol — careful! Don't confuse '-olol' and '-terol.' Class?",
    c:["β2-agonist","β-blocker (cardioselective β1)","α1-blocker","ACE inhibitor"], a:1,
    p:"<strong>Atenolol = β-blocker (-olol)</strong>. <em>-olol = β-blockers; -terol = β2-agonists</em>. Cardioselective β1 blockers: <em>'A BEAM' — Atenolol, Betaxolol, Esmolol, Acebutolol, Metoprolol</em>. Non-selective: propranolol, nadolol, timolol. Mixed α/β: carvedilol, labetalol." },

  { topic:"Pulm", type:"s2c", stem:"-tropium / -tropine", q:"What class?",
    c:["β2-agonist","Anticholinergic (muscarinic antagonist)","Inhaled steroid","Leukotriene blocker"], a:1,
    p:"<strong>-tropium / -tropine = muscarinic antagonist</strong>. A<em>tropine</em>, ipra<em>tropium</em> (short-acting), tio<em>tropium</em> (long-acting), umec<em>lidinium</em>. <em>Block M3 in airway → bronchodilation</em>. Used for COPD primarily; atropine for bradycardia + organophosphate poisoning." },

  // ── PAIN / INFLAMMATION ────────────────────────────────────────────
  { topic:"Pain", type:"s2c", stem:"-rofen / -fenac", q:"What class?",
    c:["Opioid","NSAID","Steroid","Acetaminophen-like"], a:1,
    p:"<strong>-rofen / -fenac = NSAID</strong>. Ibup<em>rofen</em>, ketop<em>rofen</em>, naprosyn (naproxen), diclo<em>fenac</em>, ketoro<em>lac</em>. <em>Reversible COX-1 + COX-2 inhibitors</em>. <em>Aspirin = irreversible (acetylates serine)</em>. SE: GI ulcer, AKI, ↑ BP, asthma exacerbation (aspirin-sensitive)." },

  { topic:"Pain", type:"s2c", stem:"-coxib", q:"What class?",
    c:["Non-selective NSAID","COX-2 selective inhibitor","Opioid","Steroid"], a:1,
    p:"<strong>-coxib = COX-2 selective inhibitor</strong>. Cele<em>coxib</em>, rofe<em>coxib</em> (withdrawn — CV events), val<em>decoxib</em>. <em>Selective COX-2 → ↓ GI ulcer risk but ↑ CV thrombotic events (no platelet COX-1 inhibition)</em>. Used for RA, OA in patients with GI risk." },

  // ── HEME / ONC ─────────────────────────────────────────────────────
  { topic:"HemeOnc", type:"s2c", stem:"-mab", q:"What class? (broadest answer)",
    c:["Tyrosine kinase inhibitor","Monoclonal antibody","Antifungal","Antiviral"], a:1,
    p:"<strong>-mab = monoclonal antibody</strong>. Rituxi<em>mab</em> (anti-CD20), trastuzu<em>mab</em> (anti-HER2), infli<em>ximab</em> (anti-TNF), adalimu<em>mab</em>, ipili<em>mumab</em>, pembrolizu<em>mab</em>. <strong>Naming substems</strong>: -<em>zumab</em> = humanized; -<em>mumab</em> = fully human; -<em>ximab</em> = chimeric; -<em>omab</em> = murine." },

  { topic:"HemeOnc", type:"s2c", stem:"-nib / -tinib", q:"What class?",
    c:["Monoclonal antibody","Small molecule kinase inhibitor","Alkylating agent","Antibiotic"], a:1,
    p:"<strong>-nib / -tinib = small molecule kinase inhibitor</strong>. Imati<em>nib</em> (BCR-ABL, CML), erloti<em>nib</em> (EGFR), suni<em>tinib</em>, ibru<em>tinib</em> (BTK), tofaci<em>tinib</em> (JAK), pembroli<em>nib</em>. Oral; -mabs are infused. Many target-specific therapies; varying SE profiles." },

  { topic:"HemeOnc", type:"s2c", stem:"-rubicin", q:"What class?",
    c:["Alkylating agent","Anthracycline (DNA intercalator + free radicals)","Antimetabolite","Vinca alkaloid"], a:1,
    p:"<strong>-rubicin = anthracycline</strong>. Dau<em>norubicin</em>, dox<em>orubicin</em>, ida<em>rubicin</em>, epirubicin. <em>Intercalate DNA + generate free radicals + inhibit topo II</em>. <strong>Classic SE: dilated cardiomyopathy</strong> (cumulative). Cardioprotection: <em>dexrazoxane</em> (iron chelator)." },

  { topic:"HemeOnc", type:"s2c", stem:"-platin", q:"What class?",
    c:["Anthracycline","Platinum-based alkylator","Antimetabolite","Mitotic inhibitor"], a:1,
    p:"<strong>-platin = platinum chemo</strong>. Cis<em>platin</em>, carbo<em>platin</em>, oxali<em>platin</em>. <em>Cross-link DNA → apoptosis</em>. SE: <em>nephrotox, ototox, peripheral neuropathy</em>. Cisplatin nephrotox: hydrate + amifostine (free radical scavenger)." },

  // ── MISC / TRICKY ───────────────────────────────────────────────────
  { topic:"Tricky", type:"tricky", stem:"-mycin (the ambiguous one)", q:"Which is TRUE about '-mycin'?",

  { topic:"Tricky", type:"tricky", stem:"-azole (split)", q:"Fluconazole vs metronidazole — both end in '-azole.' Same class?",

function loadSave() {
  try {
    const v = localStorage.getItem('suffix_showdown_save');
    if (v) {
      const data = JSON.parse(v);
      Object.assign(STATE, data);
      SYSTEMS.forEach(s => { if (!STATE.systemMastery[s]) STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
      toast('SAVE LOADED', 'xp');
    }
  } catch (e) {}
}
function save() {
  try {
    const data = {
      hp: STATE.hp, maxHp: STATE.maxHp, xp: STATE.xp, level: STATE.level,
      bestStreak: STATE.bestStreak, systemMastery: STATE.systemMastery,
      achievements: STATE.achievements, totalAnswered: STATE.totalAnswered,
      totalCorrect: STATE.totalCorrect
    };
    localStorage.setItem('suffix_showdown_save', JSON.stringify(data));
  } catch (e) {}
}

// ============================================================================
function shuffle(arr) { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function pickRandom(arr, n) { return shuffle(arr).slice(0, n); }
function toast(msg, cls='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + cls;
  setTimeout(() => t.className = 'toast ' + cls, 1500);
}
function unlock(id) {
  if (STATE.achievements[id]) return;
  const ach = ACHIEVEMENTS.find(a => a.id === id);
  if (!ach) return;
  STATE.achievements[id] = true;
  toast(`★ ${ach.name}!`, 'xp');
  save();
}
function checkAchievements() {
  if (STATE.totalAnswered >= 1) unlock('first_rx');
  if (STATE.streak >= 5) unlock('streak_5');
  if (STATE.streak >= 15) unlock('streak_15');
  if (STATE.level >= 5) unlock('level_5');
  if (STATE.level >= 10) unlock('level_10');
  ['Cardio','Antimicro','Tricky'].forEach((sys, i) => {
    const m = STATE.systemMastery[sys];
    const threshold = i === 2 ? 4 : 5;
    if (m.seen >= threshold && (m.correct/m.seen) >= 0.9) {
      unlock(['master_cardio','master_anti','master_tricky'][i]);
    }
  });
}

function renderHUD() {
  let hearts = '';
  for (let i = 0; i < STATE.maxHp; i++) {
    hearts += `<span class="heart ${i < STATE.hp ? '' : 'lost'}">♥</span>`;
  }
  document.getElementById('hearts').innerHTML = hearts;
  document.getElementById('xp-display').textContent = STATE.xp;
  document.getElementById('lvl-display').textContent = STATE.level;
  document.getElementById('streak-display').textContent = STATE.streak + '🔥';
}
function gainXP(amt) {
  STATE.xp += amt;
  const needed = STATE.level * 50;
  if (STATE.xp >= needed) {
    STATE.xp -= needed;
    STATE.level++;
    STATE.maxHp = Math.min(5, 3 + Math.floor(STATE.level / 5));
    STATE.hp = STATE.maxHp;
    toast(`RANK UP! Lvl ${STATE.level}`, 'xp');
  }
  renderHUD();
}

function startMode(mode) {
  STATE.mode = mode;
  STATE.modeStats = { correct: 0, total: 0 };
  STATE.modeIdx = 0;
  STATE.hp = STATE.maxHp;

  let pool = QBANK;
  let limit = 15;
  if (mode === 'cardio') pool = QBANK.filter(q => q.topic === 'Cardio');
  else if (mode === 'antimicro') pool = QBANK.filter(q => q.topic === 'Antimicro');
  else if (mode === 'cns') pool = QBANK.filter(q => q.topic === 'CNS');
  else if (mode === 'endo') pool = QBANK.filter(q => q.topic === 'Endo');
  else if (mode === 'tricky') pool = QBANK.filter(q => q.topic === 'Tricky' || q.type === 'tricky');
  else if (mode === 's2c') pool = QBANK.filter(q => q.type === 's2c');
  else if (mode === 'd2c') pool = QBANK.filter(q => q.type === 'd2c');
  else if (mode === 'endless') { pool = QBANK; limit = 999; }

  STATE.modeQs = mode === 'endless' ? shuffle(pool) : pickRandom(pool, Math.min(limit, pool.length));
  STATE.modeStats.total = STATE.modeQs.length;
  renderHUD();
  nextQuestion();
}

function nextQuestion() {
  if (STATE.hp <= 0) return endRound('LIFE LOST');
  if (STATE.modeIdx >= STATE.modeQs.length) {
    if (STATE.mode === 'endless') {
      STATE.modeQs = shuffle(QBANK); STATE.modeIdx = 0;
    } else return endRound('COMPLETE');
  }
  STATE.currentQ = STATE.modeQs[STATE.modeIdx];
  renderQuestion();
}

function renderDrugDisplay(q) {
  if (q.type === 's2c' || (q.type === 'tricky' && q.stem && !q.drug)) {
    // Suffix-only display
    return `<div class="drug-display suffix-only">
      <div class="label">Suffix Recognition</div>
      <div class="drug-name">${q.stem}</div>
    </div>`;
  } else if (q.drug && q.stem) {
    // Highlight the stem within the drug name
    const drug = q.drug;
    const stem = q.stem.replace(/^-/, '').replace(/\s.*$/, '').toLowerCase();
    const drugLower = drug.toLowerCase();
    const stemIdx = drugLower.lastIndexOf(stem);
    let html;
    if (stemIdx > 0) {
      html = drug.substring(0, stemIdx) + '<span class="stem">' + drug.substring(stemIdx) + '</span>';
    } else {
      html = drug;
    }
    return `<div class="drug-display">
      <div class="label">Drug Name</div>
      <div class="drug-name">${html}</div>
    </div>`;
  } else if (q.drug) {
    return `<div class="drug-display">
      <div class="label">Drug Name</div>
      <div class="drug-name">${q.drug}</div>
    </div>`;
  }
  return '';
}

function renderQuestion() {
  const q = STATE.currentQ;
  const progressTxt = STATE.mode === 'endless'
    ? `Q${STATE.modeStats.correct + 1} • ENDLESS`
    : `Q${STATE.modeIdx + 1} / ${STATE.modeQs.length}`;
  const typeLabels = {
    's2c': 'STEM → CLASS',
    'd2c': 'DRUG → CLASS',
    'c2s': 'CLASS → STEM',
    'tricky': 'TRICKY PAIR'
  };
  panel.innerHTML = `
    <div class="question-area">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
        <span class="q-tag">${typeLabels[q.type] || q.type} • ${q.topic}</span>
        <span style="font-family:'IBM Plex Mono',monospace; color:var(--text-dim); font-size:13px;">${progressTxt}</span>
      </div>
      ${renderDrugDisplay(q)}
      <div class="q-text">${q.q}</div>
      <div class="choices" id="choices">
        ${q.c.map((c, i) => `
          <button class="choice" data-idx="${i}" onclick="answer(${i})">
            <span class="key">${String.fromCharCode(65 + i)}</span>
            <span>${c}</span>
          </button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>
  `;
}

function answer(idx) {
  const q = STATE.currentQ;
  const isCorrect = idx === q.a;
  document.querySelectorAll('.choice').forEach((el, i) => {
    el.classList.add('disabled');
    el.onclick = null;
    if (i === q.a) el.classList.add('correct');
    else if (i === idx) el.classList.add('wrong');
  });

  STATE.totalAnswered++;
  STATE.systemMastery[q.topic].seen++;
  if (isCorrect) {
    STATE.totalCorrect++;
    STATE.systemMastery[q.topic].correct++;
    STATE.modeStats.correct++;
    STATE.streak++;
    if (STATE.streak > STATE.bestStreak) STATE.bestStreak = STATE.streak;
    const xpGain = 8 + Math.min(STATE.streak, 15);
    gainXP(xpGain);
    toast(`+${xpGain} XP`, 'xp');
    if (STATE.mode === 'endless' && STATE.streak >= 25) unlock('survivor');
  } else {
    STATE.streak = 0;
    STATE.hp--;
    toast('✗ -1 HP', 'error');
  }
  renderHUD();
  checkAchievements();
  save();

  document.getElementById('feedback').innerHTML = `
    <div class="pearl-box">
      <div class="pearl-label">★ KEY ★</div>
      <div class="pearl-text">${q.p}</div>
    </div>
    <div class="controls">
      <button class="btn btn-secondary" onclick="renderMenu()">◄ MENU</button>
      <button class="btn" onclick="advance()">${STATE.modeIdx + 1 >= STATE.modeQs.length && STATE.mode !== 'endless' ? 'FINISH ►' : 'NEXT ►'}</button>
    </div>
  `;
}

function advance() {
  STATE.modeIdx++;
  nextQuestion();
}

function endRound(reason) {
  const correct = STATE.modeStats.correct;
  const total = STATE.modeStats.total;
  const livePct = total > 0 ? Math.round(correct/total*100) : 0;

  let rank, rankColor;
  if (livePct === 100 && total >= 15) { rank = 'S'; rankColor = 'var(--rx-amber)'; unlock('perfect_round'); }
  else if (livePct >= 90) { rank = 'A'; rankColor = 'var(--rx-green-bright)'; }
  else if (livePct >= 75) { rank = 'B'; rankColor = 'var(--paper)'; }
  else if (livePct >= 60) { rank = 'C'; rankColor = 'var(--muted-blue)'; }
  else { rank = 'D'; rankColor = 'var(--caution-red)'; }

  const reasonMsg = reason === 'LIFE LOST' ? 'Out of Refills' : 'Prescription Filled';
  panel.innerHTML = `
    <div class="results-screen">
      <div class="results-title">${reasonMsg}</div>
      <div class="rank-badge" style="color:${rankColor}; border-color:${rankColor}; box-shadow: 0 0 25px ${rankColor};">RANK ${rank}</div>
      <div class="results-stats">
        <div class="stat-block"><span class="stat-num">${correct}</span><span class="stat-label">Correct</span></div>
        <div class="stat-block"><span class="stat-num">${livePct}%</span><span class="stat-label">Accuracy</span></div>
        <div class="stat-block"><span class="stat-num">${STATE.bestStreak}</span><span class="stat-label">Best Streak</span></div>
      </div>
      <div class="controls" style="justify-content:center;">
        <button class="btn btn-secondary" onclick="renderMenu()">◄ MENU</button>
        <button class="btn" onclick="startMode('${STATE.mode}')">↻ AGAIN</button>
      </div>
    </div>
  `;
  STATE.streak = 0;
  renderHUD();
  save();
}


// ============================================================================
// SYNC — Export / Import save codes across devices
// ============================================================================
function showSyncModal() {
  const data = {
    hp: STATE.hp, maxHp: STATE.maxHp, xp: STATE.xp, level: STATE.level,
    bestStreak: STATE.bestStreak, systemMastery: STATE.systemMastery,
    achievements: STATE.achievements, totalAnswered: STATE.totalAnswered,
    totalCorrect: STATE.totalCorrect
  };
  const code = btoa(unescape(encodeURIComponent(JSON.stringify(data))));

  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>🔄 SYNC SAVE</h2>
        <p style="font-size:14px; opacity:0.75; margin-bottom:18px;">Transfer your progress between devices. Copy code from one, paste on the other.</p>

        <div style="margin-bottom:20px; padding:14px; background:rgba(0,0,0,0.25); border-radius:4px; border:1px solid rgba(128,128,128,0.25);">
          <h3 style="font-size:15px; margin-bottom:8px; opacity:0.9;">📤 EXPORT &mdash; from this device</h3>
          <p style="font-size:13px; opacity:0.65; margin-bottom:8px;">Copy this code, then paste it on your other device:</p>
          <textarea id="sync-export-code" readonly style="width:100%; height:90px; font-family:monospace; font-size:11px; padding:8px; background:rgba(0,0,0,0.45); color:inherit; border:1px solid rgba(128,128,128,0.4); border-radius:3px; resize:none; word-break:break-all;">${code}</textarea>
          <button class="btn btn-secondary" style="margin-top:10px; width:100%;" onclick="copyExportCode()">📋 Copy to Clipboard</button>
        </div>

        <div style="margin-bottom:20px; padding:14px; background:rgba(0,0,0,0.25); border-radius:4px; border:1px solid rgba(128,128,128,0.25);">
          <h3 style="font-size:15px; margin-bottom:8px; opacity:0.9;">📥 IMPORT &mdash; from another device</h3>
          <p style="font-size:13px; opacity:0.65; margin-bottom:8px;">Paste a save code from your other device:</p>
          <textarea id="sync-import-code" placeholder="Paste save code here..." style="width:100%; height:90px; font-family:monospace; font-size:11px; padding:8px; background:rgba(0,0,0,0.45); color:inherit; border:1px solid rgba(128,128,128,0.4); border-radius:3px; resize:none;"></textarea>
          <button class="btn" style="margin-top:10px; width:100%;" onclick="applyImport()">✓ Apply Import</button>
        </div>

        <div style="text-align:center;">
          <button class="btn btn-secondary" onclick="closeModal()">CLOSE</button>
        </div>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function copyExportCode() {
  const ta = document.getElementById('sync-export-code');
  if (!ta) return;
  ta.select();
  ta.setSelectionRange(0, 99999);
  let ok = false;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(ta.value).then(
      () => toast('COPIED!', 'xp'),
      () => {
        try { ok = document.execCommand('copy'); } catch (e) {}
        if (ok) toast('COPIED!', 'xp');
        else toast('Select & copy manually', 'error');
      }
    );
  } else {
    try { ok = document.execCommand('copy'); } catch (e) {}
    if (ok) toast('COPIED!', 'xp');
    else toast('Select & copy manually', 'error');
  }
}

function applyImport() {
  const ta = document.getElementById('sync-import-code');
  if (!ta) return;
  const code = ta.value.trim();
  if (!code) { toast('Paste a code first', 'error'); return; }
  try {
    let json;
    try { json = decodeURIComponent(escape(atob(code))); }
    catch (e) { json = atob(code); }
    const data = JSON.parse(json);
    if (typeof data.xp !== 'number' || !data.systemMastery) {
      throw new Error('Invalid save format');
    }
    if (!confirm('This will REPLACE your current progress on this device. Continue?')) return;
    Object.assign(STATE, data);
    SYSTEMS.forEach(s => { if (!STATE.systemMastery[s]) STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
    if (!STATE.achievements) STATE.achievements = {};
    save();
    closeModal();
    toast('SAVE IMPORTED!', 'xp');
    renderMenu();
  } catch (e) {
    toast('Invalid code — try again', 'error');
  }
}

function showAchievements() {
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>★ ACHIEVEMENTS</h2>
        <div class="achievement-list">
          ${ACHIEVEMENTS.map(a => `
            <div class="achievement ${STATE.achievements[a.id] ? 'unlocked' : 'locked'}">
              <span class="ach-icon">${STATE.achievements[a.id] ? a.icon : '🔒'}</span>
              <div>
                <strong>${a.name}</strong><br>
                <span style="font-size:12px; color:var(--text-dim);">${a.desc}</span>
              </div>
            </div>`).join('')}
        </div>
        <button class="btn" onclick="closeModal()">CLOSE</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function showStats() {
  const totalPct = STATE.totalAnswered ? Math.round(STATE.totalCorrect/STATE.totalAnswered*100) : 0;
  const html = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>⌬ LIFETIME STATS</h2>
        <p><strong style="color:var(--rx-amber)">Total Answered:</strong> ${STATE.totalAnswered}</p>
        <p><strong style="color:var(--rx-green-bright)">Total Correct:</strong> ${STATE.totalCorrect}</p>
        <p><strong style="color:var(--paper)">Lifetime Accuracy:</strong> ${totalPct}%</p>
        <p><strong style="color:var(--caution-red)">Best Streak:</strong> ${STATE.bestStreak}🔥</p>
        <p><strong style="color:var(--muted-blue)">Current Rank:</strong> ${STATE.level}</p>
        <p><strong>Achievements:</strong> ${Object.keys(STATE.achievements).length} / ${ACHIEVEMENTS.length}</p>
        <button class="btn" onclick="closeModal()">CLOSE</button>
      </div>
    </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
}

function closeModal() { document.querySelector('.modal-overlay')?.remove(); }

function resetSave() {
  if (!confirm('Reset ALL Suffix Showdown progress?')) return;
  try { localStorage.removeItem('suffix_showdown_save'); } catch (e) {}
  STATE.hp = 3; STATE.maxHp = 3; STATE.xp = 0; STATE.level = 1;
  STATE.streak = 0; STATE.bestStreak = 0; STATE.totalAnswered = 0; STATE.totalCorrect = 0;
  STATE.achievements = {};
  SYSTEMS.forEach(s => { STATE.systemMastery[s] = { seen: 0, correct: 0 }; });
  toast('SAVE RESET');
  renderMenu();
}

document.addEventListener('keydown', (e) => {
  if (STATE.mode === 'menu' || !STATE.currentQ) return;
  const choices = document.querySelectorAll('.choice:not(.disabled)');
  if (choices.length === 0) {
    if (e.key === 'Enter') {
      const nextBtn = document.querySelector('.controls .btn:not(.btn-secondary):not(.btn-danger)');
      nextBtn?.click();
    }
    return;
  }
  const keyIdx = ['a','b','c','d','1','2','3','4'].indexOf(e.key.toLowerCase());
  if (keyIdx >= 0) {
    const idx = keyIdx >= 4 ? keyIdx - 4 : keyIdx;
    if (choices[idx]) answer(idx);
  }
});

loadSave();
renderMenu();
</script>
</body>
</html>
